name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # Fast tests — no data access needed
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install
      - name: Run tests
        env:
          LSMS_SKIP_AUTH: "1"
        run: poetry run pytest

  # DVC lockfile freshness — runs on all branches but does not block PRs.
  # Core library changes (country.py, local_tools.py) dirty every country's
  # lockfile even when outputs are unchanged; a full rebuild requires S3
  # data access and 20+ minutes.  Keep this advisory so it doesn't block
  # routine development.
  dvc-lock-check:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install
      - name: Verify DVC lockfiles
        env:
          LSMS_SKIP_AUTH: "1"
        run: poetry run python -m lsms_library.cli refresh-dvc-locks --all --check

  # Full data tests — builds Uganda tables and runs invariance checks
  data-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/separate_data')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install
      - name: Configure DVC credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LSMS_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LSMS_AWS_SECRET_ACCESS_KEY }}
        run: |
          cat > lsms_library/countries/.dvc/s3_creds <<EOF
          [default]
          aws_access_key_id = ${AWS_ACCESS_KEY_ID}
          aws_secret_access_key = ${AWS_SECRET_ACCESS_KEY}
          EOF
      - name: Build Uganda tables
        run: |
          cd lsms_library/countries/Uganda/_
          poetry run make -j2
        timeout-minutes: 30
      - name: Run full test suite
        run: poetry run pytest --tb=short
