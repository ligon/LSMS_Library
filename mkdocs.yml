site_name: LSMS Library
site_description: Uniform interface to Living Standards Measurement Study household surveys
site_url: https://ligon.github.io/LSMS_Library
repo_url: https://github.com/ligon/LSMS_Library
repo_name: ligon/LSMS_Library

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            docstring_style: numpy
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            heading_level: 2

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - Country: guide/country.md
      - Feature: guide/feature.md
      - Caching: guide/caching.md
      - Panel Data: guide/panel-data.md
  - API Reference:
      - Country: api/country.md
      - Wave: api/wave.md
      - Feature: api/feature.md
  - Contributing: contributing.md
