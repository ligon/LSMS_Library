Country: Serbia

Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    Rural: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float

  food_acquired:
    # Built by 2007/_/food_acquired.py -> canonical (t, i, j, u, s) with
    # [Quantity, Expenditure, Price]. Source is the 7-day consumption diary
    # (m5_1_diary). s is read from the per-entry `izvor` flag:
    # 1=purchased, 2=produced, 3=inkind, NaN (meals away)=purchased. Price is
    # an informational median daily unit value. food_prices / food_quantities /
    # food_expenditures auto-derive at runtime (_FOOD_DERIVED) -- do NOT
    # register them here.
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float
    materialize: make

  housing:
    index: (t, i)
    Water: str
    Toilet: str

  interview_date:
    index: (t, i)
    Int_t: datetime
