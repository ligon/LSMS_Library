Country: Serbia

cluster_features:
    file: "../Data/enumeration_district.dta"
    idxvars:
        v: popkrug
    myvars:
        Region: region2
        Rural:
            - tip
            - mapping:
                urban: Urban
                rural: Rural

household_roster:
    file:
        - "../Data/individual.dta"
    idxvars:
        v: popkrug
        i: dom
        pid: lice
    myvars:
        Sex: pol
        Relationship: srodstvo
        Age: starost
        MonthsSpent: prisustvo

sample:
    dfs:
        - df_hh
        - df_ed
    df_hh:
        file: "../Data/domacinstva.dta"
        idxvars:
            i: [popkrug, naselje, dom]
        myvars:
            v: popkrug
            weight: hhweight
            panel_weight: popweight
    df_ed:
        file: "../Data/enumeration_district.dta"
        idxvars:
            v: popkrug
        myvars:
            Rural:
                - tip
                - mapping:
                    urban: Urban
                    rural: Rural
            strata: region2
    merge_on:
        - v
    final_index:
        - i
        - t