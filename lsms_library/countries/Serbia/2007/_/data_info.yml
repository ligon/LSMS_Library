Country: Serbia

cluster_features:
    file: "../Data/enumeration_district.dta"
    idxvars:
        v: popkrug
    myvars:
        Region: region2
        Rural:
            - tip
            - mapping:
                urban: Urban
                rural: Rural

assets:
    file: "../Data/m2_durables.dta"
    idxvars:
        i: [opstina, popkrug, dom]
        j: s26
    myvars:
        Quantity: s27
        Age: s28
        Value:
            - s30
            - mappings: to_float

household_roster:
    file:
        - "../Data/individual.dta"
    idxvars:
        v: popkrug
        i: [opstina, popkrug, dom]
        pid: lice
    myvars:
        Sex: pol
        Relationship: srodstvo
        Age: starost
        MonthsSpent: prisustvo

sample:
    dfs:
        - df_hh
        - df_ed
    df_hh:
        file: "../Data/domacinstva.dta"
        idxvars:
            i: [opstina, popkrug, dom]
        myvars:
            v: popkrug
            weight: hhweight
            panel_weight: popweight
    df_ed:
        file: "../Data/enumeration_district.dta"
        idxvars:
            v: popkrug
        myvars:
            Rural:
                - tip
                - mapping:
                    urban: Urban
                    rural: Rural
            strata: region2
    merge_on:
        - v
    final_index:
        - i
        - t

individual_education:
    # Education embedded in the roster file individual.dta; obrazovanje is the
    # attainment code (00-11). pid=lice matches the roster (0% spine orphans).
    file:
        - "../Data/individual.dta"
    idxvars:
        i: [opstina, popkrug, dom]
        pid: lice
    myvars:
        Educational Attainment: obrazovanje