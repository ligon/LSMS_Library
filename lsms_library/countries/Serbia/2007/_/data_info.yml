Country: Serbia

cluster_features:
    file: "../Data/enumeration_district.dta"
    idxvars:
        v: popkrug
    myvars:
        Region: region2
        Rural:
            - tip
            - mapping:
                urban: Urban
                rural: Rural

assets:
    file: "../Data/m2_durables.dta"
    idxvars:
        i: [opstina, popkrug, dom]
        j: s26
    myvars:
        Quantity: s27
        Age: s28
        Value:
            - s30
            - mappings: to_float

household_roster:
    file:
        - "../Data/individual.dta"
    idxvars:
        v: popkrug
        i: [opstina, popkrug, dom]
        pid: lice
    myvars:
        Sex: pol
        Relationship: srodstvo
        Age: starost
        MonthsSpent: prisustvo

sample:
    dfs:
        - df_hh
        - df_ed
    df_hh:
        file: "../Data/domacinstva.dta"
        idxvars:
            i: [opstina, popkrug, dom]
        myvars:
            v: popkrug
            # GH #500: carry the full settlement key (opstina, popkrug) as
            # plain columns so the df_hh<->df_ed join can match on it.  The
            # household id `i` collapses [opstina, popkrug, dom] into one
            # composite string, so opstina/popkrug aren't otherwise available
            # as merge keys.  Dropped after the merge via `drop:` below.
            opstina: opstina
            popkrug: popkrug
            weight: hhweight
            panel_weight: popweight
    df_ed:
        file: "../Data/enumeration_district.dta"
        # GH #500: opstina+popkrug is the unique settlement key in the
        # enumeration-district file (popkrug alone is non-unique: 510 rows ->
        # 328 unique popkrug).  Merging on popkrug (= v) alone multiplied
        # household rows ~2x, then _normalize_dataframe_index collapsed the
        # duplicate (i,t) tuples via groupby().first(), arbitrarily picking one
        # cluster per household.  Joining on the full key makes it 1:1.
        idxvars:
            opstina: opstina
            popkrug: popkrug
        myvars:
            Rural:
                - tip
                - mapping:
                    urban: Urban
                    rural: Rural
            strata: region2
    merge_on:
        - opstina
        - popkrug
    drop:
        - opstina
        - popkrug
    final_index:
        - i
        - t

interview_date:
    # Household file domacinstva.dta; Int_t from dana/mesa/goda (day/month/year)
    # via mapping.py:Int_t. i=[opstina,popkrug,dom] matches roster. 100% coverage.
    file:
        - "../Data/domacinstva.dta"
    idxvars:
        i: [opstina, popkrug, dom]
    myvars:
        Int_t:
            - dana
            - mesa
            - goda

housing:
    # Dwelling water/sanitation module (bo*) in household.dta. Administered to a
    # sub-sample (~2744 of 5557 HH; rest NaN). i=[opstina,popkrug,dom] matches
    # roster. No Roof/Floor/Walls/Tenure/Rooms/Electricity in this survey: the bo*
    # block is exclusively a water-and-sanitation module, so housing declares only
    # the Water and Toilet subset. Values are decoded NAME strings (value labels).
    file:
        - "../Data/household.dta"
    idxvars:
        i: [opstina, popkrug, dom]
    myvars:
        Water: bo2_1
        Toilet: bo28

individual_education:
    # Education embedded in the roster file individual.dta; obrazovanje is the
    # attainment code (00-11). pid=lice matches the roster (0% spine orphans).
    file:
        - "../Data/individual.dta"
    idxvars:
        i: [opstina, popkrug, dom]
        pid: lice
    myvars:
        Educational Attainment: obrazovanje
