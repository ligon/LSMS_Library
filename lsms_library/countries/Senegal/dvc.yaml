stages:
  materialize:
    do:
      cmd: cd _ && LSMS_USE_DVC_CACHE=false python3 -m lsms_library.cli materialize --country "${item.country}" --all-waves --table "${item.table}" --format "${item.format}" --out ../var/${item.table}.${item.format}
      deps:
      - ../../cli.py
      - ../../country.py
      - ../../local_tools.py
      - _
      outs:
      - var/${item.table}.${item.format}
    foreach:
      senegal::::cluster_features:
        country: Senegal
        wave: null
        table: cluster_features
        format: parquet
      senegal::::household_roster:
        country: Senegal
        wave: null
        table: household_roster
        format: parquet
