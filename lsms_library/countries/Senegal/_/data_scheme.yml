Country: Senegal

Waves:
  - 2018-19
  - 2021-22

Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    Rural: str
    Latitude: float
    Longitude: float

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str
  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind / other).  The wave-level
    # mapping.py imports food_acquired_to_canonical as food_acquired
    # to reshape the wide-form (Quantity-total, Produced-subset,
    # Expenditure) into long-form on s.  `visit` (vague) is dropped:
    # in EHCVM 2018-19 / 2021-22 it's a sample split, not a repeated
    # measure (each grappe surveyed in exactly one vague), so
    # households are uniquely keyed by (t, v, i, j, u, s) without it.
    index: (t, v, i, j, u, s)
    Quantity: float
    Expenditure: float
  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  interview_date:
    index: (t, i)
    Int_t: datetime

  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata:
      type: str
      optional: true
    Rural: str

  panel_ids: !make
