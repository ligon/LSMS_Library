Country: Senegal

Waves:
  - 2018-19
  - 2021-22

Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    Rural: str
    Latitude: float
    Longitude: float

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  subjective_well_being:
    # EHCVM Section 20 'Pauvreté relative' self-placement ladder.
    # Single item: respondent classes the household on a 4-point
    # welfare scale (Très pauvre / Pauvre / Moyen / Riche) mapped to
    # Own Step 1-4 (higher = better off, consistent with Malawi/Cantril).
    # Ne sait pas / Refus / NaN -> NaN.  Source item: s20q05 (2018-19),
    # s20aq05 (2021-22, after §20 was split into a/b/c subsections).
    # Only 'Own Step' is asked (no Neighbors/Friends placement).
    index: (t, i)
    Own Step: int

  food_security:
    # FAO FIES 8-item experience scale, EHCVM Section 8A 'Sécurité
    # alimentaire' (recall: last 12 months).  Source items s08aq01..
    # s08aq08 map IN ORDER to the FAO items Worried..WholeDay.
    # Oui->True, Non->False, Ne sait pas / Refus / NaN -> NaN.
    # FIES_score = count of True across the 8 items (0-8), NaN only if
    # all eight are NaN.  Both EHCVM waves (2018-19, 2021-22).
    index: (t, i)
    Worried: bool
    HealthyDiet: bool
    FewFoods: bool
    SkippedMeal: bool
    AteLess: bool
    RanOut: bool
    Hungry: bool
    WholeDay: bool
    FIES_score: int

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str
  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind / other).  The wave-level
    # mapping.py imports food_acquired_to_canonical as food_acquired
    # to reshape the wide-form (Quantity-total, Produced-subset,
    # Expenditure) into long-form on s.  `visit` (vague) is dropped:
    # in EHCVM 2018-19 / 2021-22 it's a sample split, not a repeated
    # measure (each grappe surveyed in exactly one vague), so
    # households are uniquely keyed by (t, v, i, j, u, s) without it.
    index: (t, v, i, j, u, s)
    Quantity: float
    Expenditure: float
    # DECLARED many-to-one merge (GH #323).  harmonize_food deliberately maps
    # several 2021-22 Original Labels onto ONE Preferred Label, because the
    # 2021-22 questionnaire SPLIT four items that 2018-19 recorded as one:
    #   Café                             <- Café en poudre + Café soluble
    #   Arachides décortiquées ou pilées <- Arachides décortiquées + ... pilées
    #   Crabes, crevettes                <- Crabes + Crevettes fraiches
    #   Lait frais                       <- Lait frais industriel + non industriel
    # Re-merging them restores cross-wave comparability, so the merge is
    # INTENDED -- but it makes the declared index non-unique for 218 rows in
    # 2021-22 (0 in 2018-19, where the split never happened).  Rows can only
    # collide when the native unit `u` is IDENTICAL (u is in the index), so
    # Quantity and Expenditure are extensive and SUM is exact -- it neither
    # double-counts (the colliding rows are DISTINCT source items) nor discards
    # (which groupby().first() would: it would erase 44,870 of 96,455 CFA and
    # 1,545 of 2,588 units across the 436 colliding rows).
    aggregation:
      on_duplicate_index:
        Quantity: sum
        Expenditure: sum
  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  interview_date:
    # EHCVM records start+end timestamps for each enumerator visit needed to
    # complete the questionnaire (distinct from the survey round, which `t`
    # carries).  Both visits are preserved on an ordinal `visit` level, melted
    # by senegal.interview_date; v auto-joins from sample() -> grain
    # (t, v, i, visit).  Collapsing `visit` with `first` reproduces the legacy
    # visit-1-start single-date table.
    index: (t, i, visit)
    Interview start: datetime
    Interview end: datetime
    aggregation:
      visit: first

  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata:
      type: str
      optional: true
    Rural: str

  panel_ids: !make

  plot_features:
    # Lasting parcel-level characteristics from the EHCVM agriculture
    # module s16a (GH #167; copies the Mali EHCVM reference, PR #284).
    # EHCVM waves only: 2018-19 and 2021-22.  plot_id =
    # "{field_no}_{parcel_no}".  Latitude / Longitude are NOT emitted —
    # EHCVM s16a has no decimal-degree parcel GPS (s16aq47 is an area,
    # not a coordinate); deferred as in Uganda.  Senegal-specific delta:
    # 2021-22 relabels s16aq10 code 3 "Fermage/colonage" but the integer
    # code is unchanged (still rented_in); the harmonizer keys on codes.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    SoilType: str
    Irrigated: bool
    materialize: make

  livestock:
    # Item-level livestock roster (GAP 4), cloned from the Niger EHCVM
    # template.  One row per REPORTED (household, species) the household
    # owns/raises, from the EHCVM Section 17 'Élevage' roster
    # (s17_me_sen2018.dta).  The WB .do collapses this to a single
    # engaged-in-livestock y/n binary (recoverable as
    # groupby(['t','i']).any() over these rows); TLU is a Σ(head × factor)
    # transformation — neither is a column here (item-level discipline).
    #
    # GRAIN (t, i, animal) — NO v level: 'livestock' is in the framework's
    # _no_v_join set, so the household-level rows carry no cluster level and
    # the framework does NOT join one from sample().  `animal` is the
    # harmonized species Preferred Label (harmonize_species_ehcvm; codes
    # 1-11).  EHCVM 2018-19 only (the 2021-22 round lacks this section).
    #
    # COLUMNS (reported, item-level): HeadCount (owned now), HeadAcquired
    # (number bought in the last 12 months), HeadSold (number sold on the
    # hoof in the last 12 months).  A `Value` (herd value) column is
    # intentionally OMITTED: EHCVM s17 records no current herd value.
    index: (t, i, animal)
    HeadCount: float
    HeadAcquired: float
    HeadSold: float
    materialize: make

  crop_production:
    # Item-level crop harvest (GAP 1), cloned from the Niger EHCVM template.
    # One row per REPORTED (field, parcel, crop) harvest line from the EHCVM
    # agriculture module s16c (s16c_me_sen2018.dta) — REPORTED values only;
    # harvest_kg / yield / main_crop / value-shares are transformations,
    # never columns here.  EHCVM 2018-19 only.  crop joins food via
    # harmonize_food Preferred Labels; u via the u table (both label-
    # preserving — Senegal's tables cover a subset of the s16c labels, the
    # rest surface in raw French and are flagged by the sanity checker).
    # plot = "{s16cq02}_{s16cq03}" aligns with plot_features' plot_id.  `u`
    # is in the index (as in food_acquired): one (plot, crop) can be reported
    # in several units.  Quantity_sold / Value_sold are at plot-crop grain
    # (s16cq16a / s16cq17).  harvest_month is NA (the EHCVM s16c module has
    # no planting/harvest-date question); intercropped from s16cq07.
    index: (t, i, plot, crop, u)
    Quantity: float
    Quantity_sold: float
    Value_sold: float
    harvest_month:
      type: float
      optional: true
    intercropped: bool
    materialize: make

  plot_inputs:
    # Item-level agricultural inputs (GAP 2), cloned from the Niger EHCVM
    # template.  One row per REPORTED input applied by a household from the
    # EHCVM s16b roster (s16b_me_sen2018.dta): input identity, reported
    # quantity used + native unit, purchased flag + reported purchased
    # quantity, and (seed rows) the seed's crop on the shared harmonize_food
    # labels.  REPORTED values only: seed_kg / nitrogen_kg / fertilizer
    # totals are transformations, never columns.  EHCVM 2018-19 only.
    #
    # GRAIN (t, i, input, crop, u): Senegal (like Niger) records inputs at
    # the HOUSEHOLD x input grain, NOT plot x input, so `plot` is NOT in the
    # index (the feature keeps the GAP-2 name).  input -> harmonize_input;
    # u -> the u table; crop -> harmonize_seed_crop on the seed label (both
    # copied from Niger, with the Senegal-specific 'Semences d'arachide' ->
    # Arachide seed slot added).  Non-crop-specific rows (every fertilizer /
    # pesticide; unresolved seed crops) carry the sentinel
    # '(not crop-specific)' rather than NaN — a NaN index level would be
    # silently dropped by the framework's canonical NaN-key de-dup collapse.
    # A missing unit is filled with the 'Manquant' u label for the same
    # non-null reason.
    index: (t, i, input, crop, u)
    Quantity: float
    Purchased: bool
    Quantity_purchased: float
    # DECLARED many-to-one merge (GH #323), same mechanism as food_acquired.
    # harmonize_input maps all 11 seed types -> 'Seed', and harmonize_seed_crop
    # maps the three CATCH-ALL seed labels ('Autres semences', 'Plants/boutures
    # de tubercules', "Semences d'autres céréales") -> the same 'Autre crop'.
    # Crop-specific seeds stay distinct (their crop separates them); ONLY the
    # catch-all bucket collides -- exactly 15 groups / 30 rows, all
    # ('Seed', 'Autre crop').
    # SUM is exact, not a guess: each colliding pair is two DISTINCT source
    # items (verified against s16b_me_sen2018.dta -- 0 duplicate source records
    # on (grappe, menage, s16bq01, s16bq03b)), reported in the SAME unit u.  The
    # five equal-valued pairs (e.g. 2.0 + 2.0 kg) are coincidence, not a
    # duplicated record, so summing does not double-count.
    # groupby().first() was DESTROYING 819.5 of 1,478.5 units of seed (55%) and
    # resolving the one conflicting Purchased flag (i=341003: Non + Oui) by row
    # order; `any` makes it well-defined.
    aggregation:
      on_duplicate_index:
        Quantity: sum
        Purchased: any
        Quantity_purchased: sum
    materialize: make

  plot_labor:
    # Item-level plot labor (GAP 3), cloned from the Niger EHCVM template.
    # One row per REPORTED labor SOURCE on a plot, from the EHCVM s16a parcel
    # module (s16a_me_sen2018.dta — the same file plot_features reads).
    # EHCVM records family vs non-family (hired) only (NO free/exchange
    # 'other').  The WB .do collapses these to total_labor_days /
    # total_family_labor_days / total_hired_labor_days / hired_labor_value —
    # all TRANSFORMATIONS over these rows, never columns here.  EHCVM 2018-19
    # only.
    #
    # GRAIN (t, i, plot, source):
    #   plot   -- "{field_no}_{parcel_no}", aligned with crop_production's
    #             plot key and plot_features' plot_id.
    #   source -- 'family' / 'hired' (EHCVM s16a has no 'other' source).
    #             Small fixed vocabulary assigned in code (no categorical
    #             table).
    # COLUMNS (reported): PersonDays -- reported person-days of that source on
    #   the plot (family = Σ member-day cells across the three phase grids;
    #   hired = Σ(#workers × days) over the non-family grids — a within-source
    #   sum of strata, NOT a cross-source rollup).  Wage -- cash PAID to hired
    #   labor (CFA francs); NaN for family.  v auto-joins from sample().
    #   units: PersonDays in days; Wage in CFA francs.
    index: (t, i, plot, source)
    PersonDays: float
    Wage: float
    materialize: make

  people_last7days:
    # Item-level individual 7-day labor (GAP 3), cloned from the Niger EHCVM
    # template.  One row per individual carrying the REPORTED last-7-days
    # labor participation, from the EHCVM s04 7-day module
    # (s04_me_sen2018.dta) merged to the s01 roster (s01_me_sen2018.dta) for
    # working_age.  This is the per-individual activity feature the GAP
    # ranking targets (distinct from Uganda's legacy HH-level count).  No
    # rollups: the WB nb_members_working_age HH total is a transformation.
    # EHCVM 2018-19 only.
    #
    # GRAIN (t, i, pid): pid = s01q00a (matches household_roster).  v
    # auto-joins from sample().
    #
    # COLUMNS (reported, per-individual):
    #   farm_work / SOB_work / wage_work -- worked >=1h on own farm / own
    #       business / for a wage in the last 7 days (nullable bool; s04q06 /
    #       s04q07 / s04q08).
    #   working_age -- member is of working age (Age >= 6, the survey
    #       threshold).
    # The EHCVM 7-day module records hours only for unpaid domestic tasks and
    # the industry only as 12-month occupation codes (not the WB 7-day
    # section ranges), so farm_hrs / SB_hrs / wage_hrs / Industry are NA
    # (declared for cross-wave / cross-country schema parity).
    # units: hours in hours.
    index: (t, i, pid)
    farm_work: bool
    SOB_work: bool
    wage_work: bool
    farm_hrs: {type: float, optional: true}
    SB_hrs: {type: float, optional: true}
    wage_hrs: {type: float, optional: true}
    Industry: {type: str, optional: true}
    working_age: bool
    materialize: make
