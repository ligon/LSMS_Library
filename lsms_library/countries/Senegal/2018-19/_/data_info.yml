subjective_well_being:
    # EHCVM §20 'Pauvreté relative' ladder; s20q05 self-placement on a
    # 4-point welfare scale -> Own Step (higher = better off).
    # Ne sait pas / Refus / NaN -> NaN.
    file: s20_me_sen2018.dta
    idxvars:
        v: grappe
        i:
            - grappe
            - menage
    myvars:
        Own Step:
            - s20q05
            - mapping:
                Très pauvre: 1
                Pauvre: 2
                Moyen: 3
                Riche: 4
                Ne sait pas: null
                Refus: null

housing:
    file: s11_me_sen2018.dta
    idxvars:
        i:
            - grappe
            - menage
    myvars:
        Roof:
            - s11q20
            - mapping:
                Dalle en ciment: Concrete Slab
                Tuile: Clay Tiles
                Tôles: Iron Sheets
                Paille: Thatch
                Banco: Adobe
                Chaume: Thatch
                Nattes: Woven Mats
                'Autre (à préciser)': Other
        Floor:
            - s11q21
            - mapping:
                Carreaux/Marbre: Tiles
                Ciment/Béton: Cement
                Terre battue/Sable: Earth
                "Bouse d'animaux": Dung
                Autre: Other

interview_date:
    file: s00_me_sen2018.dta
    idxvars:
        i:
            - grappe
            - menage
    myvars:
        Int_t: s00q23a

food_security:
    # FAO FIES 8-item scale, EHCVM §8A 'Sécurité alimentaire'.
    # Recall period: last 12 months.  s08aq01..s08aq08 map IN ORDER to
    # the FAO items Worried..WholeDay (verified against variable labels:
    # q01='inquiets de ne pas avoir suffisamment de nourriture',
    # q08='passé toute une journée sans manger').  Oui->True, Non->False,
    # Ne sait pas / Refus / NaN -> NaN.  s08aq07a/s08aq08a are frequency
    # follow-ups and are ignored.  FIES_score (0-8 count of True) is
    # added row-wise by the food_security() function in mapping.py.
    file: s08a_me_sen2018.dta
    idxvars:
        i:
            - grappe
            - menage
    myvars:
        Worried:
            - s08aq01
            - mapping: &fies_map {Oui: true, Non: false, Ne sait pas: null, Refus: null}
        HealthyDiet:
            - s08aq02
            - mapping: *fies_map
        FewFoods:
            - s08aq03
            - mapping: *fies_map
        SkippedMeal:
            - s08aq04
            - mapping: *fies_map
        AteLess:
            - s08aq05
            - mapping: *fies_map
        RanOut:
            - s08aq06
            - mapping: *fies_map
        Hungry:
            - s08aq07
            - mapping: *fies_map
        WholeDay:
            - s08aq08
            - mapping: *fies_map
