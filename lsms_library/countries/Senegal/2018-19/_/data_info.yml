      file: s00_me_sen2018.dta
      idxvars:
          v: grappe
      myvars:
          Region:
              - s00q01
              - mapping:
                  SAINT-LOUIS: Saint-Louis
          Rural:
              - s00q04
              - mapping:
                  Rural: Rural
                  Urbain: Urban
  df_geo:
      file: grappe_gps_sen2018.dta
      idxvars:
          v: grappe
      myvars:
          Latitude: coordonnes_gps__Latitude
          Longitude: coordonnes_gps__Longitude
  merge_on:
      - v
  final_index:
      - t
      - v

