Country: Senegal
Wave: 2018-19

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: s00_me_sen2018.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
        myvars:
            Rural:
                - s00q04
                - mapping:
                    Rural: Rural
                    Urbain: Urban
    df_weights:
        file: ehcvm_ponderations_sen2018.dta
        idxvars:
            v: grappe
        myvars:
            weight: hhweight
            panel_weight: hhweight
    merge_on:
        - v
    final_index:
        - i
        - t

cluster_features:
  dfs:
      - df_main
      - df_geo
