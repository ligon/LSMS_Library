Country: Tajikistan
Wave: 1999
household_roster:
    file:
        - ../Data/SSEC1.DTA
    idxvars:
        v: pop_pt
        i: [pop_pt, hhid]
        pid: iid
    myvars:
        Sex:
            - s1q2
            - mapping:
                1.0: male
                2.0: female
        Age: s1q6
        Marital:
            - s1q7
            - mapping:
                1.0: married
                2.0: nekared
                3.0: divorced
                4.0: living apart but not divorced
                5.0: widow/widower
                6.0: never married
        MonthsAway: s1q9
        Relationship:
            - s1q3
            - mapping:
                1.0: head
                2.0: spouse
                3.0: son/daughter
                4.0: son/daughter-in-law
                5.0: father/mother
                6.0: father/mother of the wife of head
                7.0: father/mother of the husband of head
                8.0: brother/sister
                9.0: grandchild
                10.0: grandparent
                11.0: other relative
                12.0: no relation
                14.0: lodger

cluster_features:
    file: ../Data/SHLDDTA.DTA
    idxvars:
        i: hhid
        v: pop_pt
    myvars:
        Region:
            - region
            - mapping:
                1.0: Dushanbe
                2.0: GBAO
                3.0: Khatlon
                4.0: RRS
                5.0: Sogd
        Rural:
            - settlm
            - mapping:
                1.0: Urban
                2.0: Rural

sample:
    file: ../Data/SHLDDTA.DTA
    idxvars:
        i: [pop_pt, hhid]
    myvars:
        v: pop_pt
        Rural:
            - settlm
            - mapping:
                1.0: Urban
                2.0: Rural

individual_education:
    # s3q2 "highest diploma or certificate obtained" (Section 3 Education).
    # Value labels are stripped in the .dta; codes decoded from the household
    # questionnaire (HH012007-00.pdf) qualification ladder.
    file: ../Data/SSEC3.DTA
    idxvars:
        v: pop_pt
        i: [pop_pt, hhid]
        pid: iid
    myvars:
        Educational Attainment:
            - s3q2
            - mapping:
                1.0: 8th (9th) class
                2.0: secondary school
                3.0: prof-tech school
                4.0: spec tech school
                5.0: higher ed institute
                6.0: candidate of science
                7.0: doctor of science
                8.0: other
                9.0: none
