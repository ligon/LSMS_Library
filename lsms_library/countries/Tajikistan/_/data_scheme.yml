Country: Tajikistan

Data Scheme:
  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make

  life_satisfaction:
    index: (t, i, Domain)
    Satisfaction: str
    materialize: make

  food_security_hfias:
    index: (t, i)
    HFIAS1: int
    HFIAS2: int
    HFIAS3: int
    HFIAS4: int
    HFIAS5: int
    HFIAS6: int
    HFIAS7: int
    HFIAS8: int
    HFIAS9: int
    HFIAS_score: int
    HFIAS_category:
      - Food secure
      - Mildly food insecure
      - Moderately food insecure
      - Severely food insecure
    materialize: make

  cluster_features:
    index: (t, v)
    Region: str
    Rural: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: float
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight:
      type: float
      optional: true
    strata: str
    Rural: str
