Country: Tajikistan

Data Scheme:
  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make

  life_satisfaction:
    index: (t, i, Domain)
    Satisfaction: str
    materialize: make

  food_security_hfias:
    index: (t, i)
    HFIAS1: int
    HFIAS2: int
    HFIAS3: int
    HFIAS4: int
    HFIAS5: int
    HFIAS6: int
    HFIAS7: int
    HFIAS8: int
    HFIAS9: int
    HFIAS_score: int
    HFIAS_category:
      - Food secure
      - Mildly food insecure
      - Moderately food insecure
      - Severely food insecure
    materialize: make

  cluster_features:
    index: (t, v)
    Region: str
    Rural: str
    # All four waves read Region/Rural from the HOUSEHOLD cover file
    # (1999 SHLDDTA, 2003 interview, 2007 r1m0, 2009 m0), so the extraction
    # lands at household grain -- one row per household, `i` alongside `v`.
    # The canonical grain of cluster_features is the CLUSTER, (t, v), so `i`
    # is collapsed away.  The row multiplicity is exactly the two-stage
    # sampling take (households sampled per PSU):
    #
    #   wave   HH rows   PSUs   collapsed   HH per PSU
    #   1999      2000    125        1875      14-18
    #   2003      4160    208        3952      exactly 20
    #   2007      4644    267        4377      exactly 9..20
    #   2009      1503    167        1336      exactly 9
    #
    # Region and Rural are PSU-level attributes REPLICATED across the
    # households of a cluster, so the collapse is lossless: 0 of all 767
    # cluster-waves carry more than one distinct (Region, Rural) -- verified on
    # the raw numeric codes in the source .dta, so no code->label mapping
    # collision can hide a conflict.
    #
    # `unique` (not `first`) is the reducer precisely BECAUSE it is a no-op
    # today: it converts that fact from an unchecked assumption into an
    # invariant re-verified on every build.  If a recode or a new wave ever
    # puts a PSU across two oblasts, this RAISES instead of silently keeping
    # whichever household happened to sort first (GH #323).
    aggregation:
      i: unique

  housing:
    # TLSS dwelling module.  1999 (SSEC2) and 2007 (r1m7a/b/c) field a full
    # structure+utilities block; 2009 (m6b) retained utilities only (the
    # physical-structure block was dropped), so it contributes Water alone.
    # 2003 (module6) is skipped: value labels are stripped in the repo .dta
    # (codes only, no questionnaire in scope to decode them).
    # 1999 omits Water (s2bq40 is distance-to-source in metres, not a source
    # category) and Electricity (s2bq26 is hours/availability, not boolean).
    index: (t, i)
    Tenure: str
    Walls: str
    Roof: str
    Floor: str
    Rooms: int
    Toilet: str
    Water: str
    Electricity: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: float
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  plot_features:
    # Per-plot land roster from TLSS 2007 module 12a (only round with a
    # usable plot roster).  Three subsections merged on a tenure-tagged
    # plot_id: r1m12a1 (owned), r1m12a2 (rented_in), r1m12a3 (rented_out).
    # Area is in sotka (1/100 ha); TenureSystem (legal title) is present for
    # owned plots only.  See _/plot_features.py.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    SoilType: str
    Irrigated: bool
    materialize: make

  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight:
      type: float
      optional: true
    strata: str
    Rural: str
