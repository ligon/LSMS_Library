Country: Tajikistan
Wave: 2007
household_roster:
    file: ../Data/r1m1.dta
    idxvars:
        i: hhid
        pid: memid
    myvars:
        Sex:
            - m1q2
            - mapping:
                'male': male
                'female': female
        Age: m1q3
        Marital:
            - m1q7
            - mapping:
                'married': married
                'married (polygamous union)': married (polygamous union)
                'divorced': divorced
                'living together': living together
                'separated': separated
                'widow/er': widow/er
                'single': single
                'other': other
        MonthsAway: m1q20
        Relationship:
            - m1q5
            - mapping:
                'head': head
                'spouse/partner': spouse/partner
                'son/daughter': son/daughter
                'son/daughter-in-law': son/daughter-in-law
                'father/mother': father/mother
                'father/mother-in-law': father/mother-in-law
                'sister/brother': sister/brother
                'grandchild': grandchild
                'grandparent': grandparent
                'niece/nephew': niece/nephew
                'other relative': other relative
                'not related': not related

cluster_features:
    file: ../Data/r1m0.dta
    idxvars:
        i: hhid
        v: psuid
    myvars:
        Region: h_q7
        Rural: location

sample:
    dfs:
        - df_weights
        - df_pov
    df_weights:
        file: ../Data/weights.dta
        idxvars:
            i: hhid
        myvars:
            v: psuid
            weight: weight
    df_pov:
        file: ../Data/Pov_final.dta
        idxvars:
            i: hhid
        myvars:
            strata: strata
            Rural: location
    merge_on:
        - i
    final_index:
        - i
        - t

individual_education:
    # m3bq5 "what is the highest diploma you have obtained?" — clean 8-level
    # diploma labels in the .dta; pass through verbatim (free-text attainment).
    file: ../Data/r1m3b.dta
    idxvars:
        i: hhid
        pid: memid
    myvars:
        Educational Attainment:
            - m3bq5
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    # Module 7: r1m7a (structure + tenure), r1m7b (electricity),
    # r1m7c (water + toilet).  One row per hhid in each; merged on i.
    # Source labels are already human-readable strings (verbatim pass-through).
    dfs:
        - df_a
        - df_b
        - df_c
    df_a:
        file: ../Data/r1m7a.dta
        idxvars:
            i: hhid
        myvars:
            Tenure: m7aq13
            Walls: m7aq3
            Roof: m7aq4
            Floor: m7aq5
            Rooms: m7aq9
    df_b:
        file: ../Data/r1m7b.dta
        idxvars:
            i: hhid
        myvars:
            Electricity: m7bq9
    df_c:
        file: ../Data/r1m7c.dta
        idxvars:
            i: hhid
        myvars:
            Water: m7cq1
            Toilet: m7cq24
    merge_on:
        - i
    final_index:
        - i
        - t
