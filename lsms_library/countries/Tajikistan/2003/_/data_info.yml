Country: Tajikistan
Wave: 2003
household_roster:
    file:
        - ../Data/module1.dta
    idxvars:
        i: hhid
        pid: hhlid
    myvars:
        Sex:
            - m1q2
            - mapping:
                '횑처챈챰챗챤챕': male
                '횈책챠챰챗챔챕': female
        Age: m1q3_1
        Marital:
            - m1q5
            - mapping:
                1.0: married
                2.0: married (polygamous union)
                3.0: divorced
                4.0: living together
                5.0: widow/widower
                6.0: single
                7.0: other
        Relationship: 
            - m1q4
            - mapping:
                '횄챘횪창횪 채챤챙챤천챤챌첼챕챰챵창횪': head
                '횗처챦챨처찾(횪)/챦횪챨챵챠책챨': spouse/partner
                '횗청챠/채챤첨체': son/daughter
                '횉첼챵체/챠책창책챰챵횪': son/daughter-in-law
                '횓챵책철/챙횪챵체': father/mother
                '횖챤채챔챵책챘챔 챙처챈횪/챈책챠청': father/mother of husband
                '횗책챰챵챨횪/찼챨횪챵': father/mother of wife
                '횂챠처챗(첨챗횪)': brother/sister
                '횆책채처첩챗횪(찼횪찼처첩챗횪)': grandchild
                '횕챘책챙첼챠챠챔철횪/챦챘책챙첼챠챠챔챗': grandparent
                '횆챨처찾챔책 챨챤채챰챵창책챠챠챔챗챔': other relatives
                '횒책 챨챤채챰챵창책챠챠챔챗챔': no relation
