cluster_features:
    file: ../Data/interview.dta
    idxvars:
        i: hhid
        v: tlss_psu
    myvars:
        Region: oblast
        Rural: type_reg

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: ../Data/interview.dta
        idxvars:
            i: hhid
        myvars:
            v: tlss_psu
            Rural: type_reg
    df_weights:
        file: ../Data/new_expend.dta
        idxvars:
            i: hhid
        myvars:
            weight: wgt_nat
    merge_on:
        - i
    final_index:
        - i
        - t

individual_education:
    # m3bq5 "highest diploma obtained" (Module 3b Education).  Value labels are
    # stripped in this wave's .dta; codes 0-7 match the 2007 file's clean
    # m3bq5 ladder ("what is the highest diploma you have obtained?") exactly.
    file: ../Data/module3.dta
    idxvars:
        v: tlss_psu
        i: hhid
        pid: hhlid
    myvars:
        Educational Attainment:
            # Grades-explicit ladder; right-hand values are canonical
            # harmonize_education levels (GH #493) โ a wave with an inline
            # mapping: cannot also carry a mappings: table.
            - m3bq5
            - mapping:
                0.0: None                       # none
                1.0: Primary complete           # primary (grades 1-4)
                2.0: Lower secondary complete   # basic (grades 1-8(9))
                3.0: Upper secondary complete   # secondary general (grades 9-10(11))
                4.0: Vocational/Technical       # secondary special (technikum)
                5.0: Vocational/Technical       # secondary technical
                6.0: Bachelor                   # higher education (VUZ)
                7.0: Postgraduate               # graduate school/aspirantura
