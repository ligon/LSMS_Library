Country: GhanaLSS
Wave: 2012-13

cluster_features:
    file: 
        - PARTA/g6loc_edt.dta
    idxvars:
        v: clust
    myvars:
        Region: region
        Rural: loc2
        Ecological_zone: ez


sample:
    file:
        - PARTA/g6loc_edt.dta
    idxvars:
        i: HID
    myvars:
        v: clust
        weight: weight
        panel_weight: weight
        strata: region
        Rural: loc2

household_roster:
    file: 
        - PARTA/SEC1.dta
    idxvars:
        v: clust
        i: HID
        pid: PID
    myvars:
        Sex: s1q2
        Age: s1q5y
        Birthplace: s1q11
        Relationship: s1q3
        MonthsAway: s1q22

interview_date:
    file: PARTA/SEC0.dta
    idxvars:
        i: HID
    myvars:
        Int_t:
            - ddate
            - mdate
            - ydate

individual_education:
    file:
        - PARTA/SEC2a.dta
    idxvars:
        v: clust
        i: HID
        pid: PID
    myvars:
        Educational Attainment: s2aq2

plot_features:
    # Section 8B (Agricultural land) -- clean per-plot roster, one row per
    # (household, farm).  s8bq3 = "farm number" -> plot_id.  hid is already
    # the clust/nh composite, matching household_roster's i (=HID here).
    # Value labels are lowercase in this wave.  Section 10 is non-farm
    # ENTERPRISES (entno), not plots.
    file:
        - PARTB/sec8b.dta
    idxvars:
        i: hid
        plot_id: s8bq3
    myvars:
        Area: s8bq4a
        AreaUnit:
            # value labels are lowercase in this wave -> Title-case to match
            # the other waves' AreaUnit vocabulary.
            - s8bq4b
            - mapping:
                acres: Acres
                poles: Poles
                ropes: Ropes
                plot: Plot
                hectare: Hectare
                other: Other
        Tenure:
            - s8bq8
            - mapping:
                bought: owned
                rented for cash or in kind: rented_in
                sharecropped by household: sharecropped_in
                use free of charge: use_right
                distributed by village/family: communal
                inherited: inherited



