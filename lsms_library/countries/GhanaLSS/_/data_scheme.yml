Country: GhanaLSS

Waves:
  - '1987-88'
  - '1988-89'
  - '1991-92'
  - '1998-99'
  - '2005-06'
  - '2012-13'
  - '2016-17'

Index Info:
  index_info:
    cluster_features: (t, v)
    household_roster: (t, v, i, pid)
    individual_education: (t, i, pid)
    food_acquired: (t, v, i, j)
    food_security: (t, i)

Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    Rural: str
  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Birthplace: str
    Generation: int
    Distance: int
    Affinity: str
  individual_education:
    index: (t, i, pid)
    Educational Attainment: str
  food_acquired:
    index: (t, i, j)
    Expenditure: float
    Quantity: float
    Price: float
    Produced: float

  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  interview_date:
    index: (t, i)
    Int_t: datetime

  food_security:
    index: (t, i)
    Worried: bool
    HealthyDiet: bool
    FewFoods: bool
    SkippedMeal: bool
    AteLess: bool
    RanOut: bool
    Hungry: bool
    WholeDay: bool
    FIES_score: int

  panel_ids: !make
