Country: GhanaLSS
Wave: 2005-06

cluster_features:
    file: aggregates/pov_gh5.dta
    idxvars:
        v: clust
    myvars:
        Region: region
        Rural: loc2


sample:
    file: parta/sec0.dta
    idxvars:
        i: hhid
    myvars:
        v: clust
        weight: weight
        panel_weight: weight
        strata: region

interview_date:
    file: parta/sec0.dta
    idxvars:
        i: hhid
    myvars:
        Int_t:
            - ddate
            - mdate
            - ydate

household_roster:
    file: parta/sec1.dta
    idxvars:
        v: clust
        i: hhid
        pid: pid
    myvars:
        Sex: s1q2
        Age: s1q5y
        Birthplace: s1q11
        Relationship: s1q3
        MonthsAway: s1q22

individual_education:
    # GLSS5 Section 2A (Education).  s2aq2 = "highest grade completed"; the
    # .dta carries embedded value labels (none, preschool, p1..p6, jss1..jss3,
    # m1..m4, sss1..sss3, voc, teacher training, nursing, polytechnic,
    # university, ...), decoded automatically by get_dataframe().  i = hhid and
    # pid = pid to match this wave's household_roster index.
    file: parta/sec2a.dta
    idxvars:
        v: clust
        i: hhid
        pid: pid
    myvars:
        Educational Attainment:
            - s2aq2
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    # GLSS5 Section 7 dwelling characteristics (parta/sec7.dta).  Wall/Floor/
    # Roof = Part F (s7fq1/2/3); Water = Part D q1a; Toilet = Part D q16;
    # Rooms = Part A q2; Tenure = Part B q1 (occupancy status); Electricity =
    # Part D q11 (main source of lighting).  Value labels in this wave are
    # lowercase -> Title-cased / canonicalized below.  i = hhid, matching the
    # household_roster i for this wave.
    file: parta/sec7.dta
    idxvars:
        i: hhid
    myvars:
        Walls:
            - s7fq1
            - mapping:
                mud/ mud brick: Mud/Earth
                wood/bamboo: Wood/Bamboo
                metal sheet/slate/asbestos: Metal/Asbestos
                stone: Stone
                burned bricks: Burnt Bricks
                cement/sandcrete blocks: Cement/Concrete
                landcrete: Landcrete
                thatch: Thatch
                cardboard: Cardboard
                other: Other
        Floor:
            - s7fq2
            - mapping:
                earth/mud/mud bricks: Earth/Mud
                wood: Wood
                stone: Stone
                cement/concrete: Cement/Concrete
                burnt bricks: Burnt Bricks
                vinyl tiles: Vinyl Tiles
                ceramic/marble/tiles: Ceramic/Marble Tiles
                terrazo: Terrazzo
                other: Other
        Roof:
            - s7fq3
            - mapping:
                palme leaves/raffia/thatch: Thatch
                wood: Wood
                corrugated iron sheets: Metal Sheet
                cement/concrete: Cement/Concrete
                asbestos/slate: Slate/Asbestos
                roofing tiles: Roofing Tiles
                mud bricks/earth: Mud/Earth
                bamboo: Bamboo
                other: Other
        Water: s7dq1a
        Toilet: s7dq16
        Rooms: s7aq2
        Tenure:
            - s7bq1
            - mapping:
                owning: Own
                renting: Rent
                rent-free: Rent-free
                perching: Perching
        Electricity: s7dq11
