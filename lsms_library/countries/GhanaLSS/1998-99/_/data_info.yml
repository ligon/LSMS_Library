Country: GhanaLSS
Wave: 1998-99

cluster_features:
    file: SEC0A.DTA
    idxvars:
        v: clust
    myvars:
        Region: region
        Rural: loc2


sample:
    file: SEC0A.DTA
    idxvars:
        i:
            - clust
            - nh
    myvars:
        v: clust
        strata: region
        Rural: loc2

interview_date:
    file: SEC0A.DTA
    idxvars:
        i:
            - clust
            - nh
    myvars:
        Int_t:
            - dd
            - mm
            - yy

household_roster:
    file: SEC1.DTA
    idxvars:
        v: clust
        i: 
            - clust
            - nh
        pid: pid
    myvars:
        Sex: sex
        Age: agey
        Birthplace: s1q10
        Relationship: rel
        MonthsAway: s1q21

individual_education:
    file: SEC2A.DTA
    idxvars:
        v: clust
        i:
            - clust
            - nh
        pid: pid
    myvars:
        # s2aq2 = "highest level completed" (bare numeric codes in the .dta;
        # decoded from the GLSS4 household questionnaire, Section 2A).
        Educational Attainment:
            - s2aq2
            # GH #171: codes -> canonical ordinal education levels directly.  This
            # wave has an inline code->label step; the framework can't also chain
            # the harmonize_education table on one myvar, so map to canonical here
            # (same targets the table gives the other GhanaLSS waves' text labels).
            - mapping:
                1: None
                2: Pre-primary
                3: Primary complete
                4: Lower secondary complete
                5: Lower secondary complete
                6: Upper secondary complete
                7: Vocational/Technical
                8: Upper secondary complete
                9: Upper secondary complete
                10: Tertiary certificate/diploma
                11: Vocational/Technical
                12: Tertiary certificate/diploma
                13: Tertiary certificate/diploma
                14: Tertiary certificate/diploma
                15: Tertiary certificate/diploma
                16: Bachelor
                17: Informal
                96: Unknown

plot_features:
    # Section 8B (Agricultural land) -- clean per-plot roster, one row per
    # (household, farm).  farmcd = "Farm land number ID" -> plot_id.
    # i = [clust, nh] (no pre-composed hid column in this wave), matching
    # household_roster's i.  s8bq4a/s8bq4b = farm size + unit code.  The
    # .dta carries no value labels, so AreaUnit is decoded with the GLSS
    # area-unit codes (1=Acres,2=Poles,3=Ropes,4=Hectare; verified against
    # the GLSS7 g7sec8b value labels and the code-frequency distribution).
    # s8bq8 ("how land was obtained") is 4 bare codes whose GLSS4 mapping is
    # not recoverable from the available materials, so Tenure is omitted
    # here rather than fabricated.  Section 10 is non-farm ENTERPRISES.
    file: SEC8B.DTA
    idxvars:
        i:
            - clust
            - nh
        plot_id: farmcd
    myvars:
        Area: s8bq4a
        AreaUnit:
            - s8bq4b
            - mapping:
                1: Acres
                2: Poles
                3: Ropes
                4: Hectare

housing:
    # GLSS4 Section 7 dwelling characteristics (SEC7.DTA).  The .dta has variable
    # labels but NO value labels, so codes are decoded from the GLSS4 household
    # questionnaire text (Section 7): walls = Part E q1 (s7eq1), floor = Part E
    # q2 (s7eq2), roof = Part D q3 (s7eq3); water source = Part D q1 (s7dq1 --
    # the "Drinking water cost" label is a misnomer; the column holds the 1-12
    # source code, confirmed by its 1-12 range); lighting = Part D q8 (s7dq8);
    # toilet = Part D q13 (s7dq13); occupancy = Part B (s7bq1); rooms = Part A
    # q2 (s7aq2).  Part E walls/floor code lists follow the GLSS3 instrument
    # (identical structure, verified from the GLSS3 questionnaire).  i =
    # [clust, nh] to match household_roster.
    file: SEC7.DTA
    idxvars:
        i:
            - clust
            - nh
    myvars:
        Walls:
            - s7eq1
            - mapping:
                1: Mud/Earth
                2: Wood
                3: Metal Sheet
                4: Stone/Burnt Bricks
                5: Cement/Concrete
                6: Other
        Floor:
            - s7eq2
            - mapping:
                1: Earth/Mud
                2: Wood
                3: Stone/Brick
                4: Fibre-glass
                5: Cement/Concrete
                6: Other
        Roof:
            - s7eq3
            - mapping:
                1: Thatch
                2: Wood
                3: Metal Sheet
                4: Cement/Concrete
                5: Slate/Asbestos
                6: Other
        Water:
            - s7dq1
            - mapping:
                1: Indoor plumbing
                2: Inside standpipe
                3: Water vendor
                4: Water truck/tanker service
                5: Neighbouring household
                6: Private outside standpipe/tap
                7: Public standpipe
                8: Well with pump
                9: Well without pump
                10: River/lake/spring/pond
                11: Rainwater
                12: Other
        Toilet:
            - s7dq13
            - mapping:
                1: Flush toilet
                2: Pit latrine
                3: Pan/Bucket
                4: KVIP
                5: No toilet
        Rooms: s7aq2
        Tenure:
            - s7bq1
            - mapping:
                1: Own
                2: Rent
                3: Rent-free
                4: Perching
        Electricity:
            - s7dq8
            - mapping:
                1: Electricity (mains)
                2: Generator
                3: Kerosene/Gas lamp
                4: Candles/Torches
                5: Other
