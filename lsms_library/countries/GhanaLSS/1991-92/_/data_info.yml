Country: GhanaLSS
Wave: 1991-92

cluster_features:
    file: POV_GH.DTA
    idxvars:
        v: clust
    myvars:
        Region: region
        Rural: loc2


sample:
    file: POV_GH.DTA
    idxvars:
        i:
            - clust
            - nh
    myvars:
        v: clust
        strata: region
        Rural: loc2

interview_date:
    file: S0A.DTA
    idxvars:
        i:
            - clust
            - nh
    myvars:
        Int_t:
            - dd
            - mm
            - yy

household_roster:
    file: S1.DTA
    idxvars:
        v: clust
        i:
            - clust
            - nh
        pid: pid
    myvars:
        Sex: sex
        Age: agey
        Birthplace: s1q10
        Relationship: rel
        MonthsAway: s1q22

plot_features:
    # Section 8B (Agricultural land) -- clean per-plot roster, one row per
    # (household, farm).  farmcd = farm number -> plot_id.  i = [clust, nh],
    # matching household_roster's i.  This wave has no variable/value labels:
    # s8bq4 = farm size, s8bq4c = unit code (decoded with the GLSS area-unit
    # codes 1=Acres,2=Poles,3=Ropes,4=Hectare; verified against the GLSS7
    # value labels and the code-frequency distribution).  s8bq8 in this wave
    # is a value field (not a tenure code), and the GLSS3 tenure code is not
    # recoverable, so Tenure is omitted.  Section 10 is non-farm ENTERPRISES.
    file: S8B.DTA
    idxvars:
        i:
            - clust
            - nh
        plot_id: farmcd
    myvars:
        Area: s8bq4
        AreaUnit:
            - s8bq4c
            - mapping:
                1: Acres
                2: Poles
                3: Ropes
                4: Hectare

housing:
    # GLSS3 Section 7 dwelling characteristics (S7.DTA).  This wave's .dta has
    # neither variable nor value labels (missing = ~1.75e100 sentinel), so all
    # codes are decoded from the GLSS3 Part-A household questionnaire (Section 7):
    # walls = Part E q35 (s7q35), floor = Part E q36 (s7q36), roof = Part D q37
    # (s7q37), water source = Part D q22 (s7q22), lighting = Part D q29 (s7q29),
    # toilet = Part D q34 (s7q34), occupancy = Part B q11 (s7q11; s7q5 is the
    # FORMER dwelling type, not occupancy), rooms = Part A q2 (s7q2).  Code lists
    # and code ranges verified against the questionnaire text and the data.
    # i = [clust, nh] to match household_roster.
    file: S7.DTA
    idxvars:
        i:
            - clust
            - nh
    myvars:
        Walls:
            - s7q35
            - mapping:
                1: Mud/Earth
                2: Wood
                3: Metal Sheet
                4: Stone/Burnt Bricks
                5: Cement/Concrete
                6: Other
        Floor:
            - s7q36
            - mapping:
                1: Earth/Mud
                2: Wood
                3: Stone/Brick
                4: Fibre-glass
                5: Cement/Concrete
                6: Other
        Roof:
            - s7q37
            - mapping:
                1: Thatch
                2: Wood
                3: Metal Sheet
                4: Cement/Concrete
                5: Slate/Asbestos
                6: Other
        Water:
            - s7q22
            - mapping:
                1: Indoor plumbing
                2: Inside standpipe
                3: Water vendor
                4: Water truck/tanker service
                5: Neighbouring household
                6: Private outside standpipe/tap
                7: Public standpipe
                8: Well with pump
                9: Well without pump
                10: River/lake/spring/pond
                11: Rainwater
                12: Other
        Toilet:
            - s7q34
            - mapping:
                1: Flush toilet
                2: Pit latrine
                3: Pan/Bucket
                4: KVIP
                5: No toilet
                6: Other
        Rooms: s7q2
        Tenure:
            - s7q11
            - mapping:
                1: Own
                2: Rent
                3: Rent-free
                4: Perching
        Electricity:
            - s7q29
            - mapping:
                1: Electricity (mains)
                2: Generator
                3: Kerosene/Gas lamp
                4: Candles/Torches

individual_education:
    file: S2.DTA
    idxvars:
        v: clust
        i:
            - clust
            - nh
        pid: pid
    myvars:
        # GH #171: s2q2 = highest class/form completed (letter ladder P/M/JSS/S/A/T/PS/U,
        # same coding as GLSS1/2); blanks = never-attended (s2q1=2), dropped via mapping.py.
        Educational Attainment:
            - s2q2
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']
