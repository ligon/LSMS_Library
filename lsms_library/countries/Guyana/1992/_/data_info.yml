Country: Guyana
Wave: 1992
cluster_features:
    file:
        - ../Data/COVERN.dta
    idxvars:
        v: ED
        i: HH
    myvars:
        Region: RGN
        Rural:
            - SECTOR
            - mapping:
                1: Urban
                2: Rural

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: ../Data/COVERN.dta
        idxvars:
            i: [ED, HH]
            v: ED
        myvars:
            strata: STNO
            Rural:
                - SECTOR
                - mapping:
                    1: Urban
                    2: Rural
    df_weights:
        file: ../Data/WEIGHT.dta
        idxvars:
            v: ED
        myvars:
            weight: WEIGHT
    merge_on:
        - v
    final_index:
        - i
        - t

household_roster:
    file:
        - ../Data/ROSTERN.dta
    idxvars:
        v: ED
        i: HH
        pid: PID
    myvars:
        Sex:
            - SX
            - mapping:
               1: Male
               2: Female
        Age: AG
        Marital:
            - UNS
            - mapping:
               1: Married
               2: Common law
               3: Visiting
               4: Widowed
               5: Divorced
               6: Separated
               7: Single
               8: Others
        Relationship: 
            - RLL
            - mapping:
               1: Head of Household
               2: Spouse of HoH
               3: Married child
               4: Spouse of married child
               5: Unmarried child
               6: Grandchild
               7: Father/Mother/T-in-law/M-in-law
               8: Bro/Sis/B-in-law/S-in-law/Other relative
               9: Servant/Employee/Other non-relative

