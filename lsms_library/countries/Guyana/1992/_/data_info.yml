Country: Guyana
Wave: 1992
# HOUSEHOLD AND CLUSTER IDENTITY (GH #323).
#
# The survey keys a household on the THREE-level (ED, SN, HH), where SN is the
# ED sample-segment serial (spelled `ed_smpl` in HHCHAR/WEIGHTID, `SN` in
# COVERN/ROSTERN/EDUCN).  ED numbers are REUSED across segments, so (ED, HH)
# alone MERGES DISTINCT REAL HOUSEHOLDS: 248 (ED,HH) buckets conflate 542 real
# households holding 2,381 of 7,827 people (30.4%).  The survey's own household
# id proves the key: COVERN.NEWID == ED*100000 + SN*100 + HH for 1807/1807 rows,
# all unique.  i is therefore the hyphen-joined "ED-SN-HH".
#
# CLUSTER: the sampling segment is (ED, SN), NOT ED.  An ED number appears in
# more than one region -- e.g. ED 5 / SN 194 is Region 4, urban (12 hh) while
# ED 5 / SN 702 is Region 10, RURAL (12 hh): two different enumeration
# districts that share the number 5.  Keying v on ED alone therefore forces an
# arbitrary Region for 537 households and an arbitrary Rural for 274.  Keyed on
# (ED, SN): 168 segments, each a fixed take of <=12 households, SECTOR (Rural)
# 100% homogeneous (0 of 168 ambiguous) and RGN ambiguous in only 3 segments
# (35 hh), each a single stray household mis-coded to a neighbouring region.
# The WEIGHT lookup is unaffected -- see the sample block below.
cluster_features:
    file:
        - ../Data/COVERN.dta
    idxvars:
        v: [ED, SN]
    myvars:
        Region: RGN
        Rural:
            - SECTOR
            - mapping:
                1: Urban
                2: Rural

sample:
    # WEIGHT.dta is a LOOKUP (the 616-ED national frame), not a spine.  The
    # framework merges sub-dfs with how='outer', so merging on `v` used to admit
    # the 488 frame-only EDs as phantom rows with i = NaN (1807 + 488 = 2295
    # rows, of which 793 were then silently dropped by the duplicate collapse).
    # We merge on the RAW ED (`ed_key`, a helper carried by both sub-dfs, dropped
    # by the sample() hook in mapping.py) and the hook then drops every i-less
    # row, restoring 1807 real households.
    #
    # The weight is keyed on ED alone in the SOURCE (WEIGHTID.dta assigns one
    # weight per ED; 0 of 126 EDs vary across their segments), so looking it up
    # on ED while identifying the cluster as (ED, SN) is faithful to the survey:
    # joining WEIGHT.dta on ED reproduces WEIGHTID's household weights 1795/1795
    # with 100% value agreement.  EDs 408 and 482 (23 households) have no row in
    # WEIGHT.dta at all; their weight stays NaN -- loudly missing, never imputed.
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: ../Data/COVERN.dta
        idxvars:
            i: [ED, SN, HH]
            v: [ED, SN]
            ed_key: ED
        myvars:
            strata: STNO
            Rural:
                - SECTOR
                - mapping:
                    1: Urban
                    2: Rural
    df_weights:
        file: ../Data/WEIGHT.dta
        idxvars:
            ed_key: ED
        myvars:
            weight: WEIGHT
    merge_on:
        - ed_key
    final_index:
        - i
        - t

household_roster:
    # i=[ED,SN,HH]: dropping SN made (ED,HH,PID) non-unique for 888 of 7,827
    # rows, which the framework then collapsed with groupby().first() -- keeping
    # one household's members and discarding the other's (GH #323).  With SN the
    # key is exactly unique (0 duplicates).  v is joined from sample() at API
    # time; it is not declared here.
    file:
        - ../Data/ROSTERN.dta
    idxvars:
        i: [ED, SN, HH]
        pid: PID
    myvars:
        Sex:
            - SX
            - mapping:
               1: Male
               2: Female
        Age: AG
        Marital:
            - UNS
            - mapping:
               1: Married
               2: Common law
               3: Visiting
               4: Widowed
               5: Divorced
               6: Separated
               7: Single
               8: Others
        Relationship: 
            - RLL
            - mapping:
               1: Head of Household
               2: Spouse of HoH
               3: Married child
               4: Spouse of married child
               5: Unmarried child
               6: Grandchild
               7: Father/Mother/T-in-law/M-in-law
               8: Bro/Sis/B-in-law/S-in-law/Other relative
               9: Servant/Employee/Other non-relative

individual_education:
    # Dedicated education module EDUCN.dta; HS = highest school (codes 1-17).
    # i=[ED,SN,HH], pid=PID match the roster.  Without SN, 867 of 7,691 rows
    # collided on (ED,HH,PID) and were silently dropped (GH #323); with SN the
    # key is exactly unique (0 duplicates, 0 spine orphans vs COVERN).
    file:
        - ../Data/EDUCN.dta
    idxvars:
        i: [ED, SN, HH]
        pid: PID
    myvars:
        Educational Attainment:
            - HS
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    # Dwelling module HHCHAR.dta, block (16) HOUSING (questionnaire GUY02.pdf
    # p.31).  HHCHAR keys the household on the THREE-level
    # (ed_dvsn, ed_smpl, smpl_hh), which equals the roster's (ED, SN, HH)
    # numerically -- so i=[ed_dvsn, ed_smpl, smpl_hh] hyphen-joins to the same
    # "ED-SN-HH" form.  The previous 2-level i=[ed_dvsn, smpl_hh] was NOT merely
    # ambiguous, it was WRONG: 311 of 1,819 rows collided and were silently
    # collapsed with groupby().first(), fusing distinct households (GH #323).
    #
    # Do NOT key this table on HHCHAR.newid: that column is corrupt (319
    # duplicate values, and it disagrees with the ED*100000+ed_smpl*100+smpl_hh
    # formula in 240 of 1,819 rows).  Where the two disagree the TRIPLE is the
    # trustworthy one -- it matches a real COVERN household in 235 of those 240
    # rows, versus 201 for newid (1,765 vs 1,731 overall).  (COVERN.NEWID, a
    # different column in a different file, IS clean and is used by _/assets.py.)
    #
    # Exactly one duplicate survives the 3-level key and is handled EXPLICITLY
    # by the housing() hook in mapping.py -- see there.  All dwelling columns are
    # bare integer codes with NO embedded value labels, so each carries an
    # explicit code->name mapping (0 = not recorded -> "Not Stated").
    #   Roof        <- bldg4  (16.1,4 material used for roof)
    #   Walls       <- bldg3  (16.1,3 material used for walls)
    #   Tenure      <- hous1  (16.2,1 ownership)
    #   Toilet      <- hous4  (16.2,4 toilet facility)
    #   Water       <- hous6  (16.2,6 water supply)
    #   Electricity <- hous8  (16.2,8 lighting type)
    #   Rooms       <- hhld4  (16.1,34 # rooms occupied; numeric)
    # No Floor variable exists in the module (bldg2 is year of construction).
    file:
        - ../Data/HHCHAR.dta
    idxvars:
        i: [ed_dvsn, ed_smpl, smpl_hh]
    myvars:
        Roof:
            - bldg4
            - mapping:
                0: Not Stated
                1: Sheet Metal
                2: Shingle (Asphalt)
                3: Shingle (Wood)
                4: Shingle (Other)
                5: Tile
                6: Concrete
                7: Makeshift
                9: Other
        Walls:
            - bldg3
            - mapping:
                0: Not Stated
                1: Wood
                2: Concrete
                3: Wood & Concrete
                4: Stone
                5: Brick
                6: Adobe
                7: Makeshift
                9: Other
        Tenure:
            - hous1
            - mapping:
                0: Not Stated
                1: Owned
                2: Squatted
                3: Rented (Private)
                4: Rented (Government)
                5: Leased
                6: Rent-Free
                9: Other
        Toilet:
            - hous4
            - mapping:
                0: Not Stated
                1: WC Linked to Sewer
                2: WC Cesspit or Septic Tank
                3: Pit Latrine
                4: None
                9: Other
        Water:
            - hous6
            - mapping:
                0: Not Stated
                1: Private Piped into Dwelling
                2: Private Catchment, Not Piped
                3: Public Piped into Dwelling
                4: Public Piped into Yard
                5: Public Standpipe
                6: Public Well or Tank
                9: Other
        Electricity:
            - hous8
            - mapping:
                0: Not Stated
                1: Gas
                2: Kerosene
                3: Electricity
                4: Other
                9: Other
        Rooms: hhld4

