# Household identity is the TRIPLE (ED, SN, HH) -- GH #503.
#
# COVERN.dta has 1807 rows: 1807 unique (ED, SN, HH) but only 1502 unique
# (ED, HH).  The survey declares the triple itself -- COVERN.NEWID ==
# ED*100000 + SN*100 + HH for all 1807 rows -- and an independent check agrees:
# HHCHAR.hhsize equals the ROSTERN member count for 98.1% of households keyed on
# the triple, but only 81.1% keyed on the pair.  Keying on (ED, HH) silently
# merged ~305 real households into others (and grafted 294 people onto a
# household that was not theirs).  Every table below keys on the triple; they
# MUST move together, or the v-join would fail to match across tables.
#
# The cluster is (ED, SN), not ED -- see mapping.py:v().
Country: Guyana
Wave: 1992
cluster_features:
    # i is declared (and immediately collapsed away by Wave.cluster_features)
    # only so the household-grain cover page is aggregated to (t, v) explicitly
    # rather than tripping the GH#323 duplicate-index collapse downstream.
    file:
        - ../Data/COVERN.dta
    idxvars:
        v: [ED, SN]
        i: [ED, SN, HH]
    myvars:
        Region: RGN
        Rural:
            - SECTOR
            - mapping:
                1: Urban
                2: Rural

sample:
    # WEIGHT.dta is keyed on ED alone and carries one weight per ED; joining it
    # on ED reproduces WEIGHTID.dta's authoritative per-household weight for
    # 1795/1795 rows.  So the weight merge stays keyed on a plain `ED` helper
    # column even though v is now (ED, SN) -- the helper is dropped below.
    # (WEIGHTID.dta is not a usable substitute: only 1742/1795 of its triples
    # are in COVERN, and it carries a duplicate triple.)
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: ../Data/COVERN.dta
        idxvars:
            i: [ED, SN, HH]
            v: [ED, SN]
            ED: ED
        myvars:
            strata: STNO
            Rural:
                - SECTOR
                - mapping:
                    1: Urban
                    2: Rural
    df_weights:
        file: ../Data/WEIGHT.dta
        idxvars:
            ED: ED
        myvars:
            weight: WEIGHT
    merge_on:
        - ED
    final_index:
        - i
        - t
    drop:
        # merge-only helper; v (ED-SN) is the cluster the API exposes.
        - ED

household_roster:
    # No `v` here: the framework joins it from sample() at API time
    # (_join_v_from_sample), and it SKIPS when v is already present -- so a
    # stale `v: ED` would survive and disagree with sample's (ED, SN).
    file:
        - ../Data/ROSTERN.dta
    idxvars:
        i: [ED, SN, HH]
        pid: PID
    myvars:
        Sex:
            - SX
            - mapping:
               1: Male
               2: Female
        Age: AG
        Marital:
            - UNS
            - mapping:
               1: Married
               2: Common law
               3: Visiting
               4: Widowed
               5: Divorced
               6: Separated
               7: Single
               8: Others
        Relationship: 
            - RLL
            - mapping:
               1: Head of Household
               2: Spouse of HoH
               3: Married child
               4: Spouse of married child
               5: Unmarried child
               6: Grandchild
               7: Father/Mother/T-in-law/M-in-law
               8: Bro/Sis/B-in-law/S-in-law/Other relative
               9: Servant/Employee/Other non-relative

individual_education:
    # Dedicated education module EDUCN.dta; HS = highest school (codes 1-17).
    # i=[ED,SN,HH], pid=PID match the roster.  EDUCN carries the same ED/SN/HH
    # triple as ROSTERN: 7691 rows, 7691 unique (ED,SN,HH,PID) -- but only 6824
    # unique (ED,HH,PID), so the old pair key collided 867 person-rows.
    file:
        - ../Data/EDUCN.dta
    idxvars:
        i: [ED, SN, HH]
        pid: PID
    myvars:
        Educational Attainment:
            - HS
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    # Dwelling module HHCHAR.dta, block (16) HOUSING (questionnaire GUY02.pdf
    # p.31).  HHCHAR keys the household on (ed_dvsn, ed_smpl, smpl_hh), which
    # equals the roster's (ED, SN, HH) numerically -- so i=[ed_dvsn, ed_smpl,
    # smpl_hh] hyphen-joins to the same "ED-SN-HH" form the roster/sample use.
    # Verified: 1765/1819 HHCHAR triples are present in COVERN's (ED,SN,HH) set,
    # and HHCHAR.hhsize equals the ROSTERN member count for 98.1% of households
    # under the triple vs 81.1% under the old (ed_dvsn, smpl_hh) pair -- the pair
    # is not the household (GH #503).  Do NOT use HHCHAR's `newid` column as the
    # key: it is corrupt (240 of 1819 rows violate the ED*100000+SN*100+HH
    # identity that COVERN satisfies exactly, and it collides -- 1616 distinct
    # values for 1819 rows).  All dwelling columns are
    # bare integer codes with NO embedded value labels, so each carries an
    # explicit code->name mapping (0 = not recorded -> "Not Stated").
    #   Roof        <- bldg4  (16.1,4 material used for roof)
    #   Walls       <- bldg3  (16.1,3 material used for walls)
    #   Tenure      <- hous1  (16.2,1 ownership)
    #   Toilet      <- hous4  (16.2,4 toilet facility)
    #   Water       <- hous6  (16.2,6 water supply)
    #   Electricity <- hous8  (16.2,8 lighting type)
    #   Rooms       <- hhld4  (16.1,34 # rooms occupied; numeric)
    # No Floor variable exists in the module (bldg2 is year of construction).
    file:
        - ../Data/HHCHAR.dta
    idxvars:
        i: [ed_dvsn, ed_smpl, smpl_hh]
    myvars:
        Roof:
            - bldg4
            - mapping:
                0: Not Stated
                1: Sheet Metal
                2: Shingle (Asphalt)
                3: Shingle (Wood)
                4: Shingle (Other)
                5: Tile
                6: Concrete
                7: Makeshift
                9: Other
        Walls:
            - bldg3
            - mapping:
                0: Not Stated
                1: Wood
                2: Concrete
                3: Wood & Concrete
                4: Stone
                5: Brick
                6: Adobe
                7: Makeshift
                9: Other
        Tenure:
            - hous1
            - mapping:
                0: Not Stated
                1: Owned
                2: Squatted
                3: Rented (Private)
                4: Rented (Government)
                5: Leased
                6: Rent-Free
                9: Other
        Toilet:
            - hous4
            - mapping:
                0: Not Stated
                1: WC Linked to Sewer
                2: WC Cesspit or Septic Tank
                3: Pit Latrine
                4: None
                9: Other
        Water:
            - hous6
            - mapping:
                0: Not Stated
                1: Private Piped into Dwelling
                2: Private Catchment, Not Piped
                3: Public Piped into Dwelling
                4: Public Piped into Yard
                5: Public Standpipe
                6: Public Well or Tank
                9: Other
        Electricity:
            - hous8
            - mapping:
                0: Not Stated
                1: Gas
                2: Kerosene
                3: Electricity
                4: Other
                9: Other
        Rooms: hhld4

