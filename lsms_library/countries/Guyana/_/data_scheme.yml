Country: Guyana

Data Scheme:
  assets:
    index: (t, i, j)
    Quantity: float
    Value: float
    materialize: make

  cluster_features:
    index: (t, v)
    Region: str
    Rural: str

  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make

  housing:
    index: (t, i)
    Roof: str
    Walls: str
    Tenure: str
    Toilet: str
    Water: str
    Electricity: str
    Rooms: float

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: float
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight:
      type: float
      optional: true
    strata: str
    Rural: str
