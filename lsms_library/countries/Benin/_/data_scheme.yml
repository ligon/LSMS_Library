Country: Benin

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str
  cluster_features:
    # GRAIN (GH #323).  The declared grain is the cluster, (t, v) -- 670
    # grappes in 2018-19 -- but `df_main` in 2018-19/_/data_info.yml reads
    # Region/Rural from the HOUSEHOLD-level cover page s00_me_ben2018.dta
    # while declaring only `v: grappe`.  Each grappe's attributes were
    # therefore broadcast across its households, handing the framework 8,012
    # rows carrying 7,342 duplicate (t, v) tuples for it to reduce.
    #
    # The reduction was value-lossless (measured cold under LSMS_NO_CACHE=1:
    # 0 of 670 grappes carry more than one distinct s00q01/Region or
    # s00q04/Rural; grappe_gps_ben2018.dta is already grappe-level at
    # 670/670), so the framework's #323 audit was correctly silent and no
    # number here has ever been wrong.  But that is a property of the 2018-19
    # data, not of the extraction -- a grappe that ever straddled two regions
    # would have been resolved by groupby().first(), which skips NA per
    # COLUMN and so returns a composite cluster assembled from different
    # households.
    #
    # Fixed at the source rather than at the collapse: the
    # `cluster_features(df)` hook in 2018-19/_/mapping.py projects to cluster
    # grain in the EXTRACTION and RAISES if any cluster straddles two values,
    # so the 670 rows are right by construction instead of by luck.  8,012 ->
    # 670 rows reach the framework; the API result is byte-identical.
    #
    # No `aggregation:` key: per the #323 consolidation (D1, 2026-07-13) the
    # core never aggregates, the key is not read by anything, and declaring
    # one would be prose masquerading as enforcement.
    index: (t, v)
    Region: str
    Rural: str
    Latitude: float
    Longitude: float

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  subjective_well_being:
    # EHCVM Section 20 'Pauvreté relative' item s20q05 -> Own Step, a
    # 4-point relative-welfare ladder (1=Très pauvre ... 4=Riche;
    # 'Ne sait pas'/NaN -> NaN).  LADDER construct only.  Benin's §20
    # asks only the own-placement item, so no Neighbors/Friends Step.
    index: (t, i)
    Own Step: int

  food_security:
    # FAO 8-item Food Insecurity Experience Scale (FIES).  EHCVM §8A
    # 'Sécurité alimentaire', recall period = last 12 months.  Single
    # EHCVM wave (2018-19) reads s08a_me_ben2018.dta; items
    # s08aq01..s08aq08 map IN ORDER to the 8 canonical FIES items
    # (Worried..WholeDay).  Values Oui->True, Non->False;
    # "Ne sait pas"/"Refus"/NaN->NaN.  FCS (#332) is deliberately NOT
    # wired here; only the FIES binary battery is exposed.
    index: (t, i)
    Worried: bool
    HealthyDiet: bool
    FewFoods: bool
    SkippedMeal: bool
    AteLess: bool
    RanOut: bool
    Hungry: bool
    WholeDay: bool
    FIES_score: int

  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind / other).  The wave-level
    # mapping.py food_acquired() function reshapes the wide-form
    # (Quantity-total, Produced-subset, Expenditure) into long-form on s.
    # `visit` (vague) is dropped: in EHCVM 2018-19 it's a sample split
    # (each grappe surveyed in exactly one vague), not a repeated measure,
    # so households are uniquely keyed by (t, v, i, j, u, s) without it.
    #
    # GRAIN (GH #323).  1,382 rows collide on the declared index, and the
    # collision is CORRECT here -- unlike plot_inputs below, nothing is being
    # destroyed.  The raw source has no duplicates (s07b_me_ben2018.dta:
    # 187,672 rows, all unique on (grappe, menage, s07bq01)); the collisions
    # are created downstream by harmonize_food, which is deliberately
    # many-to-one (160 Original Labels -> 146 Preferred Labels; 14 buckets
    # take 2 originals each).  Seven of those 14 merely pool an alternate
    # spelling or a mis-encoded variant of the SAME item ('Maïs' with
    # 'MaÃ¯s en grain'); the five that actually collide in the data are the
    # taxonomy's own residual categories -- 'Autres légumes en feuilles'
    # (1,830 rows), 'Autres poissons fumés' (712), 'Riz importé non parfumé'
    # (120), 'Autre Riz local' (66), 'Autres poissons frais' (36).
    #
    # Two distinct items landing in one residual bucket is a genuine, intended
    # aggregation, and core already handles it correctly: food_acquired is in
    # `_ADDITIVE_MEASURE_COLUMNS`, so the measures are SUMMED rather than
    # first()-ed, which is why the #323 audit is silent about this cell.
    # Colliding rows necessarily share `u` AND `s` (both are IN the index), so
    # the sums are commensurable BY CONSTRUCTION.  Verified cold under
    # LSMS_NO_CACHE=1: wave-frame and API totals agree exactly -- Quantity
    # 576,293.81, Expenditure 87,287,926.96 -- over a 190,618 -> 189,236 row
    # reduction.  Nothing to fix; recorded so the next reader does not
    # mistake a lossless sum for a silent drop.
    index: (t, v, i, j, u, s)
    Quantity: float
    Expenditure: float

  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  interview_date:
    # An `aggregation: {visit: first}` block used to sit here.  Removed
    # 2026-07-21 (GH #323): NOTHING READS IT.  `aggregation` appears in core
    # only inside "skip these meta-keys" sets, a test pins that the collapse
    # does not honour it, and per the #323 consolidation (D1, 2026-07-13) the
    # core never aggregates -- so the key was prose wearing the costume of
    # enforcement.  It was also nonsense on its own terms: `visit` is an INDEX
    # LEVEL here, not a measure, and "reduce the index level with first" names
    # no operation.  Benin's interview_date has no duplicate-index problem
    # to reduce (24,035 rows, zero grain reports on a cold build), so deleting
    # it changes no returned value.
    index: (t, i, visit)
    Interview start: datetime
    Interview end: datetime

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str

  plot_features:
    # Lasting parcel-level characteristics from the EHCVM agriculture
    # module s16a (GH #167; Benin is an EHCVM sibling of the Mali
    # reference implementation).  Single EHCVM wave: 2018-19 (Benin has
    # no 2021-22 EHCVM-II wave in this repo).  plot_id =
    # "{field_no}_{parcel_no}".  Latitude / Longitude are NOT emitted —
    # EHCVM s16a has no decimal-degree parcel GPS (s16aq47 is an area,
    # not a coordinate); deferred as in Uganda / Mali.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    SoilType: str
    Irrigated: bool
    materialize: make

  livestock:
    # Item-level livestock roster (GAP 4).  One row per REPORTED
    # (household, species) the household owns/raises, from the EHCVM
    # section-17 ('Élevage') module s17_me_ben2018.dta (single 2018-19
    # wave; roster pre-filtered to owned species, s17q03 == 1).
    #
    # GRAIN (t, i, animal) — NO v level: 'livestock' is in the framework's
    # _no_v_join set, so the household-level rows carry no cluster level and
    # the framework does NOT join one from sample().  `animal` is the
    # harmonized species Preferred Label (harmonize_species_ehcvm for the
    # 1-11 EHCVM codes).  `i` is the EHCVM composite household id built with
    # benin.i() so it matches sample().i.
    #
    # COLUMNS (reported, item-level): HeadCount (owned now), HeadAcquired
    # (number bought in the last 12 months), HeadSold (number sold on the
    # hoof in the last 12 months).  A `Value` (herd value) column is
    # intentionally OMITTED: EHCVM s17 has no current herd-value question.
    index: (t, i, animal)
    HeadCount: float
    HeadAcquired: float
    HeadSold: float
    materialize: make

  crop_production:
    # Item-level crop harvest (GAP 1).  One row per REPORTED (field, parcel,
    # crop) harvest line from the EHCVM agriculture module s16c_me_ben2018.dta
    # (single 2018-19 wave) — REPORTED values only; harvest_kg / yield /
    # main_crop / value-shares are transformations, never columns here.  crop
    # carries the native French crop label (Benin has no harmonize_food crop
    # table; Niger's passthrough behavior keeps the label as the item
    # identity); u via the u table (passthrough for harvest-specific units).
    # ``u`` is in the index (as in food_acquired) because one (plot, crop) can
    # be reported in several units.  plot = "{field_no}_{parcel_no}" aligns
    # with plot_features' plot_id.  Quantity_sold / Value_sold recorded at
    # plot-crop grain (s16cq16a / s16cq17); intercropped from s16cq07.
    # harvest_month is OMITTED-then-filled NaN (Benin's s16c has no harvest-
    # month question) but carried for cross-country schema parity with Niger.
    index: (t, i, plot, crop, u)
    Quantity: float
    Quantity_sold: float
    Value_sold: float
    harvest_month:
      type: float
      optional: true
    intercropped: bool
    materialize: make

  plot_inputs:
    # Item-level agricultural inputs (GAP 2).  One row per REPORTED input
    # applied by a household from the EHCVM input roster s16b_me_ben2018.dta
    # (single 2018-19 wave): input identity (Seed / Urea / DAP / NPK /
    # Phosphate / Organic manure / Organic compost / Pesticide / Herbicide /
    # Fungicide / Other phytosanitary), reported quantity used + native unit,
    # purchased flag + reported purchased quantity, and (seed rows) the seed's
    # crop.  REPORTED values only: seed_kg / nitrogen_kg / fertilizer totals
    # are TRANSFORMATIONS over these rows, never columns.
    #
    # GRAIN NOTE: EHCVM records inputs at the HOUSEHOLD x input grain, NOT
    # plot x input (the WB plot split is a forbidden fabrication), so `plot`
    # is NOT in the index; the feature keeps the GAP-2 name `plot_inputs`.
    # input -> harmonize_input; u -> the u table; crop -> harmonize_seed_crop
    # on the seed label (the EHCVM s16b roster has no crop column).  Both
    # tables were copied verbatim from Niger into categorical_mapping.org.
    # `crop` is in the index; non-crop-specific rows carry the sentinel
    # '(not crop-specific)' rather than NaN (a NaN index level is dropped by
    # the framework's canonical NaN-key de-dup collapse).  `u` is in the index
    # and a missing unit is filled with 'Manquant' for the same non-null
    # reason.
    #
    # GRAIN (GH #323, fixed 2026-07-13).  71 rows -- 11,445.2 units of
    # reported input quantity, and 4 households' Purchased flag flipped
    # True->False -- used to be DESTROYED here, and unlike food_acquired above
    # the loss was real.  `crop` is an index level and harmonize_input maps
    # every seed label onto the single input 'Seed', so `crop` was the only
    # level left to tell two seed line-items apart; harmonize_seed_crop was
    # NON-INJECTIVE (four labels shared one 'Autre crop' catch-all, three of
    # which occur in Benin's s16b), so a household reporting BOTH 'Autres
    # semences' (9 kg) and 'Plants/boutures de tubercules' (6 kg) landed both
    # on (Seed, Autre crop, Kilogramme) and one was dropped.  Tuber cuttings
    # and cereal seed are not the same thing and summing them would be as
    # wrong as dropping one: THE IDENTIFIER WAS BROKEN.  The catch-all is now
    # split (see the note above harmonize_seed_crop in _/categorical_mapping.org)
    # and 2018-19/_/plot_inputs.py ASSERTS the declared index is unique before
    # writing, so a re-widened bucket fails the build instead of shipping
    # short.  API rows 10,534 -> 10,605 = every reported line-item.
    index: (t, i, input, crop, u)
    Quantity: float
    Purchased: bool
    Quantity_purchased: float
    materialize: make

  plot_labor:
    # Item-level plot labor (GAP 3).  One row per REPORTED labor SOURCE on a
    # plot from the EHCVM agriculture-parcel module s16a_me_ben2018.dta (single
    # 2018-19 wave).  REPORTED person-days; total_labor_days /
    # total_family_labor_days / total_hired_labor_days / hired_labor_value (a
    # median-wage valuation) are TRANSFORMATIONS over these rows, never columns.
    #
    # GRAIN (t, i, plot, source):
    #   plot   -- "{field_no}_{parcel_no}", aligned with crop_production's plot
    #             key and plot_features' plot_id.
    #   source -- 'family' / 'hired'.  EHCVM s16a records family vs non-family
    #             (hired) only (no free/exchange 'other' source); small fixed
    #             vocabulary assigned in code (inline mapping, no table).
    #
    # COLUMNS (reported, item-level):
    #   PersonDays -- within-source sum of the reported day cells (per family
    #                 member, or per hired-worker gender category, across the
    #                 prep/maintenance/harvest phases); hired person-days =
    #                 Σ(#workers × days).  NOT a forbidden cross-source rollup.
    #   Wage       -- cash PAID to hired labor (CFA francs); NaN for family.
    # v is NOT baked in (household-linked); the framework joins it from
    # sample().  units: PersonDays in days; Wage in CFA francs.
    index: (t, i, plot, source)
    PersonDays: float
    Wage: float
    materialize: make

  people_last7days:
    # Item-level individual 7-day labor (GAP 3).  One row per individual
    # carrying the REPORTED last-7-days labor participation, from the EHCVM
    # 7-day module s04_me_ben2018.dta merged to the s01 roster (single 2018-19
    # wave).  No rollups: the WB nb_members_working_age HH total is a
    # transformation, not a column here.
    #
    # GRAIN (t, i, pid): pid = s01q00a (matches household_roster).  v
    # auto-joins from sample() (people_last7days is NOT in the framework
    # _no_v_join set).
    #
    # COLUMNS (reported, per-individual):
    #   farm_work / SOB_work / wage_work -- worked >=1h on own farm / own
    #       business / for a wage in the last 7 days (s04q06/07/08; nullable
    #       bool).
    #   farm_hrs / SB_hrs / wage_hrs / Industry -- NA in Benin: the EHCVM
    #       7-day module records hours only for unpaid domestic tasks and the
    #       industry only as 12-month occupation codes (not the WB 7-day
    #       section ranges), so these are declared for cross-wave schema parity
    #       with Niger but left NA.
    #   working_age -- member is of working age (Age >= 6, the survey
    #       threshold); Age from s01 (reported years, else survey_year minus
    #       birth-year s01q03c).
    # units: hours in hours.
    index: (t, i, pid)
    farm_work: bool
    SOB_work: bool
    wage_work: bool
    farm_hrs: {type: float, optional: true}
    SB_hrs: {type: float, optional: true}
    wage_hrs: {type: float, optional: true}
    Industry: {type: str, optional: true}
    working_age: bool
    materialize: make
