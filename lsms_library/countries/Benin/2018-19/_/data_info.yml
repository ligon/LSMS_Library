Country: Benin
Wave: 2018-19

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: s00_me_ben2018.dta
        idxvars:
            i: menage
            v: grappe
        myvars:
            Region: s00q01
            Rural:
                - s00q04
                - mapping:
                    Rural: Rural
                    rural: Rural
                    RURAL: Rural
                    Urbain: Urban
                    urbain: Urban
                    URBAIN: Urban
    df_geo:
        file: grappe_gps_ben2018.dta
        idxvars:
            v: grappe
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v

household_roster:
    file: ehcvm_individu_ben2018.dta
    idxvars:
        i:
            - grappe
            - menage
        pid: numind
    myvars:
        Sex: sexe
        Age: age
        Relation: lien

food_acquired:
    file: s07b_me_ben2018.dta
    idxvars:
        v: grappe
        visit: vague
        i:
            - grappe
            - menage
        j: s07bq01
        u: s07bq03b
    myvars:
        Quantity: s07bq03a
        Expenditure: s07bq08
        Produced: s07bq04
