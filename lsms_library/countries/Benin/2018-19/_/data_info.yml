Country: Benin
Wave: 2018-19

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: s00_me_ben2018.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
        myvars:
            strata: s00q01
            Rural:
                - s00q04
                - mapping:
                    Rural: Rural
                    rural: Rural
                    RURAL: Rural
                    Urbain: Urban
                    urbain: Urban
                    URBAIN: Urban
    df_weights:
        file: ehcvm_ponderations_ben2018.dta
        idxvars:
            v: grappe
        myvars:
            weight: hhweight
            panel_weight: hhweight
    merge_on:
        - v
    final_index:
        - i
        - t

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: s00_me_ben2018.dta
        idxvars:
            i: menage
            v: grappe
        myvars:
            Region: s00q01
            Rural:
                - s00q04
                - mapping:
                    Rural: Rural
                    rural: Rural
                    RURAL: Rural
                    Urbain: Urban
                    urbain: Urban
                    URBAIN: Urban
    df_geo:
        file: grappe_gps_ben2018.dta
        idxvars:
            v: grappe
        myvars:
            Latitude: coordonnes_gps__Latitude
            Longitude: coordonnes_gps__Longitude
    merge_on:
        - v
    final_index:
        - t
        - v

household_roster:
    dfs:
        - df_main
        - df_cover
    df_main:
        file: s01_me_ben2018.dta
        idxvars:
            v: grappe
