Country: Malawi
Wave: 2019-20

sample:
    file:
        - Cross_Sectional/hh_mod_a_filt.dta
        - Panel/hh_mod_a_filt_19.dta:
            i: y4_hhid
    idxvars:
        i:
            - case_id
            - function: cs_i
    myvars:
        v: ea_id
        weight: hh_wgt
        panel_weight: panelweight_2019
        strata:
            - district
            - mappings: ['district', 'Alternate Spelling', 'Preferred Label']
        Rural: reside
        # Region values harmonized via the auto-discovery `region` table
        # in ../../_/categorical_mapping.org.
        Region: region
        District: district

interview_date:
    file:
        - Cross_Sectional/hh_mod_a_filt.dta
        - Panel/hh_mod_a_filt_19.dta:
            i: y4_hhid
            int_t: interviewdate_v1
            int_t_v2: interviewdate_v2
    idxvars:
        i:
            - case_id
            - function: cs_i
    myvars:
        # Cross_Sectional names the date column 'interviewDate' (single
        # visit); the Panel file uses 'interviewdate_v1' (Visit 1) +
        # 'interviewdate_v2' (Visit 2), overridden per-file above.  Both are
        # 'YYYY-MM-DD' strings -> datetime via the Int_t coercion.  The
        # cross-sectional half has no Visit 2, so int_t_v2 is requested only
        # from the Panel file (NaN-filled on concat for the CS rows).  Both
        # date columns are melted to the `visit` index level by the
        # country-level malawi.interview_date df_edit hook.
        int_t: interviewDate

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file:
            - Cross_Sectional/hh_mod_a_filt.dta
            - Panel/hh_mod_a_filt_19.dta:
                i: y4_hhid
        idxvars:
            i:
                - case_id
                - function: cs_i
            v: ea_id
        myvars:
            Region: region
            District: district
            Rural:
                - reside
                - mapping:
                    Rural: 0
                    Urban: 1
                    RURAL: 1
                    URBAN: 0
    df_geo:
        file: Cross_Sectional/householdgeovariables_ihs5.dta
        idxvars:
            v: ea_id
        myvars:
            Latitude: ea_lat_mod
            Longitude: ea_lon_mod
    merge_on:
        - v
    final_index:
        - t
        - v
        - i

subjective_well_being:
    file: Cross_Sectional/HH_MOD_T.dta
    idxvars:
        i: case_id
    myvars:
        Own Step: hh_t05
        Neighbors Step: hh_t06
        Friends Step: hh_t07

food_security:
    # FAO FIES 8-item battery, IHS5 (hh_t13..hh_t20 in FAO order).
    # Recall period: last 12 months.  yes->True, no->False,
    # DON'T KNOW/refused/NaN->NA (see _/mapping.py).
    file: Cross_Sectional/HH_MOD_T.dta
    idxvars:
        i: case_id
    myvars:
        Worried:
            - hh_t13
            - mapping: fies_yesno
        HealthyDiet:
            - hh_t14
            - mapping: fies_yesno
        FewFoods:
            - hh_t15
            - mapping: fies_yesno
        SkippedMeal:
            - hh_t16
            - mapping: fies_yesno
        AteLess:
            - hh_t17
            - mapping: fies_yesno
        RanOut:
            - hh_t18
            - mapping: fies_yesno
        Hungry:
            - hh_t19
            - mapping: fies_yesno
        WholeDay:
            - hh_t20
            - mapping: fies_yesno
        FIES_score:
            - hh_t13
            - hh_t14
            - hh_t15
            - hh_t16
            - hh_t17
            - hh_t18
            - hh_t19
            - hh_t20
            - mapping: fies_score


household_roster:
    file:
        - Cross_Sectional/HH_MOD_B.dta
        - Panel/hh_mod_b_19.dta: #override column mapping
            i: y4_hhid
            pid: id_code
    idxvars:
        i:
            - case_id
            - function: cs_i #apply function to just case_id column for files using this column
        pid: PID
    myvars:
        Sex: hh_b03
        Age: hh_b05a
        Relationship: hh_b04
        MonthsAway: hh_b07


individual_education:
    file:
        - Cross_Sectional/HH_MOD_C.dta
        - Panel/hh_mod_c_19.dta:
            i: y4_hhid
            pid: id_code
    idxvars:
        i:
            - case_id
            - function: cs_i
        pid: PID
    myvars:
        Educational Attainment:
            - hh_c09
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    file:
        - Cross_Sectional/HH_MOD_F.dta
        - Panel/hh_mod_f_19.dta:
            i: y4_hhid
    idxvars:
        i:
            - case_id
            - function: cs_i
    myvars:
        # Roof / Floor values harmonized via the auto-discovery `Roof`
        # and `Floor` tables in ../../_/categorical_mapping.org.
        Roof: hh_f08
        Floor: hh_f09

panel_ids:
    file: Panel/hh_mod_a_filt_19.dta
    idxvars:
        i: y4_hhid
    myvars:
        previous_i: y3_hhid

shocks:
    file: Cross_Sectional/HH_MOD_U.dta
    idxvars:
        i: case_id
        Shock: hh_u0a
    myvars:
        AffectedIncome:
            - hh_u03a
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedAssets:
            - hh_u03b
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedProduction:
            - hh_u03c
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedConsumption:
            - hh_u03d
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        HowCoped0: hh_u04a
        HowCoped1: hh_u04b
        HowCoped2: hh_u04c

assets:
    file: Cross_Sectional/HH_MOD_L.dta
    idxvars:
        i: case_id
        j: hh_l02
    myvars:
        Quantity: hh_l03
        Age: hh_l04
        Value: hh_l05
        Purchased Recently: hh_l06
        Purchase Price: hh_l07
