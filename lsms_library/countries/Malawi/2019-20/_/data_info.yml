Country: Malawi
Wave: 2019-20

cluster_features:
    file: 
        - Cross_Sectional/hh_mod_a_filt.dta
        - Panel/hh_mod_a_filt_19.dta
    idxvars:
        v: ea_id
    myvars:
        Region: region
        District: district
        Rural:
            - reside
            - mapping:
                Rural: 0
                Urban: 1
                RURAL: 1
                URBAN: 0

subjective_well_being:
    file: Cross_Sectional/HH_MOD_T.dta
    idxvars:
        i: case_id
    myvars:
        Own Step: hh_t05
        Neighbors Step: hh_t06
        Friends Step: hh_t07

    
household_roster:
    file: 
        - Cross_Sectional/HH_MOD_B.dta
        - Panel/hh_mod_b_19.dta: #override column mapping
            i: y4_hhid 
            pid: id_code
    idxvars:
        i: 
            - case_id 
            - function: cs_i #apply function to just case_id column for files using this column
        pid: PID
    myvars:
        Sex: hh_b03
        Age: hh_b05a
        Relation: hh_b04


panel_ids:
    file: Panel/hh_mod_a_filt_19.dta
    idxvars:
        i: y4_hhid
    myvars:
        previous_i: y3_hhid

shocks:
    file: Cross_Sectional/HH_MOD_U.dta
    idxvars:
        i: case_id
        Shock: hh_u0a
    myvars:
        AffectedIncome:
            - hh_u03a
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedAssets:
            - hh_u03b
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedProduction:
            - hh_u03c
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedConsumption:
            - hh_u03d
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        HowCoped0: hh_u04a
        HowCoped1: hh_u04b
        HowCoped2: hh_u04c

assets:
    file: Cross_Sectional/HH_MOD_L.dta
    idxvars:
        i: case_id
        j: hh_l02
    myvars:
        Quantity: hh_l03
        Age: hh_l04
        Value: hh_l05
        Purchased Recently: hh_l06
        Purchase Price: hh_l07
