Country: Malawi
Wave: 2019-20

sample:
    file:
        - Cross_Sectional/hh_mod_a_filt.dta
        - Panel/hh_mod_a_filt_19.dta:
            i: y4_hhid
    idxvars:
        i:
            - case_id
            - function: cs_i
    myvars:
        v: ea_id
        weight: hh_wgt
        panel_weight: panelweight_2019
        strata:
            - district
            - mappings: ['district', 'Alternate Spelling', 'Preferred Label']
        Rural: reside
        # Region values harmonized via the auto-discovery `region` table
        # in ../../_/categorical_mapping.org.
        Region: region
        District: district

interview_date:
    file:
        - Cross_Sectional/hh_mod_a_filt.dta
        - Panel/hh_mod_a_filt_19.dta:
            i: y4_hhid
            int_t: interviewdate_v1
            int_t_v2: interviewdate_v2
    idxvars:
        i:
            - case_id
            - function: cs_i
    myvars:
        # Cross_Sectional names the date column 'interviewDate' (single
        # visit); the Panel file uses 'interviewdate_v1' (Visit 1) +
        # 'interviewdate_v2' (Visit 2), overridden per-file above.  Both are
        # 'YYYY-MM-DD' strings -> datetime via the Int_t coercion.  The
        # cross-sectional half has no Visit 2, so int_t_v2 is requested only
        # from the Panel file (NaN-filled on concat for the CS rows).  Both
        # date columns are melted to the `visit` index level by the
        # country-level malawi.interview_date df_edit hook.
        int_t: interviewDate

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file:
            - Cross_Sectional/hh_mod_a_filt.dta
            - Panel/hh_mod_a_filt_19.dta:
                i: y4_hhid
        idxvars:
            i:
                - case_id
                - function: cs_i
            v: ea_id
        myvars:
            Region: region
            District: district
            # Raw `reside` is already a declared spelling of the canonical
            # Rural/Urban vocabulary in every Malawi wave ('Rural'/'Urban',
            # 'rural'/'urban', 'RURAL'/'URBAN' -- the case differs between the
            # Cross_Sectional and Panel files).  Pass it through and let
            # _enforce_canonical_spellings normalise it.  The `mapping:` blocks
            # that used to sit here converted these good labels into 0/1 and
            # got the DIRECTION WRONG: because the two source files disagree on
            # case, 2016-17 and 2019-20 mapped rural households to BOTH codes,
            # sign-flipping the indicator between waves.  GH #602.
            Rural: reside
    df_geo:
        # GH #323 SITE 4 / GH #627 -- CARTESIAN, CURED AT THE MERGE.
        #
        # This block USED to key `householdgeovariables_ihs5.dta` on
        # `v: ea_id` and merge on the CLUSTER key `v`.  Both sub-frames are
        # HOUSEHOLD grain -- df_main is 14,612 households (11,434 IHS5
        # cross-section + 3,178 IHPS panel), df_geo 11,434, one row per
        # case_id across 717 EAs -- so `pd.merge` paired every household with
        # every geo row sharing its `v`: 185,842 rows, 171,230 of them PHANTOM.
        # `_normalize_dataframe_index` then collapsed that to 819 clusters with
        # groupby().first(), so nothing downstream ever saw it.
        #
        # The geo file carries `case_id`, so the honest key was there all
        # along.  Verified cold against the two source files:
        #   * the CROSS-SECTIONAL half is exactly 1:1 on case_id -- 11,434 =
        #     11,434, zero rows on either side alone, no duplicates;
        #   * ea_lat_mod / ea_lon_mod are CONSTANT within all 717 ea_id (0 EAs
        #     with more than one distinct coordinate) -- the published GPS is
        #     the EA's displaced fix stamped on each household;
        #   * df_main.ea_id == df_geo.ea_id for all 11,434 shared households.
        # So keying on `i` hands each household its own coordinate, which is
        # the coordinate the `v`-merge was already giving it: 185,842 -> 14,612
        # wave rows, 171,230 -> 0 phantom, every returned value unchanged.
        #
        # `i` MUST be built exactly as df_main builds it -- case_id through
        # `cs_i` -- or the join silently matches nothing (the failure mode
        # 2016-17 was in until GH #323: 0 of 880 clusters carried GPS).
        # `v` is deliberately NOT declared here; df_main owns it.
        #
        # Unchanged by this fix: the 102 IHPS Panel EAs share NO ea_id and no
        # id with the geo file (measured: 0 overlap on either), so the panel
        # half's clusters carry NaN coordinates before and after -- IHS5
        # publishes no geovariables for the panel.  Under `outer` they arrive
        # from df_main alone, exactly as they did under the `v` merge.
        file: Cross_Sectional/householdgeovariables_ihs5.dta
        idxvars:
            i:
                - case_id
                - function: cs_i
        myvars:
            Latitude: ea_lat_mod
            Longitude: ea_lon_mod
    merge_on:
        - i
    final_index:
        - t
        - v
        - i

subjective_well_being:
    file: Cross_Sectional/HH_MOD_T.dta
    idxvars:
        i: case_id
    myvars:
        Own Step: hh_t05
        Neighbors Step: hh_t06
        Friends Step: hh_t07

food_security:
    # FAO FIES 8-item battery, IHS5 (hh_t13..hh_t20 in FAO order).
    # Recall period: last 12 months.  yes->True, no->False,
    # DON'T KNOW/refused/NaN->NA (see _/mapping.py).
    file: Cross_Sectional/HH_MOD_T.dta
    idxvars:
        i: case_id
    myvars:
        Worried:
            - hh_t13
            - mapping: fies_yesno
        HealthyDiet:
            - hh_t14
            - mapping: fies_yesno
        FewFoods:
            - hh_t15
            - mapping: fies_yesno
        SkippedMeal:
            - hh_t16
            - mapping: fies_yesno
        AteLess:
            - hh_t17
            - mapping: fies_yesno
        RanOut:
            - hh_t18
            - mapping: fies_yesno
        Hungry:
            - hh_t19
            - mapping: fies_yesno
        WholeDay:
            - hh_t20
            - mapping: fies_yesno
        FIES_score:
            - hh_t13
            - hh_t14
            - hh_t15
            - hh_t16
            - hh_t17
            - hh_t18
            - hh_t19
            - hh_t20
            - mapping: fies_score


household_roster:
    file:
        - Cross_Sectional/HH_MOD_B.dta
        - Panel/hh_mod_b_19.dta: #override column mapping
            i: y4_hhid
            pid: id_code
    idxvars:
        i:
            - case_id
            - function: cs_i #apply function to just case_id column for files using this column
        pid: PID
    myvars:
        Sex: hh_b03
        Age: hh_b05a
        Relationship: hh_b04
        MonthsAway: hh_b07


individual_education:
    file:
        - Cross_Sectional/HH_MOD_C.dta
        - Panel/hh_mod_c_19.dta:
            i: y4_hhid
            pid: id_code
    idxvars:
        i:
            - case_id
            - function: cs_i
        pid: PID
    myvars:
        Educational Attainment:
            - hh_c09
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    file:
        - Cross_Sectional/HH_MOD_F.dta
        - Panel/hh_mod_f_19.dta:
            i: y4_hhid
    idxvars:
        i:
            - case_id
            - function: cs_i
    myvars:
        # Roof / Floor values harmonized via the auto-discovery `Roof`
        # and `Floor` tables in ../../_/categorical_mapping.org.
        Roof: hh_f08
        Floor: hh_f09

panel_ids:
    file: Panel/hh_mod_a_filt_19.dta
    idxvars:
        i: y4_hhid
    myvars:
        previous_i: y3_hhid

shocks:
    file: Cross_Sectional/HH_MOD_U.dta
    idxvars:
        i: case_id
        Shock: hh_u0a
    myvars:
        AffectedIncome:
            - hh_u03a
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedAssets:
            - hh_u03b
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedProduction:
            - hh_u03c
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedConsumption:
            - hh_u03d
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        HowCoped0: hh_u04a
        HowCoped1: hh_u04b
        HowCoped2: hh_u04c

assets:
    file: Cross_Sectional/HH_MOD_L.dta
    idxvars:
        i: case_id
        j: hh_l02
    myvars:
        Quantity: hh_l03
        Age: hh_l04
        Value: hh_l05
        Purchased Recently: hh_l06
        Purchase Price: hh_l07
