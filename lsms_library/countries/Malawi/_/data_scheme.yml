Country: Malawi

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str
    Region: str
    District: str
  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude: float
    Longitude: float
  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
  individual_education:
    index: (t, i, pid)
    Educational Attainment: str
  subjective_well_being:
    index: (t,i)
    Own Step: int
    Neighbors Step: int
    Friends Step: int
  food_security:
    # FAO FIES 8-item experience scale (GH #332).  Sourced from
    # Module T (hh_t13..hh_t20): standard FAO FIES order in IHS4 (2016-17)
    # and IHS5 (2019-20); a concept-mapped 8-item battery in IHPS 2013
    # (2013-14, item order differs -- see that wave's _/mapping.py).
    # ABSENT in 2004-05 (IHS2) and 2010-11 (IHS3): those waves carry only
    # the coping-strategies / food-shortage module (Module H), not the
    # FIES experience battery.  Recall period: last 12 months.
    index: (t, i)
    Worried: bool
    HealthyDiet: bool
    FewFoods: bool
    SkippedMeal: bool
    AteLess: bool
    RanOut: bool
    Hungry: bool
    WholeDay: bool
    FIES_score: int
  panel_ids:
    index: (t, i)
    previous_i: str
  housing:
    index: (t, i)
    Roof: str
    Floor: str
  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind).  Wave-level food_acquired.py
    # threads the per-source quantities and units through the conversion
    # tables and then calls malawi.food_acquired_to_canonical, which
    # handles the long-form melt and fixes Malawi's legacy (j=HHID,
    # i=item) -> canonical (i=HHID, j=item) inversion.  See
    # slurm_logs/DESIGN_food_acquired_canonical_2026-05-05.org.
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float
    materialize: make
  interview_date:
    index: (t, i)
    Int_t: datetime
  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str
  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchased Recently: str
    Purchase Price: float
  plot_features:
    # Lasting plot-level characteristics for the four buildable IHS/IHPS
    # waves (2010-11, 2013-14, 2016-17, 2019-20); GH #167.  2004-05 (IHS2)
    # is deferred -- it has no standard plot roster.  Module C (area) is
    # merged with Module D (soil / irrigation / tenure) on (hhid, plotkey)
    # in each wave's plot_features.py.  Tenure is derived from the labeled
    # acquire question ag_d03 in 2010-11 & 2013-14 ONLY; ag_d03 is absent
    # from IHS4/IHS5 ag_mod_d (where ag_d02 is "ID of Respondent", not
    # tenure), so Tenure / TenureSystem are NaN for 2016-17 & 2019-20.
    # Latitude / Longitude are deferred: Malawi plot GPS is offset /
    # redacted in the public release.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    SoilType: str
    Irrigated: bool
    materialize: make
  food_coping:
    # rCSI coping-strategy day counts (GH #332).  Module H question H02
    # (hh_h02a..hh_h02e) of the IHS3/IHS4/IHS5 + IHPS-2013 household
    # questionnaire: how many of the past 7 days the HH used each of the 5
    # standard reduced-Coping-Strategies-Index strategies.  One row per
    # (HH, Strategy); Days is 0-7.  Strategy order is stable across all
    # waves (verified vs the IHS3 questionnaire Module H, Page 35):
    # a=LessPreferred, b=LimitPortion, c=ReduceMeals, d=RestrictAdults,
    # e=BorrowFood.  Recall: last 7 days.  ABSENT in 2004-05 (IHS2): its
    # Module H is a 3-day food-consumption recall, not a coping battery.
    index: (t, i, Strategy)
    Days: int
    materialize: make
  months_food_inadequate:
    # Months of inadequate food provisioning (GH #332).  Module H questions
    # H04 (hh_h04, Yes/No: faced a food-shortage situation in the last 12
    # months) and H05 (wide month calendar, 'X' = a month the HH lacked
    # food).  MonthsInadequate = count of marked months (0-12) for H04==Yes
    # households, 0 otherwise; AnyInadequate = (H04==Yes).  The H05 count is
    # gated on H04==Yes because IHS4/IHS5 pre-fill all 25 calendar cells for
    # H04==No households.  Recall: last 12 months.  ABSENT in 2004-05.
    index: (t, i)
    MonthsInadequate: int
    AnyInadequate: bool
    materialize: make
  crop_production:
    # Item-level (t, i, plot, crop) harvest feature for the four IHS3+
    # IHPS waves (2010-11, 2013-14, 2016-17, 2019-20); GAP 1.  Reported
    # values only -- harvest Quantity + native unit, household-crop sale
    # (Quantity_sold / Value_sold, attached to single-plot crops only),
    # item planting / harvest-end months, and intercropped / perennial
    # flags.  Sources: seasonal Module G + perennial Module P (plot-crop
    # harvest), seasonal Module I + perennial Module Q (household-crop
    # sale).  crop on the shared harmonize_crop -> harmonize_food
    # Preferred Label axis so a crop that is also a consumed food (Rice,
    # Sorghum, Groundnut, Tomato, ...) JOINS food_acquired.j; u on the
    # shared `u` Preferred Label axis.  Plot grain aligns with
    # plot_features.  Aggregates (harvest_kg / yield / share_kg_sold /
    # main_crop / value-shares) are transformations, NOT stored columns.
    # 2004-05 (IHS2) deferred: household-level aggregated ag file, no
    # plot-crop roster.  See _/malawi.py:assemble_crop_production.
    index: (t, i, plot, crop)
    Quantity: float
    u: str
    Quantity_sold: float
    Value_sold: float
    planting_month: int
    harvest_month: int
    intercropped: bool
    perennial: bool
    materialize: make
  plot_inputs:
    # Item-level (t, i, plot, input, crop, u) agricultural-input feature
    # for the four IHS3+/IHPS waves (2010-11, 2013-14, 2016-17, 2019-20);
    # GAP 2.  One reported row per input applied to a plot.  Sources:
    # Module D (ag_mod_d) -- inorganic fertilizer in two slots (type +
    # applied quantity + unit), an organic-fertilizer used? flag (ag_d36),
    # and pesticide/herbicide/fungicide/fumigant types + qty + unit gated
    # by ag_d40; Module G (ag_mod_g) -- seed planted per plot-crop
    # (ag_g04a/b) with the improved-seed flag ag_g0f in IHS4/IHS5; Module H
    # (ag_mod_h) -- purchased seed (household-crop grain) attached to the
    # single-plot seed row of that (i, crop), like crop_production's sale.
    # `input` is the shared harmonize_input Preferred Label
    # (NPK/DAP/CAN/Urea/D-Compound/Other fertilizer, Organic Fertilizer,
    # Insecticide/Herbicide/Fungicide/Fumigant/Other Pesticide, Seed).
    # `crop` is the harmonize_crop->harmonize_food label for seed rows
    # (NaN for fertilizer/pesticide).  `u` is the reported native unit
    # label (NaN where the survey records no quantity basis, e.g. organic
    # fertilizer).  crop / u are in the index because a plot may carry
    # several seed crops or a fertilizer in several units.  Reported item
    # columns only: Quantity, native u, Purchased (bool, True where a
    # purchased seed quantity is attached), Quantity_purchased, Improved
    # (bool, seed rows).  Aggregates (seed_kg, nitrogen_kg,
    # inorganic/organic/pesticide any-flags) are transformations, NOT
    # stored columns.  2004-05 (IHS2) deferred: household-level aggregated
    # ag file, no plot-input roster.  See _/malawi.py:assemble_plot_inputs.
    index: (t, i, plot, input, crop, u)
    Quantity: float
    Purchased: bool
    Quantity_purchased: float
    Improved: bool
    materialize: make
  livestock:
    # Item-level (t, i, animal) livestock-roster feature for the four
    # IHS3+/IHPS waves (2010-11, 2013-14, 2016-17, 2019-20); GAP 4.  One
    # reported row per (household, species owned), from Module R
    # (ag_mod_r1) -- the SAME roster the World Bank cleaning code reads then
    # collapses to a single HH "engaged-in-livestock" binary (MWI_IHPS{1-4}
    # .do: recode ag_r00 -> collapse (max) livestock by hhid).  We keep the
    # PRE-collapse rows, which are strictly richer: their binary =
    # livestock().groupby(['t','i']).size() > 0.  Reported item columns:
    #   HeadCount    (ag_r02, head owned now),
    #   HeadAcquired (ag_r10, head bought to raise in last 12 months),
    #   HeadSold     (ag_r16, head sold alive in last 12 months),
    #   Value        (ag_r04, REPORTED per-head current value -- "if you
    #                 sold one today, how much would you receive?";  a herd
    #                 value = Value x HeadCount and a TLU rollup are
    #                 transformations, NOT stored columns).
    # `animal` is the harmonize_species Preferred Label (the wave scripts
    # reconcile 2010-11's fine 301-318 code scheme with the later coarse
    # scheme -- Ox=3304, Donkey/Horse=3305, Chicken=3310,
    # Turkey/Guinea Fowl=3314 -- and drop code 318 "Other (Specify)").
    # Grain is (t, i, animal) with NO v level: 'livestock' is in the
    # framework _no_v_join set (a household holding, not a cluster roster).
    # 2004-05 (IHS2) deferred: household-level aggregated ag file, no
    # Module R roster.  See _/malawi.py:assemble_livestock.
    index: (t, i, animal)
    HeadCount: float
    HeadAcquired: float
    HeadSold: float
    Value: float
    materialize: make
  anthropometry:
    # Item-level (t, i, pid) body-measurement feature for the four IHS3+/
    # IHPS waves (2010-11, 2013-14, 2016-17, 2019-20); GAP 5.  One reported
    # row per measured individual, from Module V (hh_mod_v) of the household
    # questionnaire -- the SAME module the World Bank cleaning code reads
    # then collapses to WHO-2006 z-scores (MWI_IHPS{1-4}.do:1213-1231:
    # weight=hh_v08; height=hh_v09; cage=age*12 | hh_b05b; zscore06 ->
    # haz06/waz06/whz06/bmiz06).  We keep the PRE-zscore RAW measures:
    #   Weight      (hh_v08, kg),
    #   Height      (hh_v09, cm),
    #   Age_months  (the .do `cage`: roster years hh_b05a x 12, falling back
    #                to infant months-of-age hh_b05b -- self-describing for
    #                the z-score transform),
    #   Sex         (roster hh_b03, normalised to F/M).
    # NO MUAC column: Module V records no mid-upper-arm circumference in any
    # IHS/IHPS wave (we carry only the columns the source actually records;
    # a country whose Module V has MUAC declares and populates it itself).
    # The WHO-2006 z-scores (haz06/waz06/whz06/bmiz06) and wasting/stunting
    # are TRANSFORMS (they require the WHO-2006 reference population),
    # computed at query time, NEVER stored here.  Grain is individual
    # (t, i, pid), aligned with household_roster's (i, pid); v auto-joins
    # from sample() at API time, so the returned grain is (t, i, v, pid).
    # 2004-05 (IHS2) deferred: no Module V body-measurement roster.  See
    # _/malawi.py:_anthropometry_block / assemble_anthropometry.
    index: (t, i, pid)
    Weight: float
    Height: float
    Age_months: float
    Sex: str
    materialize: make
  plot_labor:
    # Item-level (t, i, plot, source) plot-labor feature for the four
    # IHS3+/IHPS waves (2010-11, 2013-14, 2016-17, 2019-20); GAP 3 (plot
    # grain).  One REPORTED row per labor source applied to a plot, with
    # source in {family, hired, other} on the harmonize_labor_source
    # Preferred Labels.  Source: the Module D (ag_mod_d) plot-labor block --
    # the SAME columns the World Bank cleaning code (MWI_IHPS{1-4}.do
    # labor-days block) reads then collapses to per-plot total_*_labor_days /
    # hired_labor_value.  We keep the PRE-collapse reported person-days per
    # source:
    #   PersonDays -- reported person-days of that source on the plot.  For
    #                 family labor the survey records (days x #people) per
    #                 person-slot/week block, so PersonDays sums those
    #                 day*count products; for hired/other it sums the reported
    #                 man/woman/child day counts across the two visit columns.
    #   Wage       -- reported cash daily wage paid to HIRED labor (mean of
    #                 the reported man/woman/child daily wages recorded for
    #                 that plot); NaN for family / other (no wage paid).  This
    #                 is the REPORTED per-day wage, NOT the WB median-wage
    #                 valuation.
    # The WB total_labor_days (sum ACROSS sources), the per-source HH-level
    # rollups, and hired_labor_value (median-wage valuation) are ALL
    # transformations, NEVER stored columns here.  Plot grain aligns with
    # crop_production / plot_inputs (join on (t, i, plot)).  Variable layout
    # differs by questionnaire generation: IHS3/IHPS-2013 (2010-11, 2013-14)
    # use the ag_d47{a,c,e}/d48 hired layout + ag_d4{2,3,4}{b/c,f/g,j/k,n/o}
    # family slots; IHS4/IHS5 (2016-17, 2019-20) use ag_d47{a1,a2,a3}/d48
    # hired + ag_d4{2,3,4}{b}{n}*{c}{n} family.  The IHS4/IHS5
    # Cross_Sectional halves drop the "other" (ag_d52*/ag_d54*) columns, so
    # those halves carry no `other` rows (reported, not faked).  2004-05
    # (IHS2) is DEFERRED (household-level aggregated ag file, no plot-labor
    # roster).  See _/malawi.py:_plot_labor_block / assemble_plot_labor.
    index: (t, i, plot, source)
    PersonDays: float
    Wage: float
    materialize: make
  people_last7days:
    # Item-level (t, i, pid) 7-day individual time-use feature for the four
    # IHS3+/IHPS waves (2010-11, 2013-14, 2016-17, 2019-20); GAP 3
    # (individual grain).  Mirrors Uganda's people_last7days at the
    # per-individual grain GAP_RANKING.org specifies (Uganda's existing
    # feature is an HH-level Men/Women/Boys/Girls count; the parity target is
    # the per-individual activity record).  Source: the household labor
    # module (hh_mod_e) -- the SAME module the World Bank cleaning code
    # (MWI_IHPS{1-4}.do labor block) reads to build the farm_work/SOB_work/
    # wage_work dummies, hours, six ind_* industry one-hots, and working_age.
    # We keep the per-individual REPORTED record:
    #   farm_work  -- worked on HH agric/livestock/fishing in last 7 days
    #   SOB_work   -- helped/ran a non-farm HH business in last 7 days
    #   wage_work  -- worked for a wage/salary OR ganyu in last 7 days
    #   farm_hrs   -- hours on HH agric (+livestock/fishing where split)
    #   SB_hrs     -- hours on the non-farm HH business
    #   wage_hrs   -- hours of wage work + ganyu (the WB wage_hrs sum)
    #   wage_industry -- main wage-job industry on the harmonize_industry
    #                 Preferred Labels (Agriculture/Fishing/Mining/
    #                 Manufacturing/Construction/Services/Other), binned from
    #                 hh_e20b by the WB numeric ranges; NaN where no wage job.
    #                 Replaces the six WB ind_* dummies (a per-industry dummy
    #                 is then a trivial transformation).
    #   working_age -- the WB working_age flag (hh_e02 != "X" in IHS3/
    #                 IHPS-2013; roster age hh_b05a >= 5 in IHS4/IHS5).
    # Variable names differ by questionnaire generation (legacy hh_e07 single
    # farm col vs modern hh_e07a/b/c + roster-derived working_age); see
    # _/malawi.py:_people_last7days_block.  Grain is individual (t, i, pid),
    # aligned with household_roster's (i, pid); v auto-joins from sample() at
    # API time.  2004-05 (IHS2) is DEFERRED (its labor module predates the
    # 7-day activity battery).  See _/malawi.py:assemble_people_last7days.
    index: (t, i, pid)
    farm_work: bool
    SOB_work: bool
    wage_work: bool
    farm_hrs: float
    SB_hrs: float
    wage_hrs: float
    wage_industry: str
    working_age: bool
    materialize: make
  food_expenditures:
  food_prices:
