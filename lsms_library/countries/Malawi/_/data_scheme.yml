Country: Malawi

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str
    Region: str
    District: str
  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude: float
    Longitude: float
  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
  individual_education:
    index: (t, i, pid)
    Educational Attainment: str
  subjective_well_being:
    index: (t,i)
    Own Step: int
    Neighbors Step: int
    Friends Step: int
  food_security:
    # FAO FIES 8-item experience scale (GH #332).  Sourced from
    # Module T (hh_t13..hh_t20): standard FAO FIES order in IHS4 (2016-17)
    # and IHS5 (2019-20); a concept-mapped 8-item battery in IHPS 2013
    # (2013-14, item order differs -- see that wave's _/mapping.py).
    # ABSENT in 2004-05 (IHS2) and 2010-11 (IHS3): those waves carry only
    # the coping-strategies / food-shortage module (Module H), not the
    # FIES experience battery.  Recall period: last 12 months.
    index: (t, i)
    Worried: bool
    HealthyDiet: bool
    FewFoods: bool
    SkippedMeal: bool
    AteLess: bool
    RanOut: bool
    Hungry: bool
    WholeDay: bool
    FIES_score: int
  panel_ids:
    index: (t, i)
    previous_i: str
  housing:
    index: (t, i)
    Roof: str
    Floor: str
  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind).  Wave-level food_acquired.py
    # threads the per-source quantities and units through the conversion
    # tables and then calls malawi.food_acquired_to_canonical, which
    # handles the long-form melt and fixes Malawi's legacy (j=HHID,
    # i=item) -> canonical (i=HHID, j=item) inversion.  See
    # slurm_logs/DESIGN_food_acquired_canonical_2026-05-05.org.
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float
    materialize: make
  interview_date:
    index: (t, i)
    Int_t: datetime
  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str
  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchased Recently: str
    Purchase Price: float
  plot_features:
    # Lasting plot-level characteristics for the four buildable IHS/IHPS
    # waves (2010-11, 2013-14, 2016-17, 2019-20); GH #167.  2004-05 (IHS2)
    # is deferred -- it has no standard plot roster.  Module C (area) is
    # merged with Module D (soil / irrigation / tenure) on (hhid, plotkey)
    # in each wave's plot_features.py.  Tenure is derived from the labeled
    # acquire question ag_d03 in 2010-11 & 2013-14 ONLY; ag_d03 is absent
    # from IHS4/IHS5 ag_mod_d (where ag_d02 is "ID of Respondent", not
    # tenure), so Tenure / TenureSystem are NaN for 2016-17 & 2019-20.
    # Latitude / Longitude are deferred: Malawi plot GPS is offset /
    # redacted in the public release.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    SoilType: str
    Irrigated: bool
    materialize: make
  food_coping:
    # rCSI coping-strategy day counts (GH #332).  Module H question H02
    # (hh_h02a..hh_h02e) of the IHS3/IHS4/IHS5 + IHPS-2013 household
    # questionnaire: how many of the past 7 days the HH used each of the 5
    # standard reduced-Coping-Strategies-Index strategies.  One row per
    # (HH, Strategy); Days is 0-7.  Strategy order is stable across all
    # waves (verified vs the IHS3 questionnaire Module H, Page 35):
    # a=LessPreferred, b=LimitPortion, c=ReduceMeals, d=RestrictAdults,
    # e=BorrowFood.  Recall: last 7 days.  ABSENT in 2004-05 (IHS2): its
    # Module H is a 3-day food-consumption recall, not a coping battery.
    index: (t, i, Strategy)
    Days: int
    materialize: make
  months_food_inadequate:
    # Months of inadequate food provisioning (GH #332).  Module H questions
    # H04 (hh_h04, Yes/No: faced a food-shortage situation in the last 12
    # months) and H05 (wide month calendar, 'X' = a month the HH lacked
    # food).  MonthsInadequate = count of marked months (0-12) for H04==Yes
    # households, 0 otherwise; AnyInadequate = (H04==Yes).  The H05 count is
    # gated on H04==Yes because IHS4/IHS5 pre-fill all 25 calendar cells for
    # H04==No households.  Recall: last 12 months.  ABSENT in 2004-05.
    index: (t, i)
    MonthsInadequate: int
    AnyInadequate: bool
    materialize: make
  food_expenditures:
  food_prices:
