Country: Malawi

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str
    Region: str
    District: str
  cluster_features:
    index: (t, v, i)
    Region: str
    District: str
    Rural: str
    Latitude: float
    Longitude: float
  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
  individual_education:
    index: (t, i, pid)
    Educational Attainment: str
  subjective_well_being:
    index: (t,i)
    Own Step: int
    Neighbors Step: int
    Friends Step: int
  panel_ids:
    index: (t, i)
    previous_i: str
  housing:
    index: (t, i)
    Roof: str
    Floor: str
  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind).  Wave-level food_acquired.py
    # threads the per-source quantities and units through the conversion
    # tables and then calls malawi.food_acquired_to_canonical, which
    # handles the long-form melt and fixes Malawi's legacy (j=HHID,
    # i=item) -> canonical (i=HHID, j=item) inversion.  See
    # slurm_logs/DESIGN_food_acquired_canonical_2026-05-05.org.
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float
    materialize: make
  interview_date:
    index: (t, visit, i)
    Int_t: str
  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str
  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchased Recently: str
    Purchase Price: float
  food_expenditures:
  food_prices:
