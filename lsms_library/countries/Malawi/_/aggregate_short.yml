# Aggregate Label -> short form for graph axes / table headers.
# Consumed by `python -m lsms_library.util.orgtbl` to (re)generate the
# `Aggregate (short)` column in categorical_mapping.org.  Re-run with:
#
#     python -m lsms_library.util.orgtbl \
#         lsms_library/countries/Malawi/_/categorical_mapping.org \
#         --table harmonize_food \
#         --column 'Aggregate (short)' \
#         --mapping lsms_library/countries/Malawi/_/aggregate_short.yml \
#         --source-column 'Aggregate Label' \
#         --insert-after 'Aggregate Label'
#
# Design: max length 11 chars, mean ~7.  Local Malawian terms preferred
# where they help legibility (Mgaiwa, Madeya, Nkwani, Tanaposi, Therere,
# Nandolo, Maheu, Thobwa, Bica, Chambo).  Drop generic qualifiers when
# uniqueness preserved (Cooking Oil -> Oil; Sugar Cane -> Cane;
# Smoked Fish -> Smoked).  Suffix `+` for "this term and similar"
# (Mango+, Beans+).

