Country: Malawi
Wave: 2010-11

sample:
    file: Full_Sample/Household/hh_mod_a_filt.dta
    idxvars:
        i: case_id
    myvars:
        v: ea_id
        weight: hh_wgt
        panel_weight: hh_wgt
        strata: hh_a01
        Rural: reside

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: Full_Sample/Household/hh_mod_a_filt.dta
        idxvars:
            i: case_id
            v: ea_id
        myvars:
            Rural:
                - reside
                - mapping:
                    rural: 0
                    urban: 1
            Region:
                - hh_a01
                - mapping:
                    Chitipa: North
                    Karonga: North
                    Nkhatabay: North
                    Rumphi: North
                    Mzimba: North
                    Mzuzu City: North
                    Kasungu: Central
                    Nkhota kota: Central
                    Ntchisi: Central
                    Dowa: Central
                    Salima: Central
                    Lilongwe: Central
                    Mchinji: Central
                    Dedza: Central
                    Ntcheu: Central
                    Lilongwe City: Central
                    Mangochi: Southern
                    Machinga: Southern
                    Zomba: Southern
                    Chiradzulu: Southern
                    Blanytyre: Southern
                    Mwanza: Southern
                    Thyolo: Southern
                    Mulanje: Southern
                    Phalombe: Southern
                    Chikwawa: Southern
                    Nsanje: Southern
                    Balaka: Southern
                    Neno: Southern
                    Zomba City: Southern
                    Blantyre City: Southern
    df_geo:
        file: Full_Sample/Geovariables/HH_level/householdgeovariables.dta
        idxvars:
            v: ea_id
        myvars:
            Latitude: lat_modified
            Longitude: lon_modified
    merge_on:
        - v
    final_index:
        - t
        - v
        - i

subjective_well_being:
    file: Full_Sample/Household/hh_mod_t.dta
    idxvars:
        i: case_id
    myvars:
        Own Step: hh_t05
        Neighbors Step: hh_t06
        Friends Step: hh_t07

household_roster:
    file: Full_Sample/Household/hh_mod_b.dta
    idxvars:
        i: case_id
        pid: id_code
    myvars:
        Sex: hh_b03
        Age: hh_b05a
        Relationship: hh_b04
        MonthsAway: hh_b07


individual_education:
    file: Full_Sample/Household/hh_mod_c.dta
    idxvars:
        i: case_id
        pid: id_code
    myvars:
        Educational Attainment: hh_c09

housing:
    file: Full_Sample/Household/hh_mod_f.dta
    idxvars:
        i: case_id
    myvars:
        Roof:
            - hh_f08
            - mapping:
                Grass: Grass
                Iron sheets: Iron Sheets
                Clay tiles: Clay Tiles
                Plastic sheeting: Plastic Sheeting
                Concrete: Concrete
                Other (specify): Other
        Floor:
            - hh_f09
            - mapping:
                Smoothed mud: Smoothed Mud
                Smooth cement: Smooth Cement
                Sand: Sand
                Tile: Tile
                Wood: Wood
                Other (Specify): Other

