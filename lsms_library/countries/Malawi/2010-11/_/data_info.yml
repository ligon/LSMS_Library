Country: Malawi
Wave: 2010-11

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: Full_Sample/Household/hh_mod_a_filt.dta
        idxvars:
            i: case_id
            v: ea_id
        myvars:
            Rural:
                - reside
                - mapping:
                    rural: 0
                    urban: 1
            Region:
                - hh_a01
                - mapping:
                    Chitipa: North
                    Karonga: North
                    Nkhatabay: North
                    Rumphi: North
                    Mzimba: North
                    Mzuzu City: North
                    Kasungu: Central
                    Nkhota kota: Central
                    Ntchisi: Central
                    Dowa: Central
                    Salima: Central
                    Lilongwe: Central
                    Mchinji: Central
                    Dedza: Central
                    Ntcheu: Central
                    Lilongwe City: Central
                    Mangochi: Southern
                    Machinga: Southern
                    Zomba: Southern
                    Chiradzulu: Southern
                    Blanytyre: Southern
                    Mwanza: Southern
                    Thyolo: Southern
                    Mulanje: Southern
                    Phalombe: Southern
                    Chikwawa: Southern
                    Nsanje: Southern
                    Balaka: Southern
                    Neno: Southern
                    Zomba City: Southern
                    Blantyre City: Southern
    df_geo:
        file: Full_Sample/Geovariables/HH_level/householdgeovariables.dta
        idxvars:
            v: ea_id
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v
        - i

subjective_well_being:
    file: Full_Sample/Household/hh_mod_t.dta
    idxvars:
        i: case_id
    myvars:
        Own Step: hh_t05
        Neighbors Step: hh_t06
        Friends Step: hh_t07

household_roster:
    dfs:
        - df_roster
        - df_cluster
    df_roster:
        file: Full_Sample/Household/hh_mod_b.dta
        idxvars:
            i: case_id
            pid: id_code
        myvars:
            Sex: hh_b03
            Age: hh_b05a
            Relationship: hh_b04
    df_cluster:
        file: Full_Sample/Household/hh_mod_a_filt.dta
        idxvars:
            i: case_id
        myvars:
            v: ea_id
    merge_on:
        - i
    final_index:
        - t
        - v
        - i
        - pid


individual_education:
    dfs:
        - df_educ
        - df_cluster
    df_educ:
        file: Full_Sample/Household/hh_mod_c.dta
        idxvars:
            i: case_id
            pid: id_code
        myvars:
            Educational Attainment: hh_c09
    df_cluster:
        file: Full_Sample/Household/hh_mod_a_filt.dta
        idxvars:
            i: case_id
        myvars:
            v: ea_id
    merge_on:
        - i
    final_index:
        - t
        - v
        - i
        - pid

