Country: Malawi
Wave: 2010-11

sample:
    file: Full_Sample/Household/hh_mod_a_filt.dta
    idxvars:
        i: case_id
    myvars:
        v: ea_id
        weight: hh_wgt
        panel_weight: hh_wgt
        strata:
            - hh_a01
            - mappings: ['district', 'Alternate Spelling', 'Preferred Label']
        Rural: reside
        # 2010-11 has no separate `region` or `district` column;
        # hh_a01 is the district *name*.  Declare Region (mapped) and
        # District (raw) at HH grain so _add_market_index() resolves
        # market='Region' / 'District' from sample() directly.  Same
        # source/mapping as cluster_features.df_main below.
        Region:
            - hh_a01
            - mapping:
                Chitipa: North
                Karonga: North
                Nkhatabay: North
                Rumphi: North
                Mzimba: North
                Mzuzu City: North
                Kasungu: Central
                Nkhota kota: Central
                Ntchisi: Central
                Dowa: Central
                Salima: Central
                Lilongwe: Central
                Mchinji: Central
                Dedza: Central
                Ntcheu: Central
                Lilongwe City: Central
                Mangochi: Southern
                Machinga: Southern
                Zomba: Southern
                Chiradzulu: Southern
                Blanytyre: Southern
                Mwanza: Southern
                Thyolo: Southern
                Mulanje: Southern
                Phalombe: Southern
                Chikwawa: Southern
                Nsanje: Southern
                Balaka: Southern
                Neno: Southern
                Zomba City: Southern
                Blantyre City: Southern
        District: hh_a01

interview_date:
    file: Full_Sample/Household/hh_mod_a_filt.dta
    idxvars:
        i: case_id
    myvars:
        # hh_a23_1 = "Interview Date [MDY] (Visit 1)", a Stata %td date that
        # get_dataframe returns as datetime64.  hh_a23_2 = the Visit 2 date
        # (same %td datetime; populated for the ~3247 panel HH revisited at
        # post-harvest).  Both are melted to the `visit` index level by the
        # country-level malawi.interview_date df_edit hook (visit 2 rows with
        # a NaT date are dropped there).
        int_t: hh_a23_1
        int_t_v2: hh_a23_2

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: Full_Sample/Household/hh_mod_a_filt.dta
        idxvars:
            i: case_id
            v: ea_id
        myvars:
            # Raw `reside` is already a declared spelling of the canonical
            # Rural/Urban vocabulary in every Malawi wave ('Rural'/'Urban',
            # 'rural'/'urban', 'RURAL'/'URBAN' -- the case differs between the
            # Cross_Sectional and Panel files).  Pass it through and let
            # _enforce_canonical_spellings normalise it.  The `mapping:` blocks
            # that used to sit here converted these good labels into 0/1 and
            # got the DIRECTION WRONG: because the two source files disagree on
            # case, 2016-17 and 2019-20 mapped rural households to BOTH codes,
            # sign-flipping the indicator between waves.  GH #602.
            Rural: reside
            Region:
                - hh_a01
                - mapping:
                    Chitipa: North
                    Karonga: North
                    Nkhatabay: North
                    Rumphi: North
                    Mzimba: North
                    Mzuzu City: North
                    Kasungu: Central
                    Nkhota kota: Central
                    Ntchisi: Central
                    Dowa: Central
                    Salima: Central
                    Lilongwe: Central
                    Mchinji: Central
                    Dedza: Central
                    Ntcheu: Central
                    Lilongwe City: Central
                    Mangochi: Southern
                    Machinga: Southern
                    Zomba: Southern
                    Chiradzulu: Southern
                    Blanytyre: Southern
                    Mwanza: Southern
                    Thyolo: Southern
                    Mulanje: Southern
                    Phalombe: Southern
                    Chikwawa: Southern
                    Nsanje: Southern
                    Balaka: Southern
                    Neno: Southern
                    Zomba City: Southern
                    Blantyre City: Southern
            # 2010-11 has no separate `district` column; hh_a01 is the
            # district *name* (and is also consumed above as the source
            # for Region via the district->region mapping).  Surface it
            # raw here so cluster_features() can satisfy market='District'
            # lookups for this wave.
            District: hh_a01
    df_geo:
        # GH #323 SITE 4 / GH #627 -- CARTESIAN, CURED AT THE MERGE.
        #
        # This block USED to key `householdgeovariables.dta` on `v: ea_id` and
        # merge on the CLUSTER key `v`.  Both sub-frames are HOUSEHOLD grain
        # (12,271 rows each, one per case_id, across 768 EAs), so `pd.merge`
        # paired every household of df_main with every geo row sharing that
        # `v`: 196,083 rows, 183,812 of them PHANTOM -- rows that exist in no
        # survey.  `_normalize_dataframe_index` then mopped the wreck up with
        # groupby().first() down to 768 clusters, so the table read clean at
        # every point anyone ever looked.
        #
        # The geo file carries `case_id`, so the honest key was there all
        # along.  Verified cold against the two source files:
        #   * exactly 1:1 on case_id -- 12,271 = 12,271, zero rows on either
        #     side alone, no duplicate case_id in either file;
        #   * lat_modified / lon_modified are CONSTANT within all 768 ea_id
        #     (0 EAs with more than one distinct coordinate) -- the published
        #     GPS is the EA's displaced fix stamped on each household;
        #   * df_main.ea_id == df_geo.ea_id for all 12,271 households.
        # So keying on `i` hands each household its own coordinate, which is
        # the coordinate the `v`-merge was already giving it: 196,083 -> 12,271
        # wave rows, 183,812 -> 0 phantom, and every returned value unchanged.
        #
        # `v` is deliberately NOT declared here.  df_main owns it; declaring it
        # on both sides of a merge keyed on `i` would only produce a v_x/v_y
        # collision.
        file: Full_Sample/Geovariables/HH_level/householdgeovariables.dta
        idxvars:
            i: case_id
        myvars:
            Latitude: lat_modified
            Longitude: lon_modified
    merge_on:
        - i
    final_index:
        - t
        - v
        - i

subjective_well_being:
    file: Full_Sample/Household/hh_mod_t.dta
    idxvars:
        i: case_id
    myvars:
        Own Step: hh_t05
        Neighbors Step: hh_t06
        Friends Step: hh_t07

household_roster:
    file: Full_Sample/Household/hh_mod_b.dta
    idxvars:
        i: case_id
        pid: id_code
    myvars:
        Sex: hh_b03
        Age: hh_b05a
        Relationship: hh_b04
        MonthsAway: hh_b07


individual_education:
    file: Full_Sample/Household/hh_mod_c.dta
    idxvars:
        i: case_id
        pid: id_code
    myvars:
        Educational Attainment:
            - hh_c09
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    file: Full_Sample/Household/hh_mod_f.dta
    idxvars:
        i: case_id
    myvars:
        # Roof / Floor values harmonized via the auto-discovery `Roof`
        # and `Floor` tables in ../../_/categorical_mapping.org.
        Roof: hh_f08
        Floor: hh_f09

