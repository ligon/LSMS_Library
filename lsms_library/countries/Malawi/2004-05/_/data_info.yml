Country: Malawi
Wave: 2004-05

sample:
    file: sec_a.dta
    idxvars:
        i: case_id
    myvars:
        v: ea
        weight: hhwght
        panel_weight: hhwght
        strata: strata
        Rural: reside
        # Region / District declared at HH grain so that
        # _add_market_index() resolves market='Region' / 'District'
        # via sample() (HH-level) rather than via cluster_features
        # (cluster aggregate).  Both declarations coexist; see PR
        # description for the design rationale (path A).
        Region:
            - region
            - mapping:
                North: North
                Centre: Central
                South: Southern
        District: dist

cluster_features:
    file: sec_a.dta
    idxvars:
        i: case_id
        v: ea
    myvars:
        Region:
            - region
            - mapping:
                North: North
                Centre: Central
                South: Southern
        District: dist
        Rural:
            - reside
            - mappings:
                Rural: 1
                Urban: 0

household_roster:
    file: sec_b.dta
    idxvars:
        i: case_id
        pid: memid
    myvars:
        Sex: b03
        Age: b05a
        Relationship: b04
        MonthsAway: b07


individual_education:
    file: sec_c.dta
    idxvars:
        i: case_id
        pid: memid
    myvars:
        Educational Attainment: c13

housing:
    file: sec_g.dta
    idxvars:
        i: case_id
    myvars:
        Roof:
            - g09
            - mapping:
                Grass/Palm leaves: Grass
                Iron sheets: Iron Sheets
                Clay tiles: Clay Tiles
                Plastic sheeting: Plastic Sheeting
                Concrete: Concrete
                Other: Other
        Floor:
            - g10
            - mapping:
                Smoothed mud: Smoothed Mud
                Smooth cement: Smooth Cement
                Sand: Sand
                Tile: Tile
                Wood: Wood
                Other: Other

# panel_ids:
