Country: Malawi
Wave: 2004-05

sample:
    file: sec_a.dta
    idxvars:
        i: case_id
    myvars:
        # GH #323 SITE 2.  `ea` is NOT a cluster id: it is the EA's sequence
        # number WITHIN its Traditional Authority, so it takes only 110
        # distinct values for IHS2's 564 enumeration areas.  Keyed on `ea`,
        # ~5 unrelated EAs -- in different TAs, districts and regions --
        # merge into one `v`.  `psu` is the fully qualified 8-digit EA code
        # (region 1 + district 2 + TA 2 + EA 3) that the same file already
        # carries: 564 distinct values, exactly 20 households each, and it
        # is the SAME 8-digit keyspace the later IHS3/IHS4/IHS5 waves use
        # for `ea_id` (a different census frame vintage, hence only 3 codes
        # in common with 2010-11 -- the FORMAT matches, the frame does not).
        # Verified: keyed on `psu`, zero households in a cluster disagree
        # about the cluster's region / district / urban-rural status; keyed
        # on `ea`, 164 of 330 such cells are contested.
        #
        # `v` must be declared identically here and in cluster_features
        # below or _join_v_from_sample matches nothing.
        v: psu
        weight: hhwght
        panel_weight: hhwght
        strata:
            - strata
            - mappings: ['district', 'Alternate Spelling', 'Preferred Label']
        Rural: reside
        # Region / District declared at HH grain so that
        # _add_market_index() resolves market='Region' / 'District'
        # via sample() (HH-level) rather than via cluster_features
        # (cluster aggregate).  Both declarations coexist; see PR
        # description for the design rationale (path A).
        # Region values (North/Centre/South) harmonized via the
        # auto-discovery `region` table in ../../_/categorical_mapping.org.
        Region: region
        District: dist

interview_date:
    file: sec_a.dta
    idxvars:
        i: case_id
    myvars:
        # a14a/b/c = Day / Month / Year of interview (numeric).
        # Combined into a datetime by malawi_date_ymd (year, month, day order).
        int_t:
            - a14c
            - a14b
            - a14a
            - mapping: malawi_date_ymd

cluster_features:
    file: sec_a.dta
    idxvars:
        i: case_id
        # GH #323 SITE 2 -- see the note on sample.v above.  `ea` is the EA's
        # sequence number within its Traditional Authority (110 values for
        # 564 EAs); `psu` is the fully qualified 8-digit EA code.  Keeping
        # `ea` here merged ~5 real EAs per `v` and the household->cluster
        # projection then served ONE arbitrary household's answer as the
        # cluster's: 6 of Malawi's 26 districts vanished from
        # cluster_features entirely and every one of the 110 surviving
        # clusters came out `Rural` -- IHS2's whole urban stratum erased.
        v: psu
    myvars:
        Region: region
        District: dist
        # Raw `reside` is already the canonical 'Rural'/'Urban' in this wave.
        # The `mappings:` block that used to sit here DID fire (country.py's
        # map_formatting_function honours both the `mapping:` and `mappings:`
        # spellings) and destroyed those good labels into 1/0 -- which is why
        # agreement with the correct sample.Rural was 0.0%.  Pass the label
        # through; the other Malawi waves now do the same.  GH #602.
        Rural: reside

household_roster:
    file: sec_b.dta
    idxvars:
        i: case_id
        pid: memid
    myvars:
        Sex: b03
        Age: b05a
        Relationship: b04
        MonthsAway: b07


individual_education:
    file: sec_c.dta
    idxvars:
        i: case_id
        pid: memid
    myvars:
        Educational Attainment:
            - c13
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    file: sec_g.dta
    idxvars:
        i: case_id
    myvars:
        Roof:
            - g09
            - mapping:
                Grass/Palm leaves: Grass
                Iron sheets: Iron Sheets
                Clay tiles: Clay Tiles
                Plastic sheeting: Plastic Sheeting
                Concrete: Concrete
                Other: Other
        Floor:
            - g10
            - mapping:
                Smoothed mud: Smoothed Mud
                Smooth cement: Smooth Cement
                Sand: Sand
                Tile: Tile
                Wood: Wood
                Other: Other

