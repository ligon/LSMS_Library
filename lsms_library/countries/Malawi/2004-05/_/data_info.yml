Country: Malawi
Wave: 2004-05

sample:
    file: sec_a.dta
    idxvars:
        i: case_id
    myvars:
        # `psu`, NOT `ea` (GH #323).  In sec_a.dta `ea` is a 1-3 digit EA
        # sequence *within a Traditional Authority*, so it takes only 110
        # distinct values and is NOT a cluster key: 79 of those 110 buckets
        # span more than one district and 66 span more than one REGION,
        # leaving 9,940 of 11,280 households (88%) in a bucket that straddles
        # regions.  `psu` is the real IHS2 cluster: 564 distinct, exactly 20
        # households each, equal to case_id[:8] for every row, and each psu
        # resolves to exactly one region/district/reside.
        # `sample` is the single source of truth for `v` (_join_v_from_sample
        # puts it on every household-level table), so the broken key was
        # propagating a wrong cluster -- and a wrong Region/District -- into
        # every Malawi 2004-05 table.
        v: psu
        weight: hhwght
        panel_weight: hhwght
        strata:
            - strata
            - mappings: ['district', 'Alternate Spelling', 'Preferred Label']
        Rural: reside
        # Region / District declared at HH grain so that
        # _add_market_index() resolves market='Region' / 'District'
        # via sample() (HH-level) rather than via cluster_features
        # (cluster aggregate).  Both declarations coexist; see PR
        # description for the design rationale (path A).
        # Region values (North/Centre/South) harmonized via the
        # auto-discovery `region` table in ../../_/categorical_mapping.org.
        Region: region
        District: dist

interview_date:
    file: sec_a.dta
    idxvars:
        i: case_id
    myvars:
        # a14a/b/c = Day / Month / Year of interview (numeric).
        # Combined into a datetime by malawi_date_ymd (year, month, day order).
        int_t:
            - a14c
            - a14b
            - a14a
            - mapping: malawi_date_ymd

cluster_features:
    file: sec_a.dta
    idxvars:
        i: case_id
        # `psu`, NOT `ea` -- see the note on sample.v above (GH #323).  With
        # `v: ea` this table reported 110 "clusters" where 564 exist, and the
        # framework's groupby(['t','v']).first() then handed each of those 110
        # buckets ONE arbitrary household's Region/District -- wrong for the
        # 66 buckets that span >1 region.  Keyed on psu, Region/District/Rural
        # are constant within every one of the 564 clusters, so the collapse
        # to the declared (t, v) grain is lossless.
        v: psu
    myvars:
        Region: region
        District: dist
        Rural:
            - reside
            - mappings:
                Rural: 1
                Urban: 0

household_roster:
    file: sec_b.dta
    idxvars:
        i: case_id
        pid: memid
    myvars:
        Sex: b03
        Age: b05a
        Relationship: b04
        MonthsAway: b07


individual_education:
    file: sec_c.dta
    idxvars:
        i: case_id
        pid: memid
    myvars:
        Educational Attainment:
            - c13
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    file: sec_g.dta
    idxvars:
        i: case_id
    myvars:
        Roof:
            - g09
            - mapping:
                Grass/Palm leaves: Grass
                Iron sheets: Iron Sheets
                Clay tiles: Clay Tiles
                Plastic sheeting: Plastic Sheeting
                Concrete: Concrete
                Other: Other
        Floor:
            - g10
            - mapping:
                Smoothed mud: Smoothed Mud
                Smooth cement: Smooth Cement
                Sand: Sand
                Tile: Tile
                Wood: Wood
                Other: Other

