shocks:
    file: sec_ab.dta
    # CODE-BASED extraction (GH #323).  sec_ab.dta's ab02 is a labelled Stata
    # variable whose value labels are NOT unique: codes 117 and 118 -- the
    # questionnaire's two separate "Other (specify)" roster slots, each with
    # its own ab02oth free-text -- BOTH carry the label "Other".  Reading the
    # labels merges them, so (t, i, Shock) went non-unique for 11,077 rows and
    # _normalize_dataframe_index silently dropped them via groupby().first().
    # 10,831 of those 11,077 were pure artefact: the level that distinguishes
    # them is in the file and was being thrown away.  Read the raw codes and
    # map them to labels ourselves (shock_label in mapping.py), keeping 117 and
    # 118 distinct.  Because the whole file is now read unconverted, ab04 and
    # ab07a/b/c are raw codes too and are mapped from codes below.
    converted_categoricals: False
    idxvars:
        i: case_id
        Shock:
            - ab02
            - mapping: shock_label
    myvars:
        # ab04: 1 = Income loss, 2 = Asset loss, 3 = Loss of both.
        AffectedIncome:
            - ab04
            - mapping:
                1: True
                2: False
                3: True
        AffectedAssets:
            - ab04
            - mapping:
                1: False
                2: True
                3: True
        HowCoped0:
            - ab07a
            - mapping: coping_label
        HowCoped1:
            - ab07b
            - mapping: coping_label
        HowCoped2:
            - ab07c
            - mapping: coping_label

assets:
    file: sec_m1.dta
    idxvars:
        i: case_id
        j: m0a
    myvars:
        Quantity: m03a
        Age: m04a
        Value: m05a
        Purchased Recently: m06a
