#     myvars:
#         previous_i: case_id

shocks:
    file: sec_ab.dta
    idxvars:
        i: case_id
        Shock: ab02
    myvars:
        AffectedIncome:
            - ab04
            - mapping:
                Income loss: True
                Asset loss: False
                Loss of both: True
        AffectedAssets:
            - ab04
            - mapping:
                Income loss: False
                Asset loss: True
                Loss of both: True
        HowCoped0: ab07a
        HowCoped1: ab07b
        HowCoped2: ab07c

assets:
    file: sec_m1.dta
    idxvars:
        i: case_id
        j: m0a
    myvars:
        Quantity: m03a
        Age: m04a
        Value: m05a
        Purchased Recently: m06a
