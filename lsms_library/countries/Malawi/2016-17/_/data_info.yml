Country: Malawi
Wave: 2016-17

sample:
    file:
        - Cross_Sectional/hh_mod_a_filt.dta
        - Panel/hh_mod_a_filt_16.dta:
            i: y3_hhid
    idxvars:
        i:
            - case_id
            - mapping: cs_i
    myvars:
        v: ea_id
        weight: hh_wgt
        panel_weight: panelweight_2016
        strata: district
        Rural: reside

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file:
            - Cross_Sectional/hh_mod_a_filt.dta
            - Panel/hh_mod_a_filt_16.dta:
                i: y3_hhid
        idxvars:
            i:
                - case_id
                - mapping: cs_i
            v: ea_id
        myvars:
            Region:
                - region
                - mapping:
                    North: North
                    Central: Central
                    Southern: Southern
                    South: Southern
            District: district
            Rural:
                - reside
                - mapping:
                    rural: 0
                    urban: 1
                    RURAL: 1
                    URBAN: 0
    df_geo:
        file: Cross_Sectional/householdgeovariablesihs4.dta
        idxvars:
            v: ea_id
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v
        - i

subjective_well_being:
    file: Cross_Sectional/hh_mod_t.dta
    idxvars:
        i: case_id
    myvars:
        Own Step: hh_t05
        Neighbors Step: hh_t06
        Friends Step: hh_t07

    
household_roster:
    file:
        - Cross_Sectional/hh_mod_b.dta
        - Panel/hh_mod_b_16.dta:
