Country: Malawi
Wave: 2016-17

sample:
    file:
        - Cross_Sectional/hh_mod_a_filt.dta
        - Panel/hh_mod_a_filt_16.dta:
            i: y3_hhid
    idxvars:
        i:
            - case_id
            - mapping: cs_i
    myvars:
        v: ea_id
        weight: hh_wgt
        panel_weight: panelweight_2016
        strata:
            - district
            - mappings: ['district', 'Alternate Spelling', 'Preferred Label']
        Rural: reside
        # Region values harmonized via the auto-discovery `region` table
        # in ../../_/categorical_mapping.org.
        Region: region
        District: district

interview_date:
    file:
        - Cross_Sectional/hh_mod_a_filt.dta
        - Panel/hh_mod_a_filt_16.dta:
            i: y3_hhid
            int_t: interviewdate_v1
            int_t_v2: interviewdate_v2
    idxvars:
        i:
            - case_id
            - mapping: cs_i
    myvars:
        # Cross_Sectional names the date column 'interviewDate' (single
        # visit); the Panel file uses 'interviewdate_v1' (Visit 1) +
        # 'interviewdate_v2' (Visit 2), overridden per-file above.  Both are
        # 'YYYY-MM-DD' strings -> datetime via the Int_t coercion.  The
        # cross-sectional half has no Visit 2, so int_t_v2 is requested only
        # from the Panel file (NaN-filled on concat for the CS rows).  Both
        # date columns are melted to the `visit` index level by the
        # country-level malawi.interview_date df_edit hook.
        int_t: interviewDate

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file:
            - Cross_Sectional/hh_mod_a_filt.dta
            - Panel/hh_mod_a_filt_16.dta:
                i: y3_hhid
                # The Panel half is the IHPS and it TRACKS MOVERS: `reside` is
                # where the household was FOUND, not what its BASELINE EA is,
                # and it disagrees within ea_id in 75 of the 102 panel EAs.
                # This wave's panel file carries no baseline_rural flag (only
                # dist_to_IHS3location), so the EA's urban/rural status is not
                # recoverable here -- emit NA rather than let groupby().first()
                # publish one arbitrary mover's answer as the cluster's.
                # Household-level rural status is unaffected: sample() still
                # carries it, per household, correctly.  GH #323.
                Rural:
                    - reside
                    - mapping: baseline_unknown
        idxvars:
            i:
                - case_id
                - mapping: cs_i
            v: ea_id
        myvars:
            # Region/District are decoded from the EA CODE, not read from the
            # `region`/`district` columns.  Those columns are the household's
            # location at interview; for the mover-tracking Panel half they are
            # not the baseline EA's location, so collapsing them to the declared
            # (t, v) grain assigned an arbitrary household's district to the EA.
            # ea_id[:1]/[:3] encode region/district and are mover-immune (see
            # ea_region/ea_district in ../../_/malawi.py).  On the clean
            # cross-section this is a no-op -- prefix->region/district is already
            # 1:1 across all 779 CS EAs -- so only the panel is corrected.
            Region:
                - ea_id
                - mapping: ea_region
            District:
                - ea_id
                - mapping: ea_district
            Rural:
                - reside
                - mapping:
                    rural: 0
                    urban: 1
                    RURAL: 1
                    URBAN: 0
    df_geo:
        # 2016-17 IHS4 publishes lat/lon per HOUSEHOLD (cross-sectional file
        # is keyed on case_id, not ea_id).  Panel HHs (~2.5k) lack a geo
        # file in this wave and end up with NaN lat/lon -- acceptable.
        #
        # `mapping: cs_i` is REQUIRED here (GH #323).  df_main rewrites the
        # cross-sectional case_id to 'cs-17-'+format_id(case_id); df_geo used
        # to key on the RAW case_id, so the merge on `i` matched NOTHING:
        # Latitude was non-null for 0 of the 14,955 v-present rows (100% of
        # this wave's geovariables were being dropped) and the 12,447
        # unmatched geo rows came through as phantom NaN-`i`/NaN-`v` rows that
        # all collapsed into a single bogus (t, v=NaN) cluster (GH #606).
        # Both sides of the merge must live in the same keyspace.
        file: Cross_Sectional/householdgeovariablesihs4.dta
        idxvars:
            i:
                - case_id
                - mapping: cs_i
        myvars:
            Latitude: lat_modified
            Longitude: lon_modified
    merge_on:
        - i
    final_index:
        - t
        - v
        - i

subjective_well_being:
    file: Cross_Sectional/hh_mod_t.dta
    idxvars:
        i: case_id
    myvars:
        Own Step: hh_t05
        Neighbors Step: hh_t06
        Friends Step: hh_t07

food_security:
    # FAO FIES 8-item battery, IHS4 (hh_t13..hh_t20 in FAO order).
    # Recall period: last 12 months.  yes->True, no->False,
    # DON'T KNOW/refused/NaN->NA (see _/mapping.py).
    file: Cross_Sectional/hh_mod_t.dta
    idxvars:
        i: case_id
    myvars:
        Worried:
            - hh_t13
            - mapping: fies_yesno
        HealthyDiet:
            - hh_t14
            - mapping: fies_yesno
        FewFoods:
            - hh_t15
            - mapping: fies_yesno
        SkippedMeal:
            - hh_t16
            - mapping: fies_yesno
        AteLess:
            - hh_t17
            - mapping: fies_yesno
        RanOut:
            - hh_t18
            - mapping: fies_yesno
        Hungry:
            - hh_t19
            - mapping: fies_yesno
        WholeDay:
            - hh_t20
            - mapping: fies_yesno
        FIES_score:
            - hh_t13
            - hh_t14
            - hh_t15
            - hh_t16
            - hh_t17
            - hh_t18
            - hh_t19
            - hh_t20
            - mapping: fies_score

household_roster:
    file:
        - Cross_Sectional/hh_mod_b.dta
        - Panel/hh_mod_b_16.dta:
            i: y3_hhid
            pid: id_code
    idxvars:
        i:
            - case_id
            - mapping: cs_i
        pid: pid
    myvars:
        Sex: hh_b03
        Age: hh_b05a
        Relationship: hh_b04
        MonthsAway: hh_b07

individual_education:
    file:
        - Cross_Sectional/hh_mod_c.dta
        - Panel/hh_mod_c_16.dta:
            i: y3_hhid
            pid: id_code
    idxvars:
        i:
            - case_id
            - mapping: cs_i
        pid: pid
    myvars:
        Educational Attainment:
            - hh_c09
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    file:
        - Cross_Sectional/hh_mod_f.dta
        - Panel/hh_mod_f_16.dta:
            i: y3_hhid
    idxvars:
        i:
            - case_id
            - mapping: cs_i
    myvars:
        # Roof / Floor values harmonized via the auto-discovery `Roof`
        # and `Floor` tables in ../../_/categorical_mapping.org.
        Roof: hh_f08
        Floor: hh_f09

panel_ids:
    file: Panel/hh_mod_a_filt_16.dta
    idxvars:
        i: y3_hhid
    myvars:
        previous_i: y2_hhid

shocks:
    file: Cross_Sectional/hh_mod_u.dta
    idxvars:
        i: case_id
        Shock: hh_u0a
    myvars:
        AffectedIncome:
            - hh_u03a
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedAssets:
            - hh_u03b
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedProduction:
            - hh_u03c
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedConsumption:
            - hh_u03d
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        HowCoped0: hh_u04a
        HowCoped1: hh_u04b
        HowCoped2: hh_u04c

assets:
    file: Cross_Sectional/hh_mod_l.dta
    idxvars:
        i: case_id
        j: hh_l02
    myvars:
        Quantity: hh_l03
        Age: hh_l04
        Value: hh_l05
        Purchased Recently: hh_l06
        Purchase Price: hh_l07