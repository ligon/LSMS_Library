Country: MalawiIHPS
Wave: 2013-14

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: HH_MOD_A_FILT_13.dta
        idxvars:
            v: ea_id
        myvars:
            Region: region
            District: district
            Rural:
                - reside
                - mapping:
                    rural: 0
                    urban: 1
    df_geo:
        file: HouseholdGeovariables_IHPS_13.dta
        idxvars:
            v: ea_id
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v

household_roster:
    dfs:
        - df_roster
        - df_cluster
    df_roster:
        file: HH_MOD_B_13.dta
        idxvars:
            i: y2_hhid
            pid: hh_b01
        myvars:
            Sex: hh_b03
            Age: hh_b05a
            Relationship: hh_b04
    df_cluster:
        file: HH_MOD_A_FILT_13.dta
        idxvars:
            i: y2_hhid
        myvars:
            v: ea_id
    merge_on:
        - i
    final_index:
        - t
        - v
        - i
        - pid


individual_education:
    dfs:
        - df_educ
        - df_cluster
    df_educ:
        file: HH_MOD_C_13.dta
        idxvars:
            i: y2_hhid
            pid: PID
        myvars:
            Educational Attainment: hh_c09
    df_cluster:
        file: HH_MOD_A_FILT_13.dta
        idxvars:
            i: y2_hhid
        myvars:
            v: ea_id
    merge_on:
        - i
    final_index:
        - t
        - v
        - i
        - pid

panel_ids:
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        previous_i: case_id

shocks:
    file: HH_MOD_U_13.dta
    idxvars:
        i: y2_hhid
        Shock: hh_u0a
    myvars:
        AffectedIncome:
            - hh_u03a
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedAssets:
            - hh_u03b
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedProduction:
            - hh_u03c
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedConsumption:
            - hh_u03d
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        HowCoped0: hh_u04a
        HowCoped1: hh_u04b
        HowCoped2: hh_u04c

assets:
    file: HH_MOD_L_13.dta
    idxvars:
        i: y2_hhid
        j: hh_l02
    myvars:
        Quantity: hh_l03
        Age: hh_l04
        Value: hh_l05
