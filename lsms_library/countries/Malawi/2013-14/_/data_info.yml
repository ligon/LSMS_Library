Country: MalawiIHPS
Wave: 2013-14

sample:
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        v: ea_id
        weight: hh_wgt
        panel_weight: panelweight
        strata: district
        Rural: reside

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: HH_MOD_A_FILT_13.dta
        idxvars:
            i: y2_hhid
            v: ea_id
        myvars:
            Region:
                - region
                - mapping:
                    North: North
                    Central: Central
                    South: Southern
            District: district
            Rural:
                - reside
                - mapping:
                    rural: 0
                    urban: 1
    df_geo:
        file: HouseholdGeovariables_IHPS_13.dta
        idxvars:
            v: ea_id
        myvars:
            Latitude: LAT_DD_MOD
            Longitude: LON_DD_MOD
    merge_on:
        - v
    final_index:
        - t
        - v
        - i

household_roster:
    file: HH_MOD_B_13.dta
    idxvars:
        i: y2_hhid
        pid: hh_b01
    myvars:
        Sex: hh_b03
        Age: hh_b05a
        Relationship: hh_b04


individual_education:
    file: HH_MOD_C_13.dta
    idxvars:
        i: y2_hhid
        pid: PID
    myvars:
        Educational Attainment: hh_c09

housing:
    file: HH_MOD_F_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        Roof:
            - hh_f08
            - mapping:
                GRASS: Grass
                IRON SHEETS: Iron Sheets
                CLAY TILES: Clay Tiles
                PLASTIC SHEETING: Plastic Sheeting
                CONCRETE: Concrete
                OTHER (SPECIFY): Other
        Floor:
            - hh_f09
            - mapping:
                SMOOTHED MUD: Smoothed Mud
                SMOOTH CEMENT: Smooth Cement
                SAND: Sand
                TILE: Tile
                WOOD: Wood
                OTHER(SPECIFY): Other

panel_ids:
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        previous_i: case_id

shocks:
    file: HH_MOD_U_13.dta
    idxvars:
        i: y2_hhid
        Shock: hh_u0a
    myvars:
        AffectedIncome:
            - hh_u03a
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedAssets:
            - hh_u03b
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedProduction:
            - hh_u03c
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedConsumption:
            - hh_u03d
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        HowCoped0: hh_u04a
        HowCoped1: hh_u04b
        HowCoped2: hh_u04c

assets:
    file: HH_MOD_L_13.dta
    idxvars:
        i: y2_hhid
        j: hh_l02
    myvars:
        Quantity: hh_l03
        Age: hh_l04
        Value: hh_l05
