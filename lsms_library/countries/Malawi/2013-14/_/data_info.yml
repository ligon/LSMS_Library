Country: MalawiIHPS
Wave: 2013-14

sample:
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        v: ea_id
        weight: hh_wgt
        panel_weight: panelweight
        strata:
            - district
            - mappings: ['district', 'Alternate Spelling', 'Preferred Label']
        Rural: reside
        # Region values harmonized via the auto-discovery `region` table
        # in ../../_/categorical_mapping.org (case-insensitive name match
        # on column `Region`).
        Region: region
        District: district

interview_date:
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        # Visit 1, Attempt 1 interview date split across three columns:
        #   hh_a23a_1 = Day (numeric), hh_a23a_2 = Month (English name e.g.
        #   'MAY'), hh_a23a_3 = Year.  Combined into a datetime by
        #   malawi_date_ymd (year, month, day order).
        int_t:
            - hh_a23a_3
            - hh_a23a_2
            - hh_a23a_1
            - mapping: malawi_date_ymd
        # Visit 2, Attempt 1 interview date -- same Day/Month-name/Year
        # triplet layout one block later in Module A (labelled "Visit 2 -
        # Interview Date ..." in the source).  hh_a37a_1 = Day, hh_a37a_2 =
        # Month name, hh_a37a_3 = Year; ~3974 of 4000 panel HH revisited.
        # Melted to the `visit` index level by malawi.interview_date.
        # NB the hh_a23b_*/hh_a23c_* columns are Visit-1 re-attempts (NOT
        # Visit 2), so the Visit-2 date lives in the hh_a37a_* block.
        int_t_v2:
            - hh_a37a_3
            - hh_a37a_2
            - hh_a37a_1
            - mapping: malawi_date_ymd

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: HH_MOD_A_FILT_13.dta
        idxvars:
            i: y2_hhid
            v: ea_id
        myvars:
            Region: region
            District: district
            # Raw `reside` is already a declared spelling of the canonical
            # Rural/Urban vocabulary in every Malawi wave ('Rural'/'Urban',
            # 'rural'/'urban', 'RURAL'/'URBAN' -- the case differs between the
            # Cross_Sectional and Panel files).  Pass it through and let
            # _enforce_canonical_spellings normalise it.  The `mapping:` blocks
            # that used to sit here converted these good labels into 0/1 and
            # got the DIRECTION WRONG: because the two source files disagree on
            # case, 2016-17 and 2019-20 mapped rural households to BOTH codes,
            # sign-flipping the indicator between waves.  GH #602.
            Rural: reside
    df_geo:
        # 2013-14 IHPS publishes lat/lon per HOUSEHOLD (jittered per HH),
        # not per cluster — the file is keyed on y2_hhid, not ea_id.
        # Merge df_geo onto df_main on i rather than v.
        file: HouseholdGeovariables_IHPS_13.dta
        idxvars:
            i: y2_hhid
        myvars:
            Latitude: LAT_DD_MOD
            Longitude: LON_DD_MOD
    merge_on:
        - i
    final_index:
        - t
        - v
        - i

household_roster:
    file: HH_MOD_B_13.dta
    idxvars:
        i: y2_hhid
        pid: hh_b01
    myvars:
        Sex: hh_b03
        Age: hh_b05a
        Relationship: hh_b04
        MonthsAway: hh_b07


individual_education:
    file: HH_MOD_C_13.dta
    idxvars:
        i: y2_hhid
        pid: PID
    myvars:
        Educational Attainment:
            - hh_c09
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    file: HH_MOD_F_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        # Roof / Floor values harmonized via the auto-discovery `Roof`
        # and `Floor` tables in ../../_/categorical_mapping.org.
        Roof: hh_f08
        Floor: hh_f09

panel_ids:
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        previous_i: case_id

shocks:
    file: HH_MOD_U_13.dta
    idxvars:
        i: y2_hhid
        Shock: hh_u0a
    myvars:
        AffectedIncome:
            - hh_u03a
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedAssets:
            - hh_u03b
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedProduction:
            - hh_u03c
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedConsumption:
            - hh_u03d
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        HowCoped0: hh_u04a
        HowCoped1: hh_u04b
        HowCoped2: hh_u04c

assets:
    file: HH_MOD_L_13.dta
    idxvars:
        i: y2_hhid
        j: hh_l02
    myvars:
        Quantity: hh_l03
        Age: hh_l04
        Value: hh_l05

food_security:
    # IHPS 2013 8-item adult food-insecurity battery (HH_MOD_T_13,
    # hh_t13..hh_t20).  NOTE: NOT the standard FAO FIES wording/order used
    # in IHS4/IHS5; mapped to the canonical FAO-FIES columns by concept
    # (see _/mapping.py).  In particular HealthyDiet is sourced from the
    # lack-of-money item (hh_t15) and RanOut from hh_t14.  Recall: 12 months.
    # yes->True, no->False, missing->NA.
    file: HH_MOD_T_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        Worried:
            - hh_t13
            - mapping: fies_yesno
        HealthyDiet:
            - hh_t15
            - mapping: fies_yesno
        FewFoods:
            - hh_t16
            - mapping: fies_yesno
        SkippedMeal:
            - hh_t17
            - mapping: fies_yesno
        AteLess:
            - hh_t18
            - mapping: fies_yesno
        RanOut:
            - hh_t14
            - mapping: fies_yesno
        Hungry:
            - hh_t19
            - mapping: fies_yesno
        WholeDay:
            - hh_t20
            - mapping: fies_yesno
        FIES_score:
            - hh_t13
            - hh_t14
            - hh_t15
            - hh_t16
            - hh_t17
            - hh_t18
            - hh_t19
            - hh_t20
            - mapping: fies_score
