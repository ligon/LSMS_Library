Country: MalawiIHPS
Wave: 2013-14

sample:
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        v: ea_id
        weight: hh_wgt
        panel_weight: panelweight
        strata:
            - district
            - mappings: ['district', 'Alternate Spelling', 'Preferred Label']
        Rural: reside
        # Region values harmonized via the auto-discovery `region` table
        # in ../../_/categorical_mapping.org (case-insensitive name match
        # on column `Region`).
        Region: region
        District: district

interview_date:
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        # Visit 1, Attempt 1 interview date split across three columns:
        #   hh_a23a_1 = Day (numeric), hh_a23a_2 = Month (English name e.g.
        #   'MAY'), hh_a23a_3 = Year.  Combined into a datetime by
        #   malawi_date_ymd (year, month, day order).
        int_t:
            - hh_a23a_3
            - hh_a23a_2
            - hh_a23a_1
            - mapping: malawi_date_ymd
        # Visit 2, Attempt 1 interview date -- same Day/Month-name/Year
        # triplet layout one block later in Module A (labelled "Visit 2 -
        # Interview Date ..." in the source).  hh_a37a_1 = Day, hh_a37a_2 =
        # Month name, hh_a37a_3 = Year; ~3974 of 4000 panel HH revisited.
        # Melted to the `visit` index level by malawi.interview_date.
        # NB the hh_a23b_*/hh_a23c_* columns are Visit-1 re-attempts (NOT
        # Visit 2), so the Visit-2 date lives in the hh_a37a_* block.
        int_t_v2:
            - hh_a37a_3
            - hh_a37a_2
            - hh_a37a_1
            - mapping: malawi_date_ymd

cluster_features:
    # 2013-14 is the IHPS PANEL, and it TRACKS MOVERS.  `ea_id` is the
    # household's BASELINE (IHS3 2010-11) enumeration area, but `region`,
    # `district` and `reside` describe where the household was found in 2013 --
    # which, for a household that moved, is not where its baseline EA is.  So
    # these are HOUSEHOLD attributes wearing a CLUSTER attribute's name, and
    # collapsing them to the declared (t, v) grain with groupby().first() hands
    # each EA one arbitrary household's location: `region` disagrees within
    # ea_id in 93 of 204 EAs, `district` in 165, `reside` in 131 (GH #323).
    #
    # Evidence that this is exactly the mover effect and not a broken key:
    # every single household whose region/district/reside differs from its EA's
    # modal value has dist_to_IHS3location > 0 (177/177, 519/519, 300/300), and
    # restricting to non-movers makes ea_id perfectly consistent (0 of 161 EAs
    # vary on any of the three).
    #
    # Fix: take the cluster's geography from the EA CODE, which encodes it.
    # ea_id[:1] is the region and ea_id[:3] the district -- verified unique in
    # EVERY Malawi wave that has a sound cluster key (2004-05 psu: 564 EAs;
    # 2016-17: 779; 2019-20: 717) and against this wave's own non-movers.
    # Rural comes from `baseline_rural`, the BASELINE urban/rural flag, which
    # (unlike `reside`) is already constant within all 204 EAs.
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
        v: ea_id
    myvars:
        Region:
            - ea_id
            - mapping: ea_region
        District:
            - ea_id
            - mapping: ea_district
        Rural: baseline_rural
    # Latitude/Longitude are DELIBERATELY NOT DECLARED for this wave.
    # HouseholdGeovariables_IHPS_13.dta is keyed on y2_hhid and gives the
    # household's 2013 position, so for a mover it is the coordinate of
    # wherever they moved TO -- up to 699 km from the baseline EA.  lat/lon
    # therefore disagree within ea_id in 188 of 204 EAs, and .first() would
    # publish one arbitrary household's position as the cluster's.  The
    # source does not carry a cluster-level coordinate for this wave and the
    # YAML path cannot filter to non-movers, so we emit NOTHING rather than a
    # number that can be a district away: absent-and-obvious beats present-
    # and-wrong.  (For the same reason the old `dfs:`/`merge_on:` block is
    # gone -- there is now a single source file.)
    merge_on:
        - i
    final_index:
        - t
        - v
        - i

household_roster:
    file: HH_MOD_B_13.dta
    idxvars:
        i: y2_hhid
        pid: hh_b01
    myvars:
        Sex: hh_b03
        Age: hh_b05a
        Relationship: hh_b04
        MonthsAway: hh_b07


individual_education:
    file: HH_MOD_C_13.dta
    idxvars:
        i: y2_hhid
        pid: PID
    myvars:
        Educational Attainment:
            - hh_c09
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    file: HH_MOD_F_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        # Roof / Floor values harmonized via the auto-discovery `Roof`
        # and `Floor` tables in ../../_/categorical_mapping.org.
        Roof: hh_f08
        Floor: hh_f09

panel_ids:
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        previous_i: case_id

shocks:
    file: HH_MOD_U_13.dta
    idxvars:
        i: y2_hhid
        Shock: hh_u0a
    myvars:
        AffectedIncome:
            - hh_u03a
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedAssets:
            - hh_u03b
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedProduction:
            - hh_u03c
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedConsumption:
            - hh_u03d
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        HowCoped0: hh_u04a
        HowCoped1: hh_u04b
        HowCoped2: hh_u04c

assets:
    file: HH_MOD_L_13.dta
    idxvars:
        i: y2_hhid
        j: hh_l02
    myvars:
        Quantity: hh_l03
        Age: hh_l04
        Value: hh_l05

food_security:
    # IHPS 2013 8-item adult food-insecurity battery (HH_MOD_T_13,
    # hh_t13..hh_t20).  NOTE: NOT the standard FAO FIES wording/order used
    # in IHS4/IHS5; mapped to the canonical FAO-FIES columns by concept
    # (see _/mapping.py).  In particular HealthyDiet is sourced from the
    # lack-of-money item (hh_t15) and RanOut from hh_t14.  Recall: 12 months.
    # yes->True, no->False, missing->NA.
    file: HH_MOD_T_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        Worried:
            - hh_t13
            - mapping: fies_yesno
        HealthyDiet:
            - hh_t15
            - mapping: fies_yesno
        FewFoods:
            - hh_t16
            - mapping: fies_yesno
        SkippedMeal:
            - hh_t17
            - mapping: fies_yesno
        AteLess:
            - hh_t18
            - mapping: fies_yesno
        RanOut:
            - hh_t14
            - mapping: fies_yesno
        Hungry:
            - hh_t19
            - mapping: fies_yesno
        WholeDay:
            - hh_t20
            - mapping: fies_yesno
        FIES_score:
            - hh_t13
            - hh_t14
            - hh_t15
            - hh_t16
            - hh_t17
            - hh_t18
            - hh_t19
            - hh_t20
            - mapping: fies_score
