Country: MalawiIHPS
Wave: 2013-14

sample:
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        v: ea_id
        weight: hh_wgt
        panel_weight: panelweight
        strata:
            - district
            - mappings: ['district', 'Alternate Spelling', 'Preferred Label']
        Rural: reside
        # Region values harmonized via the auto-discovery `region` table
        # in ../../_/categorical_mapping.org (case-insensitive name match
        # on column `Region`).
        Region: region
        District: district

interview_date:
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        # Visit 1, Attempt 1 interview date split across three columns:
        #   hh_a23a_1 = Day (numeric), hh_a23a_2 = Month (English name e.g.
        #   'MAY'), hh_a23a_3 = Year.  Combined into a datetime by
        #   malawi_date_ymd (year, month, day order).
        int_t:
            - hh_a23a_3
            - hh_a23a_2
            - hh_a23a_1
            - mapping: malawi_date_ymd

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: HH_MOD_A_FILT_13.dta
        idxvars:
            i: y2_hhid
            v: ea_id
        myvars:
            Region: region
            District: district
            Rural:
                - reside
                - mapping:
                    rural: 0
                    urban: 1
    df_geo:
        # 2013-14 IHPS publishes lat/lon per HOUSEHOLD (jittered per HH),
        # not per cluster — the file is keyed on y2_hhid, not ea_id.
        # Merge df_geo onto df_main on i rather than v.
        file: HouseholdGeovariables_IHPS_13.dta
        idxvars:
            i: y2_hhid
        myvars:
            Latitude: LAT_DD_MOD
            Longitude: LON_DD_MOD
    merge_on:
        - i
    final_index:
        - t
        - v
        - i

household_roster:
    file: HH_MOD_B_13.dta
    idxvars:
        i: y2_hhid
        pid: hh_b01
    myvars:
        Sex: hh_b03
        Age: hh_b05a
        Relationship: hh_b04
        MonthsAway: hh_b07


individual_education:
    file: HH_MOD_C_13.dta
    idxvars:
        i: y2_hhid
        pid: PID
    myvars:
        Educational Attainment: hh_c09

housing:
    file: HH_MOD_F_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        # Roof / Floor values harmonized via the auto-discovery `Roof`
        # and `Floor` tables in ../../_/categorical_mapping.org.
        Roof: hh_f08
        Floor: hh_f09

panel_ids:
    file: HH_MOD_A_FILT_13.dta
    idxvars:
        i: y2_hhid
    myvars:
        previous_i: case_id

shocks:
    file: HH_MOD_U_13.dta
    idxvars:
        i: y2_hhid
        Shock: hh_u0a
    myvars:
        AffectedIncome:
            - hh_u03a
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedAssets:
            - hh_u03b
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedProduction:
            - hh_u03c
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        AffectedConsumption:
            - hh_u03d
            - mapping:
                Decrease: True
                DECREASE: True
                Did not change: False
                Did Not Change: False
                DID NOT CHANGE: False
                Increase: True
                INCREASE: True
        HowCoped0: hh_u04a
        HowCoped1: hh_u04b
        HowCoped2: hh_u04c

assets:
    file: HH_MOD_L_13.dta
    idxvars:
        i: y2_hhid
        j: hh_l02
    myvars:
        Quantity: hh_l03
        Age: hh_l04
        Value: hh_l05
