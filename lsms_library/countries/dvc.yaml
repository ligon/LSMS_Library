stages:
  materialize:
    foreach:
      malawi_2019_20_household_roster:
        country: Malawi
        wave: 2019-20
        table: household_roster
        format: parquet
      malawi_2019_20_food_acquired:
        country: Malawi
        wave: 2019-20
        table: food_acquired
        format: parquet
    do:
      cmd: python3 -m lsms_library.cli materialize --country ${item.country} --wave
        ${item.wave} --table ${item.table} --format ${item.format} --out build/${item.country}/${item.wave}/${item.table}.${item.format}
      deps:
      - ../cli.py
      - ../country.py
      - ../local_tools.py
      - ${item.country}/_
      - ${item.country}/${item.wave}/_
      outs:
      - build/${item.country}/${item.wave}/${item.table}.${item.format}
