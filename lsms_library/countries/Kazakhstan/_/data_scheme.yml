Country: Kazakhstan
Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    Rural: str

  housing:
    index: (t, i)
    Walls: str
    Toilet: str
    Tenure: str
    Electricity: str
    Rooms: float
    materialize: make

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  sample:
    index: (i, t)
    v: str
    weight:
      type: float
      optional: true
    panel_weight:
      type: float
      optional: true
    strata:
      type: str
      optional: true
    Rural: str

