Country: Uganda
Wave: 2009-10

household_roster:
    file: ../Data/GSEC2.dta
    idxvars:
        i: HHID
        pid: PID
    myvars:
        Sex: h2q3
        Relationship: h2q4
        Age: h2q8
        MonthsSpent: h2q5

people_last7days:
    file: GSEC15A.dta
    idxvars:
        i: HHID
    myvars:
        Men : h15a1
        Women : h15a2
        Boys : h15a3
        Girls : h15a4

housing:
    file: ../Data/GSEC9A.dta
    idxvars:
        i: Hhid
    myvars:
        Roof: H9q04
        Floor: H9q06

sample:
    # 2009-10 is a panel-refresh wave: `comm` in GSEC1 is the 2005-06 EA
    # (the original sampling frame).  565 HH (movers + split-offs) have
    # blank `comm` because they fall outside that frame.  Fall back to a
    # synthetic `@lat,lon` cluster label built from the modified GPS
    # coordinates in the geovars file.  See Uganda/_/CONTENTS.org for
    # the full rationale.
    dfs:
        - df_main
        - df_geo
    df_main:
        file: ../Data/GSEC1.dta
        idxvars:
            i: HHID
        myvars:
            v: comm
            weight: wgt09
            panel_weight: wgt09  # pre-refreshment — same as cross-sectional
            strata: stratum
            Rural: urban
            # HH-level Region — populated in GSEC1 for every household
            # (including the 565 movers/split-offs whose comm is blank),
            # so Region is always available regardless of whether v ended
            # up as a real comm or a synthetic @lat,lon label.
            Region:
                - region
                - # Fix some values (matches cluster_features convention)
                  " Kampala": "Central"
                  "Central without Kampala": "Central"
    df_geo:
        file: ../Data/UNPS_Geovars_0910.dta
        idxvars:
            i: HHID
        myvars:
            _lat: lat_mod
            _lon: lon_mod
    merge_on:
        - i
    final_index:
        - t
        - i
    derived:
        v:
            kind: coalesce_coord_bin
            lat: _lat
            lon: _lon
    drop:
        - _lat
        - _lon

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: ../Data/GSEC1.dta
        idxvars:
            i: HHID
            v: comm
        myvars:
            Rural: urban
            District: h1aq1  # TODO: This is numeric codes; needs mapping to names.
            Region:
                - region
                - # Fix some values
                  " Kampala": "Central"
                  "Central without Kampala": "Central"
    df_geo:
        file: ../Data/UNPS_Geovars_0910.dta
        idxvars:
            i: HHID
        myvars:
            Latitude: lat_mod
            Longitude: lon_mod
    merge_on:
        - i
    final_index:
        - t
        - v
