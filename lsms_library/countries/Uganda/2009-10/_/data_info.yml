Country: Uganda
Wave: 2009-10

household_roster:
    file: ../Data/GSEC2.dta
    idxvars:
        i: HHID
        pid: PID
    myvars:
        Sex: h2q3
        Relationship: h2q4
        # Age list = [age, day, month, year] -> ../_/2009-10.py reduces
        # to a scalar via tools.age_handler() (GH #177).
        Age:
            - h2q8
            - h2q9a
            - h2q9b
            - h2q9c
        MonthsSpent: h2q5

individual_education:
    file: ../Data/GSEC4.dta
    idxvars:
        i: HHID
        pid: PID
    myvars:
        # GH #171: highest grade/class completed (h4q7).  Raw labels
        # ('Completed P.7', ...) map onto the canonical ordinal levels via the
        # row-additive harmonize_education table.
        Educational Attainment:
            - h4q7
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

people_last7days:
    file: GSEC15A.dta
    idxvars:
        i: HHID
    myvars:
        Men : h15a1
        Women : h15a2
        Boys : h15a3
        Girls : h15a4

housing:
    file: ../Data/GSEC9A.dta
    idxvars:
        i: Hhid
    myvars:
        Roof: H9q04
        Floor: H9q06

sample:
    # 2009-10 is a panel-refresh wave: `comm` in GSEC1 is the 2005-06 EA
    # (the original sampling frame).  565 HH (movers + split-offs) have
    # blank `comm` because they fall outside that frame.  Fall back to a
    # synthetic `@lat,lon` cluster label built from the modified GPS
    # coordinates in the geovars file.  See Uganda/_/CONTENTS.org for
    # the full rationale.
    dfs:
        - df_main
        - df_geo
    df_main:
        file: ../Data/GSEC1.dta
        idxvars:
            i: HHID
        myvars:
            v: comm
            weight: wgt09
            panel_weight: wgt09  # pre-refreshment — same as cross-sectional
            strata: stratum
            Rural: urban
            # HH-level Region — populated in GSEC1 for every household
            # (including the 565 movers/split-offs whose comm is blank),
            # so Region is always available regardless of whether v ended
            # up as a real comm or a synthetic @lat,lon label.
            Region:
                - region
                - # Fix some values (matches cluster_features convention)
                  " Kampala": "Central"
                  "Central without Kampala": "Central"
    df_geo:
        file: ../Data/UNPS_Geovars_0910.dta
        idxvars:
            i: HHID
        myvars:
            _lat: lat_mod
            _lon: lon_mod
    merge_on:
        - i
    final_index:
        - t
        - i
    derived:
        v:
            kind: coalesce_coord_bin
            lat: _lat
            lon: _lon
    drop:
        - _lat
        - _lon

cluster_features:
    # GH #323.  2009-10 is a panel-refresh wave, so `comm` in GSEC1 is the
    # *2005-06* EA -- the original sampling frame.  The 565 households that
    # moved or split off fall outside that frame and carry a BLANK `comm`,
    # which uganda.v() (= format_id) normalises to None.  The (t, v) collapse
    # in _normalize_dataframe_index then DELETED every one of them outright
    # (groupby(dropna=True)), so 565 households referenced a cluster that had
    # no row in cluster_features at all.
    #
    # `sample` already solved exactly this, with the `derived:
    # coalesce_coord_bin` block above: fall back to a synthetic `@lat,lon`
    # cluster binned from the modified GPS.  Do the SAME here, with the same
    # transformer, the same source coordinates and the same defaults
    # (grid_degrees=0.05, prefix='@') -- which is what makes the labels
    # identical to sample's by CONSTRUCTION rather than by coincidence.  The
    # two must agree or _join_v_from_sample hands the rest of the library a
    # key that matches nothing.
    #
    # `derived:` runs after set_index(final_index), so `v` has to be a myvar
    # and final_index (t, i) for it to still be a COLUMN when the transformer
    # sees it.  The country-level hook uganda.cluster_features() then projects
    # onto the declared (t, v) grain.
    dfs:
        - df_main
        - df_geo
    df_main:
        file: ../Data/GSEC1.dta
        idxvars:
            i: HHID
        myvars:
            v: comm
            Rural: urban
            District: h1aq1  # TODO: This is numeric codes; needs mapping to names.
            Region:
                - region
                - # Fix some values
                  " Kampala": "Central"
                  "Central without Kampala": "Central"
    df_geo:
        file: ../Data/UNPS_Geovars_0910.dta
        idxvars:
            i: HHID
        myvars:
            Latitude: lat_mod
            Longitude: lon_mod
    merge_on:
        - i
    final_index:
        - t
        - i
    derived:
        v:
            kind: coalesce_coord_bin
            lat: Latitude
            lon: Longitude
