stages:
  materialize:
    do:
      cmd: python3 ../../../util/run_stage.py --backend "${item.backend}" --country
        "${item.country}" --wave "${item.wave}" --table "${item.table}" --format "${item.format}"
        --target "${item.target}"
      deps:
      - ../../../cli.py
      - ../../../country.py
      - ../../../local_tools.py
      - _
      outs:
      - var/${item.table}.${item.format}
    foreach:
      uganda::2009_10::cluster_features:
        country: Uganda
        wave: 2009-10
        table: cluster_features
        format: parquet
        backend: cli
        target: ''
      uganda::2009_10::household_roster:
        country: Uganda
        wave: 2009-10
        table: household_roster
        format: parquet
        backend: cli
        target: ''
      uganda::2009_10::people_last7days:
        country: Uganda
        wave: 2009-10
        table: people_last7days
        format: parquet
        backend: cli
        target: ''
