stages:
  materialize:
    do:
      cmd: cd _ && LSMS_BUILD_BACKEND=make python3 -m lsms_library.cli materialize --country "${item.country}" --all-waves --table "${item.table}" --format "${item.format}" --out ../var/${item.table}.${item.format}
      deps:
      - ../../cli.py
      - ../../country.py
      - ../../local_tools.py
      - _
      outs:
      - var/${item.table}.${item.format}
    foreach:
      uganda::::assets:
        country: Uganda
        table: assets
        format: parquet
      uganda::::cluster_features:
        country: Uganda
        table: cluster_features
        format: parquet
      uganda::::earnings:
        country: Uganda
        table: earnings
        format: parquet
      uganda::::enterprise_income:
        country: Uganda
        table: enterprise_income
        format: parquet
      uganda::::food_acquired:
        country: Uganda
        table: food_acquired
        format: parquet
      uganda::::food_expenditures:
        country: Uganda
        table: food_expenditures
        format: parquet
      uganda::::food_prices:
        country: Uganda
        table: food_prices
        format: parquet
      uganda::::food_quantities:
        country: Uganda
        table: food_quantities
        format: parquet
      uganda::::household_characteristics:
        country: Uganda
        table: household_characteristics
        format: parquet
      uganda::::household_roster:
        country: Uganda
        table: household_roster
        format: parquet
      uganda::::housing:
        country: Uganda
        table: housing
        format: parquet
      uganda::::income:
        country: Uganda
        table: income
        format: parquet
      uganda::::interview_date:
        country: Uganda
        table: interview_date
        format: parquet
      uganda::::nonfood_expenditures:
        country: Uganda
        table: nonfood_expenditures
        format: parquet
      uganda::::nutrition:
        country: Uganda
        table: nutrition
        format: parquet
      uganda::::other_features:
