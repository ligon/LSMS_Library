stages:
  materialize:
    do:
      cmd: python3 ../../util/run_stage.py --backend "${item.backend}" --country "${item.country}"
        --all-waves --table "${item.table}" --format "${item.format}" --target "${item.target}"
      deps:
      - ../../cli.py
      - ../../country.py
      - ../../local_tools.py
      - _
      outs:
      - var/${item.table}.${item.format}
    foreach:
      uganda::::cluster_features:
        country: Uganda
        wave: null
        table: cluster_features
        format: parquet
        backend: cli
        target: ''
