Country: Uganda
Wave: 2019-20

household_roster:
    file: HH/gsec2.dta
    idxvars:
        i: hhid
        pid: pid
    myvars:
        Sex: h2q3
        Relationship: h2q4
        # Age list = [age, day, month, year] -> ../_/2019-20.py reduces
        # to a scalar via tools.age_handler() (GH #177).  h2q9b is an
        # English month name in this wave; the Age formatter normalises.
        Age:
            - h2q8
            - h2q9a
            - h2q9b
            - h2q9c
        MonthsSpent: h2q5

individual_education:
    file: HH/gsec4.dta
    idxvars:
        i: hhid
        pid: pid
    myvars:
        Educational Attainment: s4q07

people_last7days:
    file: HH/gsec15a.dta
    idxvars:
        i: hhid
        #member: CEA01
    myvars:
        Men : CEA01A
        Women : CEA01B
        Boys : CEA01C
        Girls : CEA01D

housing:
    file: HH/gsec9.dta
    idxvars:
        i: hhid
    myvars:
        Roof: h9q04
        Floor: h9q06

sample:
    file: HH/gsec1.dta
    idxvars:
        i: hhid
    myvars:
        v: s1aq04a
        weight: wgt  # only weight provided; wave 8 appears to be panel-only (no refreshment)
        panel_weight: wgt
        strata: subreg
        Rural: urban
        Region: region

cluster_features:
    file: HH/gsec1.dta
    idxvars:
        i: hhid
        v: s1aq04a  # String for parish name.  Parish codes broken as in 2018-19.
    myvars:
        Region: region
        Rural: urban
        District: district
