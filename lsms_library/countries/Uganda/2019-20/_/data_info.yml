Country: Uganda
Wave: 2019-20

household_roster:
    file: HH/gsec2.dta
    idxvars:
        i: hhid
        pid: pid
    myvars:
        Sex: h2q3
        Relationship: h2q4
        # Age list = [age, day, month, year] -> ../_/2019-20.py reduces
        # to a scalar via tools.age_handler() (GH #177).  h2q9b is an
        # English month name in this wave; the Age formatter normalises.
        Age:
            - h2q8
            - h2q9a
            - h2q9b
            - h2q9c
        MonthsSpent: h2q5

individual_education:
    file: HH/gsec4.dta
    idxvars:
        i: hhid
        pid: pid
    myvars:
        # GH #171: map raw attainment labels onto the canonical ordinal vocab
        # via the row-additive harmonize_education table (global base +
        # this country's per-country delta in _/categorical_mapping.org).
        Educational Attainment:
            - s4q07
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

people_last7days:
    file: HH/gsec15a.dta
    # GH #323 -- see the 2018-19 data_info.yml for the full rationale.  Same
    # LONG-format gsec15a: two rows per hhid keyed by CEA01, which collided on
    # the declared (i, t) index and were collapsed by groupby().first(),
    # silently returning VISITOR counts for 1,486 of 3,078 households (48.3%)
    # and ZERO people for 996 of them.  Restricting to the member rows matches
    # the members-only semantics of every earlier wave and makes (i, t) unique.
    where: "CEA01 == 'Household members'"
    idxvars:
        i: hhid
    myvars:
        Men : CEA01A
        Women : CEA01B
        Boys : CEA01C
        Girls : CEA01D

housing:
    file: HH/gsec9.dta
    idxvars:
        i: hhid
    myvars:
        Roof: h9q04
        Floor: h9q06

sample:
    file: HH/gsec1.dta
    idxvars:
        i: hhid
    myvars:
        # GH #323: composite DISTRICT/PARISH key built by the wave's mapping.v().
        # s1aq04a (parish name) alone is not a cluster key -- 23 parish names
        # recur across districts.  sample and cluster_features MUST declare the
        # identical pair so _join_v_from_sample propagates a key that actually
        # exists in cluster_features.
        v:
            - district
            - s1aq04a
        weight: wgt  # only weight provided; wave 8 appears to be panel-only (no refreshment)
        panel_weight: wgt
        strata: subreg
        Rural: urban
        Region: region

cluster_features:
    file: HH/gsec1.dta
    idxvars:
        i: hhid
        # GH #323: same composite DISTRICT/PARISH key as `sample` above.
        # (s1aq04a is the parish NAME; parish codes are broken as in 2018-19.)
        v:
            - district
            - s1aq04a
    myvars:
        Region: region
        Rural: urban
        District: district
