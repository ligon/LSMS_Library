Country: Uganda
Wave: 2019-20

household_roster:
    dfs:
        - df_roster
        - df_cluster
    df_roster:
        file: HH/gsec2.dta
        idxvars:
            i: hhid
            pid: pid
        myvars:
            Sex: h2q3
            Relationship: h2q4
            Age: h2q8
    df_cluster:
        file: HH/gsec1.dta
        idxvars:
            i: hhid
        myvars:
            v: s1aq04a
    merge_on:
        - i
    final_index:
        - t
        - v
        - i
        - pid

individual_education:
    dfs:
        - df_educ
        - df_cluster
    df_educ:
        file: HH/gsec4.dta
        idxvars:
            i: hhid
            pid: pid
        myvars:
            Educational Attainment: s4q07
    df_cluster:
        file: HH/gsec1.dta
        idxvars:
            i: hhid
        myvars:
            v: s1aq04a
    merge_on:
        - i
    final_index:
        - t
        - v
        - i
        - pid

people_last7days:
    file: HH/gsec15a.dta
    idxvars:
        i: hhid
        #member: CEA01
    myvars:
        Men : CEA01A
        Women : CEA01B
        Boys : CEA01C
        Girls : CEA01D

housing:
    dfs:
        - df_housing
        - df_cluster
    df_housing:
        file: HH/gsec9.dta
        idxvars:
            i: hhid
        myvars:
            Roof: h9q04
            Floor: h9q06
    df_cluster:
        file: HH/gsec1.dta
        idxvars:
            i: hhid
        myvars:
            v: s1aq04a
    merge_on:
        - i
    final_index:
        - t
        - v
        - i

cluster_features:
    file: HH/gsec1.dta
    idxvars:
        i: hhid
        v: s1aq04a  # String for parish name.  Parish codes broken as in 2018-19.
    myvars:
        Region: region
        Rural: urban
        District: district
