Country: Uganda
Wave: 2005-06

household_roster:
    file: ../Data/GSEC2.dta
    idxvars:
        i: HHID
        pid: PID
    myvars:
        Sex: h2q4
        Relationship: h2q5
        Age: h2q9
        MonthsSpent: h2q6

individual_education:
    file: ../Data/GSEC4.dta
    idxvars:
        i: HHID
        pid: PID
    myvars:
        # GH #171: highest grade/class completed (h4q4 this wave; the GSEC4
        # question moved to h4q7 from 2009-10 on).  2005-06's value labels are
        # all-lowercase ('completed p.7', ...), covered by the row-additive
        # harmonize_education table (global base + Uganda per-country delta).
        Educational Attainment:
            - h4q4
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

people_last7days:
    file: GSEC14.dta
    idxvars:
        i: HHID
    myvars:
        Men : h14q1
        Women : h14q2
        Boys : h14q3
        Girls : h14q4

housing:
    file: ../Data/GSEC11.dta
    idxvars:
        i: HHID
    myvars:
        Roof: h11q4a
        Floor: h11q6a

sample:
    file: GSEC1.dta
    idxvars:
        i: HHID
    myvars:
        v: comm
        weight: hmult
        panel_weight: hmult  # baseline wave — same as cross-sectional
        strata: stratum
        Rural:
            - urban
            - # Raw `urban` column is string-typed: '0' means rural, 'urban'
              # means urban.  String keys required (see CLAUDE.md: "YAML
              # mapping keys must be string keys when the raw labels are
              # strings").  GH #163 item 3.
                '0': Rural
                urban: Urban
        # HH-level Region — the same column cluster_features reads, exposed
        # here so consumers can get Region for every HH regardless of cluster
        # membership (relevant when v is a synthetic @lat,lon label in 2009-10).
        # The raw 'region' column uses string codes in 2005-06: '0' is the
        # Kampala-area sentinel (matches the Rural '0' convention above);
        # fold it into Central following the cluster_features convention.
        Region:
            - region
            - 0: "Central"

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: GSEC1.dta
        idxvars:
            i: HHID
            v: comm
        myvars:

            Region:
                # Some "Central" households have region coded as 0?  These seem to be households in one of the 34
                # Enumeration Areas (comm) of Kampala.
                # See https://microdata.worldbank.org/index.php/catalog/1001/data-dictionary/F41?file_name=2005_GSEC1
                - region
                - # Fix some values as above
                   0: "Central"
            Rural: urban
            District: h1aq1
            Rural:
                - urban
                - # Value mapping dictionary
                    urban: Urban
                    0: Rural
    # 2005-06 UNPS predates GPS collection; the only coordinates available
    # for these (panel) households are in the 2009-10 geovar, which shares
    # the panel HHID space (~83% of 2005-06 households match).  Cluster
    # location is geographically stable, so 2009 GPS is a sound cluster
    # centroid for the 2005-06 baseline.  Joined on HHID, collapsed to
    # cluster grain by final_index (GH #161).
    df_geo:
        file: ../Data/2009_UNPS_Geovars_0910.dta
        idxvars:
            i: HHID
        myvars:
            Latitude: lat_mod
            Longitude: lon_mod
    merge_on:
        - i
    final_index:
        - t
        - v
