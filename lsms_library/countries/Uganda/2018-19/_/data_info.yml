Country: Uganda
Wave: 2018-19

household_roster:
    dfs:
        - df_roster
        - df_cluster
    df_roster:
        file: GSEC2.dta
        idxvars:
            i: hhid
            pid: PID
        myvars:
            Sex: h2q3
            Relationship: h2q4
            Age: h2q8
    df_cluster:
        file: GSEC1.dta
        idxvars:
            i: hhid
        myvars:
            v: parish_name
    merge_on:
        - i
    final_index:
        - t
        - v
        - i
        - pid

people_last7days:
    file: GSEC15A.dta
    idxvars:
        i: hhid
       # member: CEA01
    myvars:
        Men : CEA01A
        Women : CEA01B
        Boys : CEA01C
        Girls : CEA01D

housing:
    dfs:
        - df_housing
        - df_cluster
    df_housing:
        file: ../Data/GSEC9.dta
        idxvars:
            i: hhid
        myvars:
            Roof: h9q04
            Floor: h9q06
    df_cluster:
        file: GSEC1.dta
        idxvars:
            i: hhid
        myvars:
            v: parish_name
    merge_on:
        - i
    final_index:
        - t
        - v
        - i

sample:
    file: GSEC1.dta
    idxvars:
        i: hhid
    myvars:
        v: parish_name
        weight: wgt  # cross-sectional weight
        panel_weight: hwgt_W7  # longitudinal weight (NaN for refreshment sample)
        strata: subreg
        Rural: urban

cluster_features:
    file: GSEC1.dta
    idxvars:
        i: hhid
        #v: parish_code  # BROKEN: Different codes than in previous years, and only 19 values!
        v: parish_name
    myvars:
        Region: region
        Rural: urban
        District: distirct_name
