Country: Uganda
Wave: 2018-19

household_roster:
    file: GSEC2.dta
    idxvars:
        i: hhid
        pid: PID
    myvars:
        Sex: h2q3
        Relationship: h2q4
        # Age list = [age, day, month, year] -> ../_/2018-19.py reduces
        # to a scalar via tools.age_handler() (GH #177).  h2q9b is an
        # English month name in this wave; the Age formatter normalises.
        Age:
            - h2q8
            - h2q9a
            - h2q9b
            - h2q9c
        MonthsSpent: h2q5

people_last7days:
    file: GSEC15A.dta
    idxvars:
        i: hhid
       # member: CEA01
    myvars:
        Men : CEA01A
        Women : CEA01B
        Boys : CEA01C
        Girls : CEA01D

housing:
    file: ../Data/GSEC9.dta
    idxvars:
        i: hhid
    myvars:
        Roof: h9q04
        Floor: h9q06

sample:
    file: GSEC1.dta
    idxvars:
        i: hhid
    myvars:
        v: parish_name
        weight: wgt  # cross-sectional weight
        panel_weight: hwgt_W7  # longitudinal weight (NaN for refreshment sample)
        strata: subreg
        Rural: urban
        Region: region

cluster_features:
    file: GSEC1.dta
    idxvars:
        i: hhid
        #v: parish_code  # BROKEN: Different codes than in previous years, and only 19 values!
        v: parish_name
    myvars:
        Region: region
        Rural: urban
        District: distirct_name
