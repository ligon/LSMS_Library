Country: Uganda
Wave: 2018-19

household_roster:
    file: GSEC2.dta
    idxvars:
        i: hhid
        pid: PID
    myvars:
        Sex: h2q3
        Relationship: h2q4
        # Age list = [age, day, month, year] -> ./mapping.py reduces
        # to a scalar via tools.age_handler() (GH #177).  h2q9b is an
        # English month name in this wave; the Age formatter normalises.
        Age:
            - h2q8
            - h2q9a
            - h2q9b
            - h2q9c
        MonthsSpent: h2q5

individual_education:
    file: ../Data/GSEC4.dta
    idxvars:
        i: hhid
        pid: PID
    myvars:
        # GH #171: highest grade/class completed (s4q07 — this wave renumbered
        # the GSEC4 codes to the s4q.. scheme later kept by 2019-20).  Raw labels
        # ('Completed P.7', ...) map onto the canonical ordinal levels via the
        # row-additive harmonize_education table.
        Educational Attainment:
            - s4q07
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

people_last7days:
    file: GSEC15A.dta
    # GH #323.  From 2018-19 the questionnaire went LONG: GSEC15A carries TWO
    # rows per hhid, discriminated by CEA01 ("Household member/visitor") in
    # {'Household members', 'Visitors'}, and CEA01A-D are the counts "for
    # selected category".  The declared index is (i, t), so without a filter
    # BOTH rows collide on one tuple and _normalize_dataframe_index collapsed
    # them with groupby().first() -- which, since file row-order is effectively
    # a coin flip (1,636 of 3,242 households list Visitors first), silently
    # returned the VISITOR counts for ~49% of households.  989 households came
    # back with ZERO people.
    #
    # Members-only is not a judgement call: it is what the five earlier waves
    # already do.  2005-06 (GSEC14 h14q1-4), 2009-10 (GSEC15A h15a1-4) and
    # 2013-14 (GSEC15 T6FQ01a-d) all map Men/Women/Boys/Girls to the source's
    # "hh members" block and leave the parallel "visitors" block (h14q5-8 /
    # h15a5-8 / T6FQ01e-h) unused.  Those waves are duplicate-free precisely
    # because the member/visitor split is in COLUMNS there; here it moved into
    # ROWS.  The `where:` restores members-only and makes (i, t) genuinely
    # unique, so the duplicate-collapse never fires at all.
    where: "CEA01 == 'Household members'"
    idxvars:
        i: hhid
    myvars:
        Men : CEA01A
        Women : CEA01B
        Boys : CEA01C
        Girls : CEA01D

housing:
    file: ../Data/GSEC9.dta
    idxvars:
        i: hhid
    myvars:
        Roof: h9q04
        Floor: h9q06

sample:
    file: GSEC1.dta
    idxvars:
        i: hhid
    myvars:
        # GH #323: v is the composite DISTRICT/PARISH key built by the wave's
        # mapping.v().  parish_name ALONE is not a cluster key -- 20 parish
        # names recur across districts ('CENTRAL' in ten of them).  sample and
        # cluster_features MUST declare the identical pair or they desynchronise
        # and _join_v_from_sample hands every other table a key that does not
        # exist in cluster_features.  (parish_code is unusable: 19 values.)
        v:
            - distirct_name   # sic: the source misspells "district"
            - parish_name
        weight: wgt  # cross-sectional weight
        panel_weight: hwgt_W7  # longitudinal weight (NaN for refreshment sample)
        strata: subreg
        Rural: urban
        Region: region

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: GSEC1.dta
        idxvars:
            i: hhid
            #v: parish_code  # BROKEN: Different codes than in previous years, and only 19 values!
            # GH #323: same composite DISTRICT/PARISH key as `sample` above.
            v:
                - distirct_name
                - parish_name
        myvars:
            Region: region
            Rural: urban
            District: distirct_name
    # GPS from the public geovar (modified/offset coordinates), joined on
    # household id then collapsed to cluster grain by final_index (GH #161).
    df_geo:
        file: ../Data/unps_geovars_2018_19.dta
        idxvars:
            i: hhid
        myvars:
            Latitude: pub_lat_mod
            Longitude: pub_lon_mod
    merge_on:
        - i
    final_index:
        - t
        - v
