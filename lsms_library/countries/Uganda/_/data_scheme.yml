Country: Uganda

Data Scheme:
  people_last7days:
    index: (i, t)
    Men : int
    Women : int
    Boys : int
    Girls : int

  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t,v)
    Region: str
    Rural: str
    District: str
    Latitude: float
    Longitude: float
  
  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  shocks: !make
  earnings:
    materialize: make
    index: (t, i)
    earnings: float
  food_acquired: !make
  fct: !make
  nutrition: !make
  interview_date: !make
  # food_expenditures, food_prices, food_quantities are derived at
  # runtime from food_acquired — see _FOOD_DERIVED in country.py.
  panel_ids: !make
  income:
    materialize: make
    index: (t, i)
    income: float
  enterprise_income:
    materialize: make
    index: (t, i)
  assets: !make
  housing:
    index: (t, i)
    Roof: str
    Floor: str
  nonfood_expenditures: !make
