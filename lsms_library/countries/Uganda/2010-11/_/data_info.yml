Country: Uganda
Wave: 2010-11

household_roster:
    file: ../Data/GSEC2.dta
    idxvars:
        i: HHID
        pid: PID
    myvars:
        Sex: h2q3
        Relationship: h2q4
        Age: h2q8
        MonthsSpent: h2q5

housing:
    file: ../Data/GSEC9A.dta
    idxvars:
        i: HHID
    myvars:
        Roof: h9q4
        Floor: h9q6

sample:
    file: ../Data/GSEC1.dta
    idxvars:
        i: HHID
    myvars:
        v: comm
        weight: wgt10
        panel_weight: wgt10  # pre-refreshment — same as cross-sectional
        strata: stratum
        Rural: urban
        Region:
            - region
            - # Kampala is Central (matches cluster_features convention)
              Kampala: Central

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: ../Data/GSEC1.dta
        idxvars:
            i: HHID
            v: comm
        myvars:
            Region:
                - region
                - # Kampala is Central
                  Kampala: Central
            Rural: urban
            District: h1aq1  # TODO: Needs string regularization
    df_geo:
        file: ../Data/UNPS_Geovars_1011.dta
        idxvars:
            i: HHID
        myvars:
            Latitude: lat_mod
            Longitude: lon_mod
    merge_on:
        - i
    final_index:
        - t
        - v
