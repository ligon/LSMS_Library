Country: Uganda
Wave: 2010-11

household_roster:
    file: ../Data/GSEC2.dta
    idxvars:
        i: HHID
        pid: PID
    myvars:
        Sex: h2q3
        Relationship: h2q4
        # Age list = [age, day, month, year] -> ../_/2010-11.py reduces
        # to a scalar via tools.age_handler() (GH #177).
        Age:
            - h2q8
            - h2q9a
            - h2q9b
            - h2q9c
        MonthsSpent: h2q5

individual_education:
    file: ../Data/GSEC4.dta
    idxvars:
        i: HHID
        pid: PID
    myvars:
        # GH #171: highest grade/class completed (h4q7).  Raw labels
        # ('Completed P.7', ...) map onto the canonical ordinal levels via the
        # row-additive harmonize_education table.
        Educational Attainment:
            - h4q7
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    file: ../Data/GSEC9A.dta
    idxvars:
        i: HHID
    myvars:
        Roof: h9q4
        Floor: h9q6

sample:
    file: ../Data/GSEC1.dta
    idxvars:
        i: HHID
    myvars:
        v: comm
        weight: wgt10
        panel_weight: wgt10  # pre-refreshment — same as cross-sectional
        strata: stratum
        Rural: urban
        Region:
            - region
            - # Kampala is Central (matches cluster_features convention)
              Kampala: Central

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: ../Data/GSEC1.dta
        idxvars:
            i: HHID
            v: comm
        myvars:
            Region:
                - region
                - # Kampala is Central
                  Kampala: Central
            Rural: urban
            District: h1aq1  # TODO: Needs string regularization
    df_geo:
        file: ../Data/UNPS_Geovars_1011.dta
        idxvars:
            i: HHID
        myvars:
            Latitude: lat_mod
            Longitude: lon_mod
    merge_on:
        - i
    final_index:
        - t
        - v
