Country: Uganda
Wave: 2011-12

household_roster:
    dfs:
        - df_roster
        - df_cluster
    df_roster:
        file: ../Data/GSEC2.dta
        idxvars:
            i: HHID
            pid: PID
        myvars:
            Sex: h2q3
            Relationship: h2q4
            Age: h2q8
    df_cluster:
        file: ../Data/GSEC1.dta
        idxvars:
            i: HHID
        myvars:
            v: comm
    merge_on:
        - i
    final_index:
        - t
        - v
        - i
        - pid

housing:
    dfs:
        - df_housing
        - df_cluster
    df_housing:
        file: ../Data/GSEC9A.dta
        idxvars:
            i: HHID
        myvars:
            Roof: h9q4
            Floor: h9q6
    df_cluster:
        file: ../Data/GSEC1.dta
        idxvars:
            i: HHID
        myvars:
            v: comm
    merge_on:
        - i
    final_index:
        - t
        - v
        - i

sample:
    file: ../Data/GSEC1.dta
    idxvars:
        i: HHID
    myvars:
        v: comm
        weight: mult
        panel_weight: mult  # pre-refreshment — same as cross-sectional
        strata: sregion
        Rural: urban

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: ../Data/GSEC1.dta
        idxvars:
            i: HHID
            v: comm
        myvars:
            Region: region
            Rural: urban
            District: h1aq1
    df_geo:
        file: ../Data/UNPS_Geovars_1112.dta
        idxvars:
            i: HHID
        myvars:
            Latitude: lat_mod
            Longitude: lon_mod
    merge_on:
        - i
    final_index:
        - t
        - v
