Country: Uganda
Wave: 2013-14

household_roster:
    dfs:
        - df_roster
        - df_cluster
    df_roster:
        file: ../Data/GSEC2.dta
        idxvars:
            i: HHID
            pid: PID
        myvars:
            Sex: h2q3
            Relationship: h2q4
            Age: h2q8
    df_cluster:
        file: ../Data/GSEC1.dta
        idxvars:
            i: HHID
        myvars:
            v: h1aq4a
    merge_on:
        - i
    final_index:
        - t
        - v
        - i
        - pid

people_last7days:
    file: GSEC15.dta
    idxvars:
        i: HHID
    myvars:
        Men : T6FQ01a
        Women : T6FQ01b
        Boys : T6FQ01c
        Girls : T6FQ01d

housing:
    dfs:
        - df_housing
        - df_cluster
    df_housing:
        file: ../Data/GSEC9_1.dta
        idxvars:
            i: HHID
        myvars:
            Roof: h9q4
            Floor: h9q6
    df_cluster:
        file: ../Data/GSEC1.dta
        idxvars:
            i: HHID
        myvars:
            v: h1aq4a
    merge_on:
        - i
    final_index:
        - t
        - v
        - i

sample:
    file: ../Data/GSEC1.dta
    idxvars:
        i: HHID
    myvars:
        v: h1aq4a
        weight: wgt_X  # cross-sectional weight (covers both panel and refreshment sample)
        strata: sregion
        Rural: urban

cluster_features:
    file: ../Data/GSEC1.dta
    idxvars:
        i: HHID
        v: h1aq4a # Docs identify this as "Parish"?
    myvars:
        Region: region
        Rural: urban
        District: h1aq1a  # TODO: 3 digit numeric code; map to string?
