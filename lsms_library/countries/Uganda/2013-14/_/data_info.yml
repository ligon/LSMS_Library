Country: Uganda
Wave: 2013-14

household_roster:
    file: ../Data/GSEC2.dta
    idxvars:
        i: HHID
        pid: PID
    myvars:
        Sex: h2q3
        Relationship: h2q4
        # Age list = [age, day, month, year] -> the wave-level
        # household_roster() post-processor reduces it to a scalar
        # via tools.age_handler(), reconstructing Age from year-of-birth
        # where the direct h2q8 is null (closes the ~6-8% gap; GH #177).
        # The Age() formatter cleans Uganda's sentinels (99 day, 'DK'
        # month, 9999 year) before age_handler sees the components.
        Age:
            - h2q8
            - h2q9a
            - h2q9b
            - h2q9c
        MonthsSpent: h2q5

individual_education:
    file: ../Data/GSEC4.dta
    idxvars:
        i: HHID
        pid: PID
    myvars:
        # GH #171: highest grade/class completed (h4q7).  Raw labels
        # ('Completed P.7', ...) map onto the canonical ordinal levels via the
        # row-additive harmonize_education table.
        Educational Attainment:
            - h4q7
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

people_last7days:
    file: GSEC15.dta
    idxvars:
        i: HHID
    myvars:
        Men : T6FQ01a
        Women : T6FQ01b
        Boys : T6FQ01c
        Girls : T6FQ01d

housing:
    file: ../Data/GSEC9_1.dta
    idxvars:
        i: HHID
    myvars:
        Roof: h9q4
        Floor: h9q6

sample:
    file: ../Data/GSEC1.dta
    idxvars:
        i: HHID
    myvars:
        v: h1aq4a
        weight: wgt_X  # cross-sectional weight (covers both panel and refreshment sample)
        panel_weight: wgt  # longitudinal weight (zero for non-sample, NaN for refreshment)
        strata: sregion
        Rural: urban
        Region: region

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: ../Data/GSEC1.dta
        idxvars:
            i: HHID
            v: h1aq4a # Docs identify this as "Parish"?
        myvars:
            Region: region
            Rural: urban
            District: h1aq1a  # TODO: 3 digit numeric code; map to string?
    # GPS from the public geovar (modified/offset coordinates), joined on
    # household id then collapsed to cluster grain by final_index (GH #161).
    df_geo:
        file: ../Data/unps_geovars_2013_14.dta
        idxvars:
            i: hhid
        myvars:
            Latitude: pub_lat_mod
            Longitude: pub_lon_mod
    merge_on:
        - i
    final_index:
        - t
        - v
