Country: Uganda
Wave: 2013-14

household_roster:
    file: ../Data/GSEC2.dta
    idxvars:
        i: HHID
        pid: PID
    myvars:
        Sex: h2q3
        Relationship: h2q4
        Age: h2q8

people_last7days:
    file: GSEC15.dta
    idxvars:
        i: HHID
    myvars:
        Men : T6FQ01a
        Women : T6FQ01b
        Boys : T6FQ01c
        Girls : T6FQ01d

housing:
    file: ../Data/GSEC9_1.dta
    idxvars:
        i: HHID
    myvars:
        Roof: h9q4
        Floor: h9q6

sample:
    file: ../Data/GSEC1.dta
    idxvars:
        i: HHID
    myvars:
        v: h1aq4a
        weight: wgt_X  # cross-sectional weight (covers both panel and refreshment sample)
        panel_weight: wgt  # longitudinal weight (zero for non-sample, NaN for refreshment)
        strata: sregion
        Rural: urban

cluster_features:
    file: ../Data/GSEC1.dta
    idxvars:
        i: HHID
        v: h1aq4a # Docs identify this as "Parish"?
    myvars:
        Region: region
        Rural: urban
        District: h1aq1a  # TODO: 3 digit numeric code; map to string?
