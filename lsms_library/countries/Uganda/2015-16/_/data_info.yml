Country: Uganda
Wave: 2015-16

household_roster:
    file: gsec2.dta
    idxvars:
        i: hhid
        pid: pid
    myvars:
        Sex: h2q3
        Relationship: h2q4
        Age: h2q8
        MonthsSpent: h2q5

housing:
    file: ../Data/gsec9.dta
    idxvars:
        i: hhid
    myvars:
        Roof: h9q4
        Floor: h9q6

sample:
    file: gsec1.dta
    idxvars:
        i: HHID
    myvars:
        v: parish_code
        weight: h_xwgt_W5  # cross-sectional weight (covers both panel and refreshment sample)
        panel_weight: hwgt_W5  # longitudinal weight (zero for refreshment sample)
        strata: sregion
        Rural: urban
        Region: region

cluster_features:
    file: gsec1.dta
    idxvars:
        i: HHID
        v: parish_code
    myvars:
        Region: region
        Rural: urban
        District: district
