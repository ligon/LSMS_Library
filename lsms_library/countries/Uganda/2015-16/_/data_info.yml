Country: Uganda
Wave: 2015-16

household_roster:
    file: gsec2.dta
    idxvars:
        i: hhid
        pid: pid
    myvars:
        Sex: h2q3
        Relationship: h2q4
        # Age list = [age, day, month, year] -> ../_/2015-16.py reduces
        # to a scalar via tools.age_handler() (GH #177).
        Age:
            - h2q8
            - h2q9a
            - h2q9b
            - h2q9c
        MonthsSpent: h2q5

individual_education:
    file: ../Data/gsec4.dta
    idxvars:
        i: hhid
        pid: pid
    myvars:
        # GH #171: highest grade/class completed (h4q7).  Raw labels
        # ('Completed P.7', ...) map onto the canonical ordinal levels via the
        # row-additive harmonize_education table.
        Educational Attainment:
            - h4q7
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    file: ../Data/gsec9.dta
    idxvars:
        i: hhid
    myvars:
        Roof: h9q4
        Floor: h9q6

sample:
    file: gsec1.dta
    idxvars:
        i: HHID
    myvars:
        v: parish_code
        weight: h_xwgt_W5  # cross-sectional weight (covers both panel and refreshment sample)
        panel_weight: hwgt_W5  # longitudinal weight (zero for refreshment sample)
        strata: sregion
        Rural: urban
        Region: region

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: gsec1.dta
        idxvars:
            i: HHID
            v: parish_code
        myvars:
            Region: region
            Rural: urban
            District: district
    # GPS from the public geovar (modified/offset coordinates), joined on
    # household id then collapsed to cluster grain by final_index (GH #161).
    df_geo:
        file: ../Data/unps_geovars_2015_16.dta
        idxvars:
            i: hhid
        myvars:
            Latitude: pub_lat_mod
            Longitude: pub_lon_mod
    merge_on:
        - i
    final_index:
        - t
        - v
