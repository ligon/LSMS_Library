Country: Uganda
Wave: 2015-16

household_roster:
    dfs:
        - df_roster
        - df_cluster
    df_roster:
        file: gsec2.dta
        idxvars:
            i: hhid
            pid: pid
        myvars:
            Sex: h2q3
            Relationship: h2q4
            Age: h2q8
    df_cluster:
        file: gsec1.dta
        idxvars:
            i: HHID
        myvars:
            v: parish_code
    merge_on:
        - i
    final_index:
        - t
        - v
        - i
        - pid

cluster_features:
    file: gsec1.dta
    idxvars:
        i: HHID
        v: parish_code
    myvars:
        Region: region
        Rural: urban
        District: district
