Country: Guatemala
Wave: 2000

sample:
    file:
        - ECV01H01.DTA
    idxvars:
        i: hogar
    myvars:
        v: region
        weight: factor
        panel_weight: factor
        strata: region
        Rural:
            - area
            - mapping:
                urbana: Urban
                rural: Rural

cluster_features:
    file:
        - ECV01H01.DTA
    idxvars:
        v: region
        i: hogar
    myvars:
        Rural:
            - area
            - mapping:
                urbana: Urban
                rural: Rural
        # `region` is the 8 Guatemalan geographic regions (string-labelled:
        # central / metropolitana / norte / nororiente / noroccidente /
        # suroriente / suroccidente / peten).  It is already the cluster index
        # (v) but was never surfaced as a column, so market='Region' raised
        # KeyError.  Expose it so demand estimation by region works (GH #530,
        # same class as Azerbaijan).
        Region: region

household_roster:
    file: ECV09P05.DTA
    idxvars:
        i: hogar
        pid: caso
    myvars:
        Sex:
            - sexo
            - mapping:
                1: Male
                2: Female
        Age: edad
        Marital:
            - p05a03
            - mapping:
                1: united
                2: married
                3: separated from marriage
                4: separated from union
                5: divorced
                6: widower
                7: Married or Living together
        Relationship:
            - p05a02
            - mapping:
                1: boss
                2: husband and wife or partner
                3: son (daughter)
                4: son-in-law or daughter-in-law
                5: grandson (a)
                6: father or mother
                7: father-in-law
                8: brother or sister
                9: brother-in-law
                10: another relative
                11: domestic worker
                12: pensioner or guest
                13: other non-relative

individual_education:
    # Source is the education chapter (P07 section of ECV09P05.DTA), Q27
    # "ultimo grado aprobado" (highest grade/level passed):
    #   p07b27a = nivel  (value-labelled: ninguno / preparatoria / primaria /
    #             educacion media / educacion superior / post-grado /
    #             educacion adultos; code 9 is unlabelled -> Unknown).
    #   p07b27b = grado  (year passed within that level; drives the
    #             complete/incomplete and basico/diversificado splits).
    # The former wiring pointed at ECV11P10.DTA:p10acp ("cp informante"), a
    # work-module person code that does NOT correlate with schooling
    # (corr ~0.04 with derived years of education) -- it was a placeholder,
    # not Educational Attainment (GH #493).
    # The `individual_education(df)` df_edit hook in guatemala.py combines
    # nivel+grado into the Spanish phrases that `harmonize_education` maps
    # onto the canonical ordinal vocabulary.
    file:
        - ECV09P05.DTA
    idxvars:
        i: hogar
        pid: caso
    myvars:
        # The mappings table runs at extraction (BEFORE the df_edit hook) and
        # maps the bare nivel value-labels onto coarse canonical levels; the
        # individual_education(df) hook then refines "Primary complete" and
        # "Lower secondary" by grado (edu_grade) into the (in)complete /
        # basico-diversificado tiers, and drops the edu_grade helper column.
        Educational Attainment:
            - p07b27a
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']
        edu_grade: p07b27b

assets:
    # Section E14 durables: j is the item name; Quantity=p14a02 (number owned),
    # Value=p14a05 (estimated value), Age=p14a03 (years owned). Rows for
    # non-owned items carry NaN.
    file:
        - ECV17E14.DTA
    idxvars:
        i: hogar
        j: item
    myvars:
        Quantity: p14a02
        Value: p14a05
        Age: p14a03
