Country: Guatemala

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region:
      type: str
      optional: true  # ENCOVI 2000: region is used as the v-index itself; no separate Region column (CLAUDE.md: "No PSU/cluster variable in data")
    Rural: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: float
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
    Marital: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  assets:
    # ENCOVI 2000 section E14 (durables): one row per (household, item) over a
    # fixed 38-item list; non-owned items carry NaN Quantity/Value/Age.
    index: (t, i, j)
    Quantity: float
    Value: float
    Age: float
