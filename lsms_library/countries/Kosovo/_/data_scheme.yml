Country: Kosovo

Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    Rural: str

  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
    Marital: str

  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight:
      type: float
      optional: true
    strata:
      type: str
      optional: true
    Rural: str

  assets:
    index: (t, i, j)
    Age: float
    Value: float

  plot_features:
    # OPLAND.dta section 8a is the plot roster (one row per (hhid, plot)).
    # plot_id = s8a_q01 (plot code).  Area is per-plot s8a_q03a converted
    # to hectares via the unit code s8a_q03b (all_ha_1 is the HH holding
    # total, not per-plot).  No soil-type or GPS variable exists in this
    # module, so SoilType / Latitude / Longitude are omitted.  Built by a
    # script because of the unit conversion + two-period irrigation OR.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    Irrigated: bool
    materialize: make

  housing:
    # Kosovo 2000 DWELLING.dta has no Roof/Floor/Walls/Water/Toilet
    # module; only the dwelling-characteristic subset below exists.
    index: (t, i)
    Type: str
    Electricity: str
    Rooms: float
    Tenure: str