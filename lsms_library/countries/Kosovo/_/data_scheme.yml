Country: Kosovo

Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    Rural: str

  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
    Marital_status: str

  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight:
      type: float
      optional: true
    strata:
      type: str
      optional: true
    Rural: str

  assets:
    index: (t, i, j)
    Age: float
    Value: float

  housing:
    # Kosovo 2000 DWELLING.dta has no Roof/Floor/Walls/Water/Toilet
    # module; only the dwelling-characteristic subset below exists.
    index: (t, i)
    Type: str
    Electricity: str
    Rooms: float
    Tenure: str