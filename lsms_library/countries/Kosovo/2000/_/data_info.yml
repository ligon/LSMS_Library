Country: Kosovo
Wave: 2000

# cluster_features is built by _/cluster_features.py (materialize: make).
# ID.dta is household-level (2,880 rows); cluster_features is (t, v).  The
# reduction to 360 clusters is intended, but it must VERIFY that Region/Rural
# are constant within a PSU rather than let groupby().first() pick a value by
# row order.  Declaring `i: hhid` here handed a household-grain frame to a
# cluster-grain index and 2,520 rows were collapsed silently.  GH #323.

household_roster:
    file:
        - "../Data/POP.dta"
    idxvars:
        v: psu
        i: hhid
        pid: s1a_q00
    myvars:
        Sex:
            - s1a_q02
            - mapping:
                  1: Male
                  2: Female

        Relationship:
            - s1a_q03
            - mapping:
                  1: Head
                  2: Wife/Husband
                  3: Son/Daughter
                  4: Grandchild
                  5: Niece/Nephew
                  6: Father/Mother
                  7: Sister/Brother
                  8: Son/Daughter-in-law
                  9: Brother/Sister-in-law
                  10: Grandfather/Grandmother
                  11: Father/Mother-in-law
                  12: Other relative
                  13: Servant
                  14: Tenant
                  15: Other


        Age: s1a_q05
        Marital:
            - s1a_q06
            - mapping:
                  1: Married
                  2: Living t
                  3: Living a
                  4: Divorced
                  5: Widow/er
                  6: Never ma

individual_education:
    file: "../Data/EDUC.dta"
    idxvars:
        i: hhid
        pid: s04_q00
    myvars:
        Educational Attainment:
            - s04_q4b
            # Kosovo (former-Yugoslav) education ladder, s04_q4b "highest
            # level completed" (codes 0-5, see Documentation/hheng.pdf Q4b
            # and categorical_mapping.org #+name: harmonize_education).
            # Inline-mapped to canonical levels directly because this myvar
            # already carries an inline mapping (a mappings:-table on the
            # same myvar would raise "unhashable type: dict").  "Primary"
            # is the 8-year compulsory basic school (grades 1-8 = ISCED 1+2)
            # -> Lower secondary complete; Gymnasium / Second. technical are
            # the upper-secondary tracks; University -> Bachelor (first degree).
            - mapping:
                Pre-Scho: Pre-primary
                Primary: Lower secondary complete
                'Second. ': Upper secondary complete
                Gymnasiu: Upper secondary complete
                Vocation: Vocational/Technical
                Universi: Bachelor

sample:
    file: "../Data/ID.dta"
    idxvars:
        i: hhid
    myvars:
        v: psu
        weight: weight
        Rural:
            - s0i_q09
            - mapping:
                Rural: Rural
                Urban: Urban

assets:
    file: "../Data/DURGOODS.dta"
    idxvars:
        i: hhid
        j: s10e_01
    myvars:
        Age: s10e_02
        Value: s10e_4a

# housing is built by _/housing.py (materialize: make).
#
# DWELLING.dta section 3a is a ROSTER OVER DWELLING STRUCTURES -- the
# enumerator lists all 8 structure types and asks s3a_q01 "Does your household
# use [STRUCTURE]?" for each -- so it has 7,047 rows over 2,865 households and
# CANNOT be extracted on the YAML path against a (t, i) index: it was being
# collapsed by groupby().first(), which (being skipna per column) fabricated a
# chimeric record and gave 524 households a dwelling type they had said No to.
# The roster must be filtered to the occupied structures and the genuinely
# multi-structure households reduced under a declared policy.  GH #323.
#
# NOTE: the comment that used to live here -- "DWELLING.dta has no
# Roof/Floor/Walls/Water/Toilet module" -- was FALSE, and it is why nobody
# noticed that `Electricity` had been wired to the occupancy screener.
# Walls IS in DWELLING (s3a_q03, per structure), and Water/Toilet/Electricity
# are all in the adjacent AMENITIES.dta (s3b_q01 / s3b_q05 / s3b_q07).
