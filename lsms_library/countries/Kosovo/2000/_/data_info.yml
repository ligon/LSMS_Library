Country: Kosovo
Wave: 2000

cluster_features:
    file: "../Data/ID.dta"
    idxvars:
        v: psu
        i: hhid
    myvars:
        Region: s0i_q07
        Rural:
            - s0i_q09
            - mapping:
                Rural: Rural
                Urban: Urban

household_roster:
    file:
        - "../Data/POP.dta"
    idxvars:
        v: psu
        i: hhid
        pid: s1a_q00
    myvars:
        Sex:
            - s1a_q02
            - mapping:
                  1: Male
                  2: Female

        Relationship:
            - s1a_q03
            - mapping:
                  1: Head
                  2: Wife/Husband
                  3: Son/Daughter
                  4: Grandchild
                  5: Niece/Nephew
                  6: Father/Mother
                  7: Sister/Brother
                  8: Son/Daughter-in-law
                  9: Brother/Sister-in-law
                  10: Grandfather/Grandmother
                  11: Father/Mother-in-law
                  12: Other relative
                  13: Servant
                  14: Tenant
                  15: Other


        Age: s1a_q05
        Marital:
            - s1a_q06
            - mapping:
                  1: Married
                  2: Living t
                  3: Living a
                  4: Divorced
                  5: Widow/er
                  6: Never ma

individual_education:
    file: "../Data/EDUC.dta"
    idxvars:
        i: hhid
        pid: s04_q00
    myvars:
        Educational Attainment:
            - s04_q4b
            # Kosovo (former-Yugoslav) education ladder, s04_q4b "highest
            # level completed" (codes 0-5, see Documentation/hheng.pdf Q4b
            # and categorical_mapping.org #+name: harmonize_education).
            # Inline-mapped to canonical levels directly because this myvar
            # already carries an inline mapping (a mappings:-table on the
            # same myvar would raise "unhashable type: dict").  "Primary"
            # is the 8-year compulsory basic school (grades 1-8 = ISCED 1+2)
            # -> Lower secondary complete; Gymnasium / Second. technical are
            # the upper-secondary tracks; University -> Bachelor (first degree).
            - mapping:
                Pre-Scho: Pre-primary
                Primary: Lower secondary complete
                'Second. ': Upper secondary complete
                Gymnasiu: Upper secondary complete
                Vocation: Vocational/Technical
                Universi: Bachelor

sample:
    file: "../Data/ID.dta"
    idxvars:
        i: hhid
    myvars:
        v: psu
        weight: weight
        Rural:
            - s0i_q09
            - mapping:
                Rural: Rural
                Urban: Urban

assets:
    file: "../Data/DURGOODS.dta"
    idxvars:
        i: hhid
        j: s10e_01
    myvars:
        Age: s10e_02
        Value: s10e_4a

housing:
    # DWELLING.dta has no Roof/Floor/Walls/Water/Toilet items in this
    # survey; only dwelling type, electricity, rooms, and tenure exist.
    # s3a_q0a is the full-text dwelling type (s3a_q00 is the 8-char
    # truncated Stata label); s3a_q06 only exists truncated, so its
    # labels are spelled out via mapping.
    file: "../Data/DWELLING.dta"
    idxvars:
        i: hhid
    myvars:
        Type: s3a_q0a
        Electricity: s3a_q01
        Rooms: s3a_q04
        Tenure:
            - s3a_q06
            - mapping:
                Built pe: Built personally
                Purchase: Purchased
                Inherite: Inherited
                Borrowed: Borrowed
                Occupied: Occupied
                From emp: From employer
                Assigned: Assigned
                Donated: Donated
                Swapped: Swapped
                Others: Others
