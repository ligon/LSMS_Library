                    Rural: Rural
                    rural: Rural
                    RURAL: Rural
                    Urbain: Urban
                    urbain: Urban
                    URBAIN: Urban
    df_geo:
        file: grappe_gps_ner2018.dta
        idxvars:
            v: grappe
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v
