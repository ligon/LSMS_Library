Country: Niger

Waves:
  - 2011-12
  - 2014-15
  - 2018-19
  - 2021-22

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude: float
    Longitude: float

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  panel_ids: !make

  food_acquired:
    index: (t, visit, i, j, u)
    Quantity: float
    Expenditure: float
    Produced: float

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float

  interview_date:
    index: (t, i)
    int_t: datetime
