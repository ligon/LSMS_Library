Country: Niger

Waves:
  - 2011-12
  - 2014-15
  - 2018-19
  - 2021-22

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude: float
    Longitude: float

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  panel_ids: !make

  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind / other).  Niger declares
    # food_acquired in EHCVM 2018-19 and 2021-22 only; older waves
    # (2011-12, 2014-15) have no food_acquired block in their
    # data_info.yml so they are silent at runtime.  Each EHCVM wave's
    # mapping.py imports food_acquired_to_canonical as food_acquired
    # to reshape the wide-form (Quantity-total, Produced-subset,
    # Expenditure) into long-form on s.  `visit` (vague) is dropped:
    # in EHCVM it's a sample split, not a repeated measure.
    index: (t, v, i, j, u, s)
    Quantity: float
    Expenditure: float

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  subjective_well_being:
    # EHCVM Section 20 'Pauvreté relative' (s20 / s20a).  Self-placement
    # on a 4-point relative-welfare ladder (Très pauvre / Pauvre / Moyen
    # / Riche) mapped to Own Step 1-4 so higher = better off, consistent
    # with the Malawi/Cantril ladder.  EHCVM waves only (2018-19,
    # 2021-22).  The pre-EHCVM ECVMA waves (2011-12, 2014-15) have no
    # self-placement welfare ladder: ECVMA2 §15 'Aspirations'
    # (ECVMA2_MS15P1, MS15Q16 = "Pensez-vous que vous aurez le même
    # succès dans votre vie") is a binary expectation/aspiration item,
    # not a current ladder, so it is deliberately NOT wired here.
    index: (t, i)
    Own Step: int

  interview_date:
    index: (t, i)
    Int_t: datetime

  plot_features:
    # Lasting parcel-level characteristics from the EHCVM agriculture
    # module s16a (GH #167; Niger is an EHCVM sibling of the Mali
    # reference, PR #284).  EHCVM waves only: 2018-19 and 2021-22.  The
    # pre-EHCVM ECVMA waves (2011-12, 2014-15) use a different
    # instrument and are deferred.  plot_id = "{field_no}_{parcel_no}".
    # NIGER-SPECIFIC: 2021-22 s16aq10 adds code 7 (Co-propriétaire) ->
    # owned.  Latitude / Longitude are NOT emitted — EHCVM s16a has no
    # decimal-degree parcel GPS (s16aq47 is an area, not a coordinate);
    # deferred as in Uganda.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    SoilType: str
    Irrigated: bool
    materialize: make
