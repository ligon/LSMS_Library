Country: Niger

Waves:
  - 2011-12
  - 2014-15
  - 2018-19
  - 2021-22

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude: float
    Longitude: float

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  panel_ids: !make

  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind / other).  Niger declares
    # food_acquired in EHCVM 2018-19 and 2021-22 only; older waves
    # (2011-12, 2014-15) have no food_acquired block in their
    # data_info.yml so they are silent at runtime.  Each EHCVM wave's
    # mapping.py imports food_acquired_to_canonical as food_acquired
    # to reshape the wide-form (Quantity-total, Produced-subset,
    # Expenditure) into long-form on s.  `visit` (vague) is dropped:
    # in EHCVM it's a sample split, not a repeated measure.
    index: (t, v, i, j, u, s)
    Quantity: float
    Expenditure: float

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  interview_date:
    index: (t, i)
    Int_t: datetime
