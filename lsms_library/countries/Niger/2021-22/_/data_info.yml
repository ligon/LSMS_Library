Country: Niger
Wave: 2021-22

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: s00_me_ner2021.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
        myvars:
            Rural:
                - s00q04
                - mapping:
                    Rural: Rural
                    rural: Rural
                    RURAL: Rural
                    Urbain: Urban
                    urbain: Urban
                    URBAIN: Urban
    df_weights:
        file: ehcvm_ponderations_ner2021.dta
        idxvars:
            i:
                - grappe
                - menage
        myvars:
            weight: poids
            panel_weight: poids
    merge_on:
        - i
    final_index:
        - i
        - t

subjective_well_being:
    # EHCVM Section 20a 'Pauvreté relative'.  s20aq05 = self-placement on
    # a 4-point relative-welfare ladder (Très pauvre / Pauvre / Moyen /
    # Riche).  Mapped to Own Step so higher = better off, consistent with
    # the Malawi/Cantril ladder.  Ne sait pas / NaN -> NaN.
    file: s20a_me_ner2021.dta
    idxvars:
        v: grappe
        i:
            - grappe
            - menage
    myvars:
        Own Step:
            - s20aq05
            - mapping:
                Très pauvre: 1
                Pauvre: 2
                Moyen: 3
                Riche: 4

household_roster:
    dfs:
        - df_main
        - df_temp
    df_main:
        file: s01_me_ner2021.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
            pid: membres__id
        myvars:
            Sex: s01q01
            Age:
                - s01q04a
                - s01q03a
                - s01q03b
                - s01q03c
            Relationship: s01q02
            MonthsSpent:
                - s01q12
                - mapping:
                    Oui: 12
                    Non: 0
    df_temp:
        file: s00_me_ner2021.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
        myvars:
            interview_date: s00q23a
    merge_on:
        - v
        - i
    final_index:
        - v
        - i
        - pid

food_acquired:
    file: s07b_me_ner2021.dta
    idxvars:
        v: grappe
        visit: vague
        i:
            - grappe
            - menage
        j:
            - s07bq01
            - mappings: ['harmonize_food', 'Original Label', 'Preferred Label']
        u: s07bq03b
    myvars:
        Quantity: s07bq03a
        Expenditure: s07bq08
        Produced: s07bq04

cluster_features:
    # Extracted from the household COVER PAGE (6622 rows / 555 clusters) but
    # declared at (t, v).  mapping.cluster_features collapses to cluster grain
    # explicitly, by within-cluster majority + a warning on conflict (GH #323).
    # `i: menage` used to sit here: a bare menage is NOT a household id.  It was
    # harmless only because the declared index is (t, v) and the level got
    # dropped.  cluster_features has no household level; removed.
    file: s00_me_ner2021.dta
    idxvars:
        v: grappe
    myvars:
        Region: s00q01
        District: s00q02
        Rural:
            - s00q04
            - mapping:
                Rural: Rural
                rural: Rural
                RURAL: Rural
                Urbain: Urban
                urbain: Urban
                URBAIN: Urban
        Latitude: GPS__Latitude
        Longitude: GPS__Longitude

shocks:
    file: s14b_me_ner2021.dta
    idxvars:
        i:
            - grappe
            - menage
        Shock: s14bq01
    myvars:
