                Diminué: True
                Augmenté: True
                Inchangé: False
                Non-concerné: False
        AffectedAssets:
            - s14bq04b
            - mapping:
                Diminué: True
                Augmenté: True
                Inchangé: False
                Non-concerné: False
        AffectedProduction:
            - s14bq04c
            - mapping:
                Diminué: True
                Augmenté: True
                Inchangé: False
                Non-concerné: False
        AffectedConsumption:
            - s14bq04d
            - mapping:
                Diminué: True
                Augmenté: True
                Inchangé: False
                Non-concerné: False
        Cope1: s14bq05__1
        Cope2: s14bq05__2
        Cope3: s14bq05__3
        Cope4: s14bq05__4
        Cope5: s14bq05__5
        Cope6: s14bq05__6
        Cope7: s14bq05__7
        Cope8: s14bq05__8
        Cope9: s14bq05__9
        Cope10: s14bq05__10
        Cope11: s14bq05__11
        Cope12: s14bq05__12
        Cope13: s14bq05__13
        Cope14: s14bq05__14
        Cope15: s14bq05__15
        Cope16: s14bq05__16
        Cope17: s14bq05__17
        Cope18: s14bq05__18
        Cope19: s14bq05__19
        Cope20: s14bq05__20
        Cope21: s14bq05__21
        Cope22: s14bq05__22
        Cope23: s14bq05__23
        Cope24: s14bq05__24
        Cope25: s14bq05__25
        Cope26: s14bq05__26

assets:
    file: s12_me_ner2021.dta
    idxvars:
        i:
            - grappe
            - menage
        j: s12q01
    myvars:
        Quantity: s12q03
        Age: s12q07
        Value: s12q09
        Purchase Price: s12q08

# panel_ids is constructed at the country level by
# Niger/_/panel_ids.py (declared as !make in data_scheme.yml).
# Do not reintroduce a wave-level block here.

individual_education:
    file: ehcvm_individu_ner2021.dta
    idxvars:
        v: grappe
        i:
            - grappe
            - menage
        pid: numind
    myvars:
        Educational Attainment:
            - educ_hi
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    file: s11_me_ner2021.dta
    idxvars:
        i:
            - grappe
            - menage
    myvars:
        Roof:
            - s11q19
            - mapping:
                Dalle en ciment: Concrete Slab
                Tuile: Clay Tiles
                Tôles: Iron Sheets
                Paille: Thatch
                Banco: Adobe
                Chaume: Straw
                Nattes: Mats
                'Autre (à préciser)': Other
        Floor:
            - s11q20
            - mapping:
                Carreaux/Marbre: Tiles
                Ciment/Béton: Cement
                Terre battue/Sable: Earth
                Bouse d'animaux: Dung
                Autre: Other

interview_date:
    file: s00_me_ner2021.dta
    idxvars:
        i:
            - grappe
            - menage
    myvars:
        # q23/q24/q25 a/b = visits 1/2/3 start/end
        int_start:    s00q23a
        int_end:      s00q23b
        int_start_v2: s00q24a
        int_end_v2:   s00q24b
        int_start_v3: s00q25a
        int_end_v3:   s00q25b

food_security:
    # FAO Food Insecurity Experience Scale (FIES), EHCVM Section 8A
    # 'Sécurité alimentaire'.  Recall period: last 12 months.
    # s08aq01..s08aq08 map IN ORDER to the 8 canonical FIES items
    # (verified against the .dta variable labels 2026-06-07; identical
    # wording to the 2018-19 wave):
    #   q01 Worried · q02 HealthyDiet · q03 FewFoods · q04 SkippedMeal
    #   q05 AteLess · q06 RanOut · q07 Hungry · q08 WholeDay
    # Oui->True, Non->False; Ne sait pas / Refus / NaN -> NaN.
    # s08aq07a/q08a are frequency follow-ups -> IGNORED (binary scale).
    # FIES_score computed by food_security() in mapping.py.
    file: s08a_me_ner2021.dta
    idxvars:
        i:
            - grappe
            - menage
    myvars:
        Worried:
            - s08aq01
            - mapping:
                Oui: True
                Non: False
        HealthyDiet:
            - s08aq02
            - mapping:
                Oui: True
                Non: False
        FewFoods:
            - s08aq03
            - mapping:
                Oui: True
                Non: False
        SkippedMeal:
            - s08aq04
            - mapping:
                Oui: True
                Non: False
        AteLess:
            - s08aq05
            - mapping:
                Oui: True
                Non: False
        RanOut:
            - s08aq06
            - mapping:
                Oui: True
                Non: False
        Hungry:
            - s08aq07
            - mapping:
                Oui: True
                Non: False
        WholeDay:
            - s08aq08
            - mapping:
                Oui: True
                Non: False
