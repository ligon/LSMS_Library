    idxvars:
        i: hid
    myvars:
        Roof:
            - ms06q11
            - mapping:
                'tôle en métal': Iron Sheets
                tuile: Clay Tiles
                béton: Concrete Slab
                peau: Hide
                bois: Wood
                terre: Earth
                paille: Thatch
                autre: Other
                manquant: Other
