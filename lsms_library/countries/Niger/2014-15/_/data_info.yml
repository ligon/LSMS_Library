Country: Niger
Wave: 2014-15

sample:
    file: NER_2014_ECVMA-II_v02_M_STATA8/ECVMA2014welfare_T1c.dta
    idxvars:
        i:
            - GRAPPE
            - MENAGE
    myvars:
        v: GRAPPE
        weight: hhweight
        panel_weight: hhweight
        Rural:
            - urbrur
            - mapping:
                Rural: Rural
                rural: Rural
                RURAL: Rural
                Urbain: Urban
                urbain: Urban
                URBAIN: Urban

# panel_ids is constructed at the country level by
# Niger/_/panel_ids.py (declared as !make in data_scheme.yml).
# Do not reintroduce a wave-level block here.

household_roster:
    file: NER_2014_ECVMA-II_v02_M_STATA8/ECVMA2_MS01P1.dta
    idxvars:
        v: GRAPPE
        i:
            - GRAPPE
            - MENAGE
        pid: MS01Q00
    myvars:
        Sex: MS01Q01
        Age: MS01Q06A
        Relationship: MS01Q02
        MonthsSpent: MS01Q19

cluster_features:
    file: NER_2014_ECVMA-II_v02_M_STATA8/ECVMA2_MS00P1.dta
    idxvars:
        i: MENAGE
        v: GRAPPE
    myvars:
        Region: MS00Q10
        District: MS00Q11
        Rural:
            - MS00Q15
            - mapping:
                Rural: Rural
                rural: Rural
                RURAL: Rural
                Urbain: Urban
                urbain: Urban
                URBAIN: Urban
                "Communauté Urbaine": Urban
                "Communauté urbaine": Urban

shocks:
