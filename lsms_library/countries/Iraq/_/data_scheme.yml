Country: Iraq

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    Rural: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  assets:
    index: (t, i, j)
    Quantity: float
    Value: float
    Purchase Price: float
    # 2012 is built via the script path (2012/_/assets.py) so durable
    # physical instances (multiple `durable_serial` rows per
    # (i, j)) are SUMMED into the canonical (t, i, j) index rather than
    # silently collapsed with .first().  2006-07 has zero such duplicates
    # and stays on the YAML path; `load_from_waves` dispatches per wave.

  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make
