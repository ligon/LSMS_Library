Country: Iraq

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    # Both waves read the household-level COVER PAGE (the same file `sample`
    # reads) and project it onto the cluster: 17,822 HH -> 2,961 clusters
    # (2006-07) and 25,146 HH -> 2,828 clusters (2012).  The "extra"
    # granularity being dropped is the household `i`, which a cluster-level
    # table must not retain -- so this collapse is INTENDED and lossless, NOT
    # the GH #323 data-loss class.  It was previously performed by an
    # UNDECLARED groupby().first(); `aggregation: unique` declares it and
    # ENFORCES the constancy invariant it relies on (any column not constant
    # within a cluster -> <NA> + a loud warning, never a silent guess).
    #
    # Verified against source: Region is constant within cluster in both waves
    # (0/2961 and 0/2828 violations).  Rural is constant in 2006-07 by
    # construction (it is parsed from the DESIGN STRATUM label, xstrat --
    # "... - urban"/"... - rural").  In 2012 Rural comes from q00_16, a
    # PER-HOUSEHOLD question, so within-cluster disagreement is possible; it
    # occurs in exactly ONE cluster (964, ERBIL: 7 URBAN / 2 RURAL), which the
    # old .first() silently resolved to RURAL -- the 2-of-9 MINORITY, purely
    # by source order.  The 2012 `stratum` does NOT encode urbanicity (114 of
    # 118 strata are mixed), so no design variable can adjudicate cluster 964;
    # its Rural is therefore <NA> (loudly missing) rather than a guess.
    index: (t, v)
    aggregation: unique
    Region: str
    Rural: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  assets:
    index: (t, i, j)
    Quantity: float
    Value: float
    Purchase Price: float
    # 2012 is built via the script path (2012/_/assets.py) so durable
    # physical instances (multiple `durable_serial` rows per
    # (i, j)) are SUMMED into the canonical (t, i, j) index rather than
    # silently collapsed with .first().  2006-07 has zero such duplicates
    # and stays on the YAML path; `load_from_waves` dispatches per wave.

  shocks:
    # Shocks-and-coping roster. 2012 ONLY (module 2012ihses20): 23 shock
    # categories x household, filtered to experienced shocks by the
    # _/mapping.py `shocks` df_edit hook.  i=questid (matches sample).
    # Impact bools from q2002_1/2/3/5 (income/assets/food production/food
    # purchases; DECREASE|INCREASE -> True).  HowCoped0/1/2 from q2003_1/2/3.
    # 2006-07 is NOT wired: its 2007ihses18_risks.dta is one row/HH with no
    # shock-level structure (no per-shock impact or coping roster).
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  housing:
    # Dwelling module: 2007ihses03 (q03xx) / 2012ihses04 (q04xx).
    # All source columns carry English value labels, so values are
    # material/category NAMES, not codes.  i = the wave household key:
    # xhhkey (2006-07) / questid (2012) -- the latter matches sample/assets
    # (the roster's i:hh is a known pre-existing mis-key, GH #256).
    index: (t, i)
    Roof: str
    Floor: str
    Walls: str
    Water: str
    Toilet: str
    Electricity: str
    Tenure: str

  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make

  life_satisfaction:
    # Domain-satisfaction battery. 2012 ONLY (module 2012ihses23, SECTION
    # 23). The module is INDIVIDUAL-level (asked of every member aged 15+,
    # ~7 rows/HH), so the wave script (2012/_/life_satisfaction.py) REDUCES
    # to the household HEAD (roster q0105=='Head'; 100% of heads present in
    # the module) and reshapes the 11 items q2302_1..q2302_11 WIDE->LONG.
    #   i=questid (matches sample/housing/assets; the roster's `hh` is the
    #     within-dwelling sequence number, GH #256). The head's idcode is
    #     joined from the roster on questid.
    #   Domain = canonical life aspect from the questionnaire order: Food,
    #     Housing, Finances(income), Health, Job(work), Safety(local
    #     security), Education, FreedomOfChoice, Control, Community(trust/
    #     acceptance), Overall. FreedomOfChoice/Control are autonomy items
    #     with no canonical slot, kept under descriptive names.
    #   Satisfaction = native ordinal label, Title-cased (Very satisfied ..
    #     Not at all satisfied); "DO NOT KNOW/NO ANSWER" -> dropped.
    # 2006-07 (IHSES-I) has no life-satisfaction module -> not wired.
    index: (t, i, Domain)
    Satisfaction: str
