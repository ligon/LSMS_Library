Country: Iraq
Wave: 2012

sample:
    file:
        - "../Data/2012ihses00_cover_page.dta"
    idxvars:
        i: questid
    myvars:
        v: cluster
        weight: weight
        panel_weight: weight
        strata: stratum
        Rural:
            - q00_16
            - mapping:
                URBAN: Urban
                RURAL: Rural

household_roster:
    file:
        - "../Data/2012ihses01_household_roster.dta"
    idxvars:
        v: cluster
        # i=questid is the unique household id (25,146 distinct, matching the
        # cover-page sample keyspace 100%).  The roster `hh` field is only a
        # within-dwelling sequence number (9 distinct values), so keying on it
        # collapsed every household into 9 ids that matched 0% of sample, made
        # v 100% NaN after _join_v_from_sample, and dropped wave 2012 entirely
        # from household_characteristics (GH #499).  Mirrors housing/shocks/
        # assets in this same wave, which already key on questid.
        i: questid
        pid: idcode
    myvars:
        Sex: q0102
        Relationship: q0105
        Age: q0104
        # IHSES 2012 roster has no residence-duration question, so every
        # listed member is a current resident: MonthsAway=0 (constant via
        # the months_away hook in 2012.py).  We use MonthsAway (not
        # MonthsSpent) to match wave 2006-07, which carries real MonthsAway
        # (q0113): roster_to_characteristics resolves a SINGLE residence
        # column across the whole country-concatenated roster (monthsspent
        # has precedence over monthsaway), so a wave that introduced
        # MonthsSpent would make 2006-07's all-NaN MonthsSpent drop that
        # wave instead.  Keeping both waves on MonthsAway avoids the
        # all-NaN-column contamination that otherwise drops a whole wave
        # from household_characteristics (GH #499).
        MonthsAway:
            - q0102
            - mapping: months_away

individual_education:
    # Education module; q0503 = highest attainment (12 English-labeled levels).
    # i=questid (matches sample/roster/housing/shocks); the source `hh` field is
    # a within-dwelling sequence number (nunique 9 vs questid 25146), so keying
    # on it gave 100% NaN v after _join_v_from_sample and silently dropped the
    # 2012 wave from derived tables (GH #519; residual of the #505/#499 Iraq fix
    # that missed this table).  pid=idcode matches the roster.
    file:
        - "../Data/2012ihses05_education.dta"
    idxvars:
        i: questid
        pid: idcode
    myvars:
        Educational Attainment:
            - q0503
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

# assets is built via the script path (_/assets.py) so that physical
# instances of a durable (multiple `durable_serial` rows per
# (questid, durable_code)) are SUMMED into the canonical (t, i, j) index
# rather than silently collapsed with .first().  Mark `assets: !make` in
# the country data_scheme.yml.  The YAML path cannot groupby-sum, hence the
# script.

housing:
    # Dwelling module 2012ihses04. One row per household (questid, unique).
    # i=questid (matches sample/assets), NOT hh: the housing/roster `hh`
    # field is a within-dwelling sequence number (9 distinct values), so it
    # cannot key households.  All columns are English value-labeled -> NAME
    # strings.  q0406 "Principal material of ceiling" -> Roof.
    file:
        - "../Data/2012ihses04_housing.dta"
    idxvars:
        i: questid
    myvars:
        Roof: q0406
        Floor: q0407
        Walls: q0405
        Water: q0414
        Toilet: q0419
        Electricity: q0421_1
        Tenure: q0427

shocks:
    # Shocks-and-coping roster, module 2012ihses20. LONG form: 23 shock
    # categories (shock_id, English-labeled) x ~25k households as a full
    # cross-product. q2001 ("Has hh experienced..?") flags the few that
    # actually occurred; the `shocks` df_edit hook in _/mapping.py keeps
    # only q2001=='yes' rows (8812) and drops the temporary Experienced
    # column, yielding a true experienced-shock roster.
    #   i=questid (matches sample/housing/assets; the roster/file `hh`
    #     field is the within-dwelling sequence number, GH #256).
    #   Shock = shock_id label (-> Shock index level).
    #   Impact (q2002_1/2/3/5 "Did increase/decrease income/assets/food
    #     production/food purchases?"): DECREASE|INCREASE -> True (the shock
    #     moved the dimension), DID NOT CHANGE -> False. q2002_4 (food
    #     stock) is dropped -- the canonical schema has no Affected* slot
    #     for it.
    #   Coping (q2003_1/2/3 "Response to shock"): -> HowCoped0/1/2 (text).
    file:
        - "../Data/2012ihses20_shocks.dta"
    idxvars:
        i: questid
        Shock: shock_id
    myvars:
        Experienced:
            # NB: 'yes'/'no' MUST be quoted -- bare yes/no parse to YAML
            # booleans, which never match the string values in q2001.
            - q2001
            - mapping:
                'yes': True
                'no': False
        AffectedIncome:
            - q2002_1
            - mapping:
                DECREASE: True
                INCREASE: True
                DID NOT CHANGE: False
        AffectedAssets:
            - q2002_2
            - mapping:
                DECREASE: True
                INCREASE: True
                DID NOT CHANGE: False
        AffectedProduction:
            - q2002_3
            - mapping:
                DECREASE: True
                INCREASE: True
                DID NOT CHANGE: False
        AffectedConsumption:
            - q2002_5
            - mapping:
                DECREASE: True
                INCREASE: True
                DID NOT CHANGE: False
        HowCoped0: q2003_1
        HowCoped1: q2003_2
        HowCoped2: q2003_3

cluster_features:
    # Cover page; one row per cluster v=cluster. Region=governorate;
    # Rural from q00_16. Constant within cluster (verified, 2828 clusters).
    file:
        - "../Data/2012ihses00_cover_page.dta"
    idxvars:
        v: cluster
    myvars:
        Region: governorate
        Rural:
            - q00_16
            - mapping:
                URBAN: Urban
                RURAL: Rural