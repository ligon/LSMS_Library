Country: Nigeria
Wave: 2015-16

# `v` = composite cluster id (state/lga/ea) built from raw CODES; see the
# GH #323 note in _/nigeria.py and the W1 data_info.yml for the full rationale.
sample:
    dfs:
        - df_key
        - df_main
    df_key:
        file: secta_plantingw3.dta
        converted_categoricals: true
        idxvars:
            i: hhid
        myvars:
            v: [state, lga, ea, hhid]
    df_main:
        file: secta_plantingw3.dta
        idxvars:
            i: hhid
        myvars:
            weight: wt_wave3
            panel_weight: wt_w1_w2_w3
            strata: zone
            Rural:
                - sector
                - mapping:
                    1. URBAN: Urban
                    2. RURAL: Rural
                    1. Urban: Urban
                    2. Rural: Rural
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
    merge_on:
        - i
    final_index:
        - t
        - i

cluster_features:
    dfs:
        - df_key
        - df_main
        - df_geo
    df_key:
        file: secta_plantingw3.dta
        converted_categoricals: true
        idxvars:
            i: hhid
        myvars:
            v: [state, lga, ea, hhid]
    df_main:
        file: secta_plantingw3.dta
        idxvars:
            i: hhid
        myvars:
            Region: zone
            District: state
            Rural:
                - sector
                - mapping:
                    1. URBAN: Urban
                    2. RURAL: Rural
                    1. Urban: Urban
                    2. Rural: Rural
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
    # Joined on `i` (household), not `v`.  This file's lat/lon columns are
    # UPPERCASE; asking for the lowercase names made df_data_grabber raise
    # KeyError, which the GH #515 handler swallows by dropping the sub-df --
    # which is why W3 had no Latitude/Longitude at all.
    df_geo:
        file: NGA_HouseholdGeovars_Y3.dta
        idxvars:
            i: hhid
        myvars:
            Latitude: LAT_DD_MOD
            Longitude: LON_DD_MOD
    merge_on:
        - i
    final_index:
        - t
        - i
        - v

assets:
    file: sect5_plantingw3.dta
    idxvars:
        i: hhid
        j: item_cd
    myvars:
        Quantity: s5q1
        Age: s5q3
        Value: s5q4

shocks:
    file: sect15a_harvestw3.dta
    idxvars:
        i: hhid
        Shock: shock_cd
    myvars:
        HowCoped0: s15aq5a
        HowCoped1: s15aq5b
        HowCoped2: s15aq5c

panel_ids:
    file: secta_plantingw3.dta
    idxvars:
        i: hhid
    myvars:
        previous_i: hhid

individual_education:
    # GH #171: highest education level completed per household member.
    # Post-harvest section 2 (sect2_harvestw3) s2aq9, full coverage.
    # Raw labels mapped onto the canonical ordinal vocabulary via the
    # row-additive harmonize_education table.
    file: sect2_harvestw3.dta
    idxvars:
        i: hhid
        pid: indiv
    myvars:
        Educational Attainment:
            - s2aq9
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']
