Country: Nigeria
Wave: 2015-16

sample:
    file: secta_plantingw3.dta
    idxvars:
        i: hhid
    myvars:
        v: ea
        weight: wt_wave3
        panel_weight: wt_w1_w2_w3
        strata: zone
        Rural:
            - sector
            - mapping:
                1. URBAN: Urban
                2. RURAL: Rural
                1. Urban: Urban
                2. Rural: Rural
                rural: Rural
                Rural: Rural
                RURAL: Rural
                urban: Urban
                Urban: Urban
                URBAN: Urban

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: secta_plantingw3.dta
        idxvars:
            v: ea
        myvars:
            Region: zone
            District: state
            Rural:
                - sector
                - mapping:
                    1. URBAN: Urban
                    2. RURAL: Rural
                    1. Urban: Urban
                    2. Rural: Rural
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
    df_geo:
        file: NGA_HouseholdGeovars_Y3.dta
        idxvars:
            v: ea
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v

assets:
    file: sect5_plantingw3.dta
    idxvars:
        i: hhid
        j: item_cd
    myvars:
        Quantity: s5q1
        Age: s5q3
        Value: s5q4

shocks:
    file: sect15a_harvestw3.dta
    idxvars:
        i: hhid
        Shock: shock_cd
    myvars:
        HowCoped0: s15aq5a
        HowCoped1: s15aq5b
        HowCoped2: s15aq5c

panel_ids:
    file: secta_plantingw3.dta
    idxvars:
        i: hhid
    myvars:
        previous_i: hhid

individual_education:
    # GH #171: highest education level completed per household member.
    # Post-harvest section 2 (sect2_harvestw3) s2aq9, full coverage.
    # Raw labels mapped onto the canonical ordinal vocabulary via the
    # row-additive harmonize_education table.
    file: sect2_harvestw3.dta
    idxvars:
        i: hhid
        pid: indiv
    myvars:
        Educational Attainment:
            - s2aq9
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']
