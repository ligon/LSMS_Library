Country: Nigeria
Wave: 2010-11

# `v` is the COMPOSITE cluster id (state/lga/ea), not the bare `ea` serial --
# see the GH #323 note in _/nigeria.py.  `df_key` re-reads the same file with
# `converted_categoricals` set (which makes get_dataframe skip the Stata label
# decode) so the key is built from raw numeric CODES: the community
# questionnaire that community_prices reads has no value labels on state/lga,
# so a label-built key would not join it.  `df_main` keeps the decoded labels
# for the human-readable Region / District / Rural columns.
sample:
    dfs:
        - df_key
        - df_main
    df_key:
        file: Post Planting Wave 1/Household/secta_plantingw1.dta
        converted_categoricals: true
        idxvars:
            i: hhid
        myvars:
            v: [state, lga, ea, hhid]
    df_main:
        file: Post Planting Wave 1/Household/secta_plantingw1.dta
        idxvars:
            i: hhid
        myvars:
            weight: wt_wave1
            panel_weight: wt_wave1
            strata: zone
            Rural:
                - sector
                - mapping:
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
    merge_on:
        - i
    final_index:
        - t
        - i

cluster_features:
    dfs:
        - df_key
        - df_main
        - df_geo
    df_key:
        file: Post Planting Wave 1/Household/secta_plantingw1.dta
        converted_categoricals: true
        idxvars:
            i: hhid
        myvars:
            v: [state, lga, ea, hhid]
    df_main:
        file: Post Planting Wave 1/Household/secta_plantingw1.dta
        idxvars:
            i: hhid
        myvars:
            Region: zone
            District: state
            Rural:
                - sector
                - mapping:
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
    # Geovariables are HOUSEHOLD-level, so they join on `i`.  Joining them on
    # `v` (as this block used to) is a many-to-many merge between two
    # household-level frames -- a cartesian product within each EA, which is
    # what inflated W2's cluster_features to 62,538 rows.  This file's columns
    # are lowercase; W2/W3's are uppercase.  Asking for the wrong casing makes
    # df_data_grabber raise KeyError, which the GH #515 handler catches by
    # DROPPING the sub-df -- which is why Latitude/Longitude were missing from
    # 3 of the 4 waves.
    df_geo:
        file: nga_householdgeovariables_y1.csv
        idxvars:
            i: hhid
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - i
    final_index:
        - t
        - i
        - v

assets:
    file: Post Planting Wave 1/Household/sect5_plantingw1.dta
    idxvars:
        i: hhid
        j: item_cd
    myvars:
        Quantity: s5q1

shocks:
    file: Post Harvest Wave 1/Household/sect15a_harvestw1.dta
    idxvars:
        i: hhid
        Shock: shock_cd
    myvars:
        HowCoped0: s15aq5a
        HowCoped1: s15aq5b
        HowCoped2: s15aq5c

individual_education:
    # GH #171: highest education level completed per household member.
    # Post-harvest section 2 (sect2a_harvestw1) records s2aq9 ("highest
    # level completed") only for members who had LEFT school -> low
    # coverage (~640 rows) in W1.  Raw labels mapped onto the canonical
    # ordinal vocabulary via the row-additive harmonize_education table
    # (global base + Nigeria delta in _/categorical_mapping.org).
    file: Post Harvest Wave 1/Household/sect2a_harvestw1.dta
    idxvars:
        i: hhid
        pid: indiv
    myvars:
        Educational Attainment:
            - s2aq9
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']
