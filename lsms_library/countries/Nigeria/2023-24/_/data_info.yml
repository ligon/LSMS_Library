Country: Nigeria
Wave: 2023-24

# household_roster is built by the script-path: ../_/household_roster.py
# emits a parquet at $LSMS_DATA_DIR/Nigeria/2023-24/_/household_roster.parquet
# (declared in ../../_/data_scheme.yml with `materialize: make`).
# The script handles the pp/ph concat and t-value assignment
# (2023Q3 / 2024Q1) per the pp-ph skill.

sample:
    file: Post Planting Wave 5/Household/secta_plantingw5.dta
    idxvars:
        i: hhid
    myvars:
        v: ea
        weight: wt_cross_wave5
        panel_weight: wt_longpanel_wave5
        strata:
            - strata
            - mapping:
                1: North Central
                2: North East
                3: North West
                4: South East
                5: South South
                6: South West
        Rural:
            - sector
            - mapping:
                1. URBAN: Urban
                2. RURAL: Rural
                1. Urban: Urban
                2. Rural: Rural
                rural: Rural
                Rural: Rural
                RURAL: Rural
                urban: Urban
                Urban: Urban
                URBAN: Urban

individual_education:
    # GH #171: highest education level completed per household member.
    # Post-harvest section 2 (sect2_harvestw5) s2q9, full coverage.  The
    # data_scheme comment's "numeric code s2q3" is superseded: s2q9
    # carries the labelled "NN. LEVEL" attainment string here too.  Raw
    # labels mapped onto the canonical ordinal vocabulary via the
    # row-additive harmonize_education table.
    file: Post Harvest Wave 5/Household/sect2_harvestw5.dta
    idxvars:
        i: hhid
        pid: indiv
    myvars:
        Educational Attainment:
            - s2q9
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']
