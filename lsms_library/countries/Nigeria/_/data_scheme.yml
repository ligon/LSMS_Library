Country: Nigeria

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude: float
    Longitude: float

  shocks:
    index: (t, i, Shock)
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced).  Wave-level food_acquired.py
    # reshapes wide-form (Quantity-total, Produced-subset, Expenditure)
    # into long-form on s via food_acquired_to_canonical.  `m` (zone)
    # dropped — lives in cluster_features.  See
    # slurm_logs/DESIGN_food_acquired_canonical_2026-05-05.org.
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float
    materialize: make
  # food_expenditures, food_prices, food_quantities are auto-derived
  # at runtime from food_acquired via _FOOD_DERIVED — do NOT register
  # them here.  Explicit declarations with a non-canonical index spec
  # like ``index: (t, i, j)`` cause _finalize_result to strip the ``s``
  # acquisition-source level from the derived result, breaking
  # cross-country index compatibility in Feature('food_expenditures')()
  # (it concatenates 4-level Nigeria with 5-level Phase-3 countries
  # and falls back to a flat single-level index, destroying country
  # provenance).  Per CLAUDE.md "Derived Tables".
  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
    materialize: make

  individual_education:
    # Highest educational attainment per household member.  GHS
    # section 2 (education) is collected only in the post-harvest
    # round, so each wave maps to a single t = PH quarter (2011Q1,
    # 2013Q1, 2016Q1, 2019Q1, 2024Q1) -> materialize: make.
    # Educational Attainment = highest qualification (s2aq9 in W1-W4;
    # numeric code s2q3 in W5), kept as raw per-wave labels/codes.
    # W1/W2 coverage is low (~640/310 rows): those waves recorded the
    # qualification only for members who had left school.
    index: (t, i, pid)
    Educational Attainment: str
    materialize: make

  panel_ids:
    index: (t, i)
    previous_i: str
  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make

  housing:
    index: (t, i)
    Roof: str
    Floor: str
    materialize: make

  plot_features:
    # Lasting plot characteristics from the post-planting Agriculture
    # module (GH #167).  Nigeria is post-planting/post-harvest; lasting
    # attributes are recorded only in the PP round, so each wave maps to
    # a single t = PP quarter (2010Q3, 2012Q3, 2015Q3, 2018Q3, 2023Q3).
    # Area (sect11a1) is joined onto plot detail (sect11b/sect11b1) on
    # (hhid, plotid) -- two files per wave -> materialize: make.
    # Latitude / Longitude deferred (no decimal-degree parcel coords;
    # only GPS area in m^2).  W1 lacks soil / irrigation / tenure-system;
    # TenureSystem populated for W5 only.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    SoilType: str
    Irrigated: bool
    materialize: make

  crop_production:
    # Item-level reported crop harvest (GAP 1) at natural grain
    # (t, i, plot, crop).  Source: post-harvest crop module secta3*.
    # Crop-level harvest is recorded only in the post-harvest round, so
    # each wave maps to a single t = PH quarter (2011Q1 / 2013Q1 /
    # 2016Q1 / 2019Q1 / 2024Q1), distinct from plot_features' PP quarter
    # (same wave, different round; plot_id aligns via format_id).
    # Country-level script (_/crop_production.py) joins/reshapes per wave
    # (W3-W5 split the module across secta3i / secta3ii / secta3iii) ->
    # materialize: make.  Stores REPORTED fields only -- no kg
    # conversion, yield, main_crop, or value shares (transformations).
    # crop (j) on the shared harmonize_food Preferred Label so it joins
    # food_acquired.j; u normalized to the shared `u` table base labels.
    # Quantity_sold / Value_sold populated only where the survey records
    # sales at the plot-crop grain (W1/W2); W3-W5 record sales at
    # hh-crop grain (no plot linkage) -> NaN.  intercropped derived from
    # the PP planting roster (sect11f s11fq2) where present (W1-W3);
    # perennial = True for tree/permanent-crop rows (W4/W5 secta3iii).
    index: (t, i, plot, crop)
    Quantity: float
    u: str
    Quantity_sold: float
    Value_sold: float
    planting_month: str
    harvest_month: str
    intercropped: bool
    perennial: bool
    materialize: make

  plot_inputs:
    # Item-level reported agricultural inputs (GAP 2) at natural grain
    # (t, i, plot, input, crop).  Source: the post-planting / post-harvest
    # input modules (seeds sect11e/sect11f, fertilizer sect11d/secta11c2,
    # pesticide sect11c/secta11c2).  Each wave maps to a single t = PP
    # quarter (2010Q3 / 2012Q3 / 2015Q3 / 2018Q3 / 2023Q3), matching
    # plot_features; plot_id aligns with crop_production via format_id.
    # Country-level script (_/plot_inputs.py) reshapes the per-acquisition-
    # channel modules into one row per input applied to a plot ->
    # materialize: make.  Stores REPORTED item-level fields ONLY -- no
    # seed_kg / nitrogen_kg conversion, no inorganic/organic any-use flags,
    # no fertilizer totals (those are transformations over these rows).
    #
    # `input` (index) carries a harmonized input-type Preferred Label
    # (Seed / NPK / Urea / Other Inorganic Fertilizer / Organic Fertilizer
    # / Pesticide / Herbicide / Animal Traction), resolved in-script and
    # registered in harmonize_input (the canonical registry, mirroring how
    # crop_production resolves crops via harmonize_food).  `crop` (index)
    # is the seed's crop on the shared harmonize_food Preferred Label (so
    # seed rows join food_acquired.j / crop_production.crop); non-seed
    # crop-agnostic inputs carry crop = 'n/a'.  u is normalized to the
    # shared `u` table base labels (chemicals: Kg/g/l/cl; animal traction:
    # days).
    #
    # Every row carries a REPORTED quantity (an item), never a bare any-use
    # flag.  Quantity / u: reported native quantity + unit, summed across
    # same-unit acquisition channels (mixed-unit channels keep the largest
    # reported channel -- no kg conversion, which is a transformation).
    # Animal Traction carries reported own+rented animal-days (u=days).
    # The plain "used a tractor/machine?" yes/no records no per-input
    # quantity -> left to a used_machinery transformation, not stored.
    # Purchased / Quantity_purchased: from the commercial acquisition
    # channels (W1-W3 only; W4/W5 seed/fert modules do not split purchase
    # at this grain -> NaN).  Improved: seed rows only -- W3 s11eq3b
    # (hybrid/improved), W4/W5 s11fq3b/s11fq7 + certified flag; W1/W2 seed
    # modules have no improved-variety question -> NaN.
    index: (t, i, plot, input, crop)
    Quantity: float
    u: str
    Purchased: bool
    Quantity_purchased: float
    Improved: bool
    materialize: make

  food_coping:
    # Family B (coping-strategies / rCSI), #332.  GHS section 9 ("Food
    # Security") is a coping day-count battery (items s9q1a..s9q1i: "how
    # many days in the last 7 had to [strategy]", coded 0-7), NOT an
    # HFIAS occurrence/frequency scale.  Collected in the post-planting
    # round only, so each wave maps to a single t = PP quarter
    # (2010Q3 / 2012Q3 / 2015Q3 for W1-W3) -> materialize: make.  W4+
    # section 9 switched to FIES (sect9b), wired separately.
    index: (t, i, Strategy)
    Days: int
    materialize: make

  livestock:
    # Item-level reported livestock holdings (GAP 4) at natural grain
    # (t, i, animal).  Source: the GHS-Panel livestock roster
    # sect11i_planting{wN} -- the PRE-collapse roster the WB code reads
    # then throws away down to a single household engaged-in-livestock
    # y/n binary (NGA_GHS1.do:992-998 recodes s11iq1 then `collapse
    # (max) livestock, by(hhid)`).  We keep the roster richer: per-animal
    # head counts, acquisitions, sales, and reported per-head value.
    #
    # Collected in the post-planting round only, so each wave maps to a
    # single t = PP_QUARTER[wave] (2010Q3 / 2012Q3 / 2015Q3 / 2018Q3 /
    # 2023Q3), matching plot_features / plot_inputs; hhid aligns via
    # format_id.  Country-level script (_/livestock.py) resolves each
    # wave's native animal code (101-123, one stable scheme) to a
    # harmonize_species Preferred Label and reshapes per wave ->
    # materialize: make.
    #
    # NO `v` level: livestock is in the framework `_no_v_join` set, so the
    # grain is exactly (t, i, animal) -- no cluster join at API time.
    #
    # Stores REPORTED item-level fields ONLY:
    #   HeadCount      head owned/kept now (s11iq2 W1-W3/W5; s11iq2a W4)
    #   HeadAcquired   head bought to raise (s11iq10 W1-W4; s11iq17 W5)
    #   HeadSold       head sold alive      (s11iq16 W1-W4; s11iq23 W5)
    #   Value          reported reservation value of ONE head -- "if you
    #                  sold one today, how much would you receive"
    #                  (s11iq3 W1-W4; s11iq7 W5).  Per-head reported price,
    #                  NOT a herd-value total and NOT the WB engaged
    #                  binary.
    # NO TLU, NO herd-value total, NO engaged-in-livestock binary -- those
    # are transformations over these rows (their binary = groupby.any()).
    index: (t, i, animal)
    HeadCount: float
    HeadAcquired: float
    HeadSold: float
    Value: float
    materialize: make

  nonfood_expenditures: !make
