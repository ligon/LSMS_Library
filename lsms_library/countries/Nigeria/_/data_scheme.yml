Country: Nigeria

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude: float
    Longitude: float

  shocks:
    index: (t, i, Shock)
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced).  Wave-level food_acquired.py
    # reshapes wide-form (Quantity-total, Produced-subset, Expenditure)
    # into long-form on s via food_acquired_to_canonical.  `m` (zone)
    # dropped — lives in cluster_features.  See
    # slurm_logs/DESIGN_food_acquired_canonical_2026-05-05.org.
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float
    materialize: make
  food_expenditures:
    index: (t, i, j)
    Expenditure: float
  food_prices:
    index: (t, j)
    Price: float
  food_quantities:
    index: (t, i, j)
    Quantity: float
  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
    materialize: make
  panel_ids:
    index: (t, i)
    previous_i: str
  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make

  housing:
    index: (t, i)
    Roof: str
    Floor: str
    materialize: make

  nonfood_expenditures: !make
