    Expenditure: float
    Produced: float
    materialize: make
  food_expenditures:
    index: (t, i, j)
    Expenditure: float
  food_prices:
    index: (t, j)
    Price: float
  food_quantities:
    index: (t, i, j)
    Quantity: float
  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
    materialize: make
  panel_ids:
    index: (t, i)
    previous_i: str
  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
  interview_date:
    index: (t, i)
    int_t: datetime
    materialize: make

  housing:
    index: (t, i)
    Roof: str
