Country: Nigeria

Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str

  shocks:
    index: (t, i, Shock)
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  food_acquired:
    index: (t, v, i, j, u)
    Quantity: float
    Expenditure: float
    Produced: float
    materialize: make
  food_expenditures:
    index: (t, v, i, j)
    Expenditure: float
  food_prices:
    index: (t, v, j)
    Price: float
  food_quantities:
    index: (t, v, i, j)
    Quantity: float
  household_characteristics:
    index: (t, v, i)
    materialize: make
  household_roster:
    index: (t, v, i, pid)
    Sex: str
    Age: int
    Generation: int
    Distance: int
    Affinity: str
    materialize: make
  panel_ids:
    index: (t, i)
    previous_i: str
  nonfood_expenditures: !make
  unitvalues: !make
