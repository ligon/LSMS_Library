Country: Nigeria
Wave: 2012-13

# `v` = composite cluster id (state/lga/ea) built from raw CODES; see the
# GH #323 note in _/nigeria.py and the W1 data_info.yml for the full rationale.
sample:
    dfs:
        - df_key
        - df_main
    df_key:
        file: Post Planting Wave 2/Household/secta_plantingw2.dta
        converted_categoricals: true
        idxvars:
            i: hhid
        myvars:
            v: [state, lga, ea, hhid]
    df_main:
        file: Post Planting Wave 2/Household/secta_plantingw2.dta
        idxvars:
            i: hhid
        myvars:
            weight: wt_wave2
            panel_weight: wt_combined
            strata: zone
            Rural:
                - sector
                - mapping:
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
    merge_on:
        - i
    final_index:
        - t
        - i

cluster_features:
    dfs:
        - df_key
        - df_main
        - df_geo
    df_key:
        file: Post Planting Wave 2/Household/secta_plantingw2.dta
        converted_categoricals: true
        idxvars:
            i: hhid
        myvars:
            v: [state, lga, ea, hhid]
    df_main:
        file: Post Planting Wave 2/Household/secta_plantingw2.dta
        idxvars:
            i: hhid
        myvars:
            Region: zone
            District: state
            Rural:
                - sector
                - mapping:
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
    # Joined on `i`, not `v`: both frames are household-level, so merging them
    # on the cluster key was a cartesian product within each EA -- that is what
    # made this wave's cluster_features 62,538 rows from 4,859 households.
    # This file's lat/lon columns are UPPERCASE (W1's and W4's are lowercase).
    df_geo:
        file: nga_householdgeovars_y2.csv
        idxvars:
            i: hhid
        myvars:
            Latitude: LAT_DD_MOD
            Longitude: LON_DD_MOD
    merge_on:
        - i
    final_index:
        - t
        - i
        - v

assets:
    dfs:
        - df_qty
        - df_detail
    df_qty:
        file: Post Planting Wave 2/Household/sect5a_plantingw2.dta
        idxvars:
            i: hhid
            j: item_cd
        myvars:
            Quantity: s5q1
    df_detail:
        file: Post Planting Wave 2/Household/sect5b_plantingw2.dta
        idxvars:
            i: hhid
            j: item_cd
        myvars:
            Age: s5q3
            Value: s5q4
    merge_on:
        - i
        - j
    final_index:
        - t
        - i
        - j

shocks:
    file: Post Harvest Wave 2/Household/sect15a_harvestw2.dta
    idxvars:
        i: hhid
        Shock: shock_cd
    myvars:
        HowCoped0: s15aq5a
        HowCoped1: s15aq5b
        HowCoped2: s15aq5c

panel_ids:
    file: Post Planting Wave 2/Household/secta_plantingw2.dta
    idxvars:
        i: hhid
    myvars:
        previous_i: hhid

individual_education:
    # GH #171: highest education level completed per household member.
    # Post-harvest section 2 (sect2a_harvestw2) records s2aq9 only for
    # members who had LEFT school -> low coverage (~310 rows) in W2.
    # Raw labels mapped onto the canonical ordinal vocabulary via the
    # row-additive harmonize_education table.
    file: Post Harvest Wave 2/Household/sect2a_harvestw2.dta
    idxvars:
        i: hhid
        pid: indiv
    myvars:
        Educational Attainment:
            - s2aq9
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']
