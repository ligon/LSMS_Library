Country: Nigeria
Wave: 2018-19

# `v` = composite cluster id (state/lga/ea) built from raw CODES; see the
# GH #323 note in _/nigeria.py and the W1 data_info.yml for the full rationale.
sample:
    dfs:
        - df_key
        - df_main
    df_key:
        file: secta_plantingw4.dta
        converted_categoricals: true
        idxvars:
            i: hhid
        myvars:
            v: [state, lga, ea, hhid]
    df_main:
        file: secta_plantingw4.dta
        idxvars:
            i: hhid
        myvars:
            weight: wt_wave4
            panel_weight: wt_longpanel
            strata: strata
            Rural:
                - sector
                - mapping:
                    1. URBAN: Urban
                    2. RURAL: Rural
                    1. Urban: Urban
                    2. Rural: Rural
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
    merge_on:
        - i
    final_index:
        - t
        - i

cluster_features:
    dfs:
        - df_key
        - df_main
        - df_geo
    df_key:
        file: secta_plantingw4.dta
        converted_categoricals: true
        idxvars:
            i: hhid
        myvars:
            v: [state, lga, ea, hhid]
    df_main:
        file: secta_plantingw4.dta
        idxvars:
            i: hhid
        myvars:
            Region: zone
            District: state
            Rural:
                - sector
                - mapping:
                    1. URBAN: Urban
                    2. RURAL: Rural
                    1. Urban: Urban
                    2. Rural: Rural
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
    # This wave's geovariables file has NO `ea` column at all (hhid, lat, lon
    # only), so the old `merge_on: [v]` could not join it and W4 silently lost
    # Latitude/Longitude.  Joining on `i` (household) is both correct and the
    # only thing that works here.
    df_geo:
        file: nga_householdgeovars_y4.dta
        idxvars:
            i: hhid
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - i
    final_index:
        - t
        - i
        - v

assets:
    file: sect5_plantingw4.dta
    idxvars:
        i: hhid
        j: item_cd
    myvars:
        Quantity: s5q1
        Age: s5q3
        Value: s5q4

shocks:
    file: sect15a_harvestw4.dta
    idxvars:
        i: hhid
        Shock: shock_cd
    myvars:
        HowCoped0: s15aq7_1
        HowCoped1: s15aq7_2
        HowCoped2: s15aq7_3

individual_education:
    # GH #171: highest education level completed per household member.
    # Post-harvest section 2 (sect2_harvestw4) s2aq9, full coverage.
    # Raw labels mapped onto the canonical ordinal vocabulary via the
    # row-additive harmonize_education table.
    file: sect2_harvestw4.dta
    idxvars:
        i: hhid
        pid: indiv
    myvars:
        Educational Attainment:
            - s2aq9
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']
