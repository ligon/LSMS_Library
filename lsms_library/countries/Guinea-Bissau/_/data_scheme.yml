Country: Guinea-Bissau

Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    Rural: str
    Latitude: float
    Longitude: float

  household_roster:
    index: (t, v, i, pid)
    Sex: str
    Age: int
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, v, i, pid)
    Educational Attainment: str

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float

  food_acquired:
    index: (t, v, visit, i, j, u)
    Quantity: float
    Expenditure: float
    Produced: float

  interview_date:
    index: (t, i)
    int_t: datetime
