Country: Liberia
Wave: 2018-19

household_roster:
    file:
        - "../Data/Household/sect2_public.dta"
    idxvars:
        i: hhid
        pid: member_id
    myvars:
        Relationship: S2_2
        Sex: S2_3
        Age: S2_5
        MonthsSpent: S2_7

cluster_features:
    file:
        - "../Data/Household/sect1_public.dta"
    idxvars:
        i: hhid
        v: ea_code
    myvars:
        Region: region
        Rural: locality
        County: county_code

sample:
    file:
        - "../Data/Household/sect1_public.dta"
    idxvars:
        i: hhid
    myvars:
        v: ea_code
        weight: hhweight
        Rural:
            - locality
            - mapping:
                rural: Rural
                urban: Urban

assets:
    # Section 15 (durable goods) is LONG: one row per asset type per HH.
    # j is the clean string `item_name` (NOT `item_id`, a lowercase dupe).
    # Quantity=S15_2 ("how many owned"); Value=S15_5 (resale price of the
    # most-recent purchase).  No Age and no separate purchase-price
    # question in this instrument, so those canonical columns are omitted
    # (-> NaN).  S15_6/S15_7 (forest-use / sufficiency) are dropped.
    file:
        - "../Data/Household/sect15_public.dta"
    idxvars:
        i: hhid
        j: item_name
    myvars:
        Quantity: S15_2
        Value: S15_5
