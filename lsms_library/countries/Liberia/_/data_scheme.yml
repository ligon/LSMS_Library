Country: Liberia

Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    Rural: str
    County: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  assets:
    # 2018-19 (Section 15) records only count-owned and resale value.
    # No Age and no purchase-recency / purchase-price questions in this
    # instrument, so only Quantity and Value are declared.
    index: (t, i, j)
    Quantity: float
    Value: float

  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight:
      type: float
      optional: true
    strata:
      type: str
      optional: true
    Rural: str