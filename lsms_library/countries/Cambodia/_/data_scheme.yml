Country: Cambodia

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    # HOUSEHOLD-grain source, CLUSTER-grain table -- declared, not accidental
    # (GH #323).  hh_sec_1.dta (the cover page) has one row per household:
    # 1512 households in 252 clusters (~6 per cluster, min 5 / max 7), with the
    # cluster's attributes (s01q02 -> Region, s01q06b -> Rural) repeated on
    # every household record.  Projecting to the canonical (t, v) grain drops
    # the `i` level and with it 1260 of the 1512 rows.
    #
    # `dedup` says that projection is LOSSLESS -- the 1260 rows are exact
    # repetitions, not distinct observations -- and the framework ENFORCES it
    # at build time (country._assert_dedup_lossless): every retained column
    # must be constant within (t, v), else it raises rather than let .first()
    # keep one value at random.  Verified on the pre-collapse frame:
    #   clusters whose households disagree on Region: 0 / 252
    #   clusters whose households disagree on Rural : 0 / 252
    # (v is a province-prefixed EA id -- 12064 Phnom Penh, 16001 Ratanak Kiri --
    # so it is globally unique and no province/district level is missing.)
    #
    # NB: this wave has no household GPS.  A country whose cover page carries
    # per-household Latitude/Longitude must NOT declare `i: dedup` -- those
    # genuinely vary within a cluster and are averaged to a centroid instead.
    index: (t, v)
    aggregation:
      i: dedup
    Region: str
    Rural: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  plot_features:
    # Parcel roster, 2019-20 hh_sec_8.dta. Single clean LONG file
    # (one row per (HHID, parcel)), so YAML path -- no script needed.
    # Area is in mixed native units carried in AreaUnit; no area
    # standardization. SoilType is not collected by this module.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    LandUse: str
    Irrigated: bool

  housing:
    index: (t, i)
    Roof: str
    Floor: str
    Walls: str
    Water: str
    Toilet: str
    Electricity: str
    Rooms: float
    Tenure: str

  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make

  food_acquired:
    # Built by 2019-20/_/food_acquired.py -> canonical (t, i, j, u, s) with
    # [Quantity, Expenditure]; s in {purchased, produced} via value-share split
    # of the single reported quantity (hh_sec_5; see the wave script). Price is
    # api-derived. food_prices / food_quantities / food_expenditures are
    # auto-derived at runtime (_FOOD_DERIVED) -- do NOT register them here.
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float
    materialize: make
