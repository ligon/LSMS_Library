Country: Cambodia

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    Rural: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  plot_features:
    # Parcel roster, 2019-20 hh_sec_8.dta. Single clean LONG file
    # (one row per (HHID, parcel)), so YAML path -- no script needed.
    # Area is in mixed native units carried in AreaUnit; no area
    # standardization. SoilType is not collected by this module.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    LandUse: str
    Irrigated: bool

  housing:
    index: (t, i)
    Roof: str
    Floor: str
    Walls: str
    Water: str
    Toilet: str
    Electricity: str
    Rooms: float
    Tenure: str

  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make

  food_acquired:
    # Built by 2019-20/_/food_acquired.py -> canonical (t, i, j, u, s) with
    # [Quantity, Expenditure]; s in {purchased, produced} via value-share split
    # of the single reported quantity (hh_sec_5; see the wave script). Price is
    # api-derived. food_prices / food_quantities / food_expenditures are
    # auto-derived at runtime (_FOOD_DERIVED) -- do NOT register them here.
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float
    materialize: make
