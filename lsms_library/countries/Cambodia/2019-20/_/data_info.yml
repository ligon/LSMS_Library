Country: Cambodia
Wave: 2019-20

sample:
    file: ../Data/hh_sec_1.dta
    idxvars:
        i: HHID
    myvars:
        v: s01q01
        weight: finalhhweight
        panel_weight: finalhhweight
        strata: s01q02
        Rural: s01q06b

household_roster:
    file: ../Data/hh_sec_2.dta
    idxvars:
        i: HHID
        pid: PID
    myvars:
        Sex:
            - s02q03
            - mapping:
                1: Male
                2: Female
        Age: s02q05a
        Marital:
            - s02q09
            - mapping:
                1: Married/Living together
                2: Divorced/Separated
                3: Widowed
                4: Never married/Never lived with a partner
        WeeksAway: s02q14
        Relationship:
            - s02q06
            - mapping:
                1: head
                2: spouse
                3: son/daughter
                4: stepchild
                5: adopted child/foster child
                6: parent
                7: sibling
                8: grand child
                9: nephew/niece
                10: son/daughter-in-law
                11: brother/sister-in-law
                12: parent-in-law
                13: other relatives
                14: servant
                15: other non-relative including boarder

cluster_features:
    file: ../Data/hh_sec_1.dta
    idxvars:
        i: HHID
        v: s01q01
    myvars:
        Region: s01q02
        Rural: s01q06b

housing:
    # Dwelling module hh_sec_4.dta. NB the questionnaire labels (read from the
    # .dta variable labels) differ from the bare column-number intuition:
    #   s04q04 = WALL material, s04q05 = ROOF material, s04q06 = FLOOR material.
    #   s04q02 is FLOOR AREA (m^2), NOT a room count; s04q03 is the room count.
    # All categorical columns already carry human-readable value labels, so no
    # mapping is needed; Rooms (s04q03) is numeric.
    file: ../Data/hh_sec_4.dta
    idxvars:
        i: HHID
    myvars:
        Roof: s04q05
        Floor: s04q06
        Walls: s04q04
        Water: s04q08
        Toilet: s04q19a
        Electricity: s04q07
        Rooms: s04q03
        Tenure: s04q28

individual_education:
    # Education module hh_sec_3.dta. pid is `children_out_of_H__id` (a
    # household-relative person sequence that matches the roster PID space,
    # despite the misleading name); attainment is s03q04. NB the module also
    # covers out-of-household children in school (s03q00='Yes'), which are
    # not roster members and surface as spine orphans.
    file: ../Data/hh_sec_3.dta
    idxvars:
        i: HHID
        pid: children_out_of_H__id
    myvars:
        Educational Attainment: s03q04
