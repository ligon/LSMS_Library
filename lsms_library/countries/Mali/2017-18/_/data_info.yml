Country: Mali
Wave: 2017-18

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: eaci17_s00p1.dta
        idxvars:
            v: grappe
        myvars:
            Region: s0q01
            Rural: s0q04
    df_geo:
        file: eaci_geovariables_2017.dta
        idxvars:
            v: grappe
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v

household_roster:
    idxvars:
        v: grappe
        i: 
            - grappe
            - exploitation
        pid:
            - grappe
            - exploitation 
            - codeid
    myvars:
        Sex: s1q01
        Age: s1q04a
        Relation: s1q02
    file: eaci17_s01p1.dta

shocks:
    file: eaci17_s05p2.dta
    idxvars:
        i:
            - grappe
            - exploitation
        Shock: choc
    myvars:
        AffectedIncome:
            - s5q04a
            - mapping:
                ' Diminué': True
                Diminué: True
                Augmenté: True
                Inchangé: False
        AffectedAssets:
            - s5q04b
            - mapping:
                ' Diminué': True
                Diminué: True
                Augmenté: True
                Inchangé: False
        AffectedProduction:
            - s5q04c
            - mapping:
                ' Diminué': True
                Diminué: True
                Augmenté: True
                Inchangé: False
        AffectedConsumption:
            - s5q04d
            - mapping:
                ' Diminué': True
                Diminué: True
                Augmenté: True
                Inchangé: False
        HowCoped0: s5q05a
        HowCoped1: s5q05b
        HowCoped2: s5q05c

individual_education:
    idxvars:
        v: grappe
        i: 
            - grappe
            - exploitation
        pid:
            - grappe
            - exploitation 
            - codeid
    myvars:
        Educational Attainment:  's1q07'
    file: 'eaci17_s01p1.dta'

interview_date:
    file: 
        - eaci17_s00p1.dta
        - eaci17_s00p2.dta
    idxvars:
        v: grappe
        visit: passage
        i:
            - grappe
            - exploitation
    myvars:
        Int_t: 
            - s0q21c
            - s0q21b
            - s0q21a
    converted_categoricals: False