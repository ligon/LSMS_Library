            - mapping:
                Carreaux/Marbre: Tiles
                Ciment/Béton: Cement
                Terre battue/Sable: Earth
                Bouse d'animaux: Dung
                Autre: Other

assets:
    file: s12_me_mli2021.dta
    idxvars:
        i:
            - grappe
            - menage
        j: s12q01
    myvars:
        Quantity: s12q03
        Age: s12q07
        Value: s12q09
        Purchase Price: s12q08

