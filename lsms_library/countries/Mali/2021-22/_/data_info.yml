                Dalle en ciment: Concrete Slab
                Tuile: Clay Tiles
                Tôles: Iron Sheets
                Paille: Thatch
                Banco: Adobe
                Chaume: Straw
                Nattes: Mats
                'Autre (à préciser)': Other
        Floor:
