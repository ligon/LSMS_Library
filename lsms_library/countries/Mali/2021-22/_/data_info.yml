Country: Mali
Wave: 2021-22

subjective_well_being:
    # EHCVM Section 20a 'Pauvreté relative'.  s20aq05 = self-placement on a
    # 4-point relative-welfare ladder (Très pauvre / Pauvre / Moyen / Riche).
    # Mapped to Own Step so higher = better off, consistent with the
    # Malawi/Cantril ladder.  Ne sait pas / Refus / NaN -> NaN.
    file: s20a_me_mli2021.dta
    idxvars:
        v: grappe
        i:
            - grappe
            - menage
    myvars:
        Own Step:
            - s20aq05
            - mapping:
                Très pauvre: 1
                Pauvre: 2
                Moyen: 3
                Riche: 4

food_security:
    # EHCVM Section 8A 'Sécurité alimentaire' — the FAO 8-item Food
    # Insecurity Experience Scale (FIES), recall period = last 12 months
    # ("12 derniers mois").  §8 is NOT split in 2021-22: items remain in
    # s08a_me_mli2021.dta as s08aq01..s08aq08, mapping IN ORDER to the 8
    # canonical FIES items (verified against the .dta variable labels).
    # Values Oui->True, Non->False; "Ne sait pas"/"Refus"/NaN->NaN (full
    # strings, not truncated).  s08aq07a/s08aq08a frequency follow-ups are
    # ignored.  FIES_score is computed by mapping.food_security().
    file: s08a_me_mli2021.dta
    idxvars:
        v: grappe
        i:
            - grappe
            - menage
    myvars:
        Worried:
            - s08aq01
            - mapping:
                Oui: True
                Non: False
        HealthyDiet:
            - s08aq02
            - mapping:
                Oui: True
                Non: False
        FewFoods:
            - s08aq03
            - mapping:
                Oui: True
                Non: False
        SkippedMeal:
            - s08aq04
            - mapping:
                Oui: True
                Non: False
        AteLess:
            - s08aq05
            - mapping:
                Oui: True
                Non: False
        RanOut:
            - s08aq06
            - mapping:
                Oui: True
                Non: False
        Hungry:
            - s08aq07
            - mapping:
                Oui: True
                Non: False
        WholeDay:
            - s08aq08
            - mapping:
                Oui: True
                Non: False

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: s00_me_mli2021.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
        myvars:
            Rural:
                - s00q04
                - mapping:
                    Rural: Rural
                    Urbain: Urban
    df_weights:
        file: ehcvm_ponderations_mli2021.dta
        idxvars:
            i:
                - grappe
                - menage
        myvars:
            weight: hhweight
            panel_weight: hhweight
    merge_on:
        - i
    final_index:
        - i
        - t

cluster_features:
    # GH #323 (site 4) / GH #627.  This block USED to be a two-sub-frame
    # `dfs:` merge: Region/Rural from `ehcvm_conso_mli2021.dta` and the GPS
    # fix from `s00_me_mli2021.dta`, joined on `v`.  That was a CARTESIAN
    # PRODUCT, not a join, and by a wide margin the worst one in the corpus:
    #
    #   ehcvm_conso is the EHCVM consumption file at (household x food item)
    #   grain -- 393,480 rows for 6,143 households in 513 grappes.  s00 is the
    #   household COVER PAGE -- 6,143 rows, also finer than `v`.  Merging two
    #   frames on `v` when BOTH repeat `v` pairs every consumption line-item
    #   with every household in its grappe: 393,480 x 6,143 -> 4,718,148 rows,
    #   of which 4,324,668 were phantoms that exist in no survey (88% of the
    #   4,907,774 phantom rows PR #627's 40-country census found).
    #   `_normalize_dataframe_index` then mopped it up with groupby().first(),
    #   so the table looked clean at 513 rows while nearly 4.4M invented rows
    #   passed through it.
    #
    # The merge was never needed.  s00_me_mli2021.dta carries the geography
    # itself: s00q01 == `region` and s00q04 == `milieu`, verified per grappe
    # against ehcvm_conso -- 513/513 grappes agree on BOTH, each is constant
    # within its grappe, and the two files cover the identical 6,143
    # (grappe, menage) households.  So this is a single-file extraction, the
    # cartesian is cured at the merge (not laundered by a reducer afterwards),
    # and the returned values are bit-for-bit what they were.
    #
    # Grain note: s00 is still household-grain (12 households per grappe), so
    # the declared (t, v) index is collapsed by the framework exactly as
    # before -- but now it de-duplicates 12 identical rows per grappe instead
    # of ~9,200 (mean 9,197 = 767 line-items x 12 households).  Region/Rural
    # are provably constant within grappe (checked);
    # Latitude/Longitude are the survey's per-grappe displaced fix stamped on
    # every household of the grappe.
    file: s00_me_mli2021.dta
    idxvars:
        v: grappe
    myvars:
        Region: s00q01
        Rural: s00q04
        Latitude: GPS__Latitude
        Longitude: GPS__Longitude


household_roster:
    dfs:
        - df_main
        - df_temp
    df_main:
        file: s01_me_mli2021.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
            pid: membres__id
        myvars:
            Sex: s01q01
            Age:
                - s01q04a
                - s01q03a
                - s01q03b
                - s01q03c
            Relationship: s01q02
    df_temp:
        file: s00_me_mli2021.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
        myvars:
            interview_date: s00q23a
    merge_on:
        - v
        - i
    final_index:
        - v
        - i
        - pid

food_acquired:
    file: s07b_me_mli2021.dta
    idxvars:
        v: grappe
        visit: vague
        i: 
            - grappe
            - menage
        j:
            - s07bq01
            - mappings: ['harmonize_food', 'Code', 'Preferred Label']
        u: s07bq03b
    myvars:
        Quantity: s07bq03a
        Expenditure: s07bq08
        Produced: s07bq04

individual_education:
    file: ehcvm_individu_mli2021.dta
    idxvars:
        v: grappe
        i:
            - grappe
            - menage
        # 2021-22 uses a SCALAR within-household member number for pid, to
        # match this wave's household_roster (which keys pid off the scalar
        # membres__id; numind == membres__id here -- verified 43,472/43,472
        # key overlap).  The wave-level pid() override in mapping.py also
        # expects a scalar (format_id(value)); passing the 3-column composite
        # list [grappe, menage, numind] made df_data_grabber apply pid()
        # row-wise to a Series and raise "The truth value of a Series is
        # ambiguous" (GH #322).
        pid: numind
    myvars:
        Educational Attainment:
            - educ_hi
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

interview_date:
    file: s00_me_mli2021.dta
    idxvars:
        v: grappe
        visit: vague
        i: 
            - grappe
            - menage
    myvars:
        Int_t: s00q23a
    

