Country: Mali
Wave: 2021-22

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: s00_me_mli2021.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
        myvars:
            Rural:
                - s00q04
                - mapping:
                    Rural: Rural
                    Urbain: Urban
    df_weights:
        file: ehcvm_ponderations_mli2021.dta
        idxvars:
            i:
                - grappe
                - menage
        myvars:
            weight: hhweight
            panel_weight: hhweight
    merge_on:
        - i
    final_index:
        - i
        - t

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: ehcvm_conso_mli2021.dta
        idxvars:
            v: grappe
        myvars:
            Region: region
            Rural: milieu
    df_geo:
        file: s00_me_mli2021.dta
        idxvars:
            v: grappe
        myvars:
            Latitude: GPS__Latitude
            Longitude: GPS__Longitude
    merge_on:
        - v
    final_index:
        - t
        - v


