Country: Mali
Wave: 2014-15

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: EACICONTROLE_p1.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
        myvars:
            Rural:
                - s00q04
                - mapping:
                    Rural: Rural
                    Urbain: Urban
    df_weights:
        file: EACIPOIDS.dta
        idxvars:
            i:
                - grappe
                - menage
        myvars:
            weight: poids_menage
            panel_weight: poids_menage
    merge_on:
        - i
    final_index:
        - i
        - t

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: eaci2014_agregatconso.dta
        idxvars:
            v: grappe
        myvars:
            Region: region
            Rural: milieu
    df_geo:
        file: eaci_geovariables_2014.dta
        idxvars:
            v: grappe
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v

household_roster:
    file: EACIIND_p1.dta
    idxvars:
        v: grappe
        i: 
            - grappe
            - menage
        pid:
            - grappe
            - menage 
            - s01q
    myvars:
        Sex: s01q01
        Age: s01q04a
        Relationship: s01q02
        
food_acquired:
    idxvars:
        v: grappe
        visit: passage
        i: 
            - grappe
            - menage
        j: 
            - s13q01
            - mappings: ['harmonize_food', 'Original Label', 'Preferred Label']
        u:
            - s13q03b
            - mappings: ['unit', 'Original Label', 'Preferred Label']
    myvars:
        Quantity: s13q02
        Expenditure: s13q03c
        Produced: s13q04a
    file:
        - EACIALI_p1.dta:
            Quantity: s13q03a
        - EACIALI_p2.dta

interview_date:
    file:
        - EACICONTROLE_p1.dta
        - EACICONTROLE_p2.dta
    idxvars:
        v: grappe
        i:
            - grappe
            - menage
    myvars:
        Int_t:
            - s00q22y
            - s00q22m
            - s00q22j
    converted_categoricals: False

shocks:
    file: EACICHOC_p2.dta
    idxvars:
        i:
            - grappe
            - menage
        Shock: s11q01
    myvars:
        AffectedIncome:
            - s11q04a
            - mapping:
                Dimunié: True
                Diminué: True
                Augmenté: True
                Inchangé: False
                Manquant: False
        AffectedAssets:
            - s11q04b
            - mapping:
                Dimunié: True
                Diminué: True
                Augmenté: True
                Inchangé: False
                Manquant: False
        AffectedProduction:
            - s11q04c
            - mapping:
                Dimunié: True
                Diminué: True
                Augmenté: True
                Inchangé: False
                Manquant: False
        AffectedConsumption:
            - s11q04d
            - mapping:
                Dimunié: True
                Diminué: True
                Augmenté: True
                Inchangé: False
                Manquant: False
        HowCoped0: s11q05a
        HowCoped1: s11q05b
        HowCoped2: s11q05c

individual_education:
    file: EACIIND_p1.dta
    idxvars:
        v: grappe
        i:
            - grappe
            - menage
        pid:
            - grappe
            - menage
            - s01q
    myvars:
        Educational Attainment: s01q06

housing:
    file: EACIMEN_p1.dta
    idxvars:
        i:
            - grappe
            - menage
    myvars:
        Roof:
            - s07q11
            - mapping:
                Tôle: Iron Sheets
                Banco: Adobe
                Dalle en ciment: Concrete Slab
                Paille: Thatch
                Nattes: Mats
                Chaume: Straw
                Tuile: Clay Tiles
                Autre: Other
        Floor:
            - s07q12
            - mapping:
                Terre battue/Sable: Earth
                Carreaux/Béton: Tiles
                Ciment/Marbre: Cement
                Bouse d'animaux: Dung
                Autre: Other