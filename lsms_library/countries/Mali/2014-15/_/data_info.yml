Country: Mali
Wave: 2014-15

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: EACICONTROLE_p1.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
        myvars:
            Rural:
                - s00q04
                - mapping:
                    Rural: Rural
                    Urbain: Urban
    df_weights:
        file: EACIPOIDS.dta
        idxvars:
            i:
                - grappe
                - menage
        myvars:
            weight: poids_menage
            panel_weight: poids_menage
    merge_on:
        - i
    final_index:
        - i
        - t

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: eaci2014_agregatconso.dta
        idxvars:
            v: grappe
        myvars:
            Region: region
            Rural: milieu
    df_geo:
        file: eaci_geovariables_2014.dta
        idxvars:
            v: grappe
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v

household_roster:
    file: EACIIND_p1.dta
    idxvars:
        v: grappe
        i:
            - grappe
            - menage
        # GH #323: pid MUST be s01q00 ("Numero d'ordre" -- the person's own
        # roster line), NOT s01q ("Code du répondant" -- the line number of
        # whoever ANSWERED section 1 on the household's behalf).  s01q is a
        # household-level attribute: 28,054 of 37,175 rows carry s01q == 1
        # (the head answered), so it maps ~9.77 people/HH onto ~1.35 keys.
        # Source cardinality on EACIIND_p1.dta (37,175 rows, one per PERSON):
        #     uniq (grappe, menage, s01q)   =  5,149  <- keyed by WHO ANSWERED;
        #                                       the framework then collapsed the
        #                                       other 32,026 people away with
        #                                       groupby().first(), labelling the
        #                                       survivors with the wrong key.
        #     uniq (grappe, menage, s01q00) = 37,175  <- exactly unique.
        # This also puts household_roster.pid back in the same keyspace as
        # _/people_last7days.py, which already keys on s01q00 and asserts
        # uniqueness.
        pid:
            - grappe
            - menage
            - s01q00
    myvars:
        Sex: s01q01
        Age: s01q04a
        Relationship: s01q02
        MonthsSpent: s01q11

food_acquired:
    # EACI 2014-15 Section 13 records consumption per acquisition source
    # as THREE separate quantity/unit pairs (GH #380), unlike the EHCVM
    # single-total instrument:
    #   s13q02   "A consommé le produit ..."          Oui/Non gate (NOT a quantity)
    #   s13q03a  "Quantité totale ... acheté"         purchased quantity   (unit s13q03b)
    #   s13q03c  "Valeur de cette quantité ... acheté" purchased value      -> Expenditure
    #   s13q04a  "Quantité totale ... propre production" produced quantity  (unit s13q04b)
    #   s13q05a  "Quantité totale ... reçu en cadeau,... troc" in-kind qty  (unit s13q05b)
    # The wide grab below keeps each stream's quantity, unit and (for
    # purchases) value as plain columns; the food_acquired(df) hook in
    # mapping.py melts them into the canonical (t, v, i, j, u, s) long
    # form with s in {purchased, produced, inkind}.  s13q03a/04a/05a are
    # per-source quantities (NOT a total), so the EHCVM
    # food_acquired_to_canonical (purchased = total - produced) is the
    # WRONG reshape here and is deliberately not used.
    idxvars:
        v: grappe
        visit: passage
        i:
            - grappe
            - menage
        j:
            - s13q01
            - mappings: ['harmonize_food', 'Code', 'Preferred Label']
    myvars:
        QuantityPurchased: s13q03a
        UnitPurchased: s13q03b
        ExpenditurePurchased: s13q03c
        QuantityProduced: s13q04a
        UnitProduced: s13q04b
        QuantityInkind: s13q05a
        UnitInkind: s13q05b
    file:
        - EACIALI_p1.dta
        - EACIALI_p2.dta

interview_date:
    # GH #323: the two EACI `passage`s are a REPEATED MEASURE, not a sample
    # split.  EACICONTROLE_p1 and _p2 each cover all 3,804 households (p1-only:
    # 0, p2-only: 0, both: 3,804), and the two visits are a median 124 days
    # apart -- a post-planting and a post-harvest interview.  So each household
    # has TWO genuine interview dates.  Without `visit` on the index the two
    # files concatenated to 7,608 rows keyed on (v, i), and the framework
    # collapsed the 3,804 duplicates with groupby().first(), silently throwing
    # away the second date.  `visit` is carried and DECLARED (see
    # _/data_scheme.yml), matching the canonical (t, v, i, visit) index and the
    # EHCVM peers (Niger / Benin / Togo / CotedIvoire all keep `visit`).
    #
    # Unlike 2017-18 (eaci17_s00p1/p2, which carry a real `passage` column),
    # EACICONTROLE_p1/_p2 have IDENTICAL column sets and NO passage column --
    # the visit number is encoded only in the FILENAME.  So each file injects
    # it as a literal (`{const: ...}`), which is ground truth.  It is NOT
    # inferred from row order, and NOT inferred by ranking Int_t within the
    # household: that rank would mislabel the 66 households whose passage-2
    # interview is dated BEFORE their passage-1 interview (gaps run -10..+203
    # days).
    file:
        - EACICONTROLE_p1.dta:
            visit: {const: '1'}
        - EACICONTROLE_p2.dta:
            visit: {const: '2'}
    idxvars:
        v: grappe
        i:
            - grappe
            - menage
        # Default; every file in the `file:` list above overrides it.
        visit: {const: '1'}
    myvars:
        Int_t:
            - s00q22y
            - s00q22m
            - s00q22j
    converted_categoricals: False

shocks:
    file: EACICHOC_p2.dta
    idxvars:
        i:
            - grappe
            - menage
        Shock: s11q01
    myvars:
        AffectedIncome:
            - s11q04a
            - mapping:
                Dimunié: True
                Diminué: True
                Augmenté: True
                Inchangé: False
                Manquant: False
        AffectedAssets:
            - s11q04b
            - mapping:
                Dimunié: True
                Diminué: True
                Augmenté: True
                Inchangé: False
                Manquant: False
        AffectedProduction:
            - s11q04c
            - mapping:
                Dimunié: True
                Diminué: True
                Augmenté: True
                Inchangé: False
                Manquant: False
        AffectedConsumption:
            - s11q04d
            - mapping:
                Dimunié: True
                Diminué: True
                Augmenté: True
                Inchangé: False
                Manquant: False
        HowCoped0: s11q05a
        HowCoped1: s11q05b
        HowCoped2: s11q05c

individual_education:
    file: EACIIND_p1.dta
    idxvars:
        v: grappe
        i:
            - grappe
            - menage
        # GH #323: same person-id bug as household_roster above (same source
        # file, same pid block).  s01q00 = "Numero d'ordre" (the person);
        # s01q = "Code du répondant" (who answered).  See the household_roster
        # comment for the cardinality evidence.
        pid:
            - grappe
            - menage
            - s01q00
    myvars:
        # GH #171: s02q23 = "Niveau d'instruction le plus élevé atteint" (value-
        # labelled French grade-years).  Was mis-wired to s01q06 = father's roster
        # line ("Code du père dans le ménage"), not education.
        Educational Attainment:
            - s02q23
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
    file: EACIMEN_p1.dta
    idxvars:
        i:
            - grappe
            - menage
    myvars:
        Roof:
            - s07q11
            - mapping:
                Tôle: Iron Sheets
                Banco: Adobe
                Dalle en ciment: Concrete Slab
                Paille: Thatch
                Nattes: Mats
                Chaume: Straw
                Tuile: Clay Tiles
                Autre: Other
        Floor:
            - s07q12
            - mapping:
                Terre battue/Sable: Earth
                Carreaux/Béton: Tiles
                Ciment/Marbre: Cement
                Bouse d'animaux: Dung
                Autre: Other