# ERHS wave 1995 (Round 3).
#
# CODE-BASED extraction (converted_categoricals: False).  ERHS label
# spellings drift across files/rounds (village code 6 = "Shumsha" in
# demo123 vs other spellings in food3) but numeric codes are stable
# and identical across modules -- raw (q1c,hh_no) overlap
# demo123<->food3 for the round-3 slice is 1459/1498 (97.4%).  So
# household identity and all categoricals key off the stable codes;
# labels come from _/categorical_mapping.org.
#
# Roster source demo123.dta is the pooled R1-R3 *person-panel* file
# (one row per (household, individual), round-suffixed columns).
# 1995 uses the round-3 columns: presence is flagged by the round-3
# person variables.  `sex3`/`agey3` are the round-3 sex/age; `q11_1b`
# (relation to head) is roster-wide and stable across rounds -- the
# only round-3-specific relation columns (q11_103/q11_63) cover just
# the new comers / new births, not the continuing roster, so the
# round-1 relation column is carried forward (codes identical to
# round 2/3: verified against erhs_relation 1-16).  Selecting Sex
# from `sex3` restricts the roster to round-3 members (the framework
# drops NaN-Sex rows).

household_roster:
    file: demo123.dta
    converted_categoricals: False
    idxvars:
        i:
            - q1c        # peasant association (stable code)
            - hhid       # HH no. within village
        pid: ind         # roster-card id
    myvars:
        Sex:
            - sex3       # sex of individuals included in round 3
            - mappings: ['erhs_sex', 'Code', 'Preferred Label']
        Age: agey3       # age in years in round 3
        Relationship:
            - q11_1b     # relation to HH head (round-wide, stable codes)
            - mappings: ['erhs_relation', 'Code', 'Preferred Label']

# food3.dta: one row per (household, food item); three acquisition
# sources side by side, each with its own quantity + unit (purchases
# also carry expenditure).  Household keys q1c+q2 use the SAME stable
# codes as demo123's q1c+hhid (q2 here = "HH No. for this survey",
# the round-3 analogue of food1's q5 / food2's q2; food3's own q5 is
# the unrelated "Same HH as in 2nd round?" flag).  The `food_acquired`
# df_edit hook in _/ethiopiarhs.py melts the source triplets into
# canonical (t, i, j, u, s).  j (q36_1b) and units are carried as
# stable codes; food-label / unit harmonization is a documented
# follow-up.
food_acquired:
    file: food3.dta
    converted_categoricals: False
    idxvars:
        i:
            - q1c
            - q2
        j:
            - q36_1b
            - mappings: ['harmonize_food', '1995', 'Preferred Label']
    myvars:
        q_purch: q36_2a
        u_purch:
            - q36_2b
            - mappings: ['harmonize_unit', 'Code', 'Preferred Label']
        e_purch: q36_2c
        q_prod: q36_3a
        u_prod:
            - q36_3b
            - mappings: ['harmonize_unit', 'Code', 'Preferred Label']
        q_inkind: q36_4a
        u_inkind:
            - q36_4b
            - mappings: ['harmonize_unit', 'Code', 'Preferred Label']

# Sampling design (GH #271 follow-up: market='Region').  ERHS has no
# HH-level cover file -> extracted from the per-person roster; the
# sample/cluster_features df_edit hooks in _/ethiopiarhs.py dedup to
# the (i)/(v) grain.  No design weights (purposive panel) -> NaN.
sample:
    file: demo123.dta
    converted_categoricals: False
    idxvars:
        i:
            - q1c
            - hhid
    myvars:
        v: q1c
cluster_features:
    file: demo123.dta
    converted_categoricals: False
    idxvars:
        v: q1c
    myvars:
        Region:
            - q1c
            - mappings: ['erhs_village_region', 'Code', 'Region']
        Woreda:
            - q1c
            - mappings: ['erhs_village_woreda', 'Code', 'Woreda']

# community_prices (BESPOKE, GH #275) -- Round 3 (1995) market prices.
# Same WIDE-on-round source file price1234_rev.tab as 1994a/1994b/1997;
# the shared `community_prices` df_edit hook (_/ethiopiarhs.py) melts
# p_r1..p_r4 and stamps each round's `t`, and the per-wave year filter
# keeps THIS wave's slice -- 1995 gets the p_r3 (R3) rows.  market=q1b
# (Woreda/market town), j=item1234 (raw food label), u='kg', Price in
# Birr/kg.  See the 1994a data_info for the full design note.
community_prices:
    file: price1234_rev.tab
    idxvars:
        market: q1b      # Woreda / market town (== cluster_features.Woreda)
        j: item1234      # food-item label (raw; harmonization a follow-up)
    myvars:
        p_r1: p_r1       # R1 (1994a) market price, Birr/kg
        p_r2: p_r2       # R2 (1994b) market price, Birr/kg
        p_r3: p_r3       # R3 (1995)  market price, Birr/kg
        p_r4: p_r4       # R4 (1997)  market price, Birr/kg
