# ERHS wave 1994a (Round 1).
#
# CODE-BASED extraction (converted_categoricals: False).  ERHS label
# spellings drift across files/rounds (village code 6 = "Shumsha" in
# demo123 vs "SHUMSHEHA" in food1) but numeric codes are stable and
# identical across modules -- raw (q1c,hh_no) overlap demo123<->food1
# is 1473/1473.  So household identity and all categoricals key off
# the stable codes; labels come from _/categorical_mapping.org.
#
# Roster source demo123.dta is the pooled R1-R3 file (round-suffixed
# columns); 1994a uses the round-1 columns.  1994b/1995 point at the
# same file with their round-2/round-3 column names.  `q2` (1989/90
# HH no.) is the cross-wave/1989 linkage key (carried later).

household_roster:
    file: demo123.dta
    converted_categoricals: False
    idxvars:
        i:
            - q1c        # peasant association (stable code)
            - hhid       # HH no. within village
        pid: ind         # roster-card id
    myvars:
        Sex:
            - q11_5
            - mappings: ['erhs_sex', 'Code', 'Preferred Label']
        Age: q11_6a
        Relationship:
            - q11_1b
            - mappings: ['erhs_relation', 'Code', 'Preferred Label']

# food1.dta: one row per (household, food item); three acquisition
# sources side by side, each with its own quantity + unit (purchases
# also carry expenditure).  Household keys q1c+q5 use the SAME stable
# codes as demo123's q1c+hhid.  The `food_acquired` df_edit hook in
# _/ethiopiarhs.py melts the source triplets into canonical
# (t, i, j, u, s).  j (q36_1b) and units are carried as stable codes;
# food-label / unit harmonization is a documented follow-up.
food_acquired:
    file: food1.dta
    converted_categoricals: False
    idxvars:
        i:
            - q1c
            - q5
        j:
            - q36_1b
            - mappings: ['harmonize_food', '1994a', 'Preferred Label']
    myvars:
        q_purch: q36_2a
        u_purch:
            - q36_2b
            - mappings: ['harmonize_unit', 'Code', 'Preferred Label']
        e_purch: q36_2c
        q_prod: q36_3a
        u_prod:
            - q36_3b
            - mappings: ['harmonize_unit', 'Code', 'Preferred Label']
        q_inkind: q36_4a
        u_inkind:
            - q36_4b
            - mappings: ['harmonize_unit', 'Code', 'Preferred Label']

# Sampling design (GH #271 follow-up: market='Region').  ERHS has no
# HH-level cover file -> extracted from the per-person roster; the
# sample/cluster_features df_edit hooks in _/ethiopiarhs.py dedup to
# the (i)/(v) grain.  No design weights (purposive panel) -> NaN.
sample:
    file: demo123.dta
    converted_categoricals: False
    idxvars:
        i:
            - q1c
            - hhid
    myvars:
        v: q1c
cluster_features:
    file: demo123.dta
    converted_categoricals: False
    idxvars:
        v: q1c
    myvars:
        Region:
            - q1c
            - mappings: ['erhs_village_region', 'Code', 'Region']
        Woreda:
            - q1c
            - mappings: ['erhs_village_woreda', 'Code', 'Woreda']

# community_prices (BESPOKE, GH #275).  ERHS community/market price
# module -- village/market-level food prices, NOT the API-derived
# `food_prices` (which comes from food_acquired).  There is no
# canonical cross-country market-price feature, so this is an
# ERHS-specific table, modelled on the bespoke assets/livestock/income
# blocks (HH-level value variants).
#
# SOURCE.  price1234_rev.tab -- ONE file covering Rounds 1--4, i.e.
# waves 1994a/1994b/1995/1997.  It is WIDE on round: one row per
# (q1b market x item1234 food item) with four per-kg price columns
# p_r1..p_r4 (Birr/kg) for R1..R4.  q1b is the WOREDA / market town
# (15 of them; the same named geography as cluster_features.Woreda --
# NOT the peasant-association `v`/q1c).  item1234 is a food *label*
# (white teff, barley, ...), not the numeric food code harmonize_food
# keys on, so j carries the raw label (label harmonization a
# follow-up).  Confirmed per-kg by the IFPRI Mergepricekg.SPS codebook
# (value = amount * p_r1, matched BY item1234 q1b).
#
# WIRING.  The SAME price1234_rev.tab is listed in ALL FOUR 1994+
# waves' community_prices block.  The shared df_edit hook
# `community_prices` in _/ethiopiarhs.py melts p_r1..p_r4 to long and
# stamps each round's own `t` (p_r1->1994a, ..., p_r4->1997);
# check_adding_t then leaves that `t` and the per-wave year filter
# selects this wave's slice (1994a -> the p_r1 rows).  market=q1b,
# j=item1234, u='kg', Price in Birr/kg.  R1--R3 carry only the ~19
# core staples; R4 (1997) is broader (~72 items).
#
# OUT OF SCOPE / deferred: the non-round-keyed `pricenum` (price per
# *number*) and the R6/R7 (2004/2009) price files
# (rd6_kgpr_Mkt.tab / price2009*.tab) -- 2004/2009 are not wired waves.
community_prices:
    file: price1234_rev.tab
    idxvars:
        market: q1b      # Woreda / market town (== cluster_features.Woreda)
        j: item1234      # food-item label (raw; harmonization a follow-up)
    myvars:
        p_r1: p_r1       # R1 (1994a) market price, Birr/kg
        p_r2: p_r2       # R2 (1994b) market price, Birr/kg
        p_r3: p_r3       # R3 (1995)  market price, Birr/kg
        p_r4: p_r4       # R4 (1997)  market price, Birr/kg
# plot_features (#278, under #167).  LASTING plot/parcel characteristics
# of the household's farmland, from the R1 (early 1994) land section
# (questionnaire Q21).  ONE ROW PER PLOT -- multiple plots per household
# (mean ~3.9, max 29 over 1,477 HH; 5,811 source rows).
#
# SOURCE FILE.  land1all.tab is the conversion-applied version of the
# raw R1 land section r1p2s1.tab (Landconversion.SPS sets
# area1 = q21_1b and merges the land-unit -> hectare factors): it ships
# the pre-computed per-plot HECTARE column q21_1aha, so Area needs no
# in-library unit conversion (cf. the R4 plotha "oracle" in the design
# doc, slurm_logs/DESIGN_erhs_plot_features_2026-05-20.org).  land1all
# is also markedly cleaner than r1p2s1 (19 vs 215 duplicate (i, plot_id)
# pairs), so it is the chosen R1 source.
#
# CODE-BASED extraction (converted_categoricals: False), consistent with
# the 1994a roster/food: q1c and q5 are read as the STABLE NUMERIC CODES
# the shared `i` formatter title-cases and joins as <village>_<hh_no>.
#
# i-KEY (statically verified).  i = [q1c, q5] -- peasant-association code
# + HH-no-within-village -- the SAME composite the 1994a `food_acquired`
# block uses (food1.dta q1c+q5).  Measured overlap of the plot file's
# packed [q1c, q5] against the 1994a roster's [q1c, hhid] composite is
# 1477/1477 (perfect): the roster's `hhid` == the land/food file's `q5`
# (both = HH number within village).  v (peasant association) is
# auto-joined from sample() at API time (NOT in the index).
#
# plot_id = q21_1, the plot's sequence number within the household
# (1..29).  507 of the 5,811 rows (8.7%) are per-HH land TOTAL rows that
# carry q21_1a/q21_1aha but NO q21_1 / area1 / q21_3 -- they get a null
# plot_id and surface as the documented residual (is_this_feature_sane
# warns, not fails, below the 10% null-index threshold), mirroring the
# ERHS food harmonization residual posture.  A handful of duplicate
# (i, plot_id) pairs (~19) are genuine source data-entry artifacts.
#
# COLUMNS (= source var):
#  - Area     = q21_1aha  (plot area in HECTARES, the canonical unit;
#               already converted in-file -- 5,808 non-null, 0-7.5 ha).
#  - AreaUnit = area1 (== raw q21_1b) -- the NATIVE local area unit, mapped
#               to its harmonized label (Timad/Gemed/Kert/Hectare/...);
#               preserves provenance behind the hectare conversion.
#  - Tenure   = q21_3, the form under which the plot is HELD, mapped to the
#               canonical plot_features Tenure spellings.  ERHS code 5
#               conflates "sharecropped, rented" -> sharecropped_in (the
#               dominant arrangement); code 6 (fixed rent) -> rented_in;
#               redistribution / land-reform / pre-reform purchase -> owned;
#               pre-reform inheritance + gift from parents -> inherited;
#               cleared forest -> squatted; trustship -> communal; the rest
#               -> other_tenure.  (Per-season contract detail -- crop-share
#               %, partner identity -- is plot_cultivation territory, out
#               of scope per the design doc's D2.)
#  - SoilType = q21_5, the local soil-FERTILITY class (Lem = fertile,
#               Lem-teuf = medium, Teuf = poor); carried as its label.
#  - Irrigated= q21_7 (Yes/No -> True/False), the plot's irrigation
#               status; treated as a lasting plot attribute.
plot_features:
    file: land1all.tab
    converted_categoricals: False
    idxvars:
        i:
            - q1c
            - q5
        plot_id: q21_1
    myvars:
        Area: q21_1aha
        AreaUnit:
            - area1
            - mapping:
                2: Hectare
                3: Gemed
                4: Timad
                5: Kert
                6: Massa
                8: Kufaro
                9: Other
                10: Kend (arms-length)
                11: Square meters
                12: Farrow (Boy)
                13: Tinto
                14: Ermija
                15: Dearo
                16: Gezem
                17: Debe Zhir
                20: Wodero
                21: Gura Zhir
        Tenure:
            - q21_3
            - mapping:
                1: inherited        # Own land, pre-reform inheritance
                2: owned            # Own land, pre-reform purchase
                3: owned            # Own land, obtained at land reform
                4: owned            # Own land, obtained during redistribution
                5: sharecropped_in  # "Sharecropped, rented land" (conflated)
                6: rented_in        # Rented land with fixed rent
                7: other_tenure     # Other
                10: other_tenure    # after demise of prod coop / state farm
                11: squatted        # by clearing forest
                12: inherited       # gift from parents
                13: communal        # trustship land
        SoilType:
            - q21_5
            - mapping:
                1: Lem        # fertile
                2: Lem-teuf   # medium
                3: Teuf       # poor
        Irrigated:
            - q21_7
            - mapping:
                1: True       # Yes
                2: False      # No
