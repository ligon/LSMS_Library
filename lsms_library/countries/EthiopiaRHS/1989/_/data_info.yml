# ERHS wave 1989 (pre-expansion round, 6-7 villages).
#
# 1989 is a DISTINCT instrument from the 1994+ panel and deviates from
# the standard recipe in three ways (all handled here / in shared
# _/ethiopiarhs.py + _/categorical_mapping.org, GH #271):
#
#  1. Household id is a single PACKED 5-digit `hhid` (region+PA+HH,
#     e.g. 10101) that is already unique per household (338 HH).  So
#     i = hhid as a SINGLE column -- the shared `i` formatter's scalar
#     path handles it (no (village, hh_no) composite here).
#  2. Relationship uses a 9-code taxonomy (relnhhed), NOT the 16-code
#     erhs_relation -> mapped via the dedicated erhs_relation_1989
#     table.  Sex matches erhs_sex (1=M,2=F).
#  3. food89.dta is already LONG (one row per hh x food item with a
#     single `source` code), not the 1994 wide purch/prod/inkind
#     triplets.  We map `source` -> canonical `s` directly in idxvars;
#     the shared food_acquired df_edit hook detects the absence of the
#     q_purch triplet columns and passes the frame through (filtering
#     to canonical s, which drops the NaN/5/6/7 source rows that have
#     no clean purchased/produced/inkind meaning).
#
# Code-based extraction (converted_categoricals: False), consistent
# with the other ERHS waves; foodcode/unitcode carried as stable
# codes (label harmonization a documented follow-up).

household_roster:
    file: demog89_1.dta
    converted_categoricals: False
    idxvars:
        i: hhid          # packed 5-digit region+PA+HH, unique per HH
        pid: pid
    myvars:
        Sex:
            - sex
            - mappings: ['erhs_sex', 'Code', 'Preferred Label']
        Age: age
        Relationship:
            - relnhhed
            - mappings: ['erhs_relation_1989', 'Code', 'Preferred Label']

food_acquired:
    file: food89.dta
    converted_categoricals: False
    idxvars:
        i: hhid
        j:
            - foodcode
            - mappings: ['harmonize_food', '1989', 'Preferred Label']
        u: unitcode
        s:
            - source
            - mapping:
                1: purchased
                2: produced
                3: inkind
    myvars:
        Quantity: quantity
        Expenditure: value

# Sampling design (1989).  No q1c; cluster = `site`, household id =
# the packed scalar `hhid` (same as the 1989 roster i).  Region via
# erhs_site_region_1989 (1989's own pre-expansion region codes).  The
# shared sample()/cluster_features() df_edit hooks dedup to (i)/(v).
# Coverage: demog89_1 is the partial 1989 roster (338 HH); food89 HH
# absent from it (food-only sites/HH) keep v=NA -- the documented
# 1989 roster<food gap, same as the 1994b/1995 residual.
sample:
    file: demog89_1.dta
    converted_categoricals: False
    idxvars:
        i: hhid
    myvars:
        v: site
# No 1989 cluster_features: demog89_1 has no q1b/q1a -> no in-data
# Woreda and no authoritative named region (the 1989 site->village
# key would come from Dercon-Hoddinott; cross-era named-geography
# reconciliation is a documented follow-up).  1989 keeps `sample`
# (cluster v = site) for the v-join; market='Region'/'Woreda' rows
# for 1989 are NaN and drop, as documented in CONTENTS.

# Income (1989 ONLY).  ethyrev.dta ships a constructed annual
# household income total for the 1989 instrument; hhid is the same
# packed scalar as the 1989 roster i.  income = totinc (GROSS annual
# birr, matching Uganda's gross-sum convention; netinc available as
# an alternative).  1994+ rounds have no constructed income aggregate
# -> no income block there (documented in CONTENTS).
income:
    file: ethyrev.dta
    converted_categoricals: False
    idxvars:
        i: hhid
    myvars:
        income: totinc
