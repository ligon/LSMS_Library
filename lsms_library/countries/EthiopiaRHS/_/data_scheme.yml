Country: EthiopiaRHS

# Ethiopian Rural Household Survey (ERHS), 1989-2009.
# Distinct survey from the World Bank ESS/LSMS-ISA `Ethiopia` module.
# Source: IFPRI Dataverse, doi:10.7910/DVN/T8G8IV (hdl:1902.1/15646).
# Waves are auto-discovered from {wave}/Documentation/SOURCE.org -- no
# ethiopiarhs.py / Waves dict (per maintainer steer 2026-05-18).
#
# First pass is CFE-minimal (GH #271): household_roster + food_acquired,
# which auto-derive household_characteristics and
# food_expenditures/food_quantities at runtime. Per-wave variable
# mappings live in {wave}/_/data_info.yml and are filled in wave by wave.

Data Scheme:
  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  # assets (#277): HH-level asset-VALUE aggregates from the 1989/R1
  # asset module (one .tab per peasant association).  The ERHS
  # instrument records household TOTALS (farm/non-farm value + count),
  # NOT the canonical item-level (t,i,j) Quantity/Value -- so this is a
  # documented HH-level (t,i) variant (cf. Liberia's reduced `assets`).
  assets:
    index: (t, i)
    FarmValue: float
    NonFarmValue: float
    TotalValue: float
    NumberOfAssets: float

  # livestock (#277): HH-level livestock-VALUE aggregates from the R5
  # (1999) livestock module (one {village}lvs5.tab per original-7-village
  # peasant association).  Pre-aggregated household TOTALS (herd value +
  # TLU), NOT canonical item-level (t,i,j) -- so this is a documented
  # HH-level (t,i) variant, like `assets`.  i = the packed 5-digit hhid
  # (same scalar scheme as the 1989 roster; ZERO overlap with the 1999
  # roster's named [q1c,hh] composite, 322/541 vs the 1989 packed roster).
  livestock:
    index: (t, i)
    LivestockValue: float   # total value of livestock herd (Birr)
    TLU: float              # Livestock Standard Units (tropical livestock units)

  # income (#277): HH-level income-VALUE aggregates from the R5 (1999)
  # income module ({village}inc5.tab; only 4 of 7 villages have an inc5
  # file -- ars/deb/din/sid).  Pre-aggregated household income TOTALS +
  # major source subtotals, NOT item-level -- a documented HH-level (t,i)
  # variant.  i = the same packed 5-digit hhid as `livestock`.
  income:
    index: (t, i)
    TotalIncome: float      # total household income (Birr)
    CropIncome: float       # income from crop production/sales
    LivestockIncome: float  # income from livestock products/sales
    OffFarmIncome: float    # non-farm income
    WageIncome: float       # wage/labour income

  # Mali-style clean YAML: extract wide per-source columns; the
  # `food_acquired` df_edit hook in _/ethiopiarhs.py melts them to
  # canonical long form on s. Price is API-derived (food_prices).
  food_acquired:
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float

  # plot_features (#278, under #167): LASTING plot/parcel characteristics
  # of the household's farmland.  One row per plot -- MULTIPLE PLOTS PER
  # HOUSEHOLD (mean ~3.9, max 29).  WIRED for 1994a (R1) only, from the
  # conversion-applied R1 land section land1all.tab (clean YAML, code-
  # based, i=[q1c,q5], plot_id=q21_1; see 1994a/_/data_info.yml).  Area
  # is in HECTARES (pre-computed in-file); AreaUnit carries the native
  # local unit label; Tenure is mapped to the canonical plot_features
  # spellings.  v (peasant association) is auto-joined by
  # _join_v_from_sample() at API time, so it is NOT in the index --
  # canonical (t, v, i, plot_id) less the framework-joined v.
  #
  # DEFERRED (no plot_features yet): 1989 (no plot roster in the IFPRI
  # Dataverse archive -- HH x crop only), 1994b/1995/1997 (R2-R4 raw
  # plot sections present but unwired -- R2/R4 are multi-file/script-path,
  # R3 needs a composite plot_id formatter), and 1999/2004/2009 (R5-R7,
  # only pre-aggregated HH x crop area_output_* -- no raw plot rows).
  # See slurm_logs/DESIGN_erhs_plot_features_2026-05-20.org.
  plot_features:
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    SoilType: str
    Irrigated: bool

  # Sampling design.  ERHS is a PURPOSIVE 15-village longitudinal
  # panel, not a weighted national sample -- there are no design
  # weights, so weight/panel_weight are NaN (sourcing any constructed
  # weights is a documented follow-up).  v = peasant association
  # (village).  Sources are per-person; the `sample`/`cluster_features`
  # df_edit hooks in _/ethiopiarhs.py dedup to the required grain.
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    Woreda: str
    Rural: str

  panel_ids: !make
