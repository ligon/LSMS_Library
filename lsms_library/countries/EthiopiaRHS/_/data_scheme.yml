Country: EthiopiaRHS

# Ethiopian Rural Household Survey (ERHS), 1989-2009.
# Distinct survey from the World Bank ESS/LSMS-ISA `Ethiopia` module.
# Source: IFPRI Dataverse, doi:10.7910/DVN/T8G8IV (hdl:1902.1/15646).
#
# Waves are declared by the EXPLICIT `waves` list in _/ethiopiarhs.py
# (consumed by Country.waves) -- it is authoritative, NOT auto-discovery.
# All 8 rounds are wired: 1989, 1994a, 1994b, 1995, 1997, 1999 (R1-R5) plus
# 2004 (R6) and 2009 (R7).  Per-wave variable mappings live in
# {wave}/_/data_info.yml.
#
# Feature set (this file enumerates the canonical tables):
#  - household_roster + food_acquired (1989-1997, person/item-level) ->
#    auto-derive household_characteristics, food_expenditures/food_quantities.
#  - sample + cluster_features (all 8 waves where geography exists).
#  - plot_features (1994a R1).
#  - anthropometry (t,i,pid) 1994-1997 (R1-R4) + crop_production (t,i,j)
#    1994-1997/2004/2009 (R1-R4,R6,R7) -- item-level parity features (#438).
#  - bespoke HH-level (t,i) VALUE/aggregate tables where the IFPRI archive
#    ships only pre-aggregated household scalars (no roster/item-level food):
#    assets (1989 R1), livestock (1999 R5 + 2004 R6 + 2009 R7),
#    income (1999 R5), consumption (2004 R6 + 2009 R7), hhsize (2009 R7).
#    These follow the documented _no_v_join (t,i) pattern (see CLAUDE.md).
#    (The former HH-level `area_output` (t,i) table is RETIRED -- subsumed by
#    the item-level crop_production above; #438.)
#  - panel_ids (!make).

Data Scheme:
  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  # assets (#277): HH-level asset-VALUE aggregates from the 1989/R1
  # asset module (one .tab per peasant association).  The ERHS
  # instrument records household TOTALS (farm/non-farm value + count),
  # NOT the canonical item-level (t,i,j) Quantity/Value -- so this is a
  # documented HH-level (t,i) variant (cf. Liberia's reduced `assets`).
  assets:
    index: (t, i)
    FarmValue: float
    NonFarmValue: float
    TotalValue: float
    NumberOfAssets: float

  # livestock (#277): HH-level livestock-VALUE aggregates.  Pre-aggregated
  # household TOTALS (herd value + TLU), NOT canonical item-level (t,i,j) --
  # a documented HH-level (t,i) variant, like `assets`.  Three wired waves:
  #  - 1999 (R5): one {village}lvs5.tab per original-7-village peasant
  #    association; i = the packed 5-digit hhid (same scalar scheme as the
  #    1989 roster; ZERO overlap with the 1999 roster's [q1c,hh] composite).
  #  - 2004 (R6): livestockaggregates_123456.tab, the livval6/lsu6 slice;
  #    i = composite (paid, hhid) via the shared ethiopiarhs.i formatter.
  #  - 2009 (R7): livestock_agg_round7.tab (lvs_val7/tlu7); i = (pa, hhid).
  # All wired via the existing _no_v_join exemption for `livestock`.
  livestock:
    index: (t, i)
    LivestockValue: float   # total value of livestock herd (Birr)
    TLU: float              # Livestock Standard Units (tropical livestock units)

  # income (#277): HH-level income-VALUE aggregates from the R5 (1999)
  # income module ({village}inc5.tab; only 4 of 7 villages have an inc5
  # file -- ars/deb/din/sid).  Pre-aggregated household income TOTALS +
  # major source subtotals, NOT item-level -- a documented HH-level (t,i)
  # variant.  i = the same packed 5-digit hhid as `livestock`.
  income:
    index: (t, i)
    TotalIncome: float      # total household income (Birr)
    CropIncome: float       # income from crop production/sales
    LivestockIncome: float  # income from livestock products/sales
    OffFarmIncome: float    # non-farm income
    WageIncome: float       # wage/labour income

  # consumption (#277): HH-level pre-aggregated consumption scalars for
  # 2004 (R6) and 2009 (R7).  The IFPRI archive has NO person roster and
  # NO item-level food for R6/R7 -- only these CONSTRUCTED aggregates --
  # so this is a documented HH-level (t,i) variant (cf. assets/livestock/
  # income), NOT food_acquired.  Source: the R6 *6-suffixed slice of
  # consumptionaggregates_123456.tab (R6-population = cons6 non-null,
  # 1368 HH) and consumptionAggrgates_r7.tab (2009, 1357 HH).  i =
  # composite (paid|pa, hhid) via the shared ethiopiarhs.i formatter
  # (hhid is NOT unique within a wave -> composite mandatory).  aeu* is
  # all-NaN in the 2004 source, so no AEU column.  Added to _no_v_join.
  consumption:
    index: (t, i)
    HouseholdSize: float    # hhsize6 / hhsize
    TotalConsumption: float # cons6 / cons7 (total real consumption, Birr)
    FoodConsumption: float  # food6 / food7
    RealConsumptionPC: float # rconspc6 / rconspc7 (real consumption per capita)
    FoodPriceIndex: float   # fpi6 / fpi7
    Poor: float             # poor6 / poorpc7 (poverty indicator)

  # hhsize (#277): 2009 (R7) HH-size summary from hhsize_round7.tab.
  # Documented HH-level (t,i) variant.  i = (pa, hhid).  Added to _no_v_join.
  hhsize:
    index: (t, i)
    HouseholdSize: float    # hhsize
    MaleHead: float         # malehead (1 = male-headed)

  # crop_production (#438, Tier-2): item-level HH x crop production.  The
  # ERHS area_output_* files are WIDE HH x crop AGGREGATES -- already summed
  # across plots, so there is NO plot dimension; this is the documented ERHS
  # reduced-grain variant ((t,i,j), not the canonical (t,i,plot,j)).  Per-
  # wave data_info extracts each round's {stub}_kg (production, kg) and
  # {stub}_ha (area, hectares) myvars; the `crop_production` df_edit hook in
  # _/ethiopiarhs.py melts them to long (i, j), maps the 9 crop stubs to
  # Preferred Labels (White/Black Teff, Barley, Wheat, Maize, Sorghum,
  # Coffee, Chat, Enset), sets u='Kg', and drops rows with neither metric.
  # The framework prepends t and joins v from sample() -> returned grain
  # (i, t, v, j, u).  SUBSUMES the retired (t,i) wide `area_output` table.
  #
  # WAVE COVERAGE: 1994a (R1), 1994b (R2, PRODUCTION ONLY -- no area in the
  # r2r3rev R2 columns), 1995 (R3), 1997 (R4), 2004 (R6), 2009 (R7, 6
  # CEREALS only -- no coffee/chat/enset).  1999 (R5) is DEFERRED: its
  # area_output_99 uses a packed-hhid keyspace with ~0.000 overlap vs the
  # 1999 composite sample (documented follow-up; do NOT wire it here).
  crop_production:
    # u is an INDEX level (grouping key), not a column -- see
    # SkunkWorks/grain_aggregation_policy.org.  Degenerate here (always 'Kg'),
    # but the canonical shape carries u in the index uniformly.
    index: (t, i, j, u)
    Quantity: float        # production, kg harvested
    Area_ha: float         # area planted, hectares (NaN for 1994b R2)

  # anthropometry (#438 Tier-2): individual (t, i, pid) body measures for
  # the four 1994-1997 rounds (R1-R4), from the pooled wide
  # Anthropometry_R1-R4.tab (each wave slices its round's height{r}/weight{r}/
  # age{r} columns; the `anthropometry` df_edit hook in _/ethiopiarhs.py drops
  # out-of-round all-NaN rows and converts age years -> Age_months).  Matches
  # the cross-country anthropometry schema (Ethiopia ESS / Malawi / Uganda):
  #   Weight (kg), Height (cm), Age_months, Sex (M/F via erhs_sex).
  # NO MUAC (ERHS records no mid-upper-arm circumference); the WHO z-scores
  # the source ships (haz/waz/whz) are query-time TRANSFORMS, never stored.
  # Grain (t, i, pid) aligns with household_roster's (i, pid); v auto-joins
  # from sample() at API time -> returned grain (t, i, v, pid).  Built via
  # the ERHS YAML + df_edit path (no materialize: make), like the rest of
  # this country's features.  DEFERRED: 1989 (no body-measure module) and
  # 1999/2004/2009 (R5-R7 not in Anthropometry_R1-R4.tab).
  anthropometry:
    index: (t, i, pid)
    Weight: float
    Height: float
    Age_months: float
    Sex: str

  # Mali-style clean YAML: extract wide per-source columns; the
  # `food_acquired` df_edit hook in _/ethiopiarhs.py melts them to
  # canonical long form on s. Price is API-derived (food_prices).
  #
  # GRAIN (GH #323).  The ERHS q36 food module is a ONE-ROW-PER-FOOD-ITEM
  # roster: all 27 source columns were enumerated and there is NO line /
  # transaction / occasion / visit identifier (q36_1a is a section flag, not a
  # line number).  So (t,i,j,u,s) IS the maximal grain the instrument supports
  # -- there is no finer axis to name, and none should be invented.
  #
  # The roster nevertheless carries MULTIPLE LINES per (i,j).  Most differ in
  # UNIT (u is in the index, so they do not collide).  Of the rest, 127 rows
  # across 1994a-1997 are a second acquisition of the SAME item, in the SAME
  # unit, from the SAME source, carrying DIFFERENT measurements (e.g. 1997 hh
  # 10_93 produced Berbere 1.0 kg AND 30.0 kg).  Those are real quantities, and
  # core ALREADY sums them: `food_acquired` is in feature.py's
  # `_ADDITIVE_MEASURE_COLUMNS`, so the collapse to the canonical grain SUMs
  # Quantity and Expenditure.  Nothing needs declaring here.
  #
  # But `sum` DOUBLE-COUNTS a row punched twice.  So the `food_acquired` hook in
  # _/ethiopiarhs.py drops rows that are indistinguishable in the canonical
  # grain (`_drop_double_punched`) BEFORE the framework sums: 90 rows, 514.9
  # Quantity and 343.1 Birr of pure overstatement.  The dedup is what makes the
  # (already unconditional) sum correct.
  food_acquired:
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float

  # plot_features (#278, under #167): LASTING plot/parcel characteristics
  # of the household's farmland.  One row per plot -- MULTIPLE PLOTS PER
  # HOUSEHOLD (mean ~3.9, max 29).  WIRED for 1994a (R1) only, from the
  # conversion-applied R1 land section land1all.tab (clean YAML, code-
  # based, i=[q1c,q5], plot_id=q21_1; see 1994a/_/data_info.yml).  Area
  # is in HECTARES (pre-computed in-file); AreaUnit carries the native
  # local unit label; Tenure is mapped to the canonical plot_features
  # spellings.  v (peasant association) is auto-joined by
  # _join_v_from_sample() at API time, so it is NOT in the index --
  # canonical (t, v, i, plot_id) less the framework-joined v.
  #
  # DEFERRED (no plot_features yet): 1989 (no plot roster in the IFPRI
  # Dataverse archive -- HH x crop only), 1994b/1995/1997 (R2-R4 raw
  # plot sections present but unwired -- R2/R4 are multi-file/script-path,
  # R3 needs a composite plot_id formatter), and 1999/2004/2009 (R5-R7,
  # only pre-aggregated HH x crop area_output_* -- no raw plot rows).
  # See slurm_logs/DESIGN_erhs_plot_features_2026-05-20.org.
  plot_features:
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    SoilType: str
    Irrigated: bool

  # Sampling design.  ERHS is a PURPOSIVE 15-village longitudinal
  # panel, not a weighted national sample -- there are no survey *design*
  # weights, so weight/panel_weight are set to a UNIFORM 1.0
  # (self-weighting: each HH counts once -> unweighted means; does NOT
  # break weighted-aggregation code the way NaN would).  These are
  # explicitly NOT expansion factors; sourcing any constructed ERHS
  # weights remains a documented follow-up.  is_this_feature_sane emits
  # only a constant-column *warning* (weight/panel_weight = 1, Rural =
  # 'Rural' since every ERHS HH is rural -- a true survey property).
  # v = peasant association (village).  Sources are per-person (1989-1999)
  # or the HH-level aggregate file (2004/2009); the `sample`/
  # `cluster_features` df_edit hooks in _/ethiopiarhs.py dedup to grain.
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    Woreda: str
    Rural: str

  # community_prices (#438 / #275): PA-level SURVEYED food prices (an
  # independent price series, distinct from the household food_acquired unit
  # values).  Cluster-level (t, v, j, u) -- v IS in the index (no household i,
  # no _join_v_from_sample).  Script-path (materialize: make): the country
  # _/community_prices.py reads the three dedicated ERHS price instruments and
  # writes var/community_prices.parquet:
  #   price1234_rev (R1-R4, WOREDA-level p_r1..p_r4, broadcast to PAs),
  #   rd6_kgpr_Mkt (R6/2004, PA-level kg_pr6), price2009 (R7/2009, price_r7).
  # All price-per-KG -> u='Kg'.  j = harmonize_community_food Preferred Label
  # (DRAFT; aligned with harmonize_food so prices join food_acquired /
  # crop_production on j).  REPORTED prices only -- unmapped item codes
  # (high aggregate codes) and non-positive prices are dropped.  Resolves #275.
  community_prices:
    index: (t, v, j, u)
    Price: float
    materialize: make

  panel_ids: !make
