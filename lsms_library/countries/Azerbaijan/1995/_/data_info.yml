Country: Azerbaijan
Wave: 1995
household_roster:
    file:
        - ../Data/A01A.dta
    idxvars:
        v: ppid
        i: hid
        pid: pid
    myvars:
        Sex:
            - sex
            - mapping:
                1: M
                2: F
        Age: agey
        Relationship:
            - rel
            - mapping:
                1: Head
                2: Spouse
                3: Son/Daughter
                4: Father/Mother
                5: Brother/Sister
                6: Nephew/Niece
                7: Aunt/Uncle
                8: Grandchild
                9: Grandfather/Grandmother
                10: Cousin
                11: Other relative
                12: Not related
                13: Lodger
                14: Other

cluster_features:
    file: ../Data/APP1.dta
    idxvars:
        v: ppid
    myvars:
        Rural:
            - inout
            - mapping:
                1.0: Urban
                2.0: Urban
                3.0: Urban
                4.0: Rural

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: ../Data/A00.dta
        idxvars:
            i: [ppid, hid]
            v: ppid
        myvars: {}  # interview_date is not declared in data_scheme; stray
                    # `int_t: dayint` removed (GH #163 item 1).
    df_weights:
        file: ../Data/PP.dta
        idxvars:
            v: ppid
        myvars:
            weight: w
    merge_on:
        - v
    final_index:
        - i
        - t