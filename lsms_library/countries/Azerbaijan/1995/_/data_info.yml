Country: Azerbaijan
Wave: 1995
household_roster:
    file:
        - ../Data/A01A.dta
    idxvars:
        v: ppid
        i: [ppid, hid]
        pid: pid
    myvars:
        Sex:
            - sex
            - mapping:
                1: M
                2: F
        Age: agey
        Relationship:
            - rel
            - mapping:
                1: Head
                2: Spouse
                3: Son/Daughter
                4: Father/Mother
                5: Brother/Sister
                6: Nephew/Niece
                7: Aunt/Uncle
                8: Grandchild
                9: Grandfather/Grandmother
                10: Cousin
                11: Other relative
                12: Not related
                13: Lodger
                14: Other

cluster_features:
    file: ../Data/APP1.dta
    idxvars:
        v: ppid
    myvars:
        Rural:
            - inout
            - mapping:
                1.0: Urban
                2.0: Urban
                3.0: Urban
                4.0: Rural

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: ../Data/A00.dta
        idxvars:
            i: [ppid, hid]
            v: ppid
        myvars: {}  # interview_date is not declared in data_scheme; stray
                    # `int_t: dayint` removed (GH #163 item 1).
    df_weights:
        file: ../Data/PP.dta
        idxvars:
            v: ppid
        myvars:
            weight: w
    merge_on:
        - v
    final_index:
        - i
        - t

individual_education:
    # Education module A03.dta; attainment code `diploma` (Soviet-era levels 1-13).
    file:
        - ../Data/A03.dta
    idxvars:
        i: [ppid, hid]
        pid: pid
    myvars:
        Educational Attainment: diploma

interview_date:
    # Cover module A00.dta; Int_t from dayint/moint/yrint (yrint 2-digit ->
    # +1900) via mapping.py:Int_t. i=[ppid,hid] matches roster. ~99.9% coverage.
    file:
        - ../Data/A00.dta
    idxvars:
        i: [ppid, hid]
    myvars:
        Int_t:
            - dayint
            - moint
            - yrint

housing:
    # Dwelling module: A02A.dta (rooms, area, dwelling-type code `dom`) and
    # A02B.dta (water/electricity/cooking/heating/lighting + tenure `ownhh`).
    # Both keyed on (ppid, hid) -> composite i via mapping.py:i; merged on i.
    # Codes carry no value labels in the .dta; names taken from the household
    # questionnaire (queshhe.pdf, Section 2 DWELLING).
    dfs:
        - df_a
        - df_b
    df_a:
        file: ../Data/A02A.dta
        idxvars:
            i: [ppid, hid]
        myvars:
            Rooms: rooms
            Area: area
            DwellingType:
                - dom
                - mapping:
                    1.0: One Family House
                    2.0: Separate Apartment
                    3.0: Communal Apartment
                    4.0: Several Buildings Connected
                    5.0: Several Separate Buildings
                    6.0: Room In A Hostel
                    7.0: Place In A Hostel
                    8.0: Other
    df_b:
        file: ../Data/A02B.dta
        idxvars:
            i: [ppid, hid]
        myvars:
            Water:
                - water
                - mapping:
                    1.0: Centralized Water Pipe
                    2.0: Own System Of Water Supply
                    3.0: Well
                    4.0: River/Lake/Spring/Pond
                    5.0: Rainwater
                    6.0: Other
            Electricity:
                - light
                - mapping:
                    1.0: Electricity
                    2.0: Kerosene/Oil/Gas Lamps
                    3.0: Candles Or Battery Flashlights
                    4.0: No Lighting
            Cooking:
                - cook
                - mapping:
                    1: Gas
                    2: Electricity
                    3: Wood
                    4: Coal
                    5: Kerosene
                    6: Other
                    7: Do Not Cook At Home
            Heating:
                - heat
                - mapping:
                    1.0: Centralized Heating
                    2.0: Water Radiators From Gas Or Coal Boiler
                    3.0: Electric Heaters
                    4.0: Coal Stove
                    5.0: Wood Stove
                    6.0: Stove Burning Straw/Weeds/Manure
                    7.0: Other
            Tenure:
                - ownhh
                - mapping:
                    1.0: owned
                    2.0: not_owned_privatizable
                    3.0: not_owned_non_privatizable
    merge_on:
        - i
    final_index:
        - i
        - t