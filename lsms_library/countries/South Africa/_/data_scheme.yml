Country: South Africa

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    # DECLARED REDUCTION (GH #323).  The 1993 source, Data/STRATA2.dta, is a
    # HOUSEHOLD-level stratification file: 8809 rows, `hhid` unique, carrying
    # 355 distinct `clustnum`.  cluster_features is by contract a CLUSTER-level
    # table -- Region and Rural are both cluster attributes -- so reading it out
    # of a household file is inherently many-to-one (mean 24.8 households per
    # cluster, range 3-120).  1993/_/data_info.yml therefore keeps `i: hhid` in
    # idxvars to NAME the level that is collapsed away, and the policy below
    # states how.
    #
    # Reducer `unique` = ASSERT-CONSTANT: Region/Rural must hold exactly one
    # distinct value per (t, v), else the build RAISES.  Verified on the raw
    # source: across all 355 clusters, `newprov` and `type` each have
    # nunique == 1 -- 0/355 vary -- so groupby().first() is byte-identical to a
    # full drop_duplicates (355 rows, .equals() == True) and the collapse is
    # LOSSLESS.  `first` would give the right answer here only by accident of
    # the data being clean; `unique` makes that accident a checked invariant, so
    # a future wave (or a source revision) in which a cluster's attributes DO
    # vary fails loudly instead of silently discarding one of them.
    index: (t, v)
    Region: str
    Rural: str
    aggregation:
      i: unique

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  assets:
    # 1993 module M2_NFS4 records only count-owned (dura_n); no value or
    # age in this instrument, so only Quantity is declared.
    index: (t, i, j)
    Quantity: float

  housing:
    # 1993 dwelling characteristics merged from S4_HSV1 (structure/tenure)
    # and S3_HSV2 (water/toilet) on hhid. All material/service values are
    # human-readable names decoded from the SALDRU PSLSD 1993 codebook;
    # Rooms is the integer total room count.
    index: (t, i)
    Roof: str
    Walls: str
    Floor: str
    Rooms: int
    Tenure: str
    Water: str
    Toilet: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  interview_date:
    index: (t, i)
    Int_t: datetime

  life_satisfaction:
    # 1993 S5_PQL.dta (Section 9 'Perceived Quality of Life'), one row per
    # household.  Only the overall satisfaction item `satisfie` is a genuine
    # satisfaction rating (-> Domain='Overall'); safety/crime/priorities/
    # comparison items in the same module are deliberately excluded.  Built
    # by the wave script 1993/_/life_satisfaction.py (constant Domain level +
    # WIDE->LONG reshape need a script, not YAML).
    index: (t, i, Domain)
    Satisfaction: str
    materialize: make
