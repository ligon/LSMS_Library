Country: South Africa

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    Rural: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  assets:
    # 1993 module M2_NFS4 records only count-owned (dura_n); no value or
    # age in this instrument, so only Quantity is declared.
    index: (t, i, j)
    Quantity: float

  housing:
    # 1993 dwelling characteristics merged from S4_HSV1 (structure/tenure)
    # and S3_HSV2 (water/toilet) on hhid. All material/service values are
    # human-readable names decoded from the SALDRU PSLSD 1993 codebook;
    # Rooms is the integer total room count.
    index: (t, i)
    Roof: str
    Walls: str
    Floor: str
    Rooms: int
    Tenure: str
    Water: str
    Toilet: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  interview_date:
    index: (t, i)
    Int_t: datetime
