Country: South Africa
Wave: 1993

sample:
    file:
        - ../Data/STRATA2.dta
    idxvars:
        i: hhid
    myvars:
        v: clustnum
        weight: rcweight
        panel_weight: rcweight
        strata: newprov
        Rural:
            - type
            - mapping:
                0: Urban
                1: Rural
                3: Informal

cluster_features:
    file:
        - ../Data/STRATA2.dta
    idxvars:
        v: clustnum
        i: hhid
    myvars:
        Region: newprov
        Rural:
            - type
            - mapping:
                0: Urban
                1: Rural
                3: Informal

household_roster:
    file:
        - ../Data/M8_HROST.dta
    idxvars:
        v: clustnum
        i: hhid
        pid: pcode
    myvars:
        Sex:
            - gender_c
            - mapping:
                '-1': ~      # sentinel for missing — null out
        Age:
            - age
            - mapping:
                -4: ~          # sentinel for missing — null out
                -3: ~          # sentinel for missing — null out
                -1: ~          # sentinel for missing — null out
        Relationship:
            - rel_head
            - mapping:
                '-1': ~        # sentinel for missing — null out
                1: "Resident Head"
                2: "Absent Head"
                3: "Wife or husband or partner"
                4: "Son or daughter"
                5: "Father or mother"
                6: "Grandchild"
                7: "Grandparent"
                8: "Mother- or father-in-law"
                9: "Son- or daughter-in-law"
                10: "Brother- or sister-in-law"
                11: "Aunt or uncle"
                12: "Sister or brother"
                13: "Niece or nephew"
                14: "Cousin"
                15: "Great-grandparent"
                16: "Household help (or relative of)"
                17: "Lodger or relative of lodgers"
                18: "Other family"
                19: "Other non-family"

individual_education:
    file:
        - ../Data/M8_HROST.dta
    idxvars:
        v: clustnum
        i: hhid
        pid: pcode
    myvars:
        Educational Attainment:
            - educ_c
            - mapping:
                # SALDRU PSLSD 1993 educ_c: highest education completed.
                # No value labels in source (.dta int codes); decoded from
                # the pre-1994 South African schooling ladder.
                -4: ~          # sentinel for missing — null out
                -3: ~          # sentinel for missing — null out
                -1: ~          # sentinel for missing — null out
                0: "None"
                1: "Sub A (Grade 1)"
                2: "Sub B (Grade 2)"
                3: "Standard 1 (Grade 3)"
                4: "Standard 2 (Grade 4)"
                5: "Standard 3 (Grade 5)"
                6: "Standard 4 (Grade 6)"
                7: "Standard 5 (Grade 7)"
                8: "Standard 6 (Grade 8)"
                9: "Standard 7 (Grade 9)"
                10: "Standard 8 (Grade 10)"
                11: "Standard 9 (Grade 11)"
                12: "Standard 10 (Matric, Grade 12)"
                13: "Diploma/certificate with less than Standard 10"
                14: "Diploma/certificate with Standard 10"
                15: "Degree"
                16: "Postgraduate degree or diploma"
                17: "Other"
                18: "Don't know"
                19: "Adult education / literacy"

assets:
    # Durable-goods module M2_NFS4.dta: Quantity (dura_n, count owned) per item
    # (dura_c, 11 codes). No value/age in this instrument -> Quantity-only.
    # ~10 rows carry dura_n<=0 (data artifacts; left as-is).
    file:
        - ../Data/M2_NFS4.dta
    idxvars:
        i: hhid
        j: dura_c
    myvars:
        Quantity: dura_n