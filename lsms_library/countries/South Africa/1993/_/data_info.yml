Country: South Africa
Wave: 1993

sample:
    file:
        - ../Data/STRATA2.dta
    idxvars:
        i: hhid
    myvars:
        v: clustnum
        weight: rcweight
        panel_weight: rcweight
        strata: newprov
        Rural:
            - type
            - mapping:
                0: Urban
                1: Rural
                3: Informal

cluster_features:
    file:
        - ../Data/STRATA2.dta
    idxvars:
        v: clustnum
        i: hhid
    myvars:
        Region: newprov
        Rural:
            - type
            - mapping:
                0: Urban
                1: Rural
                3: Informal

household_roster:
    file:
        - ../Data/M8_HROST.dta
    idxvars:
        v: clustnum
        i: hhid
        pid: pcode
    myvars:
        Sex:
            - gender_c
            - mapping:
                '-1': ~      # sentinel for missing — null out
        Age:
            - age
            - mapping:
                -4: ~          # sentinel for missing — null out
                -3: ~          # sentinel for missing — null out
                -1: ~          # sentinel for missing — null out
        Relationship:
            - rel_head
            - mapping:
                '-1': ~        # sentinel for missing — null out
                1: "Resident Head"
                2: "Absent Head"
                3: "Wife or husband or partner"
                4: "Son or daughter"
                5: "Father or mother"
                6: "Grandchild"
                7: "Grandparent"
                8: "Mother- or father-in-law"
                9: "Son- or daughter-in-law"
                10: "Brother- or sister-in-law"
                11: "Aunt or uncle"
                12: "Sister or brother"
                13: "Niece or nephew"
                14: "Cousin"
                15: "Great-grandparent"
                16: "Household help (or relative of)"
                17: "Lodger or relative of lodgers"
                18: "Other family"
                19: "Other non-family"

individual_education:
    file:
        - ../Data/M8_HROST.dta
    idxvars:
        v: clustnum
        i: hhid
        pid: pcode
    myvars:
        Educational Attainment:
            - educ_c
            - mapping:
                # SALDRU PSLSD 1993 educ_c: highest education completed.
                # No value labels in source (.dta int codes); decoded from
                # the pre-1994 South African schooling ladder.
                -4: ~          # sentinel for missing — null out
                -3: ~          # sentinel for missing — null out
                -1: ~          # sentinel for missing — null out
                0: "None"
                1: "Sub A (Grade 1)"
                2: "Sub B (Grade 2)"
                3: "Standard 1 (Grade 3)"
                4: "Standard 2 (Grade 4)"
                5: "Standard 3 (Grade 5)"
                6: "Standard 4 (Grade 6)"
                7: "Standard 5 (Grade 7)"
                8: "Standard 6 (Grade 8)"
                9: "Standard 7 (Grade 9)"
                10: "Standard 8 (Grade 10)"
                11: "Standard 9 (Grade 11)"
                12: "Standard 10 (Matric, Grade 12)"
                13: "Diploma/certificate with less than Standard 10"
                14: "Diploma/certificate with Standard 10"
                15: "Degree"
                16: "Postgraduate degree or diploma"
                17: "Other"
                18: "Don't know"
                19: "Adult education / literacy"

assets:
    # Durable-goods module M2_NFS4.dta: Quantity (dura_n, count owned) per item
    # (dura_c, 11 codes). No value/age in this instrument -> Quantity-only.
    # ~10 rows carry dura_n<=0 (data artifacts; left as-is).
    file:
        - ../Data/M2_NFS4.dta
    idxvars:
        i: hhid
        j: dura_c
    myvars:
        Quantity: dura_n

housing:
    # Dwelling characteristics from two modules merged on hhid:
    #   S4_HSV1.dta -> Roof (roof1_c), Walls (wall1_c), Floor (floor1_c),
    #                  Rooms (rooms_to), Tenure (ownship_)
    #   S3_HSV2.dta -> Water (wsource_), Toilet (toilet_c)
    # All characteristic columns are unlabelled int codes; names decoded from
    # the SALDRU PSLSD 1993 questionnaire (Documentation/za94hh85_V2.pdf,
    # Section 2.1 Q2/Q5, Section 2.2 Q2, Section 2.3 Q1).
    # Roof/Walls/Floor share one material code list (1-16); codes 11 (Carpet)
    # and 12 (Linoleum) appear only for Floor in the data. -1/-3 = missing.
    dfs:
        - df_struct
        - df_services
    df_struct:
        file: ../Data/S4_HSV1.dta
        idxvars:
            i: hhid
        myvars:
            Roof:
                - roof1_c
                - mapping: &material
                    -3: ~
                    -1: ~
                    1: Bricks
                    2: Cement Block
                    3: Pre-fab
                    4: Corrugated Iron
                    5: Wood
                    6: Plastic
                    7: Cardboard
                    8: Mixture of Mud and Cement
                    9: Wattle and Daub
                    10: Tile
                    11: Carpet
                    12: Linoleum
                    13: Mud
                    14: Thatching
                    15: Asbestos
                    16: Other
            Walls:
                - wall1_c
                - mapping: *material
            Floor:
                - floor1_c
                - mapping: *material
            Rooms:
                - rooms_to
                - mapping:
                    -3: ~
                    -1: ~
            Tenure:
                - ownship_
                - mapping:
                    -1: ~
                    1: Owned
                    2: Not owned
    df_services:
        file: ../Data/S3_HSV2.dta
        idxvars:
            i: hhid
        myvars:
            Water:
                - wsource_
                - mapping:
                    -1: ~
                    1: Piped - internal
                    2: Piped - yard tap
                    3: Water carrier/tanker
                    4: Piped - public tap/kiosk (free)
                    5: Piped - public tap/kiosk (paid)
                    6: Borehole
                    7: Rainwater tank
                    8: Flowing river/stream
                    9: Dam/stagnant water
                    10: Well (non-borehole)
                    11: Protected spring
                    12: Other
            Toilet:
                - toilet_c
                - mapping:
                    -1: ~
                    1: Flush toilet
                    2: Improved pit latrine (VIP)
                    3: Other pit latrine
                    4: Bucket toilet
                    5: Chemical toilet
                    6: None
    merge_on:
        - i
    final_index:
        - i
        - t

interview_date:
    # Cover page S4_HDEF.dta; Int_t built from year1/month1/day1 (year1 is a
    # 2-digit offset from 1900) via mapping.py:Int_t. 100% coverage.
    file:
        - ../Data/S4_HDEF.dta
    idxvars:
        i: hhid
    myvars:
        Int_t:
            - year1
            - month1
            - day1
