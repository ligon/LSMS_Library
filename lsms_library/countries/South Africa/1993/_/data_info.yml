Country: South Africa
Wave: 1993

sample:
    file:
        - ../Data/STRATA2.dta
    idxvars:
        i: hhid
    myvars:
        v: clustnum
        weight: rcweight
        panel_weight: rcweight
        strata: newprov
        Rural:
            - type
            - mapping:
                0: Urban
                1: Rural
                3: Informal

cluster_features:
    file:
        - ../Data/STRATA2.dta
    idxvars:
        v: clustnum
        i: hhid
    myvars:
        Region: newprov
        Rural:
            - type
            - mapping:
                0: Urban
                1: Rural
                3: Informal

household_roster:
    file:
        - ../Data/M8_HROST.dta
    idxvars:
        v: clustnum
        i: hhid
        pid: pcode
    myvars:
        Sex:
            - gender_c
            - mapping:
                '-1': ~      # sentinel for missing — null out
        Age: age
        Relationship: 
            - rel_head
            - mapping:
                1: "Resident Head"
                2: "Absent Head"
                3: "Wife or husband or partner"
                4: "Son or daughter"
                5: "Father or mother"
                6: "Grandchild"
                7: "Grandparent"
                8: "Mother- or father-in-law"
                9: "Son- or daughter-in-law"
                10: "Brother- or sister-in-law"
                11: "Aunt or uncle"
                12: "Sister or brother"
                13: "Niece or nephew"
                14: "Cousin"
                15: "Great-grandparent"
                16: "Household help (or relative of)"
                17: "Lodger or relative of lodgers"
                18: "Other family"
                19: "Other non-family"