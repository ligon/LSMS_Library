Country: Burkina Faso

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude:
      type: float
      optional: true
    Longitude:
      type: float
      optional: true

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  panel_ids:
    index: (t, i)
    previous_i: str
    materialize: make

  food_acquired:
    index: (t, visit, i, j, u)
    Quantity: float
    Expenditure: float
    Produced: float
  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  interview_date:
    index: (t, i)
    int_t: datetime

  food_expenditures: !make
  food_prices: !make
  food_quantities: !make
