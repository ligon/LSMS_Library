Country: Burkina Faso

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude:
      type: float
      optional: true
    Longitude:
      type: float
      optional: true

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  subjective_well_being:
    # Cantril-style self-placement ladder from EHCVM Section 20
    # ('Pauvreté relative').  The ladder item is s20q05 (2018-19) /
    # s20aq05 (2021-22; §20 was split into sub-modules A/B/C in the
    # 2021 instrument, A = relative poverty).  4-point categorical scale
    # mapped higher = better off, consistent with Malawi/Cantril:
    # Très pauvre=1, Pauvre=2, Moyen=3, Riche=4; Ne sait pas / Refus /
    # NaN -> NaN.  EHCVM asks only the own-placement item, so unlike
    # Malawi there are no Neighbors/Friends Step columns.
    index: (t,i)
    Own Step: int

  panel_ids:
    index: (t, i)
    previous_i: str
    materialize: make

  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind / other).  EHCVM 2018-19
    # and 2021-22 wave mapping.py files import
    # food_acquired_to_canonical as food_acquired to reshape the
    # wide-form (Quantity-total, Produced-subset, Expenditure) into
    # long-form on s.  `visit` (vague) is dropped: in EHCVM it's a
    # sample split, not a repeated measure.
    #
    # The 2014 wave (which the country module emits as t='2013_Q4' via
    # the country-level food_acquired.py script) is Phase-2-incomplete:
    # it follows the legacy script-path build that bypasses mapping.py
    # post-processors, so the helper isn't invoked.  Pending a Phase 3
    # rewrite of Burkina_Faso/2014/_/food_acquired.py (or the country-
    # level food_acquired.py) to emit canonical shape, t='2013_Q4'
    # continues to emit a legacy non-canonical shape.  Country
    # ('Burkina_Faso').food_acquired() runtime output mixes shapes
    # across waves until that lands.
    index: (t, v, i, j, u, s)
    Quantity: float
    Expenditure: float
  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  plot_features:
    # Lasting parcel-level characteristics from the EHCVM agriculture
    # module s16a (GH #167; copied from the Mali EHCVM reference, PR
    # #284).  EHCVM waves only: 2018-19 and 2021-22.  The pre-EHCVM 2014
    # EMC wave uses a different instrument and is out of scope.
    # plot_id = "{field_no}_{parcel_no}".  Latitude / Longitude are NOT
    # emitted — EHCVM s16a has no decimal-degree parcel GPS (s16aq47 is
    # an area, not a coordinate); deferred as in Uganda.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    SoilType: str
    Irrigated: bool
    materialize: make

  food_security:
    # FAO 8-item Food Insecurity Experience Scale (FIES) from EHCVM
    # Section 8A 'Sécurité alimentaire'.  s08aq01..s08aq08 map IN ORDER
    # to the 8 canonical FAO items (Worried..WholeDay); Oui->True,
    # Non->False, 'Ne sait pas'/'Refus'/NaN->NaN.  Recall period: last
    # 12 months.  FIES_score = count of True across the 8 items (NaN
    # only if all 8 are NaN), computed in each wave's food_security()
    # post-processor in mapping.py.  Both EHCVM waves (2018-19, 2021-22)
    # use s08a_me_bfa<YYYY>.dta with identical structure; the §20->§20a
    # sub-module split did NOT extend to §8.
    index: (t, i)
    Worried: bool
    HealthyDiet: bool
    FewFoods: bool
    SkippedMeal: bool
    AteLess: bool
    RanOut: bool
    Hungry: bool
    WholeDay: bool
    FIES_score: int

  food_coping:
    # Reduced Coping Strategies Index (rCSI).  2014 EMC wave ONLY (Part 3
    # "Sécurité alimentaire", emc2014_p3_securitealimentaire_27022015.dta).
    # The EHCVM waves (2018-19, 2021-22) field FIES instead -> food_security.
    # Items SA2A..SA2E ask "au cours des 7 derniers jours, combien de jours
    # [...] avez-vous dû [...]" -- a day-count 0-7.  WIDE->LONG: one
    # (t, i, Strategy) row per strategy.  SA2A..SA2E map IN ORDER to
    # LessPreferred / LimitPortion / ReduceMeals / RestrictAdults / BorrowFood.
    # The Stata labels are all truncated to an identical 80-char prefix, but the
    # a-e attribution is VERIFIED against the WB EMC 2014 Passage-3 questionnaire
    # (catalog 2538, section SA): A "aliments moins chers", B "réduire les
    # quantités consommées", C "réduire le nombre de repas", D "réduire les
    # quantités des adultes au profit des enfants", E "emprunter de la
    # nourriture".  (Matches the Mali EACI / Malawi IHS peer surveys.)
    # HOUSEHOLD-level; i = the 2014 roster i (format_id(zd)+format_id(menage,3)).
    index: (t, i, Strategy)
    Days: int
    materialize: make

  months_food_inadequate:
    # Months of inadequate food provisioning in the last 12.  2014 EMC wave
    # ONLY (Part 3 "Sécurité alimentaire",
    # emc2014_p3_securitealimentaire_27022015.dta).  SA4 ("au cours des 12
    # derniers mois, avez-vous fait face à une situation où vous n'aviez pas
    # assez de nourriture", Oui/Non) gates the SA5A..SA5L which-months battery
    # (12 Oui/Non flags, Juillet 2013..Juillet 2014).  MonthsInadequate =
    # count of SA5 'Oui' where SA4=Oui; 0 where SA4=Non; NaN where SA4 NaN.
    # AnyInadequate = MonthsInadequate > 0.  HOUSEHOLD-level; i = the 2014
    # roster i.  The EHCVM waves field FIES (food_security), not this battery.
    index: (t, i)
    MonthsInadequate: int
    AnyInadequate: bool
    materialize: make

  interview_date:
    index: (t, i, visit)
    Interview start: datetime
    Interview end: datetime
    aggregation:
      visit: first

  crop_production:
    # Item-level crop harvest (GAP 1; EHCVM parity loop 2026-06-15, cloned
    # self-contained from Niger).  One row per REPORTED (field, parcel,
    # crop) harvest line — REPORTED values only (harvest_kg / yield /
    # main_crop are transformations, never columns).  2018-19 only: s16c
    # records harvest qty+unit (s16cq12a/b), sold qty (s16cq16a), sale
    # value (s16cq17) and the intercrop flag (s16cq07) at this plot-crop
    # grain.  crop joins food via harmonize_food Preferred Labels; u via
    # the u table; unmapped labels pass through unchanged.  u is in the
    # index because one (plot, crop) can be reported in several units.
    # plot = "{field_no}_{parcel_no}" aligns with plot_features' plot_id.
    # i is the canonical EHCVM id (burkina_faso.ehcvm_i: grappe + '0' +
    # 2-digit menage) reconciling 100% with sample().  harvest_month NA
    # (no planting/harvest-date question in s16c); intercropped from
    # s16cq07.
    index: (t, i, plot, crop, u)
    Quantity: float
    Quantity_sold: float
    Value_sold: float
    harvest_month:
      type: float
      optional: true
    intercropped: bool
    materialize: make

  plot_inputs:
    # Item-level agricultural inputs (GAP 2; EHCVM parity loop 2026-06-15,
    # cloned self-contained from Niger).  One row per REPORTED input
    # applied: input identity (Seed / Urea / DAP / NPK / Phosphate / Mixed
    # fertilizer / Organic manure / Organic compost / Pesticide / Herbicide
    # / Fungicide / Other phytosanitary), reported quantity used + native
    # unit, purchased flag + reported purchased quantity, and (seed rows)
    # the seed's crop on the shared harmonize_food labels.  REPORTED values
    # only.  Source s16b (2018-19) records inputs at the HOUSEHOLD x input
    # grain, NOT plot x input (no parcel-level input data); the GAP-2 name
    # `plot_inputs` is kept but `plot` is NOT in the index.  input ->
    # harmonize_input; u -> the u table; the EHCVM roster has no crop
    # column so seed crop is resolved from the seed label via
    # harmonize_seed_crop.  Non-crop-specific rows carry the sentinel
    # '(not crop-specific)' and a missing unit carries 'Manquant' — a NaN
    # index level would be dropped by the framework's canonical NaN-key
    # de-dup collapse.  i via burkina_faso.ehcvm_i (100% sample reconcile).
    # ENCODING: s16b read default (utf-8) so accented labels match the maps.
    index: (t, i, input, crop, u)
    Quantity: float
    Purchased: bool
    Quantity_purchased: float
    materialize: make

  livestock:
    # Item-level livestock roster (GAP 4; EHCVM parity loop 2026-06-15,
    # cloned self-contained from Niger).  One row per REPORTED (household,
    # species) owned — the pre-collapse roster (the WB engaged-in-livestock
    # binary is groupby(['t','i']).any() over these rows; TLU is a
    # Σ(head × factor) transform — neither is a column here).  GRAIN
    # (t, i, animal) — NO v level ('livestock' is in the framework
    # _no_v_join set).  `animal` is the harmonize_species_ehcvm Preferred
    # Label (s17q02 codes 1-11 -> Cattle / Sheep / Goats / Camels / Horses
    # / Donkeys / Pigs / Rabbits / Chicken / Guinea Fowl / Other Poultry).
    # 2018-19 only: s17q06 head owned, s17q08 bought (HeadAcquired), s17q10
    # sold; roster pre-filtered to owned species (s17q03==1).  No herd
    # Value column (s17 records only purchase/sale FLOW values).
    #
    # I-KEY FIX (2026-06-15): the original (un-merged) livestock draft used
    # the older burkina_faso.i() (grappe + 3-digit menage) which collides
    # for the ~17% of households with a 3-digit menage, stranding them off
    # sample() (83.4% i-key).  This build uses burkina_faso.ehcvm_i
    # (grappe + '0' + 2-digit menage) — the SAME format sample() uses —
    # giving 100% i-key ∩ sample.
    index: (t, i, animal)
    HeadCount: float
    HeadAcquired: float
    HeadSold: float
    materialize: make

  plot_labor:
    # Item-level plot labor (GAP 3; EHCVM parity loop 2026-06-15, cloned
    # self-contained from Niger).  One row per REPORTED labor SOURCE on a
    # plot (the WB total_*_labor_days / hired_labor_value sums are
    # transformations, never columns).  GRAIN (t, i, plot, source):
    # plot = "{field_no}_{parcel_no}" aligned with crop_production /
    # plot_features; source 'family' / 'hired' (EHCVM s16a records family
    # vs non-family only — no free/exchange 'other').  PersonDays is the
    # within-source sum of the member / gender-category / phase day cells
    # (EHCVM hired = Σ #workers × days); Wage is the cash paid to hired
    # labor (NaN for family).  i via burkina_faso.ehcvm_i (100% reconcile);
    # v joins from sample().  2018-19 only (s16a family grids s16aq33/35/37b
    # + hired grids s16aq39/41/43{a,b,c}).
    index: (t, i, plot, source)
    PersonDays: float
    Wage: float
    materialize: make

  people_last7days:
    # Item-level individual 7-day labor (GAP 3; EHCVM parity loop
    # 2026-06-15, cloned self-contained from Niger).  One row per
    # individual with the REPORTED last-7-days labor participation (this is
    # the (t, i, pid) per-individual feature, NOT Uganda's legacy HH-level
    # count).  GRAIN (t, i, pid): pid = s01q00a (matches household_roster);
    # i via burkina_faso.ehcvm_i (100% reconcile); v auto-joins from
    # sample().  COLUMNS: farm_work / SOB_work / wage_work (s04q06/07/08
    # 1=Oui/2=Non -> bool) and working_age (roster Age >= 6, Age from
    # s01q04a else 2018 - s01q03c birth year).  EHCVM's 7-day module
    # records no productive-work hours nor the WB 7-day industry section
    # code, so farm_hrs / SB_hrs / wage_hrs / Industry are NA (declared for
    # cross-country schema parity).  2018-19 only.
    index: (t, i, pid)
    farm_work: bool
    SOB_work: bool
    wage_work: bool
    farm_hrs: {type: float, optional: true}
    SB_hrs: {type: float, optional: true}
    wage_hrs: {type: float, optional: true}
    Industry: {type: str, optional: true}
    working_age: bool
    materialize: make

  food_expenditures: !make
  food_prices: !make
  food_quantities: !make
