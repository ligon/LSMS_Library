Country: Burkina Faso

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude:
      type: float
      optional: true
    Longitude:
      type: float
      optional: true

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  panel_ids:
    index: (t, i)
    previous_i: str
    materialize: make

  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind / other).  EHCVM 2018-19
    # and 2021-22 wave mapping.py files import
    # food_acquired_to_canonical as food_acquired to reshape the
    # wide-form (Quantity-total, Produced-subset, Expenditure) into
    # long-form on s.  `visit` (vague) is dropped: in EHCVM it's a
    # sample split, not a repeated measure.
    #
    # The 2014 wave (which the country module emits as t='2013_Q4' via
    # the country-level food_acquired.py script) is Phase-2-incomplete:
    # it follows the legacy script-path build that bypasses mapping.py
    # post-processors, so the helper isn't invoked.  Pending a Phase 3
    # rewrite of Burkina_Faso/2014/_/food_acquired.py (or the country-
    # level food_acquired.py) to emit canonical shape, t='2013_Q4'
    # continues to emit a legacy non-canonical shape.  Country
    # ('Burkina_Faso').food_acquired() runtime output mixes shapes
    # across waves until that lands.
    index: (t, v, i, j, u, s)
    Quantity: float
    Expenditure: float
  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  interview_date:
    index: (t, i)
    Int_t: datetime

  food_expenditures: !make
  food_prices: !make
  food_quantities: !make
