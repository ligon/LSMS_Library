food_security:
    # FAO 8-item FIES, EHCVM §8A.  s08aq01..08 -> Worried..WholeDay in
    # FAO order (verified from variable labels).  Oui->True, Non->False,
    # 'Ne sait pas'/'Refus'->NaN.  Recall: last 12 months.  s08aq07a/08a
    # are frequency follow-ups -- ignored for the binary scale.
    # FIES_score is computed in mapping.py's food_security() post-processor.
    file: s08a_me_bfa2018.dta
    idxvars:
        i:
            - grappe
            - menage
    myvars:
        Worried:
            - s08aq01
            - mapping: &fies_yn
                Oui: true
                Non: false
                Ne sait pas: null
                Refus: null
        HealthyDiet:
            - s08aq02
            - mapping: *fies_yn
        FewFoods:
            - s08aq03
            - mapping: *fies_yn
        SkippedMeal:
            - s08aq04
            - mapping: *fies_yn
        AteLess:
            - s08aq05
            - mapping: *fies_yn
        RanOut:
            - s08aq06
            - mapping: *fies_yn
        Hungry:
            - s08aq07
            - mapping: *fies_yn
        WholeDay:
            - s08aq08
            - mapping: *fies_yn

subjective_well_being:
    # EHCVM §20 'Pauvreté relative'.  s20q05 = self-placement on a
    # 4-point relative-wealth ladder.  Mapped higher = better off
    # (Très pauvre=1 ... Riche=4); Ne sait pas -> NaN.
    file: s20_me_bfa2018.dta
    idxvars:
        i:
            - grappe
            - menage
    myvars:
        Own Step:
            - s20q05
            - mapping:
                Très pauvre: 1
                Pauvre: 2
                Moyen: 3
                Riche: 4
                Ne sait pas: null
