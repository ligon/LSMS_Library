Country: Burkina Faso
Wave: 2021-22

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: s00_me_bfa2021.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
        myvars:
            Rural:
                - s00q04
                - mapping:
                    Rural: Rural
                    rural: Rural
                    RURAL: Rural
                    Urbain: Urban
                    urbain: Urban
                    URBAIN: Urban
    df_weights:
        file: ehcvm_panel_ponderations_bfa2021.dta
        idxvars:
            v: grappe
        myvars:
            weight: hhweight2021
            panel_weight: hhweight_panel
    merge_on:
        - v
    final_index:
        - i
        - t

household_roster:
    dfs:
        - df_main
        - df_cover
    df_main:
        file: s01_me_bfa2021.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
            pid: pid
        myvars:
            Sex: s01q01
            Relationship: s01q02
            Age:
                - s01q04a
                - s01q03a
                - s01q03b
                - s01q03c
            MonthsSpent:
                - s01q12
                - mapping:
                    Oui: 12
                    Non: 0
    df_cover:
        file: s00_me_bfa2021.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
        myvars:
            interview_date: s00q23a
    merge_on:
        - v
        - i
    final_index:
        - v
        - i
        - pid

individual_education:
    # EHCVM 2021-22: highest education attained = educ_hi.  This wave's
    # household_roster keys pid off a SCALAR `pid` column, and the individu
    # file carries the same scalar `pid`, so individual_education uses
    # `pid: pid` (scalar) to align (verified 22,362/22,362 individu keys
    # overlap the roster after format_id).  i = country i([grappe, menage]).
    file: ehcvm_individu_bfa2021.dta
    idxvars:
        v: grappe
        i:
            - grappe
            - menage
        pid: pid
    myvars:
        Educational Attainment: educ_hi

