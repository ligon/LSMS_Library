Country: Burkina Faso
Wave: 2014

household_roster:
    file: emc2014_p1_individu_27022015.dta
    idxvars:
        i:
            - zd
            - menage
        pid: numind
    myvars:
        Sex: B2
        Age: B4
        Relationship: B5

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: emc2014_p1_logement_27022015.dta
        idxvars:
            i: menage
            v: zd
        myvars:
            Region: region
            District: province
            Rural:
                - milieu
                - mapping:
                    Rural: Rural
                    rural: Rural
                    RURAL: Rural
                    Urbain: Urban
                    urbain: Urban
                    URBAIN: Urban
    df_geo:
        file: emc2014_agri_gps.dta
        idxvars:
            v: zd
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v

shocks:
    file: emc2014_p3_chocs_27022015.dta
    idxvars:
        i:
            - zd
            - menage
        Shock: CS0
    myvars:
        AffectedIncome:
            - CS3A
            - mapping:
                Diminué: True
                Augmenté: True
                Inchangé: False
                NA: False
        AffectedAssets:
            - CS3B
            - mapping:
                Diminué: True
                Augmenté: True
                Inchangé: False
                NA: False
        AffectedProduction:
            - CS3C
            - mapping:
                Diminué: True
                Augmenté: True
                Inchangé: False
                NA: False
        AffectedConsumption:
            - CS3D
            - mapping:
                Diminué: True
                Augmenté: True
                Inchangé: False
                NA: False
        HowCoped0: CS4A
        HowCoped1: CS4B
        HowCoped2: CS4C

assets:
    file: emc2014_p1_biensdurables_27022015.dta
    idxvars:
        i:
            - zd
            - menage
        j: code_article
    myvars:
        Quantity: pm2
        Age: pm3
        Value: pm5
        Purchase Price: pm4

food_acquired:
    idxvars:
        v: zd
        i:
            - zd
            - menage
        j:
            - product
            - mappings: ['harmonize_food', 'Original Label', 'Preferred Label']
        u:
            - uachat
            - mappings: ['unit', 'Original Label', 'Preferred Label']
    myvars:
        Quantity: qachat
        Expenditure: achat
        Produced: qautocons
    file:
        - emc2014_p1_conso7jours_16032015.dta
        - emc2014_p2_conso7jours_16032015.dta
        - emc2014_p3_conso7jours_16032015.dta
        - emc2014_p4_conso7jours_16032015.dta
