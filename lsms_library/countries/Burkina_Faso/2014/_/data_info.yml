Country: Burkina Faso
Wave: 2014

sample:
    file: emc2014_welfare.dta
    idxvars:
        i:
            - grappe
            - menage
    myvars:
        v: grappe
        weight: hhweight
        panel_weight: hhweight
        strata: strate
        Rural:
            - milieu
            - mapping:
                Rural: Rural
                rural: Rural
                RURAL: Rural
                Urbain: Urban
                urbain: Urban
                URBAIN: Urban

household_roster:
    file: emc2014_p1_individu_27022015.dta
    idxvars:
        i:
            - zd
            - menage
        pid: numind
    myvars:
        Sex: B2
        Age: B4
        Relationship: B5
        MonthsSpent: B3A

individual_education:
    # 2014 EMC: highest formal-education level attained is B14 ("Quel est le
    # degré de l'enseignement formel le plus élevé que [NOM] a suivi"), the
    # EMC analog of the EHCVM waves' educ_hi.  Read from the same person-level
    # file as the roster, so (i, pid) align with household_roster by
    # construction: i = country i([zd, menage]), pid = numind (scalar).
    file: emc2014_p1_individu_27022015.dta
    idxvars:
        i:
            - zd
            - menage
        pid: numind
    myvars:
        Educational Attainment:
            - B14
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: emc2014_p1_logement_27022015.dta
        idxvars:
            i: menage
            v: zd
        myvars:
            Region: region
            District: province
            Rural:
                - milieu
                - mapping:
                    Rural: Rural
                    rural: Rural
                    RURAL: Rural
                    Urbain: Urban
                    urbain: Urban
                    URBAIN: Urban
    df_geo:
        file: emc2014_agri_gps.dta
        idxvars:
            v: zd
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v

shocks:
    file: emc2014_p3_chocs_27022015.dta
    idxvars:
        i:
            - zd
            - menage
        Shock: CS0
    myvars:
        AffectedIncome:
            - CS3A
            - mapping:
                Diminué: True
                Augmenté: True
                Inchangé: False
                NA: False
        AffectedAssets:
            - CS3B
            - mapping:
                Diminué: True
                Augmenté: True
                Inchangé: False
                NA: False
        AffectedProduction:
            - CS3C
            - mapping:
                Diminué: True
                Augmenté: True
                Inchangé: False
                NA: False
        AffectedConsumption:
            - CS3D
            - mapping:
                Diminué: True
                Augmenté: True
                Inchangé: False
                NA: False
        HowCoped0: CS4A
        HowCoped1: CS4B
        HowCoped2: CS4C

assets:
    file: emc2014_p1_biensdurables_27022015.dta
    idxvars:
        i:
            - zd
            - menage
        j: code_article
    myvars:
        Quantity: pm2
        Age: pm3
        Value: pm5
        Purchase Price: pm4

housing:
    file: emc2014_p1_logement_27022015.dta
    idxvars:
        i:
            - zd
            - menage
    myvars:
        Roof:
            - L06
            - mapping:
                Paille/chaume: Thatch
                Terre: Earth
                Tôle: Iron Sheets
                Dale: Concrete Slab
                Tuile: Clay Tiles
                'Autre à préciser': Other
        Floor:
            - L07
            - mapping:
                Terre battue: Earth
                Sable: Sand
                Chape de ciment: Cement
                Carreau: Tiles
                Moquette: Carpet
                'Autre à préciser': Other

# food_acquired is built by the SCRIPT path (2014/_/food_acquired.py), NOT here.
#
# GH #323.  The four `emc2014_p{1..4}_conso7jours` files are the four quarterly
# PASSAGES of the EMC 2014 continuous survey over the SAME 10,800 households --
# four independent 7-day recalls, not one.  Listing them under a single `file:`
# key (as this block used to) gives every passage the same `t` and no index
# level to tell them apart, so all four collapse onto one (t,v,i,j,u,s) tuple
# and get SUMMED.  A YAML `file:` list cannot express a per-file index level;
# the script emits the `visit` (passage) level instead.
#
# The old block also mapped `u: uachat` / `Quantity: qachat` / `Produced:
# qautocons` -- columns that exist ONLY in passage 1.  p2/p3/p4 rows entered
# with u=NaN and were then DELETED outright by the duplicate-collapse groupby's
# dropna=True default (460,438 rows / 261.8M CFA).  See the script's docstring.
