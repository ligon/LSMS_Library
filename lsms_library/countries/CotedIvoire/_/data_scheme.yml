Country: CotedIvoire

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    Rural: str
    Latitude: float
    Longitude: float

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  subjective_well_being:
    index: (t, i)
    Own Step: int

  food_security:
    # FAO 8-item Food Insecurity Experience Scale (FIES).  EHCVM §8A
    # 'Sécurité alimentaire', recall period = last 12 months.
    index: (t, i)
    Worried: bool
    HealthyDiet: bool
    FewFoods: bool
    SkippedMeal: bool
    AteLess: bool
    RanOut: bool
    Hungry: bool
    WholeDay: bool
    FIES_score: int

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2:
      type: str
      optional: true

  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float

  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind / other).  The wave-level
    # mapping.py food_acquired() function reshapes the wide-form
    # (Quantity-total, Produced-subset, Expenditure) into long-form on s.
    # `visit` (vague) is dropped: in EHCVM 2018-19 it's a sample split
    # (each grappe surveyed in exactly one vague), not a repeated measure,
    # so households are uniquely keyed by (t, v, i, j, u, s) without it.
    index: (t, v, i, j, u, s)
    Quantity: float
    Expenditure: float

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  interview_date:
    index: (t, i)
    Int_t: datetime

  livestock:
    # Item-level livestock roster (GAP 4).  One row per REPORTED
    # (household, species) the household owns/raises, from EHCVM §17
    # 'Élevage' (s17_me_CIV2018.dta).  The roster is pre-filtered to owned
    # species (s17q03 == 1).  An engaged-in-livestock HH binary is
    # recoverable as groupby(['t','i']).any(); TLU is a Σ(head × factor)
    # transformation — neither is a column here (item-level / reported
    # discipline).
    #
    # GRAIN (t, i, animal) — NO v level: 'livestock' is in the framework's
    # _no_v_join set, so the household-level rows carry no cluster level and
    # the framework does NOT join one from sample().  `animal` is the
    # harmonized species Preferred Label (harmonize_species_ehcvm: codes
    # 1-11 -> Cattle / Sheep / Goats / Camels / Horses / Donkeys / Pigs /
    # Rabbits / Chicken / Guinea Fowl / Other Poultry).
    #
    # CotedIvoire predates the standard EHCVM list (CLAUDE.md): its
    # household id is format_id(grappe) + format_id(menage, zeropadding=3)
    # (e.g. '1003'), NOT the 'E_'+grappe+'0'+menage scheme the Niger/Mali/
    # Senegal EHCVM siblings use.  2018-19/_/livestock.py inlines that id
    # construction to match sample().i.
    #
    # COLUMNS (reported, item-level): HeadCount (owned now, s17q06),
    # HeadAcquired (number bought in the last 12 months, s17q08), HeadSold
    # (number sold on the hoof in the last 12 months, s17q10).  A `Value`
    # (herd value) column is OMITTED: EHCVM s17 records no current herd
    # value (only purchase / sale FLOW values).
    index: (t, i, animal)
    HeadCount: float
    HeadAcquired: float
    HeadSold: float
    materialize: make
