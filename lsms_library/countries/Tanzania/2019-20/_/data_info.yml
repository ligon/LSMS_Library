Country: Tanzania
Wave: 2019-20

cluster_features:
    # GH #323.  Region/District come from `t0_region` / `t0_district` -- the
    # location of the SDD FRAME household, i.e. of the cluster -- and NOT from
    # `hh_a01_1` / `hh_a02_1`, which this instrument asks ONLY OF MOVERS ("where
    # are you now?").  Reading the mover question was doubly wrong: it is null
    # for 89.9% of the households found at their ORIGINAL location (the ones
    # that actually describe the cluster) and non-null precisely for the ones
    # that left.  257 of 741 cluster-attribute cells were contested by it.
    #
    # `_frame` carries `sdd_cluster` purely so the df_edit hook can tell a FRAME
    # household from a SPLIT-OFF.  A split-off is a new household formed by
    # departing members; the SDD file leaves its `sdd_cluster` and `t0_*` blank
    # but still stamps it with a `clusterid`, and that clusterid is NOT its
    # sampling cluster -- among the 326 split-off rows it collects households
    # whose own strata span DAR ES SALAAM, DODOMA and ZANZIBAR under a single
    # DODOMA cluster code.  A split-off is evidence about itself, not about a
    # cluster.  Dropped by the hook.
    file: HH_SEC_A.dta
    idxvars:
        i: sdd_hhid
        v: clusterid
    myvars:
        Region: t0_region
        District: t0_district
        _frame: sdd_cluster
        _status: hh_tracking_status
        Rural:
            - sdd_rural
            - mapping:
                RURAL: Rural
                Rural: Rural
                rural: Rural
                URBAN: Urban
                Urban: Urban
                urban: Urban

household_roster:
    file: HH_SEC_B.dta
    idxvars:
        i: sdd_hhid
        pid: sdd_indid
    myvars:
        Sex: hh_b02
        Age: hh_b04
        Relationship: hh_b05
        MonthsAway: hh_b10

shocks:
    file: HH_SEC_R.dta
    idxvars:
        i: sdd_hhid
        Shock: shock_id
    myvars:
        AffectedIncome:
            - hh_r03
            - mapping:
                INCOME LOSS: True
                Income loss: True
                income loss: True
                ASSET LOSS: False
                Asset loss: False
                asset loss: False
                LOSS OF BOTH: True
                Loss of both: True
                loss of both: True
                NEITHER: False
                Neither: False
                neither: False
        AffectedAssets:
            - hh_r03
            - mapping:
                INCOME LOSS: False
                Income loss: False
                income loss: False
                ASSET LOSS: True
                Asset loss: True
                asset loss: True
                LOSS OF BOTH: True
                Loss of both: True
                loss of both: True
                NEITHER: False
                Neither: False
                neither: False
        HowCoped0: hh_r04_1
        HowCoped1: hh_r04_2

assets:
    file: HH_SEC_M.dta
    idxvars:
        i: sdd_hhid
        j: itemcode
    myvars:
        Quantity: hh_m01
        Age: hh_m02
        Value: hh_m04
        Purchase Price: hh_m03

sample:
    file: HH_SEC_A.dta
    idxvars:
        i: sdd_hhid
    myvars:
        v: clusterid
        weight: sdd_weights  # panel-only wave; same variable for both
        panel_weight: sdd_weights
        strata: strataid
        Rural:
            - sdd_rural
            - mapping:
                RURAL: Rural
                Rural: Rural
                rural: Rural
                URBAN: Urban
                Urban: Urban
                urban: Urban

interview_date:
    file: HH_SEC_A.dta
    idxvars:
        i: sdd_hhid
    myvars:
        int_t: hh_a18

housing:
    file: HH_SEC_I.dta
    idxvars:
        i: sdd_hhid
    myvars:
        Roof:
            - hh_i09
            - mapping:
                GRASS, LEAVES, BAMBOO: Grass/Leaves/Bamboo
                MUD AND GRASS: Mud And Grass
                CONCRETE, CEMENT: Concrete/Cement
                METAL SHEETS (GCI): Metal Sheets
                ASBESTOS SHEETS: Asbestos Sheets
                TILES: Tiles
                OTHER (SPECIFY): Other
        Floor:
            - hh_i10
            - mapping:
                EARTH: Earth
                CONCRETE, CEMENT, TILES, TIMBER: Concrete/Cement/Tiles/Timber
                OTHER (SPECIFY): Other
