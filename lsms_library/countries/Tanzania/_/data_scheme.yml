Country: Tanzania

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str
    materialize: make

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str
    materialize: make

  interview_date:
    index: (t, i)
    Int_t: datetime

  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind).  Wave-level food_acquired.py
    # melts the {purchase, own, inkind} suffix decomposition into long
    # form via tanzania.food_acquired_to_canonical.  See
    # slurm_logs/DESIGN_food_acquired_canonical_2026-05-05.org.
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float
    materialize: make
  food_expenditures: !make
  food_quantities: !make
  food_prices: !make
  panel_ids: !make

  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  plot_features:
    # Lasting plot characteristics (GH #167).  Cross-file merge of
    # AG_SEC_02 (area) and AG_SEC_3A (soil/irrigation/tenure) per wave;
    # only 2019-20 and 2020-21 are buildable (2008-15 lacks an ag
    # source on disk).  GPS coordinates are redacted in the source.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    SoilType: str
    Irrigated: bool
    materialize: make
