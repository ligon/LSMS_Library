Country: Tanzania

Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str

  shocks:
    index: (t, i, Shock)
    EffectedIncome: bool
    EffectedAssets: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str
    materialize: make

  household_roster:
    index: (t, v, i, pid)
    Sex: str
    Age: int
    Relationship: str
    materialize: make

  food_acquired: !make
  food_expenditures: !make
  food_quantities: !make
  food_prices: !make
  household_characteristics: !make
  other_features: !make
  panel_ids: !make
