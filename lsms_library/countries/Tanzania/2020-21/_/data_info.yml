Country: Tanzania
Wave: 2020-21

cluster_features:
    # GH #323.  `v` is `y5_cluster`, NOT `clusterid` -- and this was not a
    # cosmetic difference.  `sample` has always used `y5_cluster` (see below),
    # so with `clusterid` here ALL 417 of this wave's `(t, v)` pairs were
    # unknown to `sample`: `_join_v_from_sample` gave every 2020-21 household a
    # `v` that had no cluster_features row at all.  `clusterid` is also blank
    # for all 545 BOOSTER households (11.6%), so those were deleted outright on
    # a NaN key, taking 68 clusters with them.  `y5_cluster` is populated for
    # 100% of rows and is the id the Y5 design actually uses.
    #
    # `_status` / `_class` are carried only so the df_edit hook can tell who is
    # still LIVING in the cluster; both are dropped there.
    file: hh_sec_a.dta
    idxvars:
        i: y5_hhid
        v: y5_cluster
    myvars:
        Region: hh_a01_1
        District: hh_a02_1
        _status: hh_tracking_status
        _class: tracking_class
        Rural:
            - y5_rural
            - mapping:
                RURAL: Rural
                Rural: Rural
                rural: Rural
                URBAN: Urban
                Urban: Urban
                urban: Urban

household_roster:
    file: hh_sec_b.dta
    idxvars:
        i: y5_hhid
        pid: indidy5
    myvars:
        Sex: hh_b02
        Age: hh_b04
        Relationship: hh_b05
        MonthsAway: hh_b10

shocks:
    file: hh_sec_r.dta
    idxvars:
        i: y5_hhid
        Shock: shockid
    myvars:
        AffectedIncome:
            - hh_r03
            - mapping:
                INCOME LOSS: True
                Income loss: True
                income loss: True
                ASSET LOSS: False
                Asset loss: False
                asset loss: False
                LOSS OF BOTH: True
                Loss of both: True
                loss of both: True
                NEITHER: False
                Neither: False
                neither: False
        AffectedAssets:
            - hh_r03
            - mapping:
                INCOME LOSS: False
                Income loss: False
                income loss: False
                ASSET LOSS: True
                Asset loss: True
                asset loss: True
                LOSS OF BOTH: True
                Loss of both: True
                loss of both: True
                NEITHER: False
                Neither: False
                neither: False
        HowCoped0: hh_r04_1
        HowCoped1: hh_r04_2

sample:
    file: hh_sec_a.dta
    idxvars:
        i: y5_hhid
    myvars:
        v: y5_cluster  # string cluster ID; clusterid is NaN for booster HH
        weight: y5_crossweight  # cross-sectional (panel + booster)
        panel_weight: y5_panelweight  # NaN for 545 booster households
        strata: strataid  # NaN for 545 booster HH (no legacy strata assignment)
        Rural:
            - y5_rural
            - mapping:
                RURAL: Rural
                Rural: Rural
                rural: Rural
                URBAN: Urban
                Urban: Urban
                urban: Urban

interview_date:
    file: hh_sec_a.dta
    idxvars:
        i: y5_hhid
    myvars:
        int_t: hh_a18

housing:
    file: hh_sec_i.dta
    idxvars:
        i: y5_hhid
    myvars:
        Roof:
            - hh_i09
            - mapping:
                GRASS, LEAVES,  BAMBOO, THATCH: Grass/Leaves/Bamboo
                MUD AND GRASS: Mud And Grass
                CONCRETE SLAB (FLAT ROOF): Concrete/Cement
                IRON SHEET: Metal Sheets
                ASBESTOS SHEETS: Asbestos Sheets
                tiles: Tiles
                OTHER, SPECIFY: Other
        Floor:
            - hh_i10
            - mapping:
                earth: Earth
                CONCRETE SLAB: Concrete Slab
                SAND/CEMENT: Sand/Cement
                tiles: Tiles
                timber: Timber
                OTHER, SPECIFY: Other
