Country: Tanzania
Wave: 2020-21

cluster_features:
    file: hh_sec_a.dta
    idxvars:
        i: y5_hhid
        v: clusterid
    myvars:
        Region: hh_a01_1
        District: hh_a02_1
        Rural:
            - y5_rural
            - mapping:
                RURAL: Rural
                Rural: Rural
                rural: Rural
                URBAN: Urban
                Urban: Urban
                urban: Urban

household_roster:
    file: hh_sec_b.dta
    idxvars:
        i: y5_hhid
        pid: indidy5
    myvars:
        Sex: hh_b02
        Age: hh_b04
        Relationship: hh_b05

shocks:
    file: hh_sec_r.dta
    idxvars:
        i: y5_hhid
        Shock: shockid
    myvars:
        AffectedIncome:
            - hh_r03
            - mapping:
                INCOME LOSS: True
                Income loss: True
                income loss: True
                ASSET LOSS: False
                Asset loss: False
                asset loss: False
                LOSS OF BOTH: True
                Loss of both: True
                loss of both: True
                NEITHER: False
                Neither: False
                neither: False
        AffectedAssets:
            - hh_r03
            - mapping:
                INCOME LOSS: False
                Income loss: False
                income loss: False
                ASSET LOSS: True
                Asset loss: True
                asset loss: True
                LOSS OF BOTH: True
                Loss of both: True
                loss of both: True
                NEITHER: False
                Neither: False
                neither: False
        HowCoped0: hh_r04_1
        HowCoped1: hh_r04_2

sample:
    file: hh_sec_a.dta
    idxvars:
        i: y5_hhid
    myvars:
        v: y5_cluster  # string cluster ID; clusterid is NaN for booster HH
        weight: y5_crossweight  # cross-sectional (panel + booster)
        panel_weight: y5_panelweight  # NaN for 545 booster households
        strata: strataid  # NaN for 545 booster HH (no legacy strata assignment)
        Rural:
            - y5_rural
            - mapping:
                RURAL: Rural
                Rural: Rural
                rural: Rural
                URBAN: Urban
                Urban: Urban
                urban: Urban

interview_date:
    file: hh_sec_a.dta
    idxvars:
        i: y5_hhid
    myvars:
        int_t: hh_a18
