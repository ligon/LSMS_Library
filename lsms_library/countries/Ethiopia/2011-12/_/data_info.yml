Country: Ethiopia
Wave: 2011-12

# cluster_features (GH #323).  Both sources are HOUSEHOLD-grain, so they are
# merged on household_id (1:1) and reduced to the EA grain by the declared
# `aggregation:` policy in ../../_/data_scheme.yml -- NOT merged on the cluster
# key v, which made the join many-to-many and produced a cartesian product.
# The geo file spells its coordinates LAT_DD_MOD / LON_DD_MOD (UPPERCASE) in
# this wave; asking for the lowercase names raised a KeyError that the optional
# sub-df fallback swallowed, silently dropping Latitude/Longitude entirely.
cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: sect_cover_hh_w1.dta
        idxvars:
            v: ea_id
            i: household_id
        myvars:
            Region: saq01
            District: saq02
            Rural:
                - rural
                - mapping:
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    small town: Urban
                    Small town: Urban
                    Small Town: Urban
                    SMALL TOWN: Urban
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
                    Large town (urban): Urban
                    Meduim and large town: Urban
    df_geo:
        file: Pub_ETH_HouseholdGeovariables_Y1.dta
        idxvars:
            i: household_id
        myvars:
            Latitude: LAT_DD_MOD
            Longitude: LON_DD_MOD
    merge_on:
        - i
    # The cover page defines the surveyed household/EA roster; the geo file is
    # a strict enrichment (and carries households the cover does not).  A left
    # merge keeps the cover authoritative instead of letting orphan geo rows
    # arrive with a null v and collapse into a phantom cluster.
    merge_how: left
    final_index:
        - t
        - v
    # i was only the merge key; cluster_features is an EA-grain table.
    drop:
        - i

household_roster:
    file: sect1_hh_w1.dta
    idxvars:
        i: household_id
        pid: individual_id
    myvars:
        Sex: hh_s1q03
        # Age list = [age_in_years, age_in_months].  ../_/2011-12.py
        # falls back to floor(months/12) when years is missing.
        # Empirical rescue: 2777 of 2998 missing rows (GH #178).
        Age:
            - hh_s1q04_a
            - hh_s1q04_b
        Relationship: hh_s1q02
        MonthsAway: hh_s1q05

individual_education:
    file: sect2_hh_w1.dta
    idxvars:
        i: household_id
        pid: individual_id
    myvars:
        # Highest grade completed (free-text survey labels).
        Educational Attainment:
            - hh_s2q05
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

shocks:
    file: sect8_hh_w1.dta
    idxvars:
        i: household_id
        Shock: hh_s8q00
    myvars:
        AffectedIncome:
            - hh_s8q03_a
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedAssets:
            - hh_s8q03_b
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedProduction:
            - hh_s8q03_c
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedConsumption:
            - hh_s8q03_e
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        HowCoped0: hh_s8q04_a
        HowCoped1: hh_s8q04_b
        HowCoped2: hh_s8q04_c

assets:
    file: sect10_hh_w1.dta
    idxvars:
        i: household_id
        j: hh_s10q0a
    myvars:
        Quantity: hh_s10q01

housing:
    file: sect9_hh_w1.dta
    idxvars:
        i: household_id
    myvars:
        Roof:
            - hh_s9q06
            - mapping:
                Thatch: Thatch
                Corrugated iron sheet: Corrugated Iron Sheet
                Wood and mud: Wood And Mud
                Reed / bamboo: Reed/Bamboo
                Others: Other
                Plastic canvas: Plastic Canvas
                Concrete / Cement: Concrete/Cement
                Asbestos: Asbestos
                18.0: Other
        Floor:
            - hh_s9q07
            - mapping:
                Mud / dung: Mud/Dung
                Cement screed: Cement Screed
                Reed / bamboo: Reed/Bamboo
                Plastic tiles: Plastic Tiles
                Others: Other
                Wood planks: Wood Planks
                Cement tiles: Cement Tiles
                Brick Tiles: Brick Tiles
                Ceramic / marble tiles: Ceramic/Marble Tiles
