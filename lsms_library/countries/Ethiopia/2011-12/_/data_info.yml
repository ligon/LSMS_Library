Country: Ethiopia
Wave: 2011-12

# cluster_features (GH #323 site 4).  Both sources are HOUSEHOLD-grain, so
# they are merged on the household id (1:1 -- household_id is unique and blank-
# free in BOTH frames: 3,969 cover rows / 3,917 geo rows, 0 keys duplicated in
# both) and reduced to the (t, v) EA grain by Wave.cluster_features' existing
# GH #161 collapse -- mean() for Latitude/Longitude (the cluster centroid),
# first() for Region/District/Rural.  That is why `i` is in `final_index`:
# the collapse only fires when `i` is an index level.  Merging on the CLUSTER
# key v instead made the join many-to-many (333 EAs shared by ~3.9k households
# on each side) -- a cartesian product.
#
# The geo file spells its coordinates LAT_DD_MOD / LON_DD_MOD (UPPERCASE) in
# THIS wave only; asking for the lowercase names raised a KeyError that the
# GH #515 optional-sub-df fallback swallowed, silently serving cluster_features
# with Latitude/Longitude 100% absent.  Verified against the source: the file
# carries LAT_DD_MOD/LON_DD_MOD non-null for all 3,917 rows.
cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: sect_cover_hh_w1.dta
        idxvars:
            v: ea_id
            i: household_id
        myvars:
            Region: saq01
            District: saq02
            Rural:
                - rural
                - mapping:
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    small town: Urban
                    Small town: Urban
                    Small Town: Urban
                    SMALL TOWN: Urban
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
                    Large town (urban): Urban
                    Meduim and large town: Urban
    df_geo:
        file: Pub_ETH_HouseholdGeovariables_Y1.dta
        idxvars:
            i: household_id
        myvars:
            # UPPERCASE in W1 -- see the header comment.
            Latitude: LAT_DD_MOD
            Longitude: LON_DD_MOD
    merge_on:
        - i
    # The cover page is authoritative for which households exist; the geo file
    # is a strict enrichment.  `left` keeps orphan geo households (households
    # the cover does not carry) from arriving with a null v and collapsing
    # into one phantom cluster.  W1 has 0 such orphans, but the declaration is
    # uniform across the five waves, which do (W2 25, W4 124, W5 35).
    merge_how: left
    final_index:
        - t
        - v
        - i

household_roster:
    file: sect1_hh_w1.dta
    idxvars:
        i: household_id
        pid: individual_id
    myvars:
        Sex: hh_s1q03
        # Age list = [age_in_years, age_in_months].  ../_/2011-12.py
        # falls back to floor(months/12) when years is missing.
        # Empirical rescue: 2777 of 2998 missing rows (GH #178).
        Age:
            - hh_s1q04_a
            - hh_s1q04_b
        Relationship: hh_s1q02
        MonthsAway: hh_s1q05

individual_education:
    file: sect2_hh_w1.dta
    idxvars:
        i: household_id
        pid: individual_id
    myvars:
        # Highest grade completed (free-text survey labels).
        Educational Attainment:
            - hh_s2q05
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

shocks:
    file: sect8_hh_w1.dta
    idxvars:
        i: household_id
        Shock: hh_s8q00
    myvars:
        AffectedIncome:
            - hh_s8q03_a
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedAssets:
            - hh_s8q03_b
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedProduction:
            - hh_s8q03_c
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedConsumption:
            - hh_s8q03_e
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        HowCoped0: hh_s8q04_a
        HowCoped1: hh_s8q04_b
        HowCoped2: hh_s8q04_c

assets:
    file: sect10_hh_w1.dta
    idxvars:
        i: household_id
        j: hh_s10q0a
    myvars:
        Quantity: hh_s10q01

housing:
    file: sect9_hh_w1.dta
    idxvars:
        i: household_id
    myvars:
        Roof:
            - hh_s9q06
            - mapping:
                Thatch: Thatch
                Corrugated iron sheet: Corrugated Iron Sheet
                Wood and mud: Wood And Mud
                Reed / bamboo: Reed/Bamboo
                Others: Other
                Plastic canvas: Plastic Canvas
                Concrete / Cement: Concrete/Cement
                Asbestos: Asbestos
                18.0: Other
        Floor:
            - hh_s9q07
            - mapping:
                Mud / dung: Mud/Dung
                Cement screed: Cement Screed
                Reed / bamboo: Reed/Bamboo
                Plastic tiles: Plastic Tiles
                Others: Other
                Wood planks: Wood Planks
                Cement tiles: Cement Tiles
                Brick Tiles: Brick Tiles
                Ceramic / marble tiles: Ceramic/Marble Tiles
