Country: Ethiopia
Wave: 2018-19

# cluster_features (GH #323 site 4).  Both sources are HOUSEHOLD-grain, so
# they are merged on household_id (1:1 -- unique and blank-free in BOTH frames:
# 6,770 cover rows / 6,804 geo rows, 0 keys duplicated in both) and reduced to
# the (t, v) EA grain by Wave.cluster_features' existing GH #161 collapse --
# mean() for Latitude/Longitude (the cluster centroid), first() for
# Region/District/Rural.  That is why `i` is in `final_index`: the collapse
# only fires when `i` is an index level.  Merging on the CLUSTER key v instead
# was a latent cartesian (535 EAs shared by ~6.8k households on each side); it
# never fired only because the geo sub-df never loaded at all -- see below.
#
# W4 spells its coordinates lat_mod / lon_mod -- NO '_dd_' infix, unlike every
# other ESS wave.  Asking for lat_dd_mod raised a KeyError that the GH #515
# optional-sub-df fallback swallowed, silently serving cluster_features with
# Latitude/Longitude 100% absent.  Verified against the source: the file
# carries lat_mod/lon_mod non-null for 6,637 of its 6,804 rows.
cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: sect_cover_hh_w4.dta
        idxvars:
            v: ea_id
            i: household_id
        myvars:
            Region: saq01
            District: saq02
            Rural:
                - saq14
                - mapping:
                    RURAL: Rural
                    Rural: Rural
                    rural: Rural
                    URBAN: Urban
                    Urban: Urban
                    urban: Urban
    df_geo:
        file: ETH_HouseholdGeovariables_Y4.dta
        idxvars:
            i: household_id
        myvars:
            # W4 drops the '_dd_' infix -- see the header comment.
            Latitude: lat_mod
            Longitude: lon_mod
    merge_on:
        - i
    # The cover page is authoritative for which households exist; the geo file
    # is a strict enrichment and carries 124 households the cover does not.
    # `left` keeps those orphans from arriving with a null v and collapsing
    # into one phantom cluster.
    merge_how: left
    final_index:
        - t
        - v
        - i

household_roster:
    file: sect1_hh_w4.dta
    idxvars:
        i: household_id
        pid: individual_id
    myvars:
        Sex:
            - s1q02
            - mapping:
                '1. Male': M
                '2. Female': F
        Age: s1q03a
        Relationship: s1q01
        WeeksAway: s1q06

individual_education:
    file: sect2_hh_w4.dta
    idxvars:
        i: household_id
        pid: individual_id
    myvars:
        # Highest grade completed (free-text survey labels; W4 labels are
        # uppercased and code-prefixed, e.g. "1. 1ST GRADE COMPLETE").
        Educational Attainment:
            - s2q06
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

shocks:
    file: sect9_hh_w4.dta
    idxvars:
        i: household_id
        Shock:
            - shock_type
            - mapping:
                "1. DEATH OF HH MEMBER (MAIN BREAD EARNER)": Death Of Hh Member (Main Bread Earner)
                "2. DEATH OF A CHILD UNDER 5 INCLUDING MISCARRIAGE OR STILLBIRTH": Death/Abortion/Still Birth Of Children Under 5
                "3. DEATH OF OTHER HH MEMBER": Death Of Other Hh Member
                "4. ILLNESS OF HOUSEHOLD MEMBER": Illness Of Household Member
                "5. LOSS OF NON-FARM JOBS OF HH MEMBER": Loss Of Non-Farm Jobs Of Hh Member
                "6. DROUGHT": Drought
                "7. FLOOD": Flood
                "8. LANDSLIDES/ AVALANCHES": Landslides/Avalanches
                "9. HEAVY RAINS PREVENTING WORK": Heavy Rains Preventing Work
                "10. OTHER CROP DAMAGE": Other Crop Damage
                "11. UNUSUAL PRICE FALL  OF FOOD ITEMS AGRICULTURE PRODUCES ": Price Fall Of Food Items
                "12. UNUSUAL PRICE RISE OF FOOD ITEMS AGRICULTURE PRODUCES ": Price Raise Of Food Item
                "13. UNUSUAL INCREASE IN PRICE OF INPUTS (SEED, FERTILIZER)": Price Raise Of Inputs
                "14. GREAT LOSS/DEATH OF LIVESTOCK": Great Loss/Death Of Livestock
                "15. FIRE": Fire
                "16. THEFT/ROBBERY AND OTHER VIOLENCE": Theft/Robbery And Other Violence
                "17. INVOLUNTARY LOSS OF HOUSE/LAND": Involuntary Loss Of House/Land
                "18. DISPLACEMENT (DUE TO GOVERNMENT DEVELOPMENT PROJECTS)": Displacement (Due To Gov Dev Project)
                "19. LOCAL UNREST/VIOLENCE ": Local Unrest/Violence
                "20. OTHER (SPECIFY)": Other (Specify)
    myvars:
        AffectedIncome:
            - s9q03a
            - mapping:
                1. INCREASED: True
                2. DECREASED: True
                3. DID NOT CHANGE: False
        AffectedAssets:
            - s9q03b
            - mapping:
                1. INCREASED: True
                2. DECREASED: True
                3. DID NOT CHANGE: False
        AffectedProduction:
            - s9q03c
            - mapping:
                1. INCREASED: True
                2. DECREASED: True
                3. DID NOT CHANGE: False
        AffectedConsumption:
            - s9q03e
            - mapping:
                1. INCREASED: True
                2. DECREASED: True
                3. DID NOT CHANGE: False
        HowCoped0: s9q04_1
        HowCoped1: s9q04_2
        HowCoped2: s9q04_3

assets:
    file: sect11_hh_w4.dta
    idxvars:
        i: household_id
        j: asset_cd
    myvars:
        Quantity: s11q01

housing:
    file: sect10a_hh_w4.dta
    idxvars:
        i: household_id
    myvars:
        Roof:
            - s10aq08
            - mapping:
                "1. Corrugated iron sheet": Corrugated Iron Sheet
                "2. Concrete / Cement": Concrete/Cement
                "3. Thatch": Thatch
                "4. Wood and mud": Wood And Mud
                "5. Reed / bamboo": Reed/Bamboo
                "6. Plastic canvas": Plastic Canvas
                "7. Asbestos": Asbestos
                "8. Bricks": Bricks
                "9. Others": Other
        Floor:
            - s10aq09
            - mapping:
                "1. Mud / dung": Mud/Dung
                "2. Reed / bamboo": Reed/Bamboo
                "3. Wood planks": Wood Planks
                "4. Parquet of polished wood": Parquet Of Polished Wood
                "5. Cement screed": Cement Screed
                "6. Plastic tiles": Plastic Tiles
                "7. Cement tiles": Cement Tiles
                "8. Brick Tiles": Brick Tiles
                "9. Ceramic / marble tiles": Ceramic/Marble Tiles
                "10. Others": Other

interview_date:
    file: sect_cover_hh_w4.dta
    idxvars:
        i: household_id
    myvars:
        int_t: InterviewStart
