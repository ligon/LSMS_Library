Country: Ethiopia
Wave: 2021-22

# cluster_features (GH #323).  Both sources are HOUSEHOLD-grain, so they are
# merged on household_id (1:1) and reduced to the EA grain by the declared
# `aggregation:` policy in ../../_/data_scheme.yml -- NOT merged on the cluster
# key v, which made the join many-to-many and produced a cartesian product
# (latent: the geo sub-df never loaded, so it never fired).
# The geo file has NO ea_id column at all -- it is keyed household_id only.
# Asking it for ea_id raised a KeyError that the optional sub-df fallback
# swallowed, silently dropping Latitude/Longitude entirely.  Joining on
# household_id lets the cover supply v.
cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: sect_cover_hh_w5.dta
        idxvars:
            v: ea_id
            i: household_id
        myvars:
            Region: saq01
            District: saq02
            Rural:
                - saq14
                - mapping:
                    RURAL: Rural
                    Rural: Rural
                    rural: Rural
                    1. RURAL: Rural
                    URBAN: Urban
                    Urban: Urban
                    urban: Urban
                    2. URBAN: Urban
    df_geo:
        file: eth_householdgeovariables_y5.dta
        idxvars:
            i: household_id
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - i
    # The cover page defines the surveyed household/EA roster; the geo file is
    # a strict enrichment (and carries households the cover does not).  A left
    # merge keeps the cover authoritative instead of letting orphan geo rows
    # arrive with a null v and collapse into a phantom cluster.
    merge_how: left
    final_index:
        - t
        - v
    # i was only the merge key; cluster_features is an EA-grain table.
    drop:
        - i

panel_ids:
    file:
        - ../Data/sect_cover_hh_w5.dta
    idxvars:
        i: household_id
    myvars:
        previous_i: household_id

household_roster:
    file: sect1_hh_w5.dta
    idxvars:
        i: household_id
        pid: individual_id
    myvars:
        Sex:
            - s1q02
            - mapping:
                '1. Male': M
                '2. Female': F
        Age: s1q03a
        Relationship: s1q01
        WeeksAway: s1q06

individual_education:
    file: sect2_hh_w5.dta
    idxvars:
        i: household_id
        pid: individual_id
    myvars:
        # Highest grade completed (free-text survey labels; W5 labels are
        # uppercased and code-prefixed, e.g. "10. 10TH GRADE COMPLETE").
        Educational Attainment:
            - s2q06
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

shocks:
    file: sect9_hh_w5.dta
    idxvars:
        i: household_id
        Shock:
            - shock_type
            - mapping:
                "1. DEATH OF HH MEMBER (MAIN BREAD EARNER)": Death Of Hh Member (Main Bread Earner)
                "2. DEATH OF A CHILD UNDER 5 INCLUDING MISCARRIAGE OR STILLBIRTH": Death/Abortion/Still Birth Of Children Under 5
                "3. DEATH OF OTHER HH MEMBER": Death Of Other Hh Member
                "4. ILLNESS OF HOUSEHOLD MEMBER": Illness Of Household Member
                "5. LOSS OF NON-FARM JOBS OF HH MEMBER": Loss Of Non-Farm Jobs Of Hh Member
                "6. DROUGHT": Drought
                "7. FLOOD": Flood
                "8. LANDSLIDES/ AVALANCHES": Landslides/Avalanches
                "9. HEAVY RAINS PREVENTING WORK": Heavy Rains Preventing Work
                "10. OTHER CROP DAMAGE": Other Crop Damage
                "11. UNUSUAL PRICE FALL  OF FOOD ITEMS AGRICULTURE PRODUCES": Price Fall Of Food Items
                "12. UNUSUAL PRICE RISE OF FOOD ITEMS AGRICULTURE PRODUCES": Price Raise Of Food Item
                "13. UNUSUAL INCREASE IN PRICE OF INPUTS (SEED, FERTILIZER)": Price Raise Of Inputs
                "14. GREAT LOSS/DEATH OF LIVESTOCK": Great Loss/Death Of Livestock
                "15. FIRE": Fire
                "16. THEFT/ROBBERY AND OTHER VIOLENCE": Theft/Robbery And Other Violence
                "17. DISPLACEMENT (DUE TO GOVERNMENT DEVELOPMENT PROJECTS)": Displacement (Due To Gov Dev Project)
                "18. LOCAL UNREST/VIOLENCE": Local Unrest/Violence
                "19. OTHER (SPECIFY)": Other (Specify)
    myvars:
        AffectedIncome:
            - s9q03a
            - mapping:
                1. INCREASED: True
                2. DECREASED: True
                3. DID NOT CHANGE: False
        AffectedAssets:
            - s9q03b
            - mapping:
                1. INCREASED: True
                2. DECREASED: True
                3. DID NOT CHANGE: False
        AffectedProduction:
            - s9q03c
            - mapping:
                1. INCREASED: True
                2. DECREASED: True
                3. DID NOT CHANGE: False
        AffectedConsumption:
            - s9q03e
            - mapping:
                1. INCREASED: True
                2. DECREASED: True
                3. DID NOT CHANGE: False
        HowCoped0: s9q04_1
        HowCoped1: s9q04_2
        HowCoped2: s9q04_3

assets:
    file: sect11_hh_w5.dta
    idxvars:
        i: household_id
        j: asset_cd
    myvars:
        Quantity: s11q01

housing:
    file: sect10a_hh_w5.dta
    idxvars:
        i: household_id
    myvars:
        Roof:
            - s10aq08
            - mapping:
                "1. Corrugated iron sheet": Corrugated Iron Sheet
                "2. Concrete / Cement": Concrete/Cement
                "3. Thatch": Thatch
                "4. Wood and mud": Wood And Mud
                "5. Reed / bamboo": Reed/Bamboo
                "6. Plastic canvas": Plastic Canvas
                "7. Asbestos": Asbestos
                "8. Bricks": Bricks
                "9. Others": Other
        Floor:
            - s10aq09
            - mapping:
                "1. Mud / dung": Mud/Dung
                "2. Reed / bamboo": Reed/Bamboo
                "3. Wood planks": Wood Planks
                "4. Parquet of polished wood": Parquet Of Polished Wood
                "5. Cement screed": Cement Screed
                "6. Plastic tiles": Plastic Tiles
                "7. Cement tiles": Cement Tiles
                "8. Brick Tiles": Brick Tiles
                "9. Ceramic / marble tiles": Ceramic/Marble Tiles
                "10. Others": Other

interview_date:
    file: sect_cover_ph_w5.dta
    idxvars:
        i: household_id
    myvars:
        int_t: InterviewDate

food_security:
    # FAO FIES 8-item experience scale.  ESS §8 file sect8_hh_w5.dta
    # carries the full FAO battery, but the question order is NOT the
    # sequential FAO order — the items are mapped BY LABEL:
    #   s8q01 worried -> Worried        (12-month recall)
    #   s8q02 unable healthy/nutritious -> HealthyDiet
    #   s8q03 only a few kinds of foods -> FewFoods
    #   s8q04 had to skip a meal        -> SkippedMeal
    #   s8q05 ate less than should      -> AteLess
    #   s8q07 ran out of food           -> RanOut
    #   s8q08 hungry but did not eat    -> Hungry
    #   s8q06 whole day without eating  -> WholeDay  (30-day recall)
    # Items recorded as '1. YES'/'2. NO' -> True/False; NaN stays NaN.
    # FIES_score (count of True over the 8 items) is computed row-wise by
    # the food_security() df_edit function in mapping.py.
    file: sect8_hh_w5.dta
    idxvars:
        i: household_id
    myvars:
        Worried:
            - s8q01
            - mapping:
                '1. YES': true
                '2. NO': false
        HealthyDiet:
            - s8q02
            - mapping:
                '1. YES': true
                '2. NO': false
        FewFoods:
            - s8q03
            - mapping:
                '1. YES': true
                '2. NO': false
        SkippedMeal:
            - s8q04
            - mapping:
                '1. YES': true
                '2. NO': false
        AteLess:
            - s8q05
            - mapping:
                '1. YES': true
                '2. NO': false
        RanOut:
            - s8q07
            - mapping:
                '1. YES': true
                '2. NO': false
        Hungry:
            - s8q08
            - mapping:
                '1. YES': true
                '2. NO': false
        WholeDay:
            - s8q06
            - mapping:
                '1. YES': true
                '2. NO': false
