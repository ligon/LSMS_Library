Country: Ethiopia

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude: float
    Longitude: float

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  panel_ids:
    index: (t, i)
    previous_i: str
    materialize: make

  assets:
    index: (t, i, j)
    Quantity: float

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  interview_date:
    index: (t, i)
    Int_t: datetime

  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s ∈ {purchased, produced}.
    # Wave scripts call ethiopia.food_acquired which derives Produced
    # from (quantity - quantity_purchased) and applies the framework
    # canonical-melt helper.  See
    # slurm_logs/DESIGN_food_acquired_canonical_2026-05-05.org.
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float
    materialize: make

  plot_features:
    # ESS post-planting parcel/field land characteristics (GH #167).
    # One row per FIELD (sect3_pp), with parcel-level Tenure / SoilType
    # broadcast from sect2_pp via the holder-aware join key
    # (holder_id, household_id, parcel_id).  Cross-file join => script.
    # Latitude/Longitude deferred: source GPS 100% '**CONFIDENTIAL**'.
    # TenureSystem always NaN: ESS has no land-tenure-regime analogue.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    # ESS records no land-tenure-regime analogue (all land is state-owned
    # under usufruct), so TenureSystem is legitimately all-NaN here.
    # Mark optional so the all-null sanity check exempts it while the
    # canonical column is still declared for cross-country alignment.
    TenureSystem:
      type: str
      optional: true
    SoilType: str
    Irrigated: bool
    materialize: make

  crop_production:
    # GAP 1 — item-level crop harvest at (t, i, plot_id, j, u).  One row
    # per (plot, crop) from ESS §9 post-harvest (sect9_ph), carrying only
    # REPORTED fields: harvest Quantity in its native unit u, Quantity_sold
    # / Value_sold from §11 (attached at the unambiguous holder-crop join,
    # see ethiopia.crop_production_for_wave SALES GRAIN CAVEAT),
    # planting_month (§4) / harvest_month (§9), and the intercropped /
    # perennial flags.  NO unit->kg conversion, NO yield / main-crop /
    # value-share rollups (those are transformations).  plot_id and i match
    # plot_features exactly, so the two features join on (t, i, plot_id).
    # crop labels reuse the food Preferred Labels (harmonize_crop table) so
    # crop_production.j joins food_acquired.j.  Multi-file joins (§9+§4+§11,
    # + §3 for W1 intercrop) + code->label harmonization => script.
    index: (t, i, plot_id, j, u)
    Quantity: float
    Quantity_sold: float
    Value_sold: float
    planting_month: int
    harvest_month: int
    intercropped: bool
    perennial: bool
    materialize: make

  plot_inputs:
    # GAP 2 -- item-level ag inputs at (t, i, plot_id, input, j).  One row
    # per input APPLIED to a plot (or plot-crop), from the ESS post-planting
    # input modules: §3 (sect3_pp) fertilizer/organic, §4 (sect4_pp) seed +
    # pesticide, §5 (sect5_pp) seed purchase.  Carries only REPORTED,
    # item-level fields:
    #   input               input identity (Seed / Urea / DAP / NPS / Manure /
    #                       Compost / Other Organic / Pesticide; Preferred
    #                       Labels emitted in-script from harmonize_input).
    #   Quantity + u        reported applied quantity in its native unit
    #                       ('Kg' for every ESS input quantity).
    #   Purchased           was the seed PURCHASED (nullable bool; seed rows,
    #                       from the §5 purchased-flag, attached where the
    #                       (holder, crop) maps to a single plot).
    #   Quantity_purchased  reported purchased kg (seed rows; fertilizer
    #                       purchased kg where the §3 module records it, W2+).
    #   Improved            improved-seed flag (nullable bool; seed rows only).
    #   Applied             reported applied/used dummy (nullable bool).  ESS
    #                       records organic fertilizer (Manure/Compost/Other
    #                       Organic) and Pesticide as a yes/no USE flag with NO
    #                       quantity, so for those input types the reported
    #                       datum is this flag (one row per applied input);
    #                       also set for inorganic-fertilizer rows that report
    #                       use without a kg.  NaN for seed rows (their use is
    #                       implied by Quantity / Improved / Purchased).
    #
    # j (crop axis): the crop Preferred Label (harmonize_crop == food labels,
    # so seed/pesticide rows join crop_production.j / food_acquired.j) for the
    # crop-specific inputs (Seed, Pesticide); the 'Whole Plot' sentinel for
    # plot-level fertilizer/organic inputs (which carry no crop -- j cannot be
    # null as an index level, mirroring how crop_production fills its u level).
    # plot_id and i match plot_features / crop_production exactly.
    #
    # NO nitrogen_kg / seed_kg sums, NO any-use roll-up flags, NO fertilizer
    # totals (those are transformations over these item rows -- GAP 2/7).
    # Multi-file joins (§3+§4+§5) + per-section grain + code->label
    # harmonization => script (materialize: make).  Seed-purchase detail
    # attaches from the (holder, crop)-grain §5 ONLY where the (holder, crop)
    # maps to a single plot (the SALES GRAIN CAVEAT crop_production uses).
    index: (t, i, plot_id, input, j)
    Quantity: float
    u: str
    Purchased:
      type: bool
      optional: true
    Quantity_purchased: float
    Improved:
      type: bool
      optional: true
    Applied:
      type: bool
      optional: true
    materialize: make

  food_security:
    # FAO FIES 8-item experience scale (GH #332).  Confirmed ONLY in
    # W5 (2021-22): ESS §8 file sect8_hh_w5.dta carries the FAO battery
    # (s8q01..s8q08, mapped BY LABEL — not sequential FAO order; see the
    # wave data_info.yml).  W4 (2018-19) §8 is an rCSI/coping-strategy
    # battery (s8q02a..h = number-of-days frequency counts), NOT FIES, so
    # it is deliberately NOT wired here; it belongs to a future rCSI
    # feature.  W1-3 carry the rCSI/coping battery in §7 (sect7_hh,
    # hh_s7q02_*), wired separately as `food_coping` below.
    # Recall period: 12 months for 7 items; WholeDay (s8q06) is 30-day.
    index: (t, i)
    Worried: bool
    HealthyDiet: bool
    FewFoods: bool
    SkippedMeal: bool
    AteLess: bool
    RanOut: bool
    Hungry: bool
    WholeDay: bool
    FIES_score: int

  food_coping:
    # CSI / rCSI coping-strategies battery (GH #332, Family B).  ESS
    # Section 7 ("Food Security"), household file sect7_hh_w{1,2,3}.dta,
    # question hh_s7q02_{a..h} = "In the past 7 days, how many days have
    # you or someone in your HH had to: [strategy]?" (integer 0-7).  This
    # is the 8-item Coping Strategies Index; it embeds the 5 reduced-CSI
    # (rCSI) strategies (LessPreferred, BorrowFood, LimitPortion,
    # RestrictAdults, ReduceMeals) plus 3 survey-specific items
    # (LimitVariety, NoFood, WholeDay).  Item wording confirmed verbatim
    # from the ESS3 HH Questionnaire (Section 7, Q2, columns A-H).
    #
    # Wired ONLY for the rCSI day-count waves: W1 (2011-12), W2 (2013-14),
    # W3 (2015-16).  W4 (2018-19) §8 s8q02a..h is a separate coping battery
    # (future feature); W5 (2021-22) §8 is FAO FIES (wired as
    # food_security).  Reshape (wide -> long over Strategy) requires a
    # script => materialize: make.  Recall period: last 7 days.
    index: (t, i, Strategy)
    Days: int
    materialize: make

  # food_expenditures, food_prices, food_quantities are derived at
  # runtime from food_acquired — see _FOOD_DERIVED in country.py.  Do
  # NOT register them here (per CLAUDE.md "Derived Tables").
  nutrition: !make
