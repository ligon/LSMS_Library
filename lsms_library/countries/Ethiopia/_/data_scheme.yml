Country: Ethiopia

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude: float
    Longitude: float

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  panel_ids:
    index: (t, i)
    previous_i: str
    materialize: make

  assets:
    index: (t, i, j)
    Quantity: float

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  interview_date:
    index: (t, i)
    Int_t: datetime

  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s ∈ {purchased, produced}.
    # Wave scripts call ethiopia.food_acquired which derives Produced
    # from (quantity - quantity_purchased) and applies the framework
    # canonical-melt helper.  See
    # slurm_logs/DESIGN_food_acquired_canonical_2026-05-05.org.
    index: (t, i, j, u, s)
    Quantity: float
    Expenditure: float
    materialize: make

  plot_features:
    # ESS post-planting parcel/field land characteristics (GH #167).
    # One row per FIELD (sect3_pp), with parcel-level Tenure / SoilType
    # broadcast from sect2_pp via the holder-aware join key
    # (holder_id, household_id, parcel_id).  Cross-file join => script.
    # Latitude/Longitude deferred: source GPS 100% '**CONFIDENTIAL**'.
    # TenureSystem always NaN: ESS has no land-tenure-regime analogue.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    # ESS records no land-tenure-regime analogue (all land is state-owned
    # under usufruct), so TenureSystem is legitimately all-NaN here.
    # Mark optional so the all-null sanity check exempts it while the
    # canonical column is still declared for cross-country alignment.
    TenureSystem:
      type: str
      optional: true
    SoilType: str
    Irrigated: bool
    materialize: make

  food_security:
    # FAO FIES 8-item experience scale (GH #332).  Confirmed ONLY in
    # W5 (2021-22): ESS §8 file sect8_hh_w5.dta carries the FAO battery
    # (s8q01..s8q08, mapped BY LABEL — not sequential FAO order; see the
    # wave data_info.yml).  W4 (2018-19) §8 is an rCSI/coping-strategy
    # battery (s8q02a..h = number-of-days frequency counts), NOT FIES, so
    # it is deliberately NOT wired here; it belongs to a future rCSI
    # feature.  W1-3 likewise used the rCSI/coping battery.
    # Recall period: 12 months for 7 items; WholeDay (s8q06) is 30-day.
    index: (t, i)
    Worried: bool
    HealthyDiet: bool
    FewFoods: bool
    SkippedMeal: bool
    AteLess: bool
    RanOut: bool
    Hungry: bool
    WholeDay: bool
    FIES_score: int

  food_expenditures: !make
  food_prices: !make
  food_quantities: !make
  nutrition: !make
