Country: Ethiopia

Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    District: str
    Rural: str
    Latitude: float
    Longitude: float

  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2: str

  household_roster:
    index: (t, v, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  panel_ids:
    index: (t, i)
    previous_i: str
    materialize: make

  assets:
    index: (t, i, j)
    Quantity: float

  interview_date:
    index: (t, i)
    int_t: datetime

  food_acquired: !make
  food_expenditures: !make
  food_prices: !make
  food_quantities: !make
  nutrition: !make
