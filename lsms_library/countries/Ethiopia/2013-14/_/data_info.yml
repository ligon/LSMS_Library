Country: Ethiopia
Wave: 2013-14

# cluster_features (GH #323 site 4).  Both sources are HOUSEHOLD-grain, so
# they are merged on the household id (1:1) and reduced to the (t, v) EA grain
# by Wave.cluster_features' existing GH #161 collapse -- mean() for
# Latitude/Longitude (the cluster centroid), first() for Region/District/Rural.
# That is why `i` is in `final_index`: the collapse only fires when `i` is an
# index level.
#
# Merging on the CLUSTER key v instead made the join many-to-many and produced
# a CARTESIAN PRODUCT: 5,262 cover households x 5,287 geo households over 433
# EAs -> 65,508 rows, of which 60,221 were phantom.  The downstream
# groupby().first() then tidied the evidence away, so the table reported clean.
#
# The key MUST be household_id2 (the W2 re-identified id), not household_id:
# household_id is the W1 baseline id and is BLANK for households new to the
# panel, so it is non-unique on the empty value -- re-keying to it would trade
# an EA cartesian for a NULL-KEY cartesian (pd.merge matches nulls).  Verified:
# household_id2 is unique and blank-free in BOTH frames (5,262 / 5,287 rows,
# 0 keys duplicated in both).  This matches the wave's v (ea_id2) and the
# i that sample/household_roster emit -- see _/CONTENTS.org.
cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: sect_cover_hh_w2.dta
        idxvars:
            v: ea_id2
            i: household_id2
        myvars:
            Region: saq01
            District: saq02
            Rural:
                - rural
                - mapping:
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    small town: Urban
                    Small town: Urban
                    Small Town: Urban
                    SMALL TOWN: Urban
                    Small town (urban): Urban
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
                    Large town (urban): Urban
                    Meduim and large town: Urban
    df_geo:
        file: Pub_ETH_HouseholdGeovars_Y2.dta
        idxvars:
            i: household_id2
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - i
    # The cover page is authoritative for which households exist; the geo file
    # is a strict enrichment and carries 25 households the cover does not (and
    # a 434th EA the cover has never heard of).  `left` keeps those orphans
    # from arriving with a null v and collapsing into one phantom cluster.
    merge_how: left
    final_index:
        - t
        - v
        - i

panel_ids:
    file:
        - ../Data/sect_cover_ls_w2.dta
    idxvars:
        i: household_id2
    myvars:
        previous_i: household_id

household_roster:
    file: sect1_hh_w2.dta
    idxvars:
        i: household_id2
        pid: individual_id2
    myvars:
        Sex: hh_s1q03
        # Age list = [age_yrs, age_mos, dob_day, dob_month_amharic,
        #             dob_year_eth_2dig, corrected_age].
        # ../_/2013-14.py converts the Ethiopian-calendar DOB to
        # Gregorian (via lsms_library.calendars) before feeding
        # age_handler, falls back to age_yrs / corrected_age, and
        # to floor(age_mos / 12) when none of those are populated.
        # Rescue: ~26 of 748 missing-age rows; precision: ~720
        # rows get DOB-derived fractional age.  GH #178.
        Age:
            - hh_s1q04_a
            - hh_s1q04_b
            - hh_s1q04g_1
            - hh_s1q04g_2
            - hh_s1q04g_3
            - hh_s1q04h
        Relationship: hh_s1q02
        MonthsAway: hh_s1q05

individual_education:
    file: sect2_hh_w2.dta
    idxvars:
        i: household_id
        pid: individual_id
    myvars:
        # Highest grade completed (free-text survey labels).
        Educational Attainment:
            - hh_s2q05
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

shocks:
    file: sect8_hh_w2.dta
    idxvars:
        i: household_id2
        Shock: hh_s8q00
    myvars:
        AffectedIncome:
            - hh_s8q03_a
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedAssets:
            - hh_s8q03_b
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedProduction:
            - hh_s8q03_c
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedConsumption:
            - hh_s8q03_e
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        HowCoped0: hh_s8q04_a
        HowCoped1: hh_s8q04_b
        HowCoped2: hh_s8q04_c

assets:
    file: sect10_hh_w2.dta
    idxvars:
        i: household_id2
        j: hh_s10q0a
    myvars:
        Quantity: hh_s10q01

housing:
    file: sect9_hh_w2.dta
    idxvars:
        i: household_id2
    myvars:
        Roof:
            - hh_s9q06
            - mapping:
                Corrugated iron sheet: Corrugated Iron Sheet
                Thatch: Thatch
                Wood and mud: Wood And Mud
                Others: Other
                Reed / bamboo: Reed/Bamboo
                Plastic canvas: Plastic Canvas
                Concrete / Cement: Concrete/Cement
                Bricks: Bricks
                Asbestos: Asbestos
        Floor:
            - hh_s9q07
            - mapping:
                Mud / dung: Mud/Dung
                Cement screed: Cement Screed
                Cement tiles: Cement Tiles
                Reed / bamboo: Reed/Bamboo
                Ceramic / marble tiles: Ceramic/Marble Tiles
                Brick Tiles: Brick Tiles
                Wood planks: Wood Planks
                Plastic tiles: Plastic Tiles
                Others: Other
                Parquet of polished wood: Parquet Of Polished Wood
