Country: Ethiopia
Wave: 2013-14

# cluster_features (GH #323).  Both sources are HOUSEHOLD-grain, so they are
# merged on household_id2 (1:1) and reduced to the EA grain by the declared
# `aggregation:` policy in ../../_/data_scheme.yml -- NOT merged on the cluster
# key v, which made the join many-to-many and produced a cartesian product
# (5,262 x 5,287 households over 433 EAs -> 65,508 rows).
# The geo file carries both household_id and household_id2; household_id2 is
# the W2-native key (matching v = ea_id2 and the roster/shocks i).
cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: sect_cover_hh_w2.dta
        idxvars:
            v: ea_id2
            i: household_id2
        myvars:
            Region: saq01
            District: saq02
            Rural:
                - rural
                - mapping:
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    small town: Urban
                    Small town: Urban
                    Small Town: Urban
                    SMALL TOWN: Urban
                    Small town (urban): Urban
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
                    Large town (urban): Urban
                    Meduim and large town: Urban
    df_geo:
        file: Pub_ETH_HouseholdGeovars_Y2.dta
        idxvars:
            i: household_id2
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - i
    # The cover page defines the surveyed household/EA roster; the geo file is
    # a strict enrichment (and carries households the cover does not).  A left
    # merge keeps the cover authoritative instead of letting orphan geo rows
    # arrive with a null v and collapse into a phantom cluster.
    merge_how: left
    final_index:
        - t
        - v
    # i was only the merge key; cluster_features is an EA-grain table.
    drop:
        - i

# panel_ids is built by the country-level _/panel_ids.py (declared
# `materialize: make` in ../../_/data_scheme.yml), which reads the correct
# household-grain cover sect_cover_hh_w2.dta (5,262 rows, unique).
#
# The wave-level block that used to sit here was a vestigial, WRONG-SOURCE
# duplicate: it pointed at ../Data/sect_cover_ls_w2.dta -- the LIVESTOCK
# section cover, whose grain is the agricultural HOLDER, not the household
# (3,812 rows / 3,670 households; 142 households have 2-3 holders).  It
# therefore presented a non-unique (t, i) index that groupby().first()
# silently collapsed, and it covered only 3,670 of the wave's 5,262
# households.  Deleted -- GH #323.

household_roster:
    file: sect1_hh_w2.dta
    idxvars:
        i: household_id2
        pid: individual_id2
    myvars:
        Sex: hh_s1q03
        # Age list = [age_yrs, age_mos, dob_day, dob_month_amharic,
        #             dob_year_eth_2dig, corrected_age].
        # ../_/2013-14.py converts the Ethiopian-calendar DOB to
        # Gregorian (via lsms_library.calendars) before feeding
        # age_handler, falls back to age_yrs / corrected_age, and
        # to floor(age_mos / 12) when none of those are populated.
        # Rescue: ~26 of 748 missing-age rows; precision: ~720
        # rows get DOB-derived fractional age.  GH #178.
        Age:
            - hh_s1q04_a
            - hh_s1q04_b
            - hh_s1q04g_1
            - hh_s1q04g_2
            - hh_s1q04g_3
            - hh_s1q04h
        Relationship: hh_s1q02
        MonthsAway: hh_s1q05

individual_education:
    # GH #323.  These MUST be the wave-native ids (household_id2 /
    # individual_id2), the same ids household_roster and shocks use for this
    # wave -- NOT the W1-baseline household_id / individual_id.
    #
    # Under the baseline ids, 5,248 of the 23,785 rows -- the W2 urban
    # refreshment sample, which has NO W1 antecedent -- carry a BLANK
    # household_id AND a BLANK individual_id, so they all collapsed into a
    # single phantom index tuple ('2013-14', '', ''), silently deleting
    # 5,247 real people from the table.
    #
    # household_id2/individual_id2 is 23,785/23,785 UNIQUE.  id_walk + the existing
    # panel_ids chain still map household_id2 back to the W1 baseline, so
    # cross-wave panel linkage is preserved (this is exactly what the roster
    # already relies on).  It also makes pid JOINABLE to household_roster,
    # which it was not before (roster pid = individual_id2, education pid was
    # individual_id).
    file: sect2_hh_w2.dta
    idxvars:
        i: household_id2
        pid: individual_id2
    myvars:
        # Highest grade completed (free-text survey labels).
        Educational Attainment:
            - hh_s2q05
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

shocks:
    file: sect8_hh_w2.dta
    idxvars:
        i: household_id2
        Shock: hh_s8q00
    myvars:
        AffectedIncome:
            - hh_s8q03_a
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedAssets:
            - hh_s8q03_b
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedProduction:
            - hh_s8q03_c
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedConsumption:
            - hh_s8q03_e
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        HowCoped0: hh_s8q04_a
        HowCoped1: hh_s8q04_b
        HowCoped2: hh_s8q04_c

assets:
    file: sect10_hh_w2.dta
    idxvars:
        i: household_id2
        j: hh_s10q0a
    myvars:
        Quantity: hh_s10q01

housing:
    file: sect9_hh_w2.dta
    idxvars:
        i: household_id2
    myvars:
        Roof:
            - hh_s9q06
            - mapping:
                Corrugated iron sheet: Corrugated Iron Sheet
                Thatch: Thatch
                Wood and mud: Wood And Mud
                Others: Other
                Reed / bamboo: Reed/Bamboo
                Plastic canvas: Plastic Canvas
                Concrete / Cement: Concrete/Cement
                Bricks: Bricks
                Asbestos: Asbestos
        Floor:
            - hh_s9q07
            - mapping:
                Mud / dung: Mud/Dung
                Cement screed: Cement Screed
                Cement tiles: Cement Tiles
                Reed / bamboo: Reed/Bamboo
                Ceramic / marble tiles: Ceramic/Marble Tiles
                Brick Tiles: Brick Tiles
                Wood planks: Wood Planks
                Plastic tiles: Plastic Tiles
                Others: Other
                Parquet of polished wood: Parquet Of Polished Wood
