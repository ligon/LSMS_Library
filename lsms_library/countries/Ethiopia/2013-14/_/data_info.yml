Country: Ethiopia
Wave: 2013-14

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: sect_cover_hh_w2.dta
        idxvars:
            v: ea_id2
        myvars:
            Region: saq01
            District: saq02
            Rural:
                - rural
                - mapping:
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    small town: Urban
                    Small town: Urban
                    Small Town: Urban
                    SMALL TOWN: Urban
                    Small town (urban): Urban
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
                    Large town (urban): Urban
                    Meduim and large town: Urban
    df_geo:
        file: Pub_ETH_HouseholdGeovars_Y2.dta
        idxvars:
            v: ea_id2
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v

panel_ids:
    file:
        - ../Data/sect_cover_ls_w2.dta
    idxvars:
        i: household_id2
    myvars:
        previous_i: household_id

household_roster:
    file: sect1_hh_w2.dta
    idxvars:
        i: household_id2
        pid: individual_id2
    myvars:
        Sex: hh_s1q03
        Age: hh_s1q04_a
        Relationship: hh_s1q02
        MonthsAway: hh_s1q05

shocks:
    file: sect8_hh_w2.dta
    idxvars:
        i: household_id2
        Shock: hh_s8q00
    myvars:
        AffectedIncome:
            - hh_s8q03_a
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedAssets:
            - hh_s8q03_b
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedProduction:
            - hh_s8q03_c
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedConsumption:
            - hh_s8q03_e
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        HowCoped0: hh_s8q04_a
        HowCoped1: hh_s8q04_b
        HowCoped2: hh_s8q04_c

assets:
    file: sect10_hh_w2.dta
    idxvars:
        i: household_id2
        j: hh_s10q0a
    myvars:
        Quantity: hh_s10q01

housing:
    file: sect9_hh_w2.dta
    idxvars:
        i: household_id2
    myvars:
        Roof:
            - hh_s9q06
            - mapping:
                Corrugated iron sheet: Corrugated Iron Sheet
                Thatch: Thatch
                Wood and mud: Wood And Mud
                Others: Other
                Reed / bamboo: Reed/Bamboo
                Plastic canvas: Plastic Canvas
                Concrete / Cement: Concrete/Cement
                Bricks: Bricks
                Asbestos: Asbestos
        Floor:
            - hh_s9q07
            - mapping:
                Mud / dung: Mud/Dung
                Cement screed: Cement Screed
                Cement tiles: Cement Tiles
                Reed / bamboo: Reed/Bamboo
                Ceramic / marble tiles: Ceramic/Marble Tiles
                Brick Tiles: Brick Tiles
                Wood planks: Wood Planks
                Plastic tiles: Plastic Tiles
                Others: Other
                Parquet of polished wood: Parquet Of Polished Wood
