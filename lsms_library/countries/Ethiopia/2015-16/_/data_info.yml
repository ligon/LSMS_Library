Country: Ethiopia
Wave: 2015-16

# cluster_features (GH #323).  Both sources are HOUSEHOLD-grain, so they are
# merged on household_id2 (1:1) and reduced to the EA grain by the declared
# `aggregation:` policy in ../../_/data_scheme.yml -- NOT merged on the cluster
# key v, which made the join many-to-many and produced a cartesian product
# (4,954 x 4,954 households over 432 EAs -> 57,786 rows).
# The geo file is keyed household_id2 only (it carries no household_id).
cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: sect_cover_hh_w3.dta
        idxvars:
            v: ea_id2
            i: household_id2
        myvars:
            Region: saq01
            District: saq02
            Rural:
                - rural
                - mapping:
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    small town: Urban
                    Small town: Urban
                    Small Town: Urban
                    SMALL TOWN: Urban
                    Small town (urban): Urban
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
                    Large town (urban): Urban
                    Meduim and large town: Urban
    df_geo:
        file: ETH_HouseholdGeovars_y3.dta
        idxvars:
            i: household_id2
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - i
    # The cover page defines the surveyed household/EA roster; the geo file is
    # a strict enrichment (and carries households the cover does not).  A left
    # merge keeps the cover authoritative instead of letting orphan geo rows
    # arrive with a null v and collapse into a phantom cluster.
    merge_how: left
    final_index:
        - t
        - v
    # i was only the merge key; cluster_features is an EA-grain table.
    drop:
        - i

panel_ids:
    # Built by bespoke script (materialize: make in data_scheme.yml).
    # W3 household_id2 chains through W2 to reach W1 baseline IDs;
    # see Ethiopia/_/panel_ids.py for details.
    file:
        - ../Data/sect_cover_hh_w3.dta
    idxvars:
        i: household_id2
    myvars:
        previous_i: household_id2

household_roster:
    file: sect1_hh_w3.dta
    idxvars:
        i: household_id2
        pid: individual_id2
    myvars:
        Sex: hh_s1q03
        # Age list = [age_in_years, age_in_months].  ../_/2015-16.py
        # falls back to floor(months/12) when years is missing.
        #
        # The DOB triplet (hh_s1q04g_*) exists but cannot be used:
        # the year is in the Ethiopian calendar (4-digit Eth year)
        # while the month is in English Gregorian ('November',
        # 'February', occasionally misspelled 'Sebtember').  The two
        # don't compose into a real date without a survey-team
        # convention that is undocumented; trying either interpretation
        # produces ages that disagree with the reported ages by ~7
        # years, so the precision improvement is not safe to apply.
        # We keep the years-or-months fallback only.  See GH #178 for
        # context and the calendar audit in PR notes.
        Age:
            - hh_s1q04a
            - hh_s1q04b
        Relationship: hh_s1q02
        MonthsAway: hh_s1q05

individual_education:
    # GH #323.  These MUST be the wave-native ids (household_id2 /
    # individual_id2), the same ids household_roster and shocks use for this
    # wave -- NOT the W1-baseline household_id / individual_id.
    #
    # Under the baseline ids, SPLIT-OFF households share their parent's W1
    # household_id (e.g. baseline HH 01050100105031 appears as W3 HHs
    # 010501020100105031 and 010501088800105031), so 8 rows collapsed --
    # merging two REAL, DISTINCT people (individual 0105010010503101 has
    # '10th Grade Complete' in one and '9th Grade Complete' in the other).
    #
    # household_id2/individual_id2 is 23,393/23,393 UNIQUE.  id_walk + the existing
    # panel_ids chain still map household_id2 back to the W1 baseline, so
    # cross-wave panel linkage is preserved (this is exactly what the roster
    # already relies on).  It also makes pid JOINABLE to household_roster,
    # which it was not before (roster pid = individual_id2, education pid was
    # individual_id).
    file: sect2_hh_w3.dta
    idxvars:
        i: household_id2
        pid: individual_id2
    myvars:
        # Highest grade completed (free-text survey labels).
        Educational Attainment:
            - hh_s2q05
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

shocks:
    file: sect8_hh_w3.dta
    idxvars:
        i: household_id2
        Shock: hh_s8q00
    myvars:
        AffectedIncome:
            - hh_s8q03_a
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedAssets:
            - hh_s8q03_b
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedProduction:
            - hh_s8q03_c
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedConsumption:
            - hh_s8q03_e
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        HowCoped0: hh_s8q04_a
        HowCoped1: hh_s8q04_b
        HowCoped2: hh_s8q04_c

assets:
    file: sect10_hh_w3.dta
    idxvars:
        i: household_id2
        j: hh_s10q0a
    myvars:
        Quantity: hh_s10q01

housing:
    file: sect9_hh_w3.dta
    idxvars:
        i: household_id2
    myvars:
        Roof:
            - hh_s9q06
            - mapping:
                Corrugated iron sheet: Corrugated Iron Sheet
                Thatch: Thatch
                Wood and mud: Wood And Mud
                Plastic canvas: Plastic Canvas
                Others: Other
                Reed / bamboo: Reed/Bamboo
                Concrete / Cement: Concrete/Cement
                Asbestos: Asbestos
                Bricks: Bricks
        Floor:
            - hh_s9q07
            - mapping:
                Mud / dung: Mud/Dung
                Cement screed: Cement Screed
                Cement tiles: Cement Tiles
                Ceramic / marble tiles: Ceramic/Marble Tiles
                Brick Tiles: Brick Tiles
                Reed / bamboo: Reed/Bamboo
                Wood planks: Wood Planks
                Plastic tiles: Plastic Tiles
                Others: Other
                Parquet of polished wood: Parquet Of Polished Wood
