Country: Ethiopia
Wave: 2015-16

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: sect_cover_hh_w3.dta
        idxvars:
            i: household_id2
            v: ea_id2
        myvars:
            Region: saq01
            District: saq02
            Rural:
                - rural
                - mapping:
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    small town: Urban
                    Small town: Urban
                    Small Town: Urban
                    SMALL TOWN: Urban
                    Small town (urban): Urban
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
                    Large town (urban): Urban
                    Meduim and large town: Urban
    df_geo:
        file: ETH_HouseholdGeovars_y3.dta
        idxvars:
            v: ea_id2
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - v
    final_index:
        - t
        - v

panel_ids:
    # Built by bespoke script (materialize: make in data_scheme.yml).
    # W3 household_id2 chains through W2 to reach W1 baseline IDs;
    # see Ethiopia/_/panel_ids.py for details.
    file:
        - ../Data/sect_cover_hh_w3.dta
    idxvars:
        i: household_id2
    myvars:
        previous_i: household_id2

household_roster:
    file: sect1_hh_w3.dta
    idxvars:
        i: household_id2
        pid: individual_id2
    myvars:
        Sex: hh_s1q03
        Age: hh_s1q04a
        Relationship: hh_s1q02

shocks:
    file: sect8_hh_w3.dta
    idxvars:
        i: household_id2
        Shock: hh_s8q00
    myvars:
        AffectedIncome:
            - hh_s8q03_a
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedAssets:
            - hh_s8q03_b
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedProduction:
            - hh_s8q03_c
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedConsumption:
            - hh_s8q03_e
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        HowCoped0: hh_s8q04_a
        HowCoped1: hh_s8q04_b
        HowCoped2: hh_s8q04_c

assets:
    file: sect10_hh_w3.dta
    idxvars:
        i: household_id2
        j: hh_s10q0a
    myvars:
        Quantity: hh_s10q01
