Country: Ethiopia
Wave: 2015-16

# cluster_features (GH #323 site 4).  Both sources are HOUSEHOLD-grain, so
# they are merged on the household id (1:1) and reduced to the (t, v) EA grain
# by Wave.cluster_features' existing GH #161 collapse -- mean() for
# Latitude/Longitude (the cluster centroid), first() for Region/District/Rural.
# That is why `i` is in `final_index`: the collapse only fires when `i` is an
# index level.
#
# Merging on the CLUSTER key v instead made the join many-to-many and produced
# a CARTESIAN PRODUCT: 4,954 x 4,954 households over 432 EAs -> 57,786 rows, of
# which 52,832 were phantom.  The downstream groupby().first() then tidied the
# evidence away, so the table reported clean.
#
# The key is household_id2 (the W2 re-identified id, which W3 inherits) -- the
# only id this geo file carries, and the i that sample/household_roster emit
# for this wave (see _/CONTENTS.org).  Verified unique and blank-free in BOTH
# frames (4,954 / 4,954 rows, 0 keys duplicated in both).
cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: sect_cover_hh_w3.dta
        idxvars:
            v: ea_id2
            i: household_id2
        myvars:
            Region: saq01
            District: saq02
            Rural:
                - rural
                - mapping:
                    rural: Rural
                    Rural: Rural
                    RURAL: Rural
                    small town: Urban
                    Small town: Urban
                    Small Town: Urban
                    SMALL TOWN: Urban
                    Small town (urban): Urban
                    urban: Urban
                    Urban: Urban
                    URBAN: Urban
                    Large town (urban): Urban
                    Meduim and large town: Urban
    df_geo:
        file: ETH_HouseholdGeovars_y3.dta
        idxvars:
            i: household_id2
        myvars:
            Latitude: lat_dd_mod
            Longitude: lon_dd_mod
    merge_on:
        - i
    # The cover page is authoritative for which households exist; the geo file
    # is a strict enrichment.  `left` keeps orphan geo households from arriving
    # with a null v and collapsing into one phantom cluster.  W3 has 0 such
    # orphans, but the declaration is uniform across the five waves, which do.
    merge_how: left
    final_index:
        - t
        - v
        - i

panel_ids:
    # Built by bespoke script (materialize: make in data_scheme.yml).
    # W3 household_id2 chains through W2 to reach W1 baseline IDs;
    # see Ethiopia/_/panel_ids.py for details.
    file:
        - ../Data/sect_cover_hh_w3.dta
    idxvars:
        i: household_id2
    myvars:
        previous_i: household_id2

household_roster:
    file: sect1_hh_w3.dta
    idxvars:
        i: household_id2
        pid: individual_id2
    myvars:
        Sex: hh_s1q03
        # Age list = [age_in_years, age_in_months].  ../_/2015-16.py
        # falls back to floor(months/12) when years is missing.
        #
        # The DOB triplet (hh_s1q04g_*) exists but cannot be used:
        # the year is in the Ethiopian calendar (4-digit Eth year)
        # while the month is in English Gregorian ('November',
        # 'February', occasionally misspelled 'Sebtember').  The two
        # don't compose into a real date without a survey-team
        # convention that is undocumented; trying either interpretation
        # produces ages that disagree with the reported ages by ~7
        # years, so the precision improvement is not safe to apply.
        # We keep the years-or-months fallback only.  See GH #178 for
        # context and the calendar audit in PR notes.
        Age:
            - hh_s1q04a
            - hh_s1q04b
        Relationship: hh_s1q02
        MonthsAway: hh_s1q05

# individual_education (GH #323).  The ids MUST be the W3-native
# household_id2 / individual_id2 -- the same pair household_roster and shocks
# already use for this wave -- NOT the W1-baseline household_id /
# individual_id.
#
# household_id is the W1 BASELINE identity, and a household that SPLIT OFF
# between waves inherits its parent's baseline id: W3 households
# 010501020100105031 and 010501088800105031 (the `8888` marks the split-off)
# both carry baseline household_id 01050100105031.  So (household_id,
# individual_id) is 23,385 unique of 23,393 rows -- 16 rows in 8 colliding
# pairs -- and the framework's groupby().first() collapse then MERGES TWO REAL,
# DISTINCT PEOPLE.  They disagree: baseline individual 0105010010503101 is
# '10th Grade Complete' in one household and '9th Grade Complete' in the other;
# ...3105 is '3rd Grade Complete' vs '7th Grade Complete'.  first() publishes
# one and destroys the other.  (household_id2, individual_id2) is 23,393 of
# 23,393 unique.
#
# It was also breaking the join to household_roster, whose pid for this wave
# IS individual_id2: BEFORE this change, 0 of the 12,633 built (i, pid) pairs
# for t=2015-16 matched a roster row (and 1,231 of the 4,283 education
# "households" existed nowhere in the roster), while W1/W4/W5 -- which use the
# wave-native ids -- matched 100%.  Panel linkage is unaffected: id_walk plus
# the existing panel_ids chain still maps household_id2 back to the W1
# baseline, exactly as household_roster already relies on.
individual_education:
    file: sect2_hh_w3.dta
    idxvars:
        i: household_id2
        pid: individual_id2
    myvars:
        # Highest grade completed (free-text survey labels).
        Educational Attainment:
            - hh_s2q05
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

shocks:
    file: sect8_hh_w3.dta
    idxvars:
        i: household_id2
        Shock: hh_s8q00
    myvars:
        AffectedIncome:
            - hh_s8q03_a
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedAssets:
            - hh_s8q03_b
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedProduction:
            - hh_s8q03_c
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        AffectedConsumption:
            - hh_s8q03_e
            - mapping:
                Decrease: True
                Did Not Change: False
                Increase: True
        HowCoped0: hh_s8q04_a
        HowCoped1: hh_s8q04_b
        HowCoped2: hh_s8q04_c

assets:
    file: sect10_hh_w3.dta
    idxvars:
        i: household_id2
        j: hh_s10q0a
    myvars:
        Quantity: hh_s10q01

housing:
    file: sect9_hh_w3.dta
    idxvars:
        i: household_id2
    myvars:
        Roof:
            - hh_s9q06
            - mapping:
                Corrugated iron sheet: Corrugated Iron Sheet
                Thatch: Thatch
                Wood and mud: Wood And Mud
                Plastic canvas: Plastic Canvas
                Others: Other
                Reed / bamboo: Reed/Bamboo
                Concrete / Cement: Concrete/Cement
                Asbestos: Asbestos
                Bricks: Bricks
        Floor:
            - hh_s9q07
            - mapping:
                Mud / dung: Mud/Dung
                Cement screed: Cement Screed
                Cement tiles: Cement Tiles
                Ceramic / marble tiles: Ceramic/Marble Tiles
                Brick Tiles: Brick Tiles
                Reed / bamboo: Reed/Bamboo
                Wood planks: Wood Planks
                Plastic tiles: Plastic Tiles
                Others: Other
                Parquet of polished wood: Parquet Of Polished Wood
