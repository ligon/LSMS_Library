Country: India
Wave: 1997-98

sample:
    file:
        - ../Data/HHLIST.DTA
    idxvars:
        i: hhcode
    myvars:
        v: village
        weight: weight
        panel_weight: weight
        # Raw `stratum` is a STRING column with exactly four values --
        # 'UP-qual', 'UP-other', ' B-qual', ' B-other' (note the leading space
        # on the Bihar pair).  It is a state x sampling-phase stratum and is
        # perfectly collinear with `state` (UP vs Bihar); crosstab confirms
        # every ' B-*' row is Bihar and every 'UP-*' row is Uttar Pradesh.
        #
        # It carries NO urban/rural information.  The float-keyed mapping that
        # used to sit here (1.0: 'Urban Poor' ... 4.0: 'Rural Non-Poor', and a
        # parallel one deriving `Rural`) never matched a single row -- the keys
        # are floats, the data are strings -- so `Rural` reached the user as the
        # raw stratum label ('UP-other', ' B-qual', ...) for 100% of households.
        # See GH #602.
        #
        # `Rural` is therefore DELETED rather than re-mapped: there is no
        # urban/rural variable in this survey to derive it from, and inventing
        # one (e.g. asserting the survey is rural-only) would replace a visibly
        # wrong value with an invisibly wrong one.  India simply has no Rural
        # indicator.  Only the whitespace is normalised on `strata` below.
        strata:
            - stratum
            - mapping:
                'UP-qual': UP-qual
                'UP-other': UP-other
                ' B-qual': B-qual
                ' B-other': B-other

cluster_features:
  file:
      - ../Data/PSULIST.DTA
  idxvars:
      v: village
  myvars:
      Region: state
      District: district

household_roster:
  # i=hhcode matches sample().i (and interview_date/individual_education/housing,
  # which read this same SECT01A.DTA with i:hhcode), so _join_v_from_sample
  # resolves v.  The roster's old i:hh was the within-village household number,
  # which did not match sample()'s i:hhcode and broke the v-join (GH #324).  v is
  # NOT declared here -- the framework joins it from sample() (only
  # cluster_features owns v; see CLAUDE.md).
  file:
      - ../Data/SECT01A.DTA
  idxvars:
      i: hhcode
      pid: idcode
  myvars:
      Sex: v01a02
      Age: v01a04
      Relationship: v01a03
      MonthsSpent: v01a10
      Educational Attainment: v01a05
individual_education:
  file:
      - ../Data/SECT01A.DTA
  idxvars:
      i: hhcode
      pid: idcode
      v: village
  myvars:
      Educational Attainment:
          - v01a05
          - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

housing:
  file:
      - ../Data/SECT03AB.DTA
  idxvars:
      i: hhcode
  myvars:
      Tenure: v03a01
      Roof: v03a05
      Floor: v03a06
      Water: v03b01
      Toilet: v03b09

employment:
  # i=hhcode matches sample().i (HHLIST.DTA uses i:hhcode), so
  # _join_v_from_sample resolves v.  The old i:hh was the within-village
  # household number, which did not match sample()'s i:hhcode and broke the
  # v-join (sibling of the household_roster defect fixed in GH #324).  v is
  # NOT declared here -- the framework joins it from sample().
  file:
      - ../Data/SECT02AD.DTA
  idxvars:
      i: hhcode
      pid: idcode
  myvars:
      Cash_per_day: v02b02
      Rural: v02a05b
        



