    myvars:
        v: village
        weight: weight
        panel_weight: weight
        strata:
            - stratum
            - mapping:
                1.0: Urban Poor
                2.0: Urban Non-Poor
                3.0: Rural Poor
                4.0: Rural Non-Poor
