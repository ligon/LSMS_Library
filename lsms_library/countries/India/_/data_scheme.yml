Country: India

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    # No Rural: this survey records no urban/rural variable.  It was previously
    # derived from `stratum` (a state x sampling-phase stratum, collinear with
    # `state`) via a float-keyed map against a string column, which never fired --
    # so the raw stratum label leaked into Rural for 100% of households.  See
    # GH #602 and ../_/CONTENTS.org.

  cluster_features:
    index: (t, v)
    Region: str
    Rural:
      type: str
      optional: true
    District: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
    Educational Attainment: str
  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  employment:
    index: (t, i, pid)
    Cash_per_day: float
    Rural: str

  housing:
    index: (t, i)
    Tenure: str
    Roof: str
    Floor: str
    Water: str
    Toilet: str

  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make

  months_food_inadequate:
    index: (t, i)
    MonthsInadequate: int
    AnyInadequate: bool
    materialize: make

  assets:
    # Consumer durables owned (SECT07D §7D). Item-level (t, i, j); j is the
    # recovered durable-item label.  §7D records counts only, so Quantity is
    # the sole measure (no reported value).
    index: (t, i, j)
    Quantity: float
    materialize: make
