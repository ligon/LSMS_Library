Country: India

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    # No Rural: this survey records no urban/rural variable.  It was previously
    # derived from `stratum` (a state x sampling-phase stratum, collinear with
    # `state`) via a float-keyed map against a string column, which never fired --
    # so the raw stratum label leaked into Rural for 100% of households.  See
    # GH #602 and ../_/CONTENTS.org.

  cluster_features:
    index: (t, v)
    Region: str
    Rural:
      type: str
      optional: true
    District: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
    Educational Attainment: str
  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  employment:
    # ACTIVITY-level (SECT02AD §2A-D): one row = one JOB, not one person.
    # `act` is the per-person activity slot (A..T); a person holds 1-14
    # activities and EACH carries its own wage, so `act` is part of the key.
    # Dropping it made the index non-unique (6,194 dup person tuples) and the
    # framework collapsed it with a skipna groupby().first(), destroying 62% of
    # wage observations and fabricating cross-row values (GH #323).  Do NOT
    # narrow this back to (t, i, pid) and do NOT add an `aggregation:` --
    # Cash_per_day is a per-day RATE, so neither `first` nor `sum` is a valid
    # reducer; collapsing to person level is the CONSUMER's decision (see the
    # long note in 1997-98/_/data_info.yml).  The widened index is the guard.
    index: (t, i, pid, act)
    Cash_per_day: float
    # per-ACTIVITY workplace location, NOT the household Rural flag (which
    # India does not have -- GH #602).  Misnamed; see data_info.yml.
    Rural: str

  housing:
    index: (t, i)
    Tenure: str
    Roof: str
    Floor: str
    Water: str
    Toilet: str

  interview_date:
    index: (t, i)
    Int_t: datetime
    materialize: make

  months_food_inadequate:
    index: (t, i)
    MonthsInadequate: int
    AnyInadequate: bool
    materialize: make

  assets:
    # Consumer durables owned (SECT07D §7D). Item-level (t, i, j); j is the
    # recovered durable-item label.  §7D records counts only, so Quantity is
    # the sole measure (no reported value).
    index: (t, i, j)
    Quantity: float
    materialize: make
