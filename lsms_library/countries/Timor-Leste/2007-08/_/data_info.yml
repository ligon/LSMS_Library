Country: Timor-Leste
Wave: 2007-08

household_roster:
    file:
        - ../Data/indiv.dta
    idxvars:
        i: hh_id
        pid: pid
    myvars:
        Sex: q01a01
        Relationship: q01a02
        Age: q01a05y

interview_date:
    file: ../Data/basicvars.dta
    idxvars:
        i: hh_id
    myvars:
        Int_t:
            - intday
            - intmonth
            - intyear
    converted_categoricals: False

sample:
    file: ../Data/basicvars.dta
    idxvars:
        i: hh_id
    myvars:
        v: cluster
        weight: hhweight
        strata: strata
        Rural:
            - urban
            - mapping:
                0: Rural
                1: Urban

cluster_features:
    # basicvars.dta; one row per cluster v=cluster. Region=region; Rural from
    # urban (0=Rural, 1=Urban). 300 clusters, constant within cluster.
    file:
        - ../Data/basicvars.dta
    idxvars:
        v: cluster
    myvars:
        Region: region
        Rural:
            - urban
            - mapping:
                0: Rural
                1: Urban