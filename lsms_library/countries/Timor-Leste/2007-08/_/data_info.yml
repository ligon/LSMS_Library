Country: Timor-Leste
Wave: 2007-08

household_roster:
    file:
        - ../Data/indiv.dta
    idxvars:
        i: hh_id
        pid: pid
    myvars:
        Sex: q01a01
        Relationship: q01a02
        Age: q01a05y

housing:
    # hhold.dta dwelling module; value labels already human-readable strings.
    # q02a01 walls, q02a02 roof, q02a03 floor, q02a06 number of rooms
    # (q02a04 type / q02a05 condition / q02a07 business rooms are outside the
    # canonical housing subset).
    file:
        - ../Data/hhold.dta
    idxvars:
        i: hh_id
    myvars:
        Walls: q02a01
        Roof: q02a02
        Floor: q02a03
        Rooms: q02a06

interview_date:
    file: ../Data/basicvars.dta
    idxvars:
        i: hh_id
    myvars:
        Int_t:
            - intday
            - intmonth
            - intyear
    converted_categoricals: False

sample:
    file: ../Data/basicvars.dta
    idxvars:
        i: hh_id
    myvars:
        v: cluster
        weight: hhweight
        strata: strata
        Rural:
            - urban
            - mapping:
                0: Rural
                1: Urban

plot_features:
    # Land module: plot.dta, one clean LONG row per (hh_id, pcode), no
    # duplicates.  Variable labels confirmed via pyreadstat metadata:
    #   q09a04 "Plot area (m2)"; q09a06 "Tenure status of the plot";
    #   q09a09 "Irrigation of the plot".
    # AreaUnit is the constant 'square meters' (mapping.py AreaUnit()).
    # Irrigated: 'Not irrigated' -> False, any irrigation method -> True.
    # SoilType / TenureSystem absent in the source (q09a05 is land-use,
    # q09a08 is slope -- neither a soil class).
    file:
        - ../Data/plot.dta
    idxvars:
        i: hh_id
        plot_id: pcode
    myvars:
        Area: q09a04
        AreaUnit:
            - q09a04
            - mapping: AreaUnit
        Tenure: q09a06
        Irrigated:
            - q09a09
            - mapping: Irrigated

cluster_features:
    # basicvars.dta; one row per cluster v=cluster. Region=region; Rural from
    # urban (0=Rural, 1=Urban). 300 clusters, constant within cluster.
    file:
        - ../Data/basicvars.dta
    idxvars:
        v: cluster
    myvars:
        Region: region
        Rural:
            - urban
            - mapping:
                0: Rural
                1: Urban