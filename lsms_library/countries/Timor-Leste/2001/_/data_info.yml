Country: Timor-Leste
Wave: 2001

household_roster:
    file:
        - ../Data/S01A1.DTA
    idxvars:
        i: identif
        pid: idperson
    myvars:
        Sex: s01a02
        Relationship: s01a03
        Age: s01a06a

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: ../Data/S00.DTA
        idxvars:
            i: identif
            v: id4
        myvars: {}  # interview_date is not declared in data_scheme; stray
                    # `int_t: s00_vis1` removed (GH #163 item 1).
    df_weights:
        file: ../Data/WEIGHT.DTA
        idxvars:
            v: id4
        myvars:
            weight: hhweight
            strata: strata
            Rural:
                - urbrural
                - mapping:
                    1: Urban
                    2: Rural
    merge_on:
        - v
    final_index:
        - i
        - t
