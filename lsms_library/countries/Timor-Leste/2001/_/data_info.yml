Country: Timor-Leste
Wave: 2001

household_roster:
    file:
        - ../Data/S01A1.DTA
    idxvars:
        i: identif
        pid: idperson
    myvars:
        Sex: s01a02
        Relationship: s01a03
        Age: s01a06a

housing:
    # S02A.DTA dwelling module; value labels already human-readable strings.
    # s02a01 walls, s02a02 roof, s02a03 floor (s02a04 type / s02a05 condition
    # are not part of the canonical housing subset). No room-count question.
    file:
        - ../Data/S02A.DTA
    idxvars:
        i: identif
    myvars:
        Walls: s02a01
        Roof: s02a02
        Floor: s02a03

interview_date:
    file: ../Data/S00.DTA
    idxvars:
        i: identif
    myvars:
        Int_t: s00_vis1   # six-digit DDMMYY integer; parsed by Int_t() in mapping.py

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: ../Data/S00.DTA
        idxvars:
            i: identif
            v: id4
        myvars: {}  # cover-page identifiers only; interview_date now wired
                    # as its own table above (GH #207).
    df_weights:
        file: ../Data/WEIGHT.DTA
        idxvars:
            v: id4
        myvars:
            weight: hhweight
            strata: strata
            Rural:
                - urbrural
                - mapping:
                    1: Urban
                    2: Rural
    merge_on:
        - v
    final_index:
        - i
        - t

cluster_features:
    # WEIGHT.DTA is already one row per cluster (id4); Region=region,
    # Rural from urbrural (1=Urban, 2=Rural). 300 clusters.
    file:
        - ../Data/WEIGHT.DTA
    idxvars:
        v: id4
    myvars:
        Region: region
        Rural:
            - urbrural
            - mapping:
                1: Urban
                2: Rural
