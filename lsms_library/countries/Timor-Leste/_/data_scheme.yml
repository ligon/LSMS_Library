Country: Timor-Leste  

Data Scheme:
  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str

  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight:
      type: float
      optional: true
    strata: str
    Rural: str

  cluster_features:
    # GH #323.  The 2007-08 wave extracts this from basicvars.dta, the HOUSEHOLD
    # cover file (4477 rows, one per hh_id, but only 300 distinct clusters), so
    # the declared (t, v) index arrives with 4177 duplicate tuples.  The collapse
    # to 300 is INTENDED and lossless -- each household merely carries a
    # redundant copy of its cluster's attributes -- but it used to be performed
    # SILENTLY by _normalize_dataframe_index's groupby().first(), i.e. by the
    # same code path that vaporises 32,026 people from Mali's roster.  A correct
    # collapse was indistinguishable from a catastrophic one.
    #
    # `on_duplicate_index: unique` DECLARES it and makes it machine-checked:
    # every (t, v) group must carry a single distinct value of Region and Rural,
    # or the build RAISES.  Verified 0/300 conflicts today, so this costs
    # nothing now; it exists so that a future wave in which Region genuinely
    # varies within a cluster fails LOUDLY instead of silently picking one.
    # (The 2001 wave needs no declaration: it reads WEIGHT.DTA, which is already
    # one row per cluster, so its index is unique by construction.)
    index: (t, v)
    aggregation:
      on_duplicate_index: unique
    Region: str
    Rural: str

  housing:
    index: (t, i)
    Walls: str
    Roof: str
    Floor: str
    Rooms:
      type: float
      optional: true

  interview_date:
    index: (t, i)
    Int_t: datetime

  life_satisfaction:
    index: (t, i, Domain)
    Satisfaction: str
    materialize: make

  months_food_inadequate:
    index: (t, i)
    MonthsInadequate: int
    AnyInadequate: bool
    materialize: make
  plot_features:
    # Lasting plot-level characteristics from the 2007-08 TLSLS-2 land
    # module (plot.dta, q09a*).  One row per (household, plot); plot.dta
    # is a clean LONG roster keyed on (hh_id, pcode) with no duplicates,
    # so this is the YAML path.  Source variable labels confirmed:
    #   pcode  = "Plot number"            -> plot_id
    #   q09a04 = "Plot area (m2)"         -> Area (AreaUnit = square meters)
    #   q09a06 = "Tenure status of the plot" -> Tenure
    #   q09a09 = "Irrigation of the plot" -> Irrigated (bool; non-"Not
    #            irrigated" source method -> True)
    # SoilType is NOT declared: q09a05 ("Kind of land") is a land-use
    # class (Plantation/Tree crop/Grassland/...) and q09a08 is slope,
    # neither a soil classification.  TenureSystem absent in the source.
    # The 2001 wave (TLSLS-1) has no plot/land module -> 2007-08 only.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    Irrigated: bool
