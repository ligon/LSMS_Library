Country: Pakistan
Wave: 1991
# cluster_features is built by _/cluster_features.py (materialize: make).
#
# It used to live here, extracted from F00A.DTA (the household COVER SHEET) with
# `idxvars: {v: clust, i: hid}`.  The `i: hid` level made the extractor emit one
# row per HOUSEHOLD (4,957) into a table whose declared index is (t, v) (301
# clusters); _normalize_dataframe_index then dropped `i` and collapsed the table
# with a silent groupby().first(), discarding 4,656 rows.  The columns were wrong
# too -- `Region: religion` wired the household's religion code to a geography
# column, and `Language: langint` was the language of the interview; neither is a
# cluster attribute.  Real cluster-level geography comes from REGIONS.DTA.  A
# household-grain source cannot be made unique-by-cluster in YAML, so this table
# moved to the script path.  GH #323.

sample:
    dfs:
        - df_cover
        - df_region
    df_cover:
        file: F00A.DTA
        idxvars:
            i: hid
        myvars:
            v: clust
    df_region:
        file: REGIONS.DTA
        idxvars:
            i: hhcode
        myvars:
            Rural:
                - urbrural
                - mapping:
                    1.0: Urban
                    2.0: Rural
            strata: province
    merge_on:
        - i
    final_index:
        - i
        - t

housing:
    dfs:
        - df_a
        - df_b
        - df_c
    df_a:
        file: F02A.DTA
        idxvars:
            i: hid
        myvars:
            Walls:
                - walls
                - mapping:
                    1: Baked Bricks/Stones - Cement Bonded
                    2: Baked Bricks/Stones - Mud Bonded
                    3: Wood/Branches
                    4: Concrete
                    5: Unbaked Bricks
                    6: Other Permanent Materials
                    7: No Outside Walls
            Floor:
                - floor
                - mapping:
                    1: Earth
                    2: Wood
                    3: Stone/Brick
                    4: Cement/Tile
                    5: Other
            Roof:
                - roof
                - mapping:
                    1: Straw/Thatch
                    2: Earth/Mud
                    3: Wood/Planks
                    4: Galvanized Iron
                    5: Concrete/Cement
                    6: Other
            Rooms: rooms
    df_b:
        file: F02B.DTA
        idxvars:
            i: hid
        myvars:
            Tenure:
                - occstat
                - mapping:
                    1: Owner
                    2: Renter
                    3: Provided Free of Charge
                    4: Squatting
                    5: Do Not Know
    df_c:
        file: F02C.DTA
        idxvars:
            i: hid
        myvars:
            Water:
                - dwater
                - mapping:
                    1: Tap in House
                    2: Outside Private Tap
                    3: Public Standpipe
                    4: Covered Well
                    5: Open Well
                    6: Canal/River
                    7: Delivery/Water Seller
                    8: Hand Pump in the Household
                    9: Hand Pump Outside the Household
                    10: Motor Pump in the Household
                    11: Motor Pump Outside the Household
                    12: Other
            Toilet:
                - toilet
                - mapping:
                    1.0: Communal Latrine
                    2.0: Household Flush (Municipal Sewer)
                    3.0: Household Flush (Septic Tank)
                    4.0: Household Non-Flush
                    5.0: No Toilet
    merge_on:
        - i
    final_index:
        - i
        - t

household_roster:
    file:
        - F01A.DTA
    idxvars:
        v: clust
        i: hid
        pid: pid
    myvars:
        Sex:
            - sex
            - mapping:
                1: Male
                2: Female
        Age: agey
        MonthsAway: mosabs
        Marital:
            - mar
            - mapping:
                1: Married
                2: Divorced
                3: Separated
                4: Widow/Widower
                5: Never Married

        Relationship: 
            - rel
            - mapping:
                1: Head
                2: Wife or Husband
                3: Son/Daughter
                4: Grandchild
                5: Father or Mother
                6: Sister or Brother
                7: Niece or Nephew
                8: Son/Daughter-in-law
                9: Brother/Sister-in-law
                10: Father/Mother-in-law
                11: Other Relative
                12: Servant/Tenant
                13: Other Not Related


