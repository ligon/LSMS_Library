Country: Togo
Wave: 2018

sample:
    dfs:
        - df_cover
        - df_weights
    df_cover:
        file: ../Data1/s00_me_tgo2018.dta
        idxvars:
            v: grappe
            i:
                - grappe
                - menage
        myvars:
            strata: s00q01
            Rural:
                - s00q04
                - mapping:
                    Rural: Rural
                    rural: Rural
                    RURAL: Rural
                    Urbain: Urban
                    urbain: Urban
                    URBAIN: Urban
    df_weights:
        file: ../Data1/ehcvm_ponderations_tgo2018.dta
        idxvars:
            v: grappe
        myvars:
            weight: hhweight
            panel_weight: hhweight
    merge_on:
        - v
    final_index:
        - i
        - t

cluster_features:
    dfs:
        - df_main
        - df_geo
    df_main:
        file: ../Data1/s00_me_tgo2018.dta
        idxvars:
            v: grappe
        myvars:
            Region: s00q01
            Rural:
                - s00q04
                - mapping:
                    Rural: Rural
                    rural: Rural
                    RURAL: Rural
                    Urbain: Urban
                    urbain: Urban
                    URBAIN: Urban
    df_geo:
        file: ../Data1/grappe_gps_tgo2018.dta
        idxvars:
            v: grappe
        myvars:
            Latitude: coordonnes_gps__Latitude
            Longitude: coordonnes_gps__Longitude
    merge_on:
        - v
    final_index:
        - t
        - v

