Country: Togo

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str
  cluster_features:
    index: (t, v)
    Region: str
    Rural: str
    Latitude: float
    Longitude: float
  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: int
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
  individual_education:
    index: (t, i, pid)
    Educational Attainment: str
  subjective_well_being:
    # EHCVM §20 'Pauvreté relative' ladder item s20q05: self-placement
    # on a 4-point welfare ladder (Très pauvre=1, Pauvre=2, Moyen=3,
    # Riche=4; higher = better off, as in Malawi/Cantril).  Ne sait pas /
    # Refus / NaN -> NaN.  Only the Own-placement item exists in EHCVM;
    # no Neighbors/Friends steps (unlike Malawi).
    index: (t, i)
    Own Step: int
  food_acquired:
    # Canonical post-2026-05-05 (GH #169): s axis carries acquisition
    # source (purchased / produced / inkind / other).  The wave-level
    # mapping.py food_acquired() function reshapes the wide-form
    # (Quantity-total, Produced-subset, Expenditure) into long-form on s.
    # `visit` (vague) is dropped: in EHCVM 2018 it's a sample split
    # (each grappe surveyed in exactly one vague), not a repeated measure,
    # so households are uniquely keyed by (t, v, i, j, u, s) without it.
    index: (t, v, i, j, u, s)
    Quantity: float
    Expenditure: float
  assets:
    index: (t, i, j)
    Quantity: float
    Age: float
    Value: float
    Purchase Price: float
  shocks:
    index: (t, i, Shock)
    AffectedIncome: bool
    AffectedAssets: bool
    AffectedProduction: bool
    AffectedConsumption: bool
    HowCoped0: str
    HowCoped1: str
    HowCoped2:
      type: str
      optional: true

  food_security:
    # FAO Food Insecurity Experience Scale (FIES), EHCVM §8A
    # 'Sécurité alimentaire'.  Recall period: last 12 months.  The 8
    # experience items s08aq01..s08aq08 map IN ORDER to the canonical
    # FIES bools; FIES_score (0-8) is the count of True items, computed
    # by the food_security() function in 2018/_/mapping.py.
    index: (t, i)
    Worried: bool
    HealthyDiet: bool
    FewFoods: bool
    SkippedMeal: bool
    AteLess: bool
    RanOut: bool
    Hungry: bool
    WholeDay: bool
    FIES_score: int

  housing:
    index: (t, i)
    Roof: str
    Floor: str

  interview_date:
    index: (t, i)
    Int_t: datetime

  plot_features:
    # Lasting parcel-level characteristics from the EHCVM agriculture
    # module s16a (GH #167; Mali is the EHCVM reference, PR #284).  Togo
    # has a single EHCVM wave (2018).  The source file lives in
    # 2018/Data1/ (NOT 2018/Data/, which holds only _forEthan extracts).
    # plot_id = "{field_no}_{parcel_no}".  Latitude / Longitude are NOT
    # emitted — EHCVM s16a has no decimal-degree parcel GPS (s16aq47 is
    # an area, not a coordinate); deferred as in Uganda.
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    SoilType: str
    Irrigated: bool
    materialize: make

  livestock:
    # Item-level livestock roster (EHCVM cluster; cloned from Niger
    # 2018-19, GAP 4).  One row per REPORTED (household, species) the
    # household owns/raises, from the EHCVM §17 'Élevage' roster
    # (2018/Data1/s17_me_tgo2018.dta, NOT the bespoke Togo_survey2018_*
    # files).  Source: s17q02 species (1-11, harmonize_species_ehcvm),
    # s17q06 head, s17q08 bought, s17q10 sold; s17q03==1 owned gate
    # (roster is pre-filtered to owned).
    #
    # GRAIN (t, i, animal) — NO v level: 'livestock' is in the
    # framework's _no_v_join set, so the household-level rows carry no
    # cluster level and the framework does NOT join one from sample().
    # `animal` is the harmonized species Preferred Label
    # (harmonize_species_ehcvm).
    #
    # COLUMNS (reported, item-level): HeadCount (owned now), HeadAcquired
    # (number bought in the last 12 months), HeadSold (number sold on the
    # hoof in the last 12 months).  A `Value` (herd value) column is
    # intentionally OMITTED: EHCVM s17 asks no current herd value (only
    # purchase / sale FLOW values), so an all-NaN Value column would only
    # trip the sanity checker.
    index: (t, i, animal)
    HeadCount: float
    HeadAcquired: float
    HeadSold: float
    materialize: make
