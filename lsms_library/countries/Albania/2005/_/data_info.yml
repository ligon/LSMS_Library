Country: Albania
Wave: 2005

individual_education:
    file: ../Data/educationB_cl.dta
    idxvars:
        i:
            - m0_q00
            - m0_q01
        pid: m2b_q00
    myvars:
        Educational Attainment:
            - m2b_q04
            - mappings: ['harmonize_education', 'Original Label', 'Preferred Label']

# cluster_features: NOT built here.  It is CLUSTER grain (index (t, v)) but the
# only source in this wave is household/person grain, so a YAML extraction had to
# declare an extra household idxvar -- which the framework then silently collapsed
# with groupby().first() (GH #323).  It is now built by _/cluster_features.py
# (materialize: make in ../../_/data_scheme.yml), which reduces to cluster grain
# EXPLICITLY and CHECKS that each cluster carries one distinct value per column.

household_roster:
    # i=[m0_q00,m0_q01] -> composite via mapping.py:i() ('m0_q00-m0_q01') to
    # match sample()'s household identity, so _join_v_from_sample resolves v.
    # Bare i=m0_q01 keyed on the within-cluster household number (only ~12
    # distinct), which collapsed the roster and broke the v-join (sample's i is
    # the composite m0_q00-m0_q01; the within-cluster number is unique only
    # inside a PSU).  v is NOT declared here -- the framework joins it from
    # sample() (the 2004 / interview_date idiom).  See GH #340, CONTENTS.org.
    file:
        - ../Data/household_rosterA_cl.dta

    idxvars:
        i: [m0_q00, m0_q01]
        pid: m1a_q00

    myvars:
        Sex:
            - m1a_q02
            - mapping:
                1: Male
                2: Female

        Age: m1a_q5y

        Marital:
            - m1a_q06
            - mapping:
                1: Married
                2: Divorced/Separated
                3: Living together
                4: Widow/er
                5: Single

        Relationship:
            - m1a_q03
            - mapping:
                1: Head
                2: Spouse
                3: Partner
                4: Child/Adopted child
                5: Grandchild
                6: Niece/Nephew
                7: Father/Mother
                8: Sister/Brother
                9: Son/Daughter in law
                10: Brother/Sister in law
                11: Grandfather/Mother
                12: Father/Mother in law
                13: Other relative
                14: Not related

        MonthsAway: m1a_q09

housing:
    # Module 13A dwelling. i=[m0_q00,m0_q01] uses the composite i() (mapping.py)
    # to match the household identity built by sample.py, so _join_v_from_sample
    # resolves v. Walls/Toilet/Tenure are value-labelled categoricals (NAME
    # strings via convert_categoricals); Rooms is the integer room count.
    # No Roof/Floor/Water/Electricity in Module 13A (water/electricity live in
    # dwellingB_cl.dta).
    file: ../Data/dwellingA_cl.dta
    idxvars:
        i:
            - m0_q00
            - m0_q01
    myvars:
        Walls: m13a_q02
        Toilet: m13a_q10
        Tenure: m13a_q14
        Rooms: m13a_q08

interview_date:
    # Cover page identification_cl.dta.  GH #474: previously wired Int_t to
    # m0_date, which the source labels "Date of last modification" -- a
    # data-entry timestamp, NOT the fieldwork interview date.  The real
    # interview date is the "Day / Month / Year of Interview" question =
    # m0_q8d/m/y (single visit; the cover records no second enumerator
    # visit).  Columns are given year, month, day order and combined into a
    # Timestamp by albania.albania_date_ymd, then melted onto a `visit` index
    # level (visit=1 only here) by the country-level albania.interview_date
    # df_edit hook.  i=[m0_q00,m0_q01] uses the composite i() to match the
    # household identity built by sample.py (so _join_v_from_sample resolves v).
    file:
        - ../Data/identification_cl.dta
    idxvars:
        i: [m0_q00, m0_q01]
    myvars:
        int_t:
            - m0_q8y
            - m0_q8m
            - m0_q8d
            - mapping: albania_date_ymd

subjective_well_being:
    # Module 7 "Subjective Poverty" (subjective_poverty_cl.dta).  Two
    # economic-status ladder items are asked: m07_q09_1 = CURRENT step,
    # m07_q09_2 = the retrospective companion.  Own Step = the current item
    # (1-10; 1 = poorest, 10 = richest); the retrospective item is dropped.
    # i=[m0_q00,m0_q01] -> composite via mapping.py:i() to match sample()'s
    # household identity (the housing/interview_date idiom); the roster's bare
    # i=m0_q01 is the known within-cluster-number defect we do NOT copy.
    file:
        - ../Data/subjective_poverty_cl.dta
    idxvars:
        i: [m0_q00, m0_q01]
    myvars:
        Own Step: m07_q09_1
