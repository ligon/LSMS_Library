Country: Albania
Wave: 2004

cluster_features:
    file: ../Data/w3_hh_basic.dta
    idxvars:
        v: m0_q01
        i: chid
    myvars:
        Region: m0_distr

household_roster:
    file: ../Data/w3_roster_all.dta
    idxvars:
        i: chid
        pid: pid
    myvars:
        Sex:
            - m1_q04
            - mapping:
                1: Male
                2: Female

        Age: m1_q06

        Marital:
            - m1_q17
            - mapping:
                1: Married
                2: Divorced/Separated
                3: Living together
                4: Widow/er
                5: Single

        Relationship:
            - m1_q16
            - mapping:
                1: Head
                2: Spouse/Partner
                3: Child/Adopted child
                4: Grandchild
                5: Niece/Nephew
                6: Father/Mother
                7: Sister/Brother
                8: Son/Daughter in law
                9: Brother/Sister in law
                10: Grandfather/Mother
                11: Father/Mother in law
                12: Other relative
                13: Not related

        MonthsAway: m1_q08

interview_date:
    # Cover page w3_hh_basic.dta.  GH #474: previously wired Int_t to
    # m0_date, which the source labels "data entry date" -- a data-entry
    # timestamp, NOT the fieldwork interview date.  The real interview date
    # is "date of enumeration (day/month/year)" = m0_q04d/m/y (single visit;
    # the 2004 panel cover records no second enumerator visit).  Columns are
    # given year, month, day order and combined into a Timestamp by
    # albania.albania_date_ymd, then melted onto a `visit` index level
    # (visit=1 only here) by the country-level albania.interview_date df_edit
    # hook.  i=chid matches the roster.
    file:
        - ../Data/w3_hh_basic.dta
    idxvars:
        i: chid
    myvars:
        int_t:
            - m0_q04y
            - m0_q04m
            - m0_q04d
            - mapping: albania_date_ymd
