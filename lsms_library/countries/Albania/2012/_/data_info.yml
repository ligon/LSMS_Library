Country: Albania
Wave: 2012

individual_education:
    file: ../Data/Modul_2B_education.sav
    idxvars:
        i:
            - psu
            - hh
        pid: idcode
    myvars:
        Educational Attainment: m2b_q04

household_roster:
    file:
        - ../Data/Modul_1A_householdroster.sav

    idxvars:
        v: psu
        i: hhid
        pid: idcode

    myvars:
        Sex:
            - m1a_q02
            - mapping:
                1: Male
                2: Female

        Age: m1a_q05y

        Marital:
            - m1a_q06
            - mapping:
                1: Married
                2: Divorced/Separated
                3: Living together
                4: Widow/er
                5: Single

        Relationship:
            - m1a_q03
            - mapping:
                1: Head
                2: Spouse
                3: Partner
                4: Child/Adopted child
                5: Grandchild
                6: Niece/Nephew
                7: Father/Mother
                8: Sister/Brother
                9: Son/Daughter in law
                10: Brother/Sister in law
                11: Grandfather/Mother
                12: Father/Mother in law
                13: Other relative
                14: Not related

        MonthsAway: m1a_q09

housing:
    # Module 13A dwelling. i=[psu,hh] uses the composite i() (mapping.py), which
    # reconstructs hhid=psu*100+hh to match the household identity built by
    # sample.py, so _join_v_from_sample resolves v. Walls/Toilet/Tenure are
    # value-labelled Title-case categoricals (NAME strings); Rooms is the integer
    # room count. No Roof/Floor/Water/Electricity in Module 13A (utilities live
    # in Modul_13B_Utilities.sav).
    file: ../Data/Modul_13A_Description_of_Dwelling.sav
    idxvars:
        i:
            - psu
            - hh
    myvars:
        Walls: m13a_q02
        Toilet: m13a_q10
        Tenure: m13a_q14
        Rooms: m13a_q08
