Country: Albania
Wave: 2002

cluster_features:
    file: ../Data/metadata_cl.dta
    idxvars:
        v: psu
        i: hh
    myvars:
        Region: m0_q1a
        Rural: m0_ur

household_roster:
    # i=[psu,hh] -> composite via mapping.py:i() ('psu-hh') to match sample()'s
    # household identity, so _join_v_from_sample resolves v.  Bare i=hh keyed on
    # the within-cluster household number (only ~14 distinct), which collapsed
    # the roster and broke the v-join (sample's i is the composite psu-hh; the
    # within-cluster number is unique only inside a PSU).  v is NOT declared
    # here -- the framework joins it from sample() (the 2004 / interview_date
    # idiom).  See GH #340, CONTENTS.org.
    file:
        - ../Data/hhroster_cl.dta

    idxvars:
        i: [psu, hh]
        pid: m1_q00

    myvars:
        Sex:
            - m1_q02
            - mapping:
                1: Male
                2: Female

        Age: m1_q05y

        Marital:
            - m1_q06
            - mapping:
                1: Married
                2: Divorced/Separated
                3: Living together
                4: Widow/er
                5: Single

        Relationship:
            - m1_q03
            - mapping:
                1: Head
                2: Spouse/Partner
                3: Child/Adopted child
                4: Grandchild
                5: Niece/Nephew
                6: Father/Mother
                7: Sister/Brother
                8: Son/Daughter in law
                9: Brother/Sister in law
                10: Grandfather/Mother
                11: Father/Mother in law
                12: Other relative
                13: Not related

        MonthsAway: m1_q11

interview_date:
    # Cover page metadata_cl.dta.  GH #474: previously wired Int_t to
    # m0_date, which the source labels "Date of last modification" -- a
    # data-entry timestamp, NOT the fieldwork interview date.  The real
    # interview date is the "Day / Month / Year of Interview" question:
    # Visit 1 = m0_q08d/m/y, Visit 2 = m0_q08d2/m2/y2 (Albania 2002 is a
    # genuine two-visit survey; the *2 columns are empty in this file, so the
    # country-level albania.interview_date melt yields no visit=2 rows -- NaT
    # rows are dropped, never fabricated).  Columns are given year, month, day
    # order and combined into a Timestamp by albania.albania_date_ymd, then
    # melted onto a `visit` index level by the country-level
    # albania.interview_date df_edit hook.
    # i=[psu,hh] -> composite via mapping.py:i() to match sample()'s household
    # identity ('psu-hh'); `hh` alone is only the within-cluster number (14
    # unique). See CONTENTS.org re: the roster's i=hh issue.
    # converted_categoricals: False -- the Year-of-Interview column carries a
    # Stata value label that decodes every cell to '***Undefined Label'; read
    # the underlying numeric code so albania_date_ymd sees 2002, not a label.
    file:
        - ../Data/metadata_cl.dta
    converted_categoricals: False
    idxvars:
        i: [psu, hh]
    myvars:
        int_t:
            - m0_q08y
            - m0_q08m
            - m0_q08d
            - mapping: albania_date_ymd
        int_t_v2:
            - m0_q08y2
            - m0_q08m2
            - m0_q08d2
            - mapping: albania_date_ymd

subjective_well_being:
    # Module 9 "Subjective Poverty" (subjpov_cl.dta).  m09_q09 "Economic status"
    # is the welfare-ladder self-placement (1-10; 1 = poorest, 10 = richest).
    # i=[psu,hh] -> composite via mapping.py:i() to match sample()'s household
    # identity ('psu-hh') so _join_v_from_sample resolves v.  This is the
    # housing/interview_date idiom; the roster's bare i=hh is a known wave-2002
    # defect (the within-cluster number, only 14 unique) that we do NOT copy.
    # Only the single current-status item is present here.
    file:
        - ../Data/subjpov_cl.dta
    idxvars:
        i: [psu, hh]
    myvars:
        Own Step: m09_q09
