Country: Albania
Wave: 2002

cluster_features:
    file: ../Data/metadata_cl.dta
    idxvars:
        v: psu
        i: hh
    myvars:
        Region: m0_q1a
        Rural: m0_ur

household_roster:
    file:
        - ../Data/hhroster_cl.dta

    idxvars:
        v: psu
        i: hh
        pid: m1_q00

    myvars:
        Sex:
            - m1_q02
            - mapping:
                1: Male
                2: Female

        Age: m1_q05y

        Marital:
            - m1_q06
            - mapping:
                1: Married
                2: Divorced/Separated
                3: Living together
                4: Widow/er
                5: Single

        Relationship:
            - m1_q03
            - mapping:
                1: Head
                2: Spouse/Partner
                3: Child/Adopted child
                4: Grandchild
                5: Niece/Nephew
                6: Father/Mother
                7: Sister/Brother
                8: Son/Daughter in law
                9: Brother/Sister in law
                10: Grandfather/Mother
                11: Father/Mother in law
                12: Other relative
                13: Not related

        MonthsAway: m1_q11

interview_date:
    # Cover page metadata_cl.dta; m0_date is int YYYYMMDD parsed by
    # mapping.py:Int_t. i=[psu,hh] -> composite via mapping.py:i() to match
    # sample()'s household identity ('psu-hh'); `hh` alone is only the
    # within-cluster number (14 unique). See CONTENTS.org re: the roster's
    # i=hh issue.
    file:
        - ../Data/metadata_cl.dta
    idxvars:
        i: [psu, hh]
    myvars:
        Int_t:
            - m0_date

subjective_well_being:
    # Module 9 "Subjective Poverty" (subjpov_cl.dta).  m09_q09 "Economic status"
    # is the welfare-ladder self-placement (1-10; 1 = poorest, 10 = richest).
    # i=[psu,hh] -> composite via mapping.py:i() to match sample()'s household
    # identity ('psu-hh') so _join_v_from_sample resolves v.  This is the
    # housing/interview_date idiom; the roster's bare i=hh is a known wave-2002
    # defect (the within-cluster number, only 14 unique) that we do NOT copy.
    # Only the single current-status item is present here.
    file:
        - ../Data/subjpov_cl.dta
    idxvars:
        i: [psu, hh]
    myvars:
        Own Step: m09_q09
