
Country: Albania

# 1996 excluded: Employment and Welfare Survey (EWS), not LSMS.
# Data hosted externally at INSTAT (Albanian statistical office);
# never downloaded into this repository.  No Data/ directory exists.
Waves:
  - '2002'
  - '2003'
  - '2004'
  - '2005'
  - '2008'
  - '2012'

Data Scheme:
  cluster_features:
    index: (t, v)
    Region: str
    Rural: str

  household_roster:
    index: (t, v, i, pid)
    Sex: str
    Age: float
    Relationship: str
    Marital: str