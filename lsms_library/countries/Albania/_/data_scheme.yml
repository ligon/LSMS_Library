
Country: Albania

# 1996 excluded: Employment and Welfare Survey (EWS), not LSMS.
Waves:
  - '2002'
  - '2003'
  - '2004'
  - '2005'
  - '2008'
  - '2012'

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  # CLUSTER grain (index (t, v)).  Built by per-wave _/cluster_features.py
  # scripts (2002, 2003, 2004, 2005; the 2008/2012 waves carry no cluster file).
  #
  # GH #323: every wave's only source is HOUSEHOLD grain -- 2003's is the PERSON
  # roster -- so the old YAML extraction declared an extra household idxvar that
  # is not part of the declared index.  _normalize_dataframe_index then dropped
  # that level and collapsed the leftover duplicate (t, v) tuples with
  # groupby().first(), SILENTLY discarding 3,149 / 8,229 / 1,347 / 3,360 rows in
  # 2002 / 2003 / 2004 / 2005.
  #
  # The scripts reduce to cluster grain EXPLICITLY, via albania.cluster_reduce,
  # which REQUIRES exactly one distinct non-NA value per (cluster, column) and
  # emits <NA> + a RuntimeWarning otherwise.  Declaring the reduction here as an
  # `aggregation:` block would NOT have worked: that key is read by nothing in
  # the library (it sits only in `_skip` sets), so it documents a policy without
  # enforcing one.
  #
  # 2004 additionally needed a SEMANTIC fix: its m0_distr is the household's
  # CURRENT district while m0_q01 is its ORIGINAL 2002 PSU, so first() handed
  # movers' districts to whole clusters.  Region is anchored on the 2002
  # psu -> district map; sentinel "PSUs" 995/999 are dropped as non-clusters.
  cluster_features:
    index: (t, v)
    Region: str
    Rural: str
    materialize: make

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: float
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
    Marital: str

  assets:
    index: (t, i, j)
    Quantity: float
    Value: float
    Age: float
    materialize: make

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  housing:
    index: (t, i)
    Walls: str
    Toilet: str
    Tenure: str
    Rooms: float

  # Module 7 "Subjective Poverty" (household questionnaire; Module 9 in the
  # 2002 questionnaire numbering).  Self-placement welfare ladder: "imagine a
  # ladder/scale of economic status; on which step does your household stand
  # today?".  The native scale is 1-10 (1 = poorest, 10 = richest) in EVERY
  # wired wave -- NOT the 6 steps suggested in the #331 verifier note (the data
  # plainly span 1..10).  Own Step keeps the native 1-10 integer; higher =
  # better off (consistent with the Malawi/Cantril anchor).  Only the CURRENT
  # placement is carried; the retrospective "step N years ago" companion item
  # present in 2005/2008/2012 is dropped.  No Neighbors/Friends step is asked.
  subjective_well_being:
    index: (t, i)
    Own Step: int

  interview_date:
    # GH #474: Int_t now comes from the "Day / Month / Year of Interview"
    # question (Visit 1 = m0_q08*/m0_q04*/m0_q8*, Visit 2 = m0_q08*2 in
    # 2002), NOT the m0_date last-modification / data-entry stamp.  Albania
    # 2002 is a genuine two-visit survey, so -- following the Malawi pattern
    # -- both visit dates are preserved on an ordinal `visit` index level
    # (1 = first visit, 2 = second visit), melted by the country-level
    # albania.interview_date df_edit hook (visit rows with a NaT date are
    # dropped there).  2004 / 2005 are single-visit -> visit = 1 only; the
    # 2002 *2 columns are empty in this data file -> no visit = 2 rows.
    # `v` auto-joins from sample() at API time, so the returned grain is
    # (t, v, i, visit).  Collapsing `visit` with the declared `first`
    # aggregation reproduces the legacy Visit-1-only table.
    index: (t, i, visit)
    Int_t: datetime
    aggregation:
      visit: first

  # Occurrence-only shocks module (2012 wave only; earlier waves have no
  # shocks module).  No impact (Affected*) or coping (HowCoped*) detail in
  # the source; ``Years`` is the comma-joined list of years 2008-2012 in
  # which each experienced shock was reported.
  shocks:
    index: (t, i, Shock)
    Years: str
    materialize: make

  # Lasting per-plot characteristics from each wave's agriculture roster
  # (GH #167).  Four buildable waves: 2002 (agr_a1_cl.dta), 2005
  # (agric/part1_roster_a.dta), 2008 (Modul_17_id_of_agric_household.sav),
  # 2012 (Modul_17_..._Hh_Q3-9.sav).  i matches each wave's sample identity
  # (psu-hh for 2002/2005/2008; psu*100+hh for 2012); plot_id is the source
  # plot code (2012 has none -> synthesised 1..n per HH).  Area is converted
  # from the source square meters to canonical hectares; AreaUnit records the
  # source unit.  Tenure (acquisition/origin), TenureSystem (legal title doc),
  # SoilType (kind of land), and Irrigated are populated where the wave's
  # questionnaire carries them: 2008 has only Area/AreaUnit/SoilType; only
  # 2002 & 2005 carry an irrigation question.  Panel waves 2003 & 2004 have
  # only a wide household-level farm module with undecodable column labels and
  # no per-plot area -> ABSENT (see CONTENTS.org).
  plot_features:
    index: (t, i, plot_id)
    Area: float
    AreaUnit: str
    Tenure: str
    TenureSystem: str
    SoilType: str
    Irrigated: bool
    materialize: make
