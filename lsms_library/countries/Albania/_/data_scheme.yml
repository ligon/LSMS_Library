
Country: Albania

# 1996 excluded: Employment and Welfare Survey (EWS), not LSMS.
Waves:
  - '2002'
  - '2003'
  - '2004'
  - '2005'
  - '2008'
  - '2012'

Data Scheme:
  sample:
    index: (i, t)
    v: str
    weight: float
    panel_weight: float
    strata: str
    Rural: str

  cluster_features:
    index: (t, v)
    Region: str
    Rural: str

  household_roster:
    index: (t, i, pid)
    Sex: str
    Age: float
    Relationship: str
    Generation: int
    Distance: int
    Affinity: str
    Marital: str

  assets:
    index: (t, i, j)
    Quantity: float
    Value: float
    Age: float
    materialize: make

  individual_education:
    index: (t, i, pid)
    Educational Attainment: str

  housing:
    index: (t, i)
    Walls: str
    Toilet: str
    Tenure: str
    Rooms: float

  interview_date:
    index: (t, i)
    Int_t: datetime

  # Occurrence-only shocks module (2012 wave only; earlier waves have no
  # shocks module).  No impact (Affected*) or coping (HowCoped*) detail in
  # the source; ``Years`` is the comma-joined list of years 2008-2012 in
  # which each experienced shock was reported.
  shocks:
    index: (t, i, Shock)
    Years: str
    materialize: make
