Country: Albania
Wave: 2003

# cluster_features: NOT built here.  It is CLUSTER grain (index (t, v)) but the
# only source in this wave is household/person grain, so a YAML extraction had to
# declare an extra household idxvar -- which the framework then silently collapsed
# with groupby().first() (GH #323).  It is now built by _/cluster_features.py
# (materialize: make in ../../_/data_scheme.yml), which reduces to cluster grain
# EXPLICITLY and CHECKS that each cluster carries one distinct value per column.

household_roster:
    file:
        - ../Data/w2_roster_all.dta

    idxvars:
        v: PSU
        i: BHID
        pid: B1_Q01

    myvars:
        Sex:
            - B1_Q04
            - mapping:
                male: Male
                female: Female

        Age: B1_Q06

        Marital:
            - B1_Q18
            - mapping:
                married: Married
                divorced/separated: Divorced/Separated
                living together: Living together
                widower: Widow/er
                single: Single

        Relationship:
            - B1_Q17
            - mapping:
                head: Head
                spouse -partner: Spouse/Partner
                child - adopted child: Child/Adopted child
                grandchild: Grandchild
                niece - nephew: Niece/Nephew
                father - mother: Father/Mother
                sister - brother: Sister/Brother
                son - daughter in law: Son/Daughter in law
                brother - sister in law: Brother/Sister in law
                grandfather - mother: Grandfather/Mother
                father - mother in law: Father/Mother in law
                other relative: Other relative
                not related: Not related

        MonthsAway: B1_Q08

subjective_well_being:
    # Section B10A "Subjective Poverty" (w2_hh_all.dta, one row per BHID).
    # B10A_Q05 "step of poverty" is the welfare-ladder self-placement (1-10;
    # 1 = poorest, 10 = richest).  i=BHID matches sample()/household_roster.
    file:
        - ../Data/w2_hh_all.dta
    idxvars:
        i: BHID
    myvars:
        Own Step: B10A_Q05
