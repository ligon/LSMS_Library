Single Index:
  v: cluster
  i: household id
  j: expenditure item
  t: wave
  pid: individual id
  plot_id: plot id
  int_t: interview date
  u: unit
  m: region

Index Info:
  note: global index info
  index_info:
    cluster_features: (t, v)
    household_roster: (t, v, i, pid)
    household_characteristics: (t, v, i, m)
    plot_features: (t, v, i, plot_id)
    food_acquired: (t, m, v, i, j, u)
    nonfood_acquired: (t, v, i, j)
    interview_date: (t, v, i)
    shocks: (t, i, Shock)
    panel_ids: (t, i)
    assets: (t, i, j)
    individual_education: (t, v, i, pid)

# Canonical column definitions for cross-country tables.
# 'required: true' means every country declaring this table must include
# the column.  'values' lists the only acceptable spellings for that
# column's contents (enforced globally, not country-specific).
Columns:
  household_roster:
    # Kinship decomposition (Kroeber 1909; Romney & D'Andrade 1964).
    # Sex x Generation x Distance x Affinity recovers all conventional
    # relationship labels without redundancy.
    Sex:
      type: str
      required: true
      values: [M, F]
    Age:
      type: int
      required: true
    Generation:
      type: int
      required: true
      note: vertical distance from head (0=same, +1=parent, -1=child, etc.)
    Distance:
      type: int
      required: true
      note: collateral distance (0=lineal, 1=sibling line, 2=cousin line)
    Affinity:
      type: str
      required: true
      values: [consanguineal, affinal, step, foster, unrelated, guest, servant]
  cluster_features:
    Region:
      type: str
      required: true
    Rural:
      type: str
      required: true
    District:
      type: str
  shocks:
    AffectedIncome:
      type: bool
    AffectedAssets:
      type: bool
    AffectedProduction:
      type: bool
    AffectedConsumption:
      type: bool
    HowCoped0:
      type: str
    HowCoped1:
      type: str
    HowCoped2:
      type: str
  interview_date:
    Int_t:
      type: datetime
  individual_education:
    Educational Attainment:
      type: str
  panel_ids:
    previous_i:
      type: str

# Spellings that must never appear in column names.  Key is the rejected
# spelling; value is the canonical replacement.
Rejected Spellings:
  Relation: Generation, Distance, Affinity
  Relationship: Generation, Distance, Affinity
  Effected: Affected
  Highest_education: Educational Attainment
  Highest Education: Educational Attainment