Single Index:
  v: cluster
  i: household id
  j: expenditure item
  t: wave
  pid: individual id
  plot_id: plot id
  int_t: interview date
  u: unit
  m: region
  s: acquisition source       # values: purchased, produced, inkind, other (food_acquired)

Index Info:
  note: global index info
  index_info:
    cluster_features: (t, v)
    household_roster: (t, v, i, pid)
    household_characteristics: (t, v, i, m)
    plot_features: (t, v, i, plot_id)
    food_acquired: (t, v, i, j, u, s)
    interview_date: (t, v, i, visit)
    shocks: (t, i, Shock)
    panel_ids: (t, i)
    assets: (t, i, j)
    individual_education: (t, v, i, pid)
    food_prices: (t, v, i, j, u, s)
    food_quantities: (t, v, i, j, u, s)
    # GH #496: register so Feature() assembles a named MultiIndex instead of
    # collapsing to a single object-tuple Index.  livestock is homogeneous
    # across countries; people_last7days is (t,v,i,pid) for all but Uganda
    # (reduced to (t,v,i) -- handled as a reduced-index country).  The plot-
    # level ag features (plot_labor/crop_production/plot_inputs) are NOT here:
    # their per-country index NAMES diverge (plot vs plot_id, crop vs j) and
    # need harmonizing before registration -- tracked separately.
    livestock: (t, i, animal)
    people_last7days: (t, v, i, pid)

  # Features whose reduced-index countries get their MISSING canonical levels
  # FABRICATED as NaN (so all countries share the full canonical shape and are
  # KEPT) instead of being modal-excluded.  Use only where the reduced shape is
  # legitimate variation, not an incompatible table.
  # interview_date (#506): EHCVM countries are genuinely per-visit (t,v,i,visit);
  # single-visit countries get visit=NaN so Feature() keeps the per-visit dates
  # instead of dropping `visit` and first()-collapsing one date per household.
  fabricate_missing_levels:
    - interview_date

# Cluster-id (v) join policy.  _finalize_result() joins v from sample() onto
# household-level (i, t) tables that lack it.  A table is SKIPPED when its
# canonical index in `index_info` above omits v, OR when it is listed in
# `skip_extra` below.  Declarative (GH #436, code/config separation): adding a
# feature whose canonical index has no v needs no framework-code edit -- declare
# its index in `index_info`, or (for tables not yet there) add it to skip_extra.
# If this whole section is absent (e.g. an older data_info.yml is loaded), the
# framework falls back to its historical hardcoded set rather than re-enabling
# the join, so behavior never silently changes under version skew.
Join v from sample:
  skip_extra:
    # Framework-special or not-yet-in-index_info tables:
    #   sample            -- the v source itself (also already carries a v column)
    #   cluster_features  -- keyed by (t, v) directly; has no i, so never joined
    #   panel_ids/updated_ids -- dict @property tables, not (i, t) frames
    #   livestock/income  -- household tables not yet declared in index_info
    - sample
    - cluster_features
    - panel_ids
    - updated_ids
    - livestock
    - income

# Canonical column definitions for cross-country tables.
# 'required: true' means every country declaring this table must include
# the column.  'spellings' is an inverse dictionary: each key is the
# canonical value, its list contains accepted variant spellings that the
# runtime maps to the canonical form.  The canonical values are simply
# spellings.keys().
Columns:
  household_roster:
    # Kinship decomposition (Kroeber 1909; Romney & D'Andrade 1964).
    # Sex x Generation x Distance x Affinity recovers all conventional
    # relationship labels without redundancy.
    Sex:
      type: str
      required: true
      spellings:
        # English / French covered by the original list; Portuguese
        # (Masculino / Feminino) added for Guinea-Bissau; Spanish
        # (masculino / femenino, lowercase) for Guatemala; bare
        # 'Feminin' (capital, no accent) for Burkina_Faso.
        M: [Male, male, Masculin, masculin, Homme, homme, m, MALE,
            Masculino, masculino]
        F: [Female, female, Féminin, feminin, Femme, femme, f, FEMALE,
            Feminin, Feminino, femenino]
    Age:
      # Float64 (pandas nullable) so DOB-derived fractional ages
      # survive (e.g. age_handler returns 3.8 from a (DOB, interview)
      # pair).  Int64 round-then-cast was reverted in v0.7.2 because
      # it pushed boundary-fractional ages into the wrong demographic
      # bracket via pd.cut(..., right=False) in age_intervals().
      type: float
      required: true
    Relationship:
      type: str
      required: true
      note: original survey label for relationship to household head
    Generation:
      type: int
      required: true
      api_derived: true
      note: vertical distance from head (0=same, +1=parent, -1=child, etc.)
    Distance:
      type: int
      required: true
      api_derived: true
      note: collateral distance (0=lineal, 1=sibling line, 2=cousin line)
    Affinity:
      type: str
      required: true
      api_derived: true
      spellings:
        consanguineal: []
        affinal: []
        step: []
        foster: []
        unrelated: []
        guest: []
        servant: []
  sample:
    # `sample` was historically absent from this section, which made
    # _enforce_canonical_spellings a complete no-op on sample() -- it did not
    # merely fail to reject unknown values, it never even mapped the *known*
    # variants.  That is why Tajikistan shipped 9,020 rows of lowercase
    # 'rural'/'urban' sitting next to canonical 'Rural'/'Urban'.  GH #602.
    #
    # Rural is deliberately NOT `required: true`: many countries' sample table
    # carries only (v, weight, strata) and has no urban/rural indicator at all.
    Rural:
      type: str
      spellings:
        # Same vocabulary as cluster_features.Rural below -- one concept, one
        # canonical spelling, wherever it appears.
        # French (EHCVM) and Portuguese (Guinea-Bissau) labels are accepted
        # variants of the same concept -- the survey language should not change
        # the canonical value the user filters on.  GH #602.
        Rural: [rural, RURAL, Rurale, rurale, RURALE, Rural (zone rurale)]
        Urban: [urban, URBAN, Urbain, urbain, URBAIN, Urbano, urbano, URBANO]
        # Third settlement stratum, used only by South Africa 1993 (PSLSD),
        # whose sampling frame classifies areas as urban / rural / informal
        # (squatter settlement).  It is deliberately NOT folded into Urban:
        # the source's own `metro` variable groups these households with the
        # non-metro areas (type=3 is entirely metro=3, whereas the urban
        # stratum is entirely metro=1), so there is no evidence they are urban.
        # Kept as a distinct, VISIBLE value rather than guessed away.  GH #602.
        Informal: []
  cluster_features:
    Region:
      type: str
      required: true
    Rural:
      type: str
      required: true
      spellings:
        # Canonical values are 'Rural' / 'Urban' (capitalised).  Some
        # wave-level extractions emit lowercase; normalise here via the
        # standard spellings path.  GH #163.
        # French (EHCVM) and Portuguese (Guinea-Bissau) labels are accepted
        # variants of the same concept -- the survey language should not change
        # the canonical value the user filters on.  GH #602.
        Rural: [rural, RURAL, Rurale, rurale, RURALE, Rural (zone rurale)]
        Urban: [urban, URBAN, Urbain, urbain, URBAIN, Urbano, urbano, URBANO]
        # Third settlement stratum, used only by South Africa 1993 (PSLSD),
        # whose sampling frame classifies areas as urban / rural / informal
        # (squatter settlement).  It is deliberately NOT folded into Urban:
        # the source's own `metro` variable groups these households with the
        # non-metro areas (type=3 is entirely metro=3, whereas the urban
        # stratum is entirely metro=1), so there is no evidence they are urban.
        # Kept as a distinct, VISIBLE value rather than guessed away.  GH #602.
        Informal: []
    District:
      type: str
    Latitude:
      type: float
    Longitude:
      type: float
  plot_features:
    # Lasting plot/parcel characteristics (GH #167).  Per-season detail
    # (which crop, who farmed it this season, season-specific inputs,
    # crop-share %) belongs in a future plot_cultivation table.  See
    # slurm_logs/DESIGN_erhs_plot_features_2026-05-20.org for the design
    # rationale; Uganda is the Phase-1 pilot.
    Area:
      type: float
      required: true
      note: plot area in hectares (canonical unit)
    AreaUnit:
      type: str
      note: original survey unit before conversion to hectares
    Tenure:
      type: str
      note: |
        Form under which the plot is held by the surveyed household.
        Captures the lasting ownership disposition; per-season contract
        detail (this year's crop-share percentage, this year's cash
        rent amount, partner identity) belongs in plot_cultivation.
        `use_right` = held under agreement with a use-rights owner (a
        recognized informal arrangement, often non-cash).  `squatted` =
        informal occupation without a recognized transfer (used without
        the owner's agreement, or cleared / walked-in).  Countries may
        extend this list rather than force-fit a local category.
      spellings:
        owned: []
        leased: []
        rented_in: []
        rented_out: []
        sharecropped_in: []
        sharecropped_out: []
        inherited: []
        communal: []
        use_right: []
        squatted: []
        other_tenure: []
    TenureSystem:
      type: str
      note: |
        Lasting legal / customary land-tenure regime, orthogonal to
        Tenure (which captures the household's ownership disposition).
        Country-specific vocabulary is permitted; Uganda contributes
        the mailo system, other countries are expected to extend the
        spellings list rather than force-fit to a foreign regime.
      spellings:
        freehold: []
        leasehold: []
        mailo: []
        customary: []
        granted_right_of_occupancy: []
        state: []
        community: []
        cooperative: []
        other_tenure_system: []
    SoilType:
      type: str
    Irrigated:
      type: bool
      note: |
        True if the plot has irrigation infrastructure / customary
        water access.  Treat as a lasting attribute (per-season
        variation in irrigated use lives in plot_cultivation).
    Latitude:
      type: float
    Longitude:
      type: float
  shocks:
    AffectedIncome:
      type: bool
    AffectedAssets:
      type: bool
    AffectedProduction:
      type: bool
    AffectedConsumption:
      type: bool
    HowCoped0:
      type: str
    HowCoped1:
      type: str
    HowCoped2:
      type: str
  interview_date:
    # Int_t: legacy single interview datetime (most countries).  EHCVM
    # records a start (and end) timestamp per enumerator visit, melted onto
    # an ordinal `visit` index (local_tools.melt_visit_intervals) into
    # Interview start / Interview end.  None required: a country emits
    # whichever columns its source records (start-only -> Interview start).
    Int_t:
      type: datetime
    Interview start:
      type: datetime
    Interview end:
      type: datetime
  individual_education:
    Educational Attainment:
      type: str
  panel_ids:
    previous_i:
      type: str
  food_acquired:
    # Acquisition source 's' is an INDEX level (see Index Info above),
    # not a column.  Canonical values: purchased, produced, inkind,
    # other.  Enforced in code (lsms_library.transformations.S_VALUES);
    # data_info.yml has no schema for index-level value enumerations.
    Quantity:
      type: float
      required: true
      note: amount acquired in unit u, per acquisition source s
    Expenditure:
      type: float
      monetary: true
      note: monetary value of the acquisition; primarily for
        s=purchased, also for s=inkind where the survey records an
        imputed value
    Price:
      type: float
      api_derived: true
      monetary: true
      note: |
        Value per unit at the relevant point of acquisition.  Market
        price for s=purchased (Expenditure / Quantity, back-calculated
        in _finalize_result if not stored).  Farmgate price for
        s=produced (survey-reported where available).  Imputed value
        for s=inkind where available.  NaN otherwise.

# Spellings that must never appear in column names.  Key is the rejected
# spelling; value is the canonical replacement.
Rejected Spellings:
  Effected: Affected
  Highest_education: Educational Attainment
  Highest Education: Educational Attainment
  # interview_date canonical column is Int_t (see Columns.interview_date
  # above); 10/11 countries emit lowercase 'int_t' (2026-04-13 feature
  # scan).  Substring rewrite is case-sensitive, so this matches 'int_t'
  # exactly without touching 'Int_t' or unrelated columns.
  int_t: Int_t

# Per-country currency for monetary columns (ISO 4217 alpha-3).
#
# Monetary values in the harmonized tables (food_expenditures.Expenditure,
# food_prices.Price, assets.Value, plot_labor.Wage, ...) are in nominal local
# currency units.  Within a single country they are commensurable; across
# countries (ll.Feature('food_expenditures')) they are not.  This section is the
# single source of truth mapping (country, wave) -> ISO 4217 code, consumed by
# lsms_library.currency.currency_for() and attached to monetary tables at API
# time when the caller passes currency='index'/'column' (see currency.py).
#
# It is also the JOIN KEY for the planned conversion layer (FX / PPP / CPI ->
# USD / international$ / real); that layer is NOT built yet.
#
# A value is either a scalar ISO code (constant across all of a country's waves)
# or a mapping {default: CODE, overrides: {'<wave>': CODE, ...}}.  Wave keys MUST
# be quoted strings -- they are matched against the string-valued `t` index level
# (e.g. '2005-06', '1999'), so an unquoted 1999 (YAML int) would never match.
#
# Currency is a function of (country, wave), NOT country alone: two in-sample
# redenominations changed both the SCALE and the ISO code mid-survey --
#   * GhanaLSS: old cedi GHC -> Ghana cedi GHS at 2007 (1 GHS = 10,000 GHC).
#   * Tajikistan: Tajikistani ruble TJR -> somoni TJS at 2000 (1 TJS = 1000 TJR).
# Currency is also NOT injective with country: the 8 EHCVM/WAEMU countries all
# share XOF.  Lines tagged `# VERIFY` are best-effort and should be confirmed
# against the questionnaire/codebook before relying on them downstream.
Currency:
  Albania: ALL
  Armenia: AMD
  Azerbaijan:                       # only the 1995 wave is present (pre-2006
    default: AZN                    # manat redenomination, 1 AZN = 5000 AZM)
    overrides: {'1995': AZM}
  Benin: XOF
  Burkina_Faso: XOF
  Cambodia: KHR
  China: CNY
  CotedIvoire: XOF
  Ethiopia: ETB
  EthiopiaRHS: ETB
  GhanaLSS:                         # 2007 redenomination, 1 GHS = 10,000 GHC
    default: GHS                    # (2012-13, 2016-17 -> GHS via default)
    overrides:
      '1987-88': GHC
      '1988-89': GHC
      '1991-92': GHC
      '1998-99': GHC
      '2005-06': GHC
  GhanaSPS: GHS                     # waves 2009-10/2013-14/2017-18, all post-reform
  Guatemala: GTQ
  Guinea-Bissau: XOF
  Guyana: GYD
  India: INR
  Iraq: IQD
  Kazakhstan: KZT
  Kosovo: EUR
  Liberia: LRD                      # VERIFY: HIES may report USD (dual currency)
  Malawi: MWK
  Mali: XOF
  Nepal: NPR
  Niger: XOF
  Nigeria: NGN
  Pakistan: PKR
  Panama: PAB                       # Balboa pegged 1:1 to USD; USD also circulates (dual currency)
  Senegal: XOF
  Serbia: RSD                       # 2007 wave (RSD since 2006)
  'Serbia and Montenegro':          # 2002, 2003 waves
    default: CSD                    # Serbian dinar (CSD) from 2003
    overrides: {'2002': YUM}        # VERIFY: Yugoslav dinar (YUM) in 2002
  South Africa: ZAR
  Tajikistan:                       # 2000 somoni reform, 1 TJS = 1000 TJR
    default: TJS                    # (2003, 2007, 2009 -> TJS via default)
    overrides: {'1999': TJR}
  Tanzania: TZS
  Timor-Leste: USD                  # USD official since 2000
  Togo: XOF
  Uganda: UGX