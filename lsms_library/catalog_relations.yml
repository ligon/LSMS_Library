# Relations BETWEEN World Bank catalog entries (GH #600).
#
# `Documentation/SOURCE.org` records what a *directory of ours* holds.  This
# file records facts about the *catalog itself* -- facts no wave directory can
# state on its own, and that catalog-id matching cannot see:
#
#   same_study    the WB catalogued ONE survey TWICE, in two repositories,
#                 under two ids, with nothing in the metadata linking them.
#   derived_from  an entry is BUILT OUT OF other entries (a harmonized panel
#                 re-release, an anonymized subset).  It is not an independent
#                 survey and, when we hold everything it is made of, it is not
#                 a gap in our holdings either.
#
# Why not put these in SOURCE.org?  Because a wave directory cannot honestly
# assert them.  `Nigeria/2010-11/` knows it holds GHS-Panel Wave 1; it does not
# know whether we also hold Waves 2-4, so it cannot say whether the Uniform
# Panel Dataset built from all four is covered.  `discover_waves()` checks that
# EVERY constituent is held before it calls a derived entry non-missing -- so a
# `derived_from` line can never over-claim.  Drop a constituent wave and the
# entry goes back to being reported as missing, on its own.
#
# EVERY entry carries its evidence.  An unevidenced claim here is an
# unfalsifiable permanent negative -- exactly the failure this file exists to
# prevent (cf. CLAUDE.md, "A closing verdict REQUIRES evidence").
#
# Evidence was gathered with the WB NADA datafile API
# (`/index.php/api/catalog/{id}/data_files?id_format=id`), which returns an
# entry's file list; that list was compared against the `*.dta` we actually
# hold.  The instrument was validated in both directions first: it matches
# 99/99 files for a held entry and 0/99 for the wrong one.

# ---------------------------------------------------------------------------
# One survey, two catalog ids, two repositories.
# ---------------------------------------------------------------------------
# `canonical` is the id we record in SOURCE.org.  A census that surfaces any
# other id in the group resolves to it -- so the duplicate reads as HELD, not
# as a missing wave.  Today `discover_waves()` searches only the repositories a
# country is configured for, so most of these never appear; this is the guard
# for when one does (GH #597 / PR #599 widen South Africa to `datafirst`).
same_study:
  - canonical: '297'
    ids: ['902']
    country: South Africa
    evidence: >-
      lsms 297 (ZAF_1993_IHS_v01_M, "Integrated Household Survey 1993") and
      datafirst 902 (ZAF_1993_PSLSD_v01_M, "Project for Statistics on Living
      Standards and Development 1993") list byte-for-byte the same 71 data
      files (71/71 overlap), and both lists are identical to the 71 files we
      hold in South Africa/1993/Data.  One survey, catalogued twice.  Checked
      2026-07-12 against the WB datafile API.

# ---------------------------------------------------------------------------
# Derived entries: built out of other entries, not surveys in their own right.
# ---------------------------------------------------------------------------
# `constituents` must be COMPLETE: `discover_waves()` reports the entry as
# `derived` (not a gap, not an acquisition target) only when we hold ALL of
# them.  If you are not sure a list is complete, do not write it -- an honest
# `no` beats a confident `derived`.
derived_from:
  '5835':
    country: Nigeria
    idno: NGA_2010-2019_NUPD_v01_M
    constituents: ['1002', '1952', '2734', '3557']
    evidence: >-
      "General Household Survey - Panel 2010-2019, Uniform Panel Data".  Its WB
      abstract describes "the universal panel survey instrument and datasets
      generated by the four rounds of the GHS"; those four rounds are GHS-Panel
      W1 (1002), W2 (1952), W3 (2734) and W4 (3557), all of which we hold.  Its
      own 65 files (nup_ph_mod_*, nup_pp_mod_*) are a harmonization of that
      content, not new fieldwork: 0 of them appear in any wave dir of ours.

  '3016':
    country: Malawi
    idno: MWI_2010_IHS-III_v01_M_v01_A_ML
    constituents: ['1003']
    evidence: >-
      A 4-file derived extract of the Third Integrated Household Survey --
      title "... ; Subset for Machine Learning Comparative Assessment Project",
      and its idno is literally 1003's idno (MWI_2010_IHS-III_v01_M) plus the
      WB's derived-version suffix _v01_A_ML.  It is a SUBSET of 1003, not an
      alias of it: its files (mwi_2010_household, mwi_2010_individual,
      mwi_2010_expenditure, mwi_2010_community) are rebuilt, and 0 of 1003's 85
      files appear under those names.  Recording it as `same_study` would
      flatten a subset relation into an equivalence.  It lives in the `central`
      repository, so it is invisible to an `lsms`-only search today.
